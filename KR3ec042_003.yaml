body:
  text: 卷之三角集廣木香廣木香味甘苦氣溫降也陰中陽也無毒能通神氣和胃氣行肝氣散滯氣破結氣止心疼逐冷氣安霍亂吐瀉嘔逆翻胃除痞癖症塊臍腹脹痛安胎散毒治痢必需且闢疫氣瘴癧但此物雖所必需亦止可少用之為佐使使氣行即止則不可謂其能補氣而重用之也大約用廣木香由一分二分至一錢而止斷勿出於一錢之外過多反無效功佐之補而不補佐之瀉而亦不瀉也或問廣木香與青木香同是止痢之藥子何取廣木香而棄青木香蓋廣木香氣溫而青木香氣寒耳夫痢乃濕熱青木香寒以去熱似相宜而余毅然刪去者惡青木香之散氣雖有益於痢終有損於氣也若廣木香則不然氣溫而不寒能降氣而不散氣且香先入脾脾得之而喜則脾氣調而穢物自去不攻之攻正善於攻此所以刪青木香而登廣木香也木香氣分藥又能開竅氣分藥與血分藥不同氣只要引之使通不須成隊共行若血藥則質滯而性膩非多不能成功香附香附味苦而甘氣寒而厚陽中陰也無毒入肝膽之經專解氣鬱氣疼調經逐瘀除皮膚瘙癢止霍亂吐逆崩漏下血乳腫癰瘡皆可治療宿食能消泄瀉能固長毛髮引血藥至氣分此乃氣血中必用之品可為佐使而不可為君臣今人不知其故用香附為君以治婦人之病如烏金丸四制香附丸之類暫服未嘗不快久之而虛者益虛郁者更郁何也香附非補劑也用之下氣以推陳非用之下氣以生新引血藥至氣分而散郁非引血藥入氣分而生血也舍氣血之味欲其陰生陽長得乎故氣虛宜補必用參耆血少宜生必須歸熟香附不過調和於其內參贊之寮佐而輕任之為大將鮮不敗乃事矣或問香附為解鬱聖藥吾子謂不可為君豈香附不能解鬱耶曰香附不解鬱又何藥以解鬱但不可專用之為君耳蓋郁病未有不傷肝者也香附入肝入膽之經而又解氣自易開肝中之滯澀但傷肝必傷其血而香附不能生血也必得白芍藥當歸以濟之則血足而鬱尤易解也夫君藥中之解鬱者莫善於芍藥芍藥得臣使速於解者莫妙於香附柴胡是芍藥為香附之君而香附為芍藥之佐合而治郁何郁不解乎或問香附解鬱而開胃乃有用香附而鬱仍不解胃仍不開豈又芍藥當歸之未用乎曰是又不盡然也香附解鬱者解易舒之郁也香附開胃者開未傷之胃也相思之病必得其心上之人而鬱乃解斷腸之症必得其意外之喜而胃乃開區區香附固自無功即益之以大料之芍藥厚味之當歸亦有無可如何者矣豈儘可望於草木之解鬱而開胃哉或問香附解鬱之品先生謂解鬱之無用是鬱症乃不可解之症吾甚為天下之有郁者危矣嗟郁之不解者非草木之能開而鬱之可解者舍草木又奚以開之耶香附正開鬱之可解者也可解之郁而欲舍香附而求之草木之外斯惑矣或疑香附性燥故易入肝肝氣既郁而肝木必加燥矣以燥投燥又何解鬱之有曰香附之解鬱正取其燥也惟燥故易入於燥之中惟燥故不可單用於燥之內和之以芍藥當歸則燥中有潤而肝舒燥中不燥而鬱解也益智益智味辛氣溫無毒入肺脾腎三經能補君相二火和中焦胃氣逐寒邪禁遺精溺止嘔噦攝涎唾調諸氣以安三焦夜多小便加鹽服之最效但不可多用恐動君相之火也然能善用之則取效甚捷大約入於補脾之內則健脾入於補肝之內則益肝入於補腎之中則滋腎也砂仁砂仁味辛苦氣溫無毒入脾肺膀胱大小腸止噦定吐除霍亂止噁心安腹痛溫脾胃治虛勞冷瀉消宿食止休息痢安胎頗良但只可為佐使以行滯氣所用不可過多用之補虛丸絶佳能輔諸補藥行氣血於不滯也或問砂仁消食之藥入之補虛之中似乎不宜何以絶佳不知補藥味重非佐之消食之藥未免過於滋益反恐難於開胃入之砂仁以蘇其脾胃之氣則補藥尤能消化而生精生氣更易易也或問砂仁香能入脾辛能潤腎虛氣不歸元非用此為嚮導不濟殆勝桂附熱毒之害多矣曰此不知砂仁者也砂仁只入脾而不入腎引補腎藥入於脾中則可謂諸補藥必借砂仁引其由脾以入腎則不可也神農本草並未言其入腎不過説主虛勞冷瀉耳夫冷瀉有專屬於脾者何謂脾寒俱是腎寒乎肉豆蔻肉豆蔻味苦辛氣溫無毒一名肉果入心脾大腸經療心腹脹疼止霍亂理脾胃虛寒能消宿食專溫補心包之火故又入膻中與胃經也但能止下寒之瀉而不能止下熱之痢從前本草多信治血痢有功而不言其止瀉痢夫瀉不同五更時痛瀉五六次到日間反不瀉名大瘕瀉也大瘕瀉者腎瀉也腎瀉乃命門無火以生脾土至五更亥子之時正腎氣正令之會腎火衰微何能生土所以作瀉故大瘕病必須補命門之火火旺而土自堅矣肉豆蔻非補命門之藥也然命門之火上通心包之火不旺而命門愈衰故欲補命門必須上補心包也膻中即心包一物而兩名之肉豆蔻補心包火補心包正所以補命門也況理脾胃寒虛原其長技命門旺而脾胃又去其虛寒脾胃得腎氣自足以分清濁而去水濕又何至五更之再瀉哉或問肉豆蔻開胃消食子舍而不談反言其能止大瘕之瀉亦何舍近而言遠乎曰大瘕之瀉正所以表肉豆蔻之開胃而消食也凡人命門之火不旺則下焦陰寒何能蒸腐水穀下不能消所以瀉也瀉久則亡陰陰亡則腎不能交於心包而心包亦寒心包寒則火不能生胃而胃又寒胃寒則胃氣蕭索又何能消食耶肉豆蔻溫補命門而通胞兩火相生於上下水瀉止而脾胃之氣自開不求其消食而自化言止腎瀉而開胃消食即在其中又何必再言哉或問肉豆蔻暖胃而健脾溫腎而止瀉故入之四神丸中以治脾腎寒虛之作瀉然而有效有不效者何故蓋腎虛作瀉又有不是命門之寒故服四神丸而反多後重之症矣夫腎虛未有不寒者寒則瀉不寒則何以瀉乃飲酒過多又加色欲使酒濕入於腎之中故作瀉也倘亦以肉豆蔻治之安能治腎寒者速效哉白豆蔻白豆蔻味辛氣大溫陽也無毒入手太陰肺經別有清高之氣非草豆蔻之可比也散胸中冷滯之氣益心包之元陽溫脾胃止嘔吐翻胃消積食目翳但此物尤難識鋪家多以草豆蔻充之所以用多不效總之必須白者為佳正不必問真假也或問白豆蔻與砂仁相似用砂仁可不必用白豆蔻矣而不知各有功效砂仁宜用之於補藥丸中而白豆蔻宜用之於補劑湯中蓋砂仁性緩而白豆蔻性急也藿香藿香味辛甘氣微溫可升可降陽也無毒入肺脾二經定霍亂有神止嘔吐尤效開胃消食去臭氣利水腫但亦可佐使而不可為君臣蓋藿香逐邪甚速未免耗氣亦多故佐氣血之藥往往取效否則無功耳或問藿香散暑氣子未言也不知藿香雖散暑氣亦散真氣也用藿香以散暑是猶執熱以止熱余所以不言耳雖霍亂亦暑症之一然用藿香以定霍亂實取其降氣非取其消暑又不可不知也或問藿香為定喘奇方而子何以未言夫藿香定喘乃言感暑氣而作喘也非藿香於治暑之外而更定喘也余所以只言其治霍亂逐邪而不言其定喘夫喘症多生於虛誤認虛喘為實喘下喉即便殺人故不敢言藿香之定喘實有微意耳高良薑良薑味辛氣大溫純陽無毒入心與膻中脾胃四經健脾開胃消食下氣除胃間逆冷止霍亂轉筋定瀉痢翻胃祛腹痛心疼溫中卻冷大有殊功倘內熱之人誤用之必至變生不測又不可不慎也高良薑止心中之痛然亦必與蒼朮同用為妙否則有愈有不愈以良薑不能祛濕故耳或問良薑最能解酒毒何子之未言也夫良薑辛溫大熱治客寒犯胃者實效倘胸腹大熱者愈增煩燒之苦矣良薑宜於治寒而不宜於治熱也酒性大熱投之解酒不以熱濟熱乎繆仲醇謂其能解酒毒此子所不信也紫蘇葉蘇子紫蘇葉梗味辛氣微溫無毒入心肺二經發表解肌療傷風寒開胃下食消脹滿除腳氣口臭蘇子降氣定喘止咳逆消膈氣破堅症利大小便定霍亂嘔吐紫蘇雖有葉與梗子之分而發表解肌止喘定嘔未嘗有異但葉與梗宜少用而子可多用也蓋葉梗散多於收而子則收多於散亦在人臨症而酌用之耳或問蘇葉表散風邪古人加人參同治奏功如響何也曰蘇葉不得人參其功不大今人一見用人參以祛邪輒驚駭不已宜乎醫生之不敢用往往輕變重而不可救夫邪初入人體正氣敢與邪戰用參以助正氣則正氣旺而又得祛邪之便則群邪自行解散此用參於蘇葉之內大有深意也至於風寒已感三四日則不可輕用人參當看虛弱壯盛而用藥矣或又問蘇子定喘有喘症用之而不效者何也蓋喘症有虛有實未可謂蘇子定喘而概用之也蘇子止可定實喘耳虛喘而用蘇子增其喘矣豈特不效而已哉或疑蘇子正是治虛喘之藥先生反謂虛喘用蘇子而愈增喘其義何乎蓋虛喘者乃氣虛也蘇子雖能定喘而未免耗氣氣耗則氣愈虛而喘更甚故治虛喘者必須大加人參熟地之藥而不可增入蘇子以增其喘也或問蘇葉散風邪之聖藥用之以發表中之風邪尤為相宜乃用之以散里中之風邪往往不效其必有義存焉先生既深知本草之微願備有以教我曰蘇葉之義不過散表邪耳原不深入於裡既不能深入又何能散在裡之風邪哉然而以所不能深入之故豫則可宜也蘇葉性輕而味厚性輕則上泛味厚則下沉宜乎可以通達內外矣然而性輕而香味厚而辛辛香則外馳易而內入難故但散在表之風邪而不散在裡之風邪也或問宗奭有言脾胃寒人食紫蘇多滑泄果有之乎曰紫蘇乃風藥也善能平肝土為木製則人多滑泄肝木既平則脾土得養矣況紫蘇辛溫辛能祛濕溫能祛寒脾胃寒之人宜無所忌何致滑泄耶惟是辛香之味能散人真氣暫服無礙而久服有傷亦當知忌也防風防風味甘辛氣溫升也陽也無毒系太陽本經之藥又通行脾胃二經古人曾分上中下以療病其實治風則一蓋隨所用而聽令從各引經之藥無所不達治一身之痛療半身之風散上下之濕祛陰陽之火皆能取效但散而不收攻而不補可暫時少用以成功而不可經年頻用以助虛耳或問通聖散專恃防風以散風邪可常用乎曰此方暫服尚不可烏可常哉蓋防風散人真氣即以之散風邪亦未可專恃也或問防風得黃耆則不散邪而輔正是防風亦可補之物先生何謂攻而不補乎夫黃耆得防風而其功更大未聞防風得黃耆而其功更神然則防風仍是攻而不補非攻而亦補之物也近人皆以防風為散風神藥毋論外感與非外感俱用之乃服而不效也或疑所用之不多也更加分兩以致散盡真氣不可哂乎殊不知防風宜於無風之時同黃耆用之可以杜邪風之不入於皮毛非風邪已入而可用之物也古人名一物必在深意顧名而可悟矣防己防己味辛苦氣寒陰也無毒能入腎以逐濕腰以下至足濕熱足痛腳氣皆除利大小二便退膀胱積熱消癰散腫除中風攣急風寒濕瘧熱邪似乎防己乃祛濕熱行經之聖藥也然其性只能下行不能上達凡濕熱在上焦者斷不可用用之則真氣大耗必至危亡説者謂防己乃下焦血分之藥可行於血分而不可行於氣分也不知即是下焦濕熱之病只可一用而亦不可再用防己之氣味尤悍一服而濕熱之在腎經者立時解散腎有補而無瀉多服則瀉腎矣如之何可再用乎或問本草俱言通十二經而吾子只言入腎子不能無疑也防己果通十二經則上焦頭目之病胸膈咽喉之間宜無不治之矣何以只見其治腰以下之病而能愈耶夫腰至於足正腎之所屬而謂非入腎者明驗乎然則言入十二經者乃前人流傳之誤而余説入腎者實有據之談也或問防己治腎中之濕與豨蘞治腎內之風二者合之不識可治腎乎此其言似善而其禍實大也夫腎有補而無瀉用一緩瀉尚為不得已之治法二者同施腎將立憊矣原因吾子之問以誡天下之人也或問防己利濕不止在腎而吾子獨謂入腎以為只能治腰足之濕也然而腰足之下不盡屬之腎與腰相對者臍也與足相附者筋也臍屬脾而筋屬肝安在盡屬於腎而必謂防己之治腎而不治肝脾人誰信之故腎病而臍與筋無不病矣防己治腎中之濕而臍與筋中之濕盡消非入腎而又入脾肝之謂也防己入腎不入肝脾何必固疑乎荊芥荊芥味辛苦氣溫浮而升陽也無毒能引血歸經清頭目之火通血脈逐邪氣化瘀血除濕痹破結聚散瘡痍治産後血暈有神中風強直亦能見效但入之血分之藥中使血各歸經而不至有妄行之虞若入之於氣分藥中反致散氣之失荊芥性升與柴胡升麻相同乃柴胡升麻入之補氣之中能提氣以升陽而荊芥獨不能者以荊芥雖升而性浮動補陽之藥尤惡動也血過凝滯荊芥之浮動則易流所以可引之以歸經氣易散亂荊芥之不更助其動乎氣過動必散此所以不可用之於補氣之藥耳或問荊芥引經走血分甚速走氣分甚遲前人言之而子尚未闡揚願暢談之曰荊芥本陽藥而非陰藥陽入陰則行速陽入陽則行遲夫陽屬氣而陰屬血血行遲而氣行速荊芥入血而速者乃血行遲而若見荊芥之行速也荊芥入氣而遲者乃氣行速若見荊芥則行遲也非荊芥走血分甚速氣分獨遲也或問荊芥引血歸經亦有引之而不歸經者乎夫荊芥炒黑則引血歸經生用則引氣歸經引血歸經者有益於血者引氣歸經者有益於氣有益於血者血無亂動之虞益於氣者氣有過動之失氣過動而血不能靜矣故用荊芥必須黑炒也炒黑以治無不歸經也或問荊芥亦能入腎乎荊芥何能入腎也雖然用之補腎藥中未嘗不可入腎但必須炒至純黑則腎屬黑正可同色以相入夫荊芥之藥本不必引入腎經蓋腎有補而無瀉也雖腎亦有感邪之日祛腎中之風邪風藥原無幾味與其藥用豨蘞防己之類以伐腎中之邪不若用炒黑荊芥雖散邪而不十分耗正之為得也白芷白芷味辛氣溫升也陽也無毒入手足陽明二經又入手太陰之經治頭痛解寒熱中風止崩漏赤白帶血閉能通散目中癢止痢消瘕治風通用定心腹血痛尤可外治各瘡癰痔漏消毒生肌殺蛇蟲此藥可為臣使未可恃之為君只外治可以為君耳蓋白芷辛散多服恐耗散元陽也或問白芷散氣外治獨不懼其壞事乎子之何慮之深也此藥修合之時便可驗其有無之效我有一法辨之尤佳凡買白芷治病其色皆白持回家中修合忽變為黑色者不必修合之也變為微黃色者半效變為老黃色者效少變為黃黯色者無效也辨其色之白者多用之即愈否則遞減用藥又何至外治散人真氣哉此藥尤靈故善變色老醫自有知之者非創説也細辛細辛味大辛氣溫升也陽也無毒入手足少陰止頭痛如神治諸風濕痹尤益肝膽之經腎得之而溫利竅清痰止迎風淚眼療婦人血閉祛在裡之寒邪口臭齒腫含漱亦良但只可少用而不可多用亦只可共用而不能獨用多用則氣耗而病增獨用則氣盡而命喪可不慎歟或問細辛既能溫腎自是補劑何故又散氣耶夫細辛陽藥也升而不沉雖下而溫腎中之火而非溫腎中之水也火之性炎上細辛溫火而即引火上升此所以不可多用耳或問細辛散人真氣何以頭痛能取效蓋頭為太陽之首清氣升而濁氣降則頭目清爽惟濁氣升而清氣降則頭目沉沉欲痛矣細辛氣清而不濁故善降濁氣而升清氣所以治頭痛如神也但味辛而性散必須佐之以補血之藥使氣得血而不散也麻黃麻黃味甘辛氣寒輕清而浮升也陽也無毒入手足太陽經手太陰本經陽明經榮衛之藥而又入足太陽經手少陰經也發汗解表祛風散邪理春間溫病消黑斑赤痛祛榮寒除心熱頭痛治夏秋寒疫雖可為君然未可多用蓋麻黃易於發汗多用恐致亡陽也或問麻黃既是太陽經散榮表肌聖藥凡太陽經有榮邪未散而表症未解者似宜多用之矣而子何戒人多用也夫君藥原不論多寡也太陽榮邪能用麻黃即為君主用之則邪自外泄而不必多用之者蓋麻黃少用邪轉易散多用則不散邪而反散正矣或問麻黃易於發汗用何藥制之使但散邪又不發汗耶曰麻黃之所尤畏者人參也用麻黃而少用人參則邪既外泄而正又不傷何致有過汗之虞倘疑邪盛之時不宜用參則惑矣夫邪輕者反忌人參而邪重者尤宜人參也用人參於麻黃湯中防其過汗亡陽此必重大之邪也又何足顧忌哉或問麻黃誤汗以致亡陽用何藥以救之乎曰舍人參無他藥也夫人參止汗之藥何以能救麻黃之過汗蓋汗生於血而血生於氣也汗出於外而血消於內非用人參以急固其氣則內無津液之以養心少則煩燥重則發狂矣此時而欲用補血之藥則血不易生此時而欲用止汗之藥則汗又難止惟有人參補氣生氣於無何有之鄉庶幾氣生血而血生汗可以救性命於垂絶否則汗出不已陽亡而陰亦亡矣或問麻黃善用之則散邪不善用之則散正何不示人以一定之法無使誤用也夫用麻黃實有一定之法而世人未知也麻黃散營中之邪也見營中之邪即用麻黃又何誤哉惟其不能明辨營中之邪所以動手即錯而營中之邪又尤易辨也凡傷寒頭疼除而身熱未退即邪入營矣便用麻黃邪隨解散又寧有發汗亡陽之慮哉夫亡陽之症乃邪未入於營而先用麻黃以開營之門而方中又不入桂枝以解衛中之邪復不入石膏以杜胃中之火此所以邪兩無所忌汗肆然而大出也倘合用桂枝石膏麻黃三味同入必不至有陽亡之禍矣或疑麻黃一味亂用已致出汗亡陽何以合桂枝石膏同用反無死亡之禍此僕所未明也不知藥單用則功專同用則功薄麻黃單用則無所顧忌專於發汗矣苟有桂枝同用則麻黃寒而桂枝熱兩相牽掣而有以奪其權苟有石膏同用則石膏重而麻黃輕兩相別而得以爭其效雖汗出而不致亡陽又何有暴亡之慘哉或疑慎用麻黃宜少而不宜多乃何以亦有少用而亡陽者乎此蓋用之不當雖少陽亦亡也故醫貴辨症分明不在用藥謹飭也或疑麻黃有初病傷寒而即用亦有久病傷寒而仍用者又是何故蓋在營之風邪未散也而在營之風邪未散何從而辨身熱而畏寒者是也凡見傷寒之症雖時日甚久而身熱未退又畏風寒非前邪未退即後邪之重入宜仍用麻黃散之但戒勿多用耳蓋初感之邪其勢盛再感之邪其勢衰邪盛者少用而邪難出邪衰者多用而邪易變也或疑麻黃善變何法以安變乎不知麻黃未嘗變也人使之變耳如宜汗不汗不用麻黃汗之又用麻黃始汗大出甚則出而不已邪亦不死者幸也可見防變之道不在麻黃之不汗而在麻黃之過汗也宜麻黃之發汗汗之而變不生不宜麻黃之發汗汗之而變必甚然則防過汗可也何必防麻黃而求安變之法哉或問麻黃性寒而善治風邪殊不可解矣傷寒初入於衛原是寒邪因入於衛得衛氣之熱而寒變為熱矣邪既變為熱倘仍用桂枝湯欲以熱散熱安得而不變為更熱乎故仲景夫子不用桂枝之熱改用麻黃之寒祛邪從營中出也從來治風之藥未嘗不寒者以寒藥散寒邪似乎可疑今以寒散熱又何疑乎或問麻黃氣溫而吾子曰氣寒繆仲醇又曰味大辛氣大熱何者為是乎曰麻黃氣寒而曰微溫猶可曰熱則非也蓋麻黃輕揚發散雖是陽藥其實氣寒若是大熱與桂枝之性相同用桂枝散太陽寒邪不必又用麻黃散太陽熱邪矣惟其與桂枝寒熱之不同雖同入太陽之中而善散熱邪與桂枝善散寒邪迥別故桂枝祛衛中之寒而麻黃解營中之熱不可因桂枝之熱以散太陽之邪而亦信麻黃為大熱也或疑麻黃性溫而吾子辨是性寒得毋與仲景公傷寒之書異乎夫仲景夫子何曾言麻黃是溫也觀其用麻黃湯俱是治太陽邪氣入營之病邪在衛為寒邪入營中為熱此仲景夫子訓也鐸敢背乎此所以深信麻黃是寒而斷非熱也或問麻黃髮汗而麻黃根節止汗何也此一種而分兩治者亦猶地骨皮瀉腎中之火而枸杞子補精而助陽也原無足異惟是麻黃性善行肌表引諸藥至衛分入腠理則彼此同之故一用麻黃之梗發汗甚速一用麻黃之根節而止汗亦神也或問麻黃世有用之數兩以示奇者宜乎不宜乎此殺人之醫也麻黃易於發汗多用未有不亡陽者安能去病而得生哉然而世人敢於多用者必鬱結之症有可解之狀多用麻黃以泄其汗則汗出而鬱亦解猶可倘見身熱無汗絶非鬱症而多用麻黃未有不汗出如雨氣喘而立亡者可不慎哉或問人不善用麻黃以致發汗亡陽將何藥同麻黃共用以救其失乎夫麻黃發汗之藥也制之太過則不能發汗矣宜汗而制之使不汗本欲制麻黃以救人反制麻黃以殺人乎無已則有一法遇不可不汗之症而又防其大汗少用麻黃多用人參同時煎服既得汗之益而後無大汗之虞則庶乎其可也或問王好古論麻黃治營實桂枝治衛虛是以二物為營衛之藥也又曰心主營為血肺主衛為氣故以麻黃為手太陰肺之劑桂枝為手少陰心之劑即李時珍亦以麻黃為肺分之藥而不以為太陽經之藥其論可為訓乎曰不可也蓋桂枝入衛而麻黃入營雖邪從皮毛而入必從皮毛而出但邪由皮毛既入於衛必由衛而非於營矣是邪在太陽而不在肺也傳經傷寒無由營衛而入心者若入於心且立死矣桂枝亦何能救乎若二人之論皆似是而實非子不得不辨之以告世也葛根葛根味甘氣平體輕上行浮而微降陽中陰也無毒入胃足陰明療傷寒發表肌熱又入脾解燥生津止渴解酒毒卒中卻溫瘧往來寒熱散瘡疹止疼提氣除熱蒸雖君藥而切戒過用恐耗散人真氣也或問葛根解寒傷營之聖藥何以有時用之以解營中寒邪而風邪不肯散得毋葛根非解營之聖藥耶夫葛根實解寒傷營之聖藥也因人多用反致傷營之正氣正氣傷而寒邪欺正氣之弱不肯外泄反致無功蓋葛根輕浮少用則浮而外散多用則沉而內降矣或問葛根解肌表之邪何以仲景張公用之於葛根湯中以入陽明耶曰葛根原是陽明之藥少用則散肌中之風多用則解胃中之熱一物而可以兩用也況寒邪由營以入腑邪入胃中而未必盡入胃也半入於胃而半留於營用葛根則營衛不兩解乎此葛根湯所以用葛根也或問用葛根以退胃中之邪熱而胃之熱不能去胃之邪不能解必用石膏白虎湯而後解似乎葛根非陽明之藥也不知葛根止能退陽明初入之邪不能退陽明變熱之邪變熱之邪必須用石膏而不可用葛根非葛根不是陽明之藥也或問葛根解肺之燥何以又入胃中以解肌中之熱得毋有誤乎非誤也葛根體輕則入肺下降則入胃又何疑焉惟是解胃中之熱即所以解肺中之燥不可不知其義也傷寒肺燥者邪入於胃也胃熱則火熾火熾則金燥胃本生肺過燥則生肺者轉克肺矣葛根解胃中之熱熱解而火息火息而土之氣生土之氣生而金之氣亦生金之氣生而肺之燥自解用一葛根肺與胃已兩治之矣不必解胃中之熱又去解肺中之燥也或問葛根發表除熱而表不能發熱不能除者何故此不善用葛根之故也葛根輕清少用則遂其性而上行多用則違其性而下降夫風邪在外宜引而外出不宜引而內入火邪炎上宜引而上散不宜引而下散乃不少用以遂其性反多用以違其性自然風邪不外出而內入火邪不上散而下攻矣欲其發表除熱得乎此葛根所以宜善用也或疑葛根發表解肌熱與麻黃功用相同何以麻黃在亡陽之列而葛根獨不之戒耶蓋葛根未嘗不能亡陽但較麻黃則少輕耳不然亦何必勸人少用而不可多用乎哉或疑葛根散邪而不補正今人用之者甚多矣未見其害人也曰葛根耗人元氣原在無形天下有形之損其損小無形之損其損大不可不知也或問葛根輕清之味耗人之元氣亦必不甚安有損於無形者大乎夫元氣甚微損傷於無形從何而知其非大耶大凡氣之重者可防味厚者可辨葛根之味則淡也氣則微也宜乎世不用信之然藥實聞諸異人之言故告世共知之誠以淡之中而有危微微之內而有死法殺人於氣味之外耳威靈仙威靈仙味苦氣溫可升可降陰中陽也無毒入各經絡消腸中久積痰涎除腹內痃癖氣塊散爪甲皮膚風中癢痛利腰膝脛踝濕滲冷疼尤療折傷治風濕各病皆宜用之以其十二經絡無處不到也但其性走而不守祛邪實速補正實難用之於補氣補血之中自得祛痛祛寒之效倘單備此一味或漉酒長飲或為丸頻服未有不散人真氣敗人之血者也或問威靈仙乃攻痰去濕妙藥子謂散人真氣敗人活血是威靈仙乃害人之物非益人之物乎曰吾戒人長飲頻服者恐風痰邪濕已去仍用之非教人風痰邪濕之未去而用之故戒之也秦艽秦艽味苦辛氣平微溫可升可降陰中陽也無毒入大腸之經養血榮筋通利四肢能止諸痛通便利水散黃疸又止頭風解酒毒療腸風下血但小有補血終非君藥前人稱其能去骨蒸傳尸此乃所不敢信也或問秦艽散風邪之品前人稱其能去骨蒸傳尸而吾子不敢信便余疑信相半幸為我論之曰骨蒸癆瘵之漸也內無真陰之水以沖養其骨中之體故夜發熱而日不熱也且夜熱之時在骨中內皮之熱反輕此非外有邪犯又非邪入腎中乃精自內空必須填補真陰少加退陰火之味始能奏效秦艽止能散內風病既無風用之不益加內熱乎傳尸之症乃勞瘵之已成也內生尸蟲食人精血以致咳嗽不止日事補陰尚難秦艽況益之以散風利水之藥以重其虛乎此余之所不敢信又天下之所宜共信余之言者也薄荷薄荷味辛苦氣溫浮而升陽也無毒入肺與包絡二經又能入肝膽下氣冷脹滿解風邪鬱結善引藥入營衛又能退熱但散邪而耗氣與柴胡同有解紛之妙然世人只知用柴胡不知薄荷者以其入糕餅之中輕其非藥中所需也不知古人用入糕餅中正取其益肝而平胃況薄荷功用又實奇乎惟前人稱其退骨蒸之熱解勞乏之困乃未免虛張其辭余嘗遇人感傷外邪又帶氣鬱者不肯服藥勸服薄橘茶立效方用薄荷一錢茶一錢橘皮一錢滾茶沖一大碗服存之以見薄荷之奇驗也或問薄荷實覺尋常子譽之如此未必其功之果效也曰余通薄荷之實耳薄荷不特善解風邪尤善解憂鬱用香附以解鬱不若用薄荷解鬱更神也或問薄荷解風邪鬱結古人之有用之否昔仲景張夫子嘗用之以解熱入血室之病又用之以治胸腹脹滿之症子未知之耳夫薄荷入肝膽之經善解半表半裡之邪較柴胡更為輕清木得風乃條達薄荷散風性屬風乃春日之和風也和風為木之所喜故得其氣肝中之熱不知其何以消膽中之氣不知其何以化世人輕薄荷不識其功用為可慨也香薷香薷味辛氣微溫無毒入脾胃心肺四經主霍亂中脘絞痛治傷暑如神通小便散水腫去口臭解熱除煩調中溫胃有徹上徹下之功撥亂反正之妙能使清氣上升濁氣下降也但宜冷飲而不可熱飲宜少用不可大用少用助氣以祛邪大用乃助邪以耗氣冷飲乃順邪解暑熱飲乃拒邪以格熱此又用香薷者所宜知也或問香薷解暑宜有暑氣儘可解之何以有解有不解也豈多用之故抑熱飲之故耶夫香薷熱飲多用固難見效然又有冷飲少用又不效者蓋香薷止能散暑氣之邪不能助正氣之乏也正氣虛而後暑邪中祛暑不補正氣焉能效耶故香薷飲宜多加參術為妙矣或疑香薷祛暑必須補正氣然有補正氣以祛暑而暑邪愈熾者豈香薷不可用乎抑正氣不可補乎曰補正祛邪王道也單祛邪不補正霸道也補正多於祛邪王道之純也祛邪多於補正霸道之譎也補正不敢祛邪學王道誤者也祛邪又敢於瀉正學霸道之忍者以上六者皆能去暑今謂補正氣以祛暑氣是王霸兼施之道也焉有暑氣之不解反謂暑邪愈熾疑於正氣之不可補哉香薷用於補正之中正千古不易之論也或問香薷用於補正之中畢竟宜多宜少曰香薷解暑感暑症者自宜以香薷為君多用之倘元氣素虛又宜以香薷為佐以補氣之藥為君倘元氣大虛又不可以香薷為臣以香薷為使少少入之總在人臨症善用之也或疑香薷解暑之外無他用本草稱其功用甚多又可信之乎此固不可盡信也然暑症多端凡與暑症同時病者香薷但有以治之乃又不可謂香薷於解暑外竟無他用矣葳蕤葳蕤味甘氣平無毒一名玉竹即華他所食漆葉青黏散中之青黏也入心腎肺肝脾五臟補中益氣潤津除煩主心腹結氣虛熱濕毒治腰腳冷痛定狂止驚眼目流淚風淫手足皆治之殊驗去黑皯澤容顏烏髮須又其小者此物性純補虛熱且解濕毒凡虛人兼風濕者俱宜用之但其功甚緩不能救一時之急必須多服始妙近人用之於湯劑之中冀目前之速效難矣且葳蕤補陰必得人參補陽乃陰陽既濟之妙所收功用實奇故中風之症葳蕤與人參煎服必無痿廢之憂驚狂之病葳蕤與人參同飲斷少死亡之病蓋人參得葳蕤益力葳蕤得人參鼓勇也或問葳蕤華元化加入漆葉以黑髭鬚近人用之不驗何也蓋葳蕤原不能烏須因得漆葉乃能黑矣然漆葉離葳蕤又無效二味兩相制兩相成今人用之不效者非輕重之不同即服食之不如法猶記楚大中丞林公諱天擎者曾服此方年七旬而鬚髯如漆問其服食方法二味各等分子午卯酉之時各服三分數十年如一日也天下能如林公之服法者乎或一日服一日不服或早服晚不服或分兩之多寡不同安得盡效哉或問葳蕤功用甚緩今人皆比於人參之補益謂人參之功驗無力葳蕤之功緩有成然乎否乎嗟乎葳蕤人參烏可同日論人參有近功更有後力豈葳蕤之可比惟是葳蕤功緩久服實有專效如中風痿症佐人參為調理之藥殊有益耳或疑葳蕤為黃精之別種黃精功用甚緩宜葳蕤之功久緩先生刪黃精取葳蕤又謂之何夫葳蕤實與黃精相同刪黃精而不刪葳蕤者取其治痿廢之症宜於緩圖而得效為不同於黃精也蛇床子蛇床子味苦辛氣平無毒治陰戶腫疼且癢溫暖子宮療男子陰囊濕癢堅舉尿莖斂陰汗卻癲癇拂瘡瘍利關節主腰膝胯痛祛手足痹頑治産後陰脫不起婦人無娠尤宜久服則功用頗奇內外俱可施治而外治尤良若欲修合丸散用之於參耆歸地山茱之中實有利益然又宜乎陰寒無火之人倘陰虛火動者服之非宜也或問蛇床子外治實佳內治未必得如外治不知蛇床子內外治無不佳也吾言其內治之益絶陽不起用蛇床子一兩熟地一兩二味煎服陽道頓起可以久戰大異平日非內治之尤佳乎以之修合丸散尤有久力可見蛇床子煎丸並用無不佳妙不可謂外治佳內治不佳也或問蛇床子除熟地同用之外何藥更可並用曰蛇床子同黃耆各一兩興陽信奇於用熟地推之而當歸可並用也推之而白朮可並用也推之而杜仲可並用也推之菟絲子可並用也或健脾或安神或益血要任人善用之何如耳安在不可出奇哉或疑蛇床子乃外治之藥可妄言內治乎試之殺人之咎將安歸曰蛇床子實可內治而世人以外治而掩其內治之功豫所以表其奇也豈好異哉龍膽草龍膽草味苦澀氣大寒陰也無毒其功專於利水消濕除黃疸其餘治目止痢退熱卻腫皆推廣之言也但此種過於分利未免耗氣敗血水去血又去濕消氣又消初起之水濕黃疸用之不得不亟久病之水濕黃疸用之又不可不緩正未可全恃之為利水神丹消濕除痹之靈藥也或謂龍膽草治濕熱尤利疸病正濕熱之病也然用龍膽草以治黃疸多有不效者何也黃疸實不止濕熱之一種也有不熱又成黃病者龍膽草所能治也龍膽草瀉濕熱不能瀉不熱之濕也或疑龍膽草苦寒雖為利濕熱之要藥治黃之症不能捨之他求然多服損胃黃疸之病未必全消元氣已失用矣曰治濕熱與治虛火大異濕熱乃熱結膀胱虛火乃火炎於腎臟熱結於膀胱不用龍膽之苦寒乃膀胱之熱不能下瀉濕且流於肢體火炎於腎臟一用知柏之苦寒乃腎臟之火不能下歸寒且留於脾胃豫闢用黃柏知母之失遇大寒之藥不論其治病之有益無益盡戒人之不用也不幾因噎廢食乎龍膽草治黃疸余所以教人亟用而不可緩用也或問龍膽草治黃疸何以有效有不效先生謂龍膽草正治濕熱之黃疸非濕熱者不能治然實是濕熱仍不效余不得其解也夫濕熱之不同也久矣濕熱入肝者其熱易散濕熱入於膽者其濕難祛蓋濕熱之邪無不從膀胱瀉出也膽主滲入而不主滲出膀胱只可瀉膽中已出之濕不能瀉膽中已入之濕熱故在肝者易見功在膽者難收效耳或問龍膽草不能瀉膽中之濕熱又用何藥以收功子曰瀉濕熱不用龍膽草余未見其可也然專用龍膽草又苦不能去病惟有如柴胡舒其膽中之氣便濕熱之邪仍從外滲出庶幾難於收功者變為易於收功乎龍膽草正不必多用也或疑龍膽草利濕利熱中之濕也不識又能利寒中之濕乎曰今人利濕不問寒熱一見水症盡用龍膽草以利濕不知龍膽能瀉濕熱又能瀉濕寒但消濕熱其功速消濕寒其功緩速則去濕而元氣不傷緩乃未免有傷元氣矣蓋速乃龍膽草不必多用而緩乃龍膽草勢不得不久用矣故利濕熱宜用龍膽草濕寒不宜用龍膽草澤瀉澤瀉味甘酸微咸氣寒沉而降陰中微陽無毒入太陽少陽足經能入腎長於利水去陰汗利小便如神除濕去渴之仙丹也或問澤瀉既是利水消濕之物宜乎水去濕干津液自少胡為反能止渴豈知澤瀉不獨利水消濕原善滋陰如腎中有水濕之氣乃所食水穀不化精而化火此火非命門之真火乃濕熱之邪火邪火不去則真火不生真火不生乃真水不生也澤瀉善瀉腎中邪火瀉邪火即所以補真水也苟非補腎火六味丸中仲景夫子何以用澤瀉耶夫腎有補無瀉澤瀉補腎非瀉腎斷斷無差不然何以瀉水而口不渴非瀉邪水耶所以生真水之明驗乎所以五苓散利膀胱而津液自潤也或曰澤瀉瀉中有補敬聞命矣然所瀉者水而非火吾子之謂是瀉火不亦異乎蓋瀉火而不瀉水是有説焉膀胱者太陽之腑也原屬火不屬水膀胱之水不能下通本於寒者少由於熱者多蓋膀胱無火乃水閉有火又水閉也澤瀉用之於五苓散中雖瀉水實瀉火也因其為瀉火之味所以用之出奇不然二苓白朮瀉水有餘又何必借重澤瀉乎此瀉火之確有至理人未之思耳或問澤瀉利多補少而子必曰補想因仲景張公用之於六味丸中故曰澤瀉利中有補不獨六味丸中為然即五苓散中用之何獨不然凡小便不利之人未有口不渴者一利小便而口渴解五苓散利小便也利小便口渴解者口中生津液也五苓利小便之水去則無水以潤口宜其渴矣乃不渴而反生津液非利中有補之明驗乎且小便之所以不利者以膀胱之有邪火膀胱有火乃熱干津液而口渴澤瀉在五苓散中逐邪火而存真水火去乃水自升水升乃津液自潤津液潤而灌注於腎宮誰謂澤瀉有瀉而無補乎或問澤瀉用於六味丸中乃瀉中有補不識用於八味丸中何意曰有深意也夫腎中無火故用八味地黃丸於水中補火也然而火性炎上不用藥以引其下行乃龍雷之火未必不隨火而沸騰而用下行之藥但有瀉無補又恐補火而火仍隨水而下泄又復徒然使下行但有補無瀉又恐補火而火不隨水而下泄乃補火大旺必有強陽不倒之虞妙在澤瀉性既利水而瀉中又復有補引火下行瀉火之有餘而不損火之不足輔桂附以成其既濟之功誰謂仲景公用澤瀉於八味丸中竟漫無妙義哉或問澤瀉舉世皆以為瀉先生獨言瀉中有補且各盡宣其異義不識八味六味五苓之外更有何説以廣鄙見乎夫澤瀉之義於三方可悟其微三方最未盡其妙澤瀉不特瀉火之有餘而且瀉水之有餘不特不損火之不足而且不損水之不足此瀉中有補前文盡宣然而功不止此澤瀉更能入於水之中以補火之不足入於火之中以瀉水之有餘虛寒之人夜多遺溺此火之不足也勢必用益智仁山茱萸五味子之類補以收澀其遺矣然徒用酸收之味不加鹹甘之品於其中乃愈澀而愈遺澤瀉正鹹甘之味也入於益智山茱萸五味子之內遺溺頓痊若非利中補火不更助其遺乎虛熱之人口必大渴此水之不足也勢必用元參生地黃沙參地骨皮甘菊之類瀉火滋潤其渴矣然徒用苦寒之味不加甘鹹之品於其中乃愈止而愈渴澤瀉正甘鹹之味也入之於元參生地沙參地骨皮菊花之內口渴自愈若非利中補水不益增其渴乎此澤瀉之微義又如此矣或疑澤瀉有功有過但言其功而不言其過恐非持論之平不知澤瀉利水單用乃有功有過共用乃少過多功蓋單用可以瀉水盛之人不可以瀉水虛之子瀉水盛乃有功瀉水虛乃有過也共用宜於補劑不宜於攻劑補虛乃多功攻實乃少過也有過有功是人之不善用也與澤瀉何過哉或問扁鵲公云多服澤瀉病人服是澤瀉過於利水非補陰之藥矣此非扁鵲公之言乃後人記而傳之者也澤瀉用之六味八味諸腎藥中但補而無瀉多服久服正得大益又安能損目哉惟腎氣乏絶陽衰流精腎氣不固精滑目痛不可單服澤瀉以虛其虛若入於群補腎藥中又正無害也元參元參味苦咸氣微寒無毒忌銅器犯人噎喉喪目入肺腎胃三經強陰益精補腎明目治傷寒身熱支滿忽忽如不知人療溫瘧寒熱往來灑灑時常發顫除女人産乳余疾祛男子骨蒸傳尸逐腸風血瘕堅症散頭下痰核癰腫乃樞機之劑領諸氣上下肅清而不致濁治空中氤氳之氣散無根浮遊之火惟此為最前人之論如此近有輕之不用即用之不敢多豈知元參乃君藥實可恃之奪命以救人者乎夫天下尤難治者火症也火症之中尤難降者無如胃腎之二火腎火沸騰乃龍雷之火也其勢尤烈以苦寒折之反致增焰焚林劈木每在陰寒大雨之時夏日炎氛之間一遇涼風白露龍雷收藏矣故以苦寒直治不若以微寒從治元參正微寒之品而又善散浮遊之火治之正復相宜此治腎火之所必需也若胃火之起勢若燎原不盡不止往往熱氣騰天火星口出登高而歌棄衣而走見水而入苟不以辛涼大寒之藥救之乃發狂亡陽立時身喪此非急用白虎湯不可然石膏過寒多服損胃雖一時救急不可以善後元參治空中氤氳之氣瀉火正其所長石膏之後即續之以元參則陽火自平而陰火又長何至有亡陽之懼乎此又治胃之所必需也但勺水難以救焚反致至焰若胃火乃陽火也必多用元參然後可以遏其勢而腎火乃陰火也亦必多用元參然後可以息其熾況元參原是君藥多用始易成功少用反致僨事不妨自一兩用至五六兩以出奇制勝倘畏首畏尾不敢多用聽其死亡而不救冀免於無過難矣吾願行醫者聞吾言而重用元參以治胃腎之二火可乎或問元參以退胃腎之火既不損胃又且滋陰但必須多用不妨一兩以用至五六兩毋乃太多恐脾胃難於承受萬一變生飽悶不欲飲食之症奈何噫免過慮矣夫胃腎之火上騰者由於下之無水也火旺之極乃水虧之極水不虧乃火不旺天地之道陰陽之道陰陽所以相根人身之中水火原以相召有水以制火乃火安平下焦斷不沸越於上焦也故火不得水乃已一得水乃相安斂戢甚神且速也然乃火之騰空正望水不可得惟恐水之細微不足以解其燥烈之炎氛豈有得滂沱及厭惡作祟之理是以入於胃而胃蘇入於脾而脾樂況胃腎二火炎上各經之水皆爍水即滂沱尚恐分潤之不足何至有觸留於補胃艱於承受致生飽悶不欲食之症哉此必無之事可放膽用之而吾猶以為少耳更當佐之以麥冬益之以生地甘菊庶幾同群共濟有露足之快也或疑元參退浮遊之火退上焦之虛火非退下焦之虛火吾子盛稱其功得無錯認腎中之火上遊耶非錯也夫浮遊之火正下焦之火非上焦之火凡火在上焦者盛易消火在下焦者炎難息元參解下焦之火故非多用不能成功蓋上焦之火肺火也心火也肺火用黃芩心火用黃連不易之法也肺火雖盛黃芩用二錢無不清涼心火雖烈黃連用三錢無不消滅正以上焦之火原易炎上又易解故也若下焦之火非出之於肝木即出之於腎水肝腎之火皆龍雷之火也忽然上騰忽然下降其浮遊無定之狀實豫人難以捉摸非大用元參乃水不足濟火其焚林劈木之威有不可言者矣人見用元參不能降火誰知是少用元參不能以益水耶總之實火可瀉而虛火可補瀉實火可少用寒涼而瀉虛火必須多用滋潤此元參退腎肝之虛火斷宜多用以定浮遊切戒少用以增其酷烈也或疑元參退浮遊之火火退又用何藥便浮遊之火不再浮遊抑仍用元參為善後之策乎夫元參可以退一時之火安能退久遠之火火性炎上非水不足以濟一時之急火性又善藏非水不足以救萬火之炎用元參以降火隨用肉桂以安火大用元參而少用肉桂或佐之以純補真陰之藥自然火得水以相制火得水而潛藏又何至再為浮遊哉或疑元參用之於肉桂之中恐寒熱之未宜此乃未知陰陽之妙矣夫陰陽之道彼此相根無陰乃陽從何生無陽乃陰從何長元參得肉桂乃陰易生肉桂得元參乃陽又易長惟陽長而後陰消陰消於下而火不騰於上矣二味合用正陰陽之妙用也或疑陰陽平而後無病今用元參肉桂一多一少吾恐輕重不同陰陽不得其平也夫陰陽之不平也久矣誠觀天地無不陰多於陽群陰之中得一陽而安倘陽多於陰乃成酷烈世界矣人一身之中五臟六腑無非火氣然非水氣之溺滿乃又成焦捁腹體矣所以補陰之藥不可不多而補陽之藥不可不少蓋陰旺則火旺可以制火若陽旺則乃火旺必至爍水矣用元參滋補必宜多肉桂益陽必宜少二味一多一少似乎陰陽之不得其平誰知陰多於陽正陰陽兩得其平哉或疑元參降火又要知母黃柏之流亞也先生戒知母黃柏之不宜輕用又勸人治浮遊之火者多用元參何其自相皆謬乎非謬也元參微寒非大寒大寒之地草木不生微寒之地草木更茂所以棄知母黃柏而用元參地骨也況元參地骨微寒之中又有滋補之味異於黃柏知母甚遠烏可同類而並論哉或疑寒涼既有損於脾胃而微寒之藥豈無損哉夫治病去其甚者未可一概盡去吾患黃柏知母過寒涼非盡謂寒涼之不可用也故倘知母黃柏尚稱其功以示可用豈元參地骨微寒之藥而反去之乎況元參地骨治虛火之內熱上遊實有殊功余又何可不亟為表揚以勸世之必用哉或問元參微寒何以能瀉浮遊之火耶蓋火分虛實實火宜大寒之品以降其炎騰之勢虛火宜微寒之味以引其歸斂之途元參瀉中有補治虛火實宜浮遊之火正虛火也故亟需之耳或問玄參何宜於腎曰腎水虛則寒而濕宜用溫以補之腎火虛則熱而燥宜用涼以補之故玄參一味特為腎臟君藥也沙參沙參味苦而甘氣微寒無毒入肺肝二經治諸毒排膿消硬寧五臟益肺補肝止疝氣絞疼實神散淫風瘙癢除邪熱去驚煩可為君藥但其功甚緩必須多用分量為得易老用代人參乃過矣説者論其能安五臟與人參同功又云人參補五臟之陽沙參補五臟之陰皆不知沙參之功用而私臆之也夫沙參止入肺肝二經諸經不能俱入也既不能俱入何以本草言其能安五臟不知人身肺肝病乃五臟不安矣沙參能滋肺氣乃上焦寧謐而中下二焦安有亂動之理沙參又能通肝氣肝氣通乃中下二焦之氣又通下氣既通豈有逆之犯之變哉此上焦又安其位無浮動之病也安五臟之義如此古今差會其意謂沙參能安五臟用之以代人參誤矣然乃沙參非補陰之物乎沙參不補陰何如能入肝肺之經沙參益肝肺二臟之陰非補心脾腎三臟之陰也且陰陽之功用不同人參補陽能回陽於頃刻沙參補陰乃不能回陽於須臾故人參少用可以成功而沙參非多用必難取效是沙參不可以代人參又明矣或問沙參益陰何以能治疝氣前人但言其功未彰其義也夫沙參治疝此繆仲醇之言也其所以能治之故仲醇又未明言余當暢其故凡疝病成於濕者居其六成於房勞而得風者居其三成於胎氣者居其一然皆陰虛邪中之也沙參補陰陰足邪自難留況沙參又善消諸硬疝症之不能久愈者正以腹中有硬也沙參消硬而疝無巢穴不攻自散矣沙參治疝之義如此而余更有説焉沙參治疝必須多用以益陰少加野杜若根佐之乃奏功更神有沙參補陰為君又得杜若根攻邪為佐乃攻補並用又何各疝病之不盡拔其根株哉或疑沙參益陰為補陰聖藥何以仲景張公不入之於地黃丸中夫地黃丸中之若干藥皆併入陰之中沙參止補肝肺之陰所以仲景夫子不取也雖肺為腎之母肝為腎之子子母可以同治然而既欲獨補腎又顧母補肺又顧子而補肝膽肹於子母之間補腎功力反分紛而不全故棄不用也倘或肺氣大虛不妨加沙參同麥冬五味入之丸中為肺腎之兩治倘或肝氣大傷不妨加沙參同芍藥當歸入之丸中為肝腎之雙療也或問沙參補五臟之陰先生謂只補肺肝之二臟與前人之論大殊何也曰沙參固能補五臟之陰何以治肺肝乃效而治心脾腎則不效安與補各有義也安者寧靜之辭補者滋潤之謂用沙參五臟寧靜者連心脾腎言用沙參而滋潤者主肺肝而言之也用藥先不知五臟之所益何以治病哉或疑沙參補陰不必論其補臟也嗟乎用藥不知臟腑又何以用藥乎知臟腑而用藥尚有不能取勝之時況不知是補何臟之藥而昧昧從事毋怪其用藥之無功也地栗粉地栗粉即荸薺又名烏芋切片曬乾入藥最消痞積與鱉甲同用最佳又不耗人真氣近人未知之余故時表出之地栗有家種野産之分用藥宜野産為佳然無野産即揀家種之佳者切片連皮曬乾用之不特消痞積更能闢瘴氣也或問荸薺吳越人喜啖而吳越人最多痞積似乎荸薺非攻消之品也且其味甘甜宜帶補性不知荸薺獨用乃消腎氣者瀉無補與鱉甲神麯白朮茯苓枳殼之類並投乃能健脾去積有補兼攻所以單食乃無功而同用乃有益也丹參丹參味苦氣微寒無毒入心脾二經專調經脈理骨筋痠痛生新血去惡血落死胎安生胎破積聚症堅止血崩帶下腳痹軟能健眼赤腫可消闢精魅鬼祟養正祛邪治腸鳴亦效僅可佐使非君臣之藥用之補則補用之攻乃攻藥籠中所不可缺也其功效全在胎産之前後大約産前可多加産後宜少用自然成功多而取敗少也或問丹參世所共用吾子又亟稱之吾恐損胃傷脾不少也是言何變余之深也雖然余譽丹參一乃曰僅可佐使再乃曰産後多用取敗非戒之辭乎可用而用非教人不可用而又用也白薇白薇味苦咸氣平大寒無毒入心脾二經主中風身熱腹滿忽忽不知人事療溫瘧寒熱痠疼灑灑發作有時狂惑鬼邪堪卻傷中淋露可除利氣益精下水滲濕此佐使要藥非君臣主藥也用之必須用參苓柴術始可奏功然又不可出二錢之外以其大寒損胃也或問白薇卻邪定神是有益於正氣之藥多用何傷夫邪病多熱白薇寒以解熱而卻邪非補正消邪也大寒之物多乃損胃所以戒之也或問白薇功用止此乎夫白薇功用不止此而其尤效者善能殺蟲用之於補陰之中乃能殺勞瘵之蟲也用之健脾開胃之中乃能殺寸白蛔蟲也以火焚之可以闢蠅斷蝨以酒敷之可以愈疥而斂瘡也茵陳茵陳味苦辛氣微寒陰中微陽無毒入足太陽少陽之經專治疸症發黃非黃症斷不可用果是真黃病可用之為君但黃症又不同有陰黃陽黃有熱黃寒黃燥黃有血黃氣黃之殊不可不辨世人一見發黃全不分別俱用茵陳無引經之品共相佐使所以有效有不效也謹細陳之陰黃之病其濕不甚黃色又不深下身黃上身不黃者也夜間反覺不安小便反澀日間小便反利轉覺安寧治法宜用茵陳為君佐之茯苓澤瀉薏苡仁之類或加之五苓散又妙茵陳可用至三錢至五錢不可越五錢之外連服數劑黃可盡退也陽黃之病其濕又不太甚但黃色如金上身眼目盡黃而下身乃不黃者是也日間小便艱澀或痛或不痛夜則安然自利治法宜用茵陳為君而佐之升麻桔梗茯苓天花粉麻黃黃芩之類數服即愈茵陳必須多加五六錢也熱黃之病口必大渴然多飲反覺不快一身上下俱黃眼目反覺色淡小便時急數疼痛其溺必如黃汗蓋熱結膀胱而不得出耳法又用茵陳為君大約必須五錢為止佐之龍膽草炒梔子芍藥茯苓豬苓澤瀉之類則火熱瀉而黃又愈也寒黃之病一見水則大吐不已畏寒怕冷腹中時痛手按之始安一身上下又黃眼目自白小便清長夜間尤利蓋寒結於膀胱命門無火以通則水氣流入於脾而脾又寒虛乃滲走於皮毛而為黃其黃色必如秋葵之色者也雖又用茵陳為君但只可用至一錢切戒多用必須佐之白朮茯苓山藥芡實薏仁少用附子數分以溫補其命門之火不須十劑則全愈矣濕黃之病全是水濕之氣也雖黃症俱是水濕而濕黃之水濕更甚一身上下眼目手足盡黃俱身必浮腫按之如泥又用茵陳四五錢加入升麻甘遂牽牛車前澤瀉之類少升其氣使水盡從大小便出一劑水濕減去大半而黃盡退矣斷不可服三劑蓋牽牛甘遂性悍多服恐傷人元氣耳燥黃之病全非水濕其外現之症不過胸前之皮肉少黃而一身上下眼目不黃此肺金燥極黃髮於胸前乃假象也然既已發黃茵陳又不可全然不用可用七八分加入麥冬梔子芍藥陳皮天門冬元參天花粉白芥子之類久服自愈肺經不燥而胸黃自除也血黃之症上下一身眼目俱黃身必花熱胸必煩悶腹必疼痛此血瘀於腹中胸下故變為發黃傷寒症中最多此病論理可遵仲景夫子之方照症分治而余又酌定一方以便世之採用茵陳為君加丹皮牛膝當歸梔子川芎大黃之品一服而疼痛煩悶除其黃必漸愈苟或服藥仍然悶痛必須加入水蛭一錢其瘀血始解發黃盡退也氣黃之病身不發熱又無飽悶煩燥之狀但頭面發黃如淡金之色飲食知味少若行動便覺氣怯不能動履小便不數大便反燥然又不結此氣虛不能運此水濕之氣以成黃病者也可用茵陳一二錢加入人參白朮黃耆茯苓車前子大劑煎飲自然氣旺黃色全消矣居言至此雖不敢謂黃症治法全備然分病既清用藥無誤要不能越此範圍願人之臨症之時細察而分治之可耳或問子論黃病實發天地之奇黃病豈盡於此乎曰更有一種身不黃足反黃此濕熱壅閉於中焦乃脾胃之虛不能化水也又用茵陳加白朮茯苓陳皮甘草白芥子枳殼檳榔白芍之類治之則水漸利而黃漸去倘身黃而手足反不黃者乃不治之症也青蒿青蒿味苦氣寒無毒入胃肝心腎四經專解骨蒸勞熱尤能瀉暑熱之火愈風瘙癢止虛煩盜汗開胃安心痛明目辟邪養脾氣此藥最佳蓋青蒿瀉火熱又不耗傷氣血用之以佐氣血之藥大建奇功可君可臣而又可佐使無往不宜也但必須多用因其體既輕而性兼補陰少用轉不得力夫人身最嫌火盛瀉火之藥動必傷陰欲其瀉火不損陰者原無多味烏可置青蒿於無用之地耶人身不離陰陽火盛則陰不生陽不長陰陽既不生長勢必陰陽不交而身病矣倘不平其火而徒補其陽則火盛而陽益旺不平其火徒補其陰則水燥而陰愈衰故無論補陰補陽總以平火為先務然火又宜養而不宜平火過旺則陰陽不生過衰則陰陽又不長必寓補於平之中而後陽得之安陰得之而泰也青蒿平火而又補水此陰陽所以兩宜之也或問青蒿退暑則有之退虛熱則未也何以先之以其有臭氣必然散氣故耳是未知青蒿者也青蒿生於火道之旁常夏日之炎蒸而色更青翠其得至陰之氣者多矣況氣臭入腎青蒿為補陰之藥無疑而疑其不能退虛熱乎夫陽藥補陽陰藥補陰青蒿既得至陰之氣其非陽藥可知既非陽藥而謂不能退虛火也此則所不信也或疑青蒿至賤而吾子譽之如神真所謂臭腐而出神奇矣顧青蒿何嘗臭腐哉以青蒿為臭者薄之辭也余嘗行田野間往往有一種氣親人不見之知氣從青蒿中出是青蒿氣香非臭也且其氣能闢蠅蝨凡案間有青蒿蠅不集也夫蠅逐腐畏青蒿而不集其非腐可知惜其叢生至多人皆賤之倘或為鮮産之物吾不知若何珍之矣青蒿實有至補之功以臭腐輕之惜矣或問青蒿退陰火至速何以前人並未用之而吾子盛稱其功效亦又有所試而云然乎曰青蒿退骨蒸勞熱前人既言之寧得不用之何必余試而後信青蒿之退陰火退骨中之火也然不獨退骨中之火即肌膚之火未嘗不其瀉之也故陰虛而又感邪者最宜用耳或問陰虛火盛者用沙參地骨皮自是正法今先生言青蒿退陰火則用青蒿可不必又用沙參地骨皮矣曰是又不然青蒿最宜與沙參地骨皮共用則瀉陰火更捷青蒿能別骨中之火行於皮膚而沙參地骨皮只能涼骨中之火而不能外泄也仙茅仙茅味辛氣溫有毒入腎治心腹冷氣療腰膝攣痹不能行走男子虛損勞傷老人失溺無子益肌膚明耳目助陽道長精神久服通神強記中仙茅毒者含大黃一片即解不須多用大黃也此種藥近人最喜用之以本草載其能助陽也然全然不能興陽蓋仙茅氣溫而又入腎且能去陰寒之氣以止老人之失溺苟非助陽焉能如此而子獨謂全不興陽者以仙茅之性與附子肉桂迥異仙茅雖溫而無發揚之氣長於閉精而短於動火閉精則精不易泄止溺則氣不外走無子者自然有子非因其興陽善戰而始能種玉也子辨明其故使世之欲閉其精者用之以固守其精而元陽衰憊痿弱而不舉者不可惑於助陽之説錯用仙茅歸咎於藥之不靈也或問仙茅閉精而不能興陽其説甚創然子論之甚辨豈亦有試之而云然乎曰餘論其性耳何試為然而余亦曾自試之矣豫平日之陽亦未甚衰也服仙茅半年全然如故余不得其意後遇岐天師之指示而始爽然自失也仙茅閉精而不興陽實身試而有驗乃閲歷之語非猜度之辭也附子附子味辛氣溫大熱浮也陽中之陽有大毒大者為天雄小者為川烏天雄過熱不可用川烏熱太劣不若附子之適於用也製法每個用甘草五錢煮水一碗將附子泡透不必去皮臍尖子正要全用為佳取甘草至仁以制不仁也無經不達走而不守但可為臣使佐群藥通行諸經以斬關奪門而不可恃之安撫鎮靜也去四肢闕逆祛五臟陰寒暖腳膝而健筋骨溫脾胃而通腰腎真奪命之靈丹回春之仙藥也用之當則立刻重生用之不當則片時可死畏之而不敢用因循觀望必有失救之悲輕之而敢於用孟浪狂妄又有誤殺之嘆要在人辨寒熱陰陽而慎用之也夫附子陽藥也以陽治陰最為相宜以陽治陽自然相惡陽主熱而陰主寒有如冰炭何至錯誤惟陽似陰而陰似陽以假亂真往往殺人慘於刀刀也我今辨陰陽寒熱之殊使用附子者盡生人而不再誤殺人也陰熱之症乃腎水之耗而腎守之火不能下安於腎宮上衝於咽喉口齒之間其舌必滑者也論理大補其真陰之水水旺而火又不歸然而徒補其水火雖少衰終不能一時驟降少用附子同肉桂入於六味地黃湯中大劑冷服下喉而火即消歸下腎內上焦之熱盡化為清涼矣此用附子以治陰熱之祕法也陽熱之症乃心火之盛移於其熱胃中發狂而大叫或失神而譫語手足反現冰冷而胸前膈上多有發斑者必大渴呼水而舌苔或紅或黃或灰黑必燥而峭開裂成綾者也論理不必從治竟用三黃石膏直治其火火瀉而腎水不幹可免亡陽禍然火過於旺盛用大寒之藥恐致格拒尚不入加附子一片重一分入於三黃石膏湯中以火從火引苦寒之藥下行而不相背熱性過而寒性發自能瀉火邪於頃刻矣此用附子以治陽熱之祕法也陰寒之病乃寒邪直中於腎經此傷寒之卒病也腎受寒邪命門之火自不能藏欲遁出於軀殼之外而寒乘勝追逐犯於脾則腹痛犯於肝乃脅痛犯於心則心痛或手足青者有之或筋骨拘攣者有之或嘔或吐或瀉或利甚則身青袋縮死生懸於反掌真危急存亡之秋也探其舌必滑急用附子二三錢人參五六錢或一二兩白朮一二兩乾薑二錢同煎服之下喉而陽回寒散矣此陰寒用附子之法有如此陽寒之病平素傷其脾胃之氣不能榮衛於一身以致風寒但犯發熱惡寒喜臥而不喜語言喜靜而不喜紛擾與之飲食又能知味身雖熱而神思甚清脈必細微氣必甚怯此陽氣不足而邪乃中之也其舌雖干而必滑急用理中湯加附子一錢治之正氣足而邪自散矣甘溫除大熱非此之謂歟陽寒用附子之法又如此知此四治觸類旁通斷無誤用之失矣或問附子有毒用之得當可以一服即回陽有毒者固如是乎附子之妙正取其有毒也斬關而入奪門而進非藉其剛烈之毒氣何能祛除陰寒之毒哉夫天下至熱者陽毒也至寒者陰毒也人感陰寒之氣往往至手足一身之青黑而死正感陰毒之深也陰毒非陽毒不能祛而陽毒非附子不勝任以毒治毒而毒不留故一祛寒而陽回是附子正有毒以祛毒非無毒以治有毒也或問附子入之於三生飲中救中風之垂絶何以必生用之乎此實有妙義存焉夫中風非風也乃氣虛而痰塞於心中故一時卒中有似乎風之吹倒也若作風治十死九矣必須用人參為君附子為佐加之生南星生半夏生薑而後可以開其心竅祛逐其痰涎使死者重生也世人皆以為人參之功也苟非附子何以推蕩而奠寧哉然此時用熟附子正恐未必神效往往有緩不濟事之憂必生用之者取其無所牽制則斬關突圍而入自能破徑敵於須臾也藥中用霸氣而成功者此類是歟或問參附湯之治陰寒直中又救一時之垂絶者何以又不用生附子耶夫熟附子之治直中陰寒也欲救其回陽也陰寒入於至陰之腎中祛命門之火出外而不敢歸宮真火越出而陰寒乘勢祛逐元陽幾無可藏之地此時而不大用人參則元陽飛出於軀殼之外矣然而徒用人參不佐之以附子則陰寒大盛人參何能直入於腹中以生元陽於無何有之鄉既用附子而不制其猛悍之氣則過逐陰寒一往不顧未必乘勝長驅隨陰寒而盡散熱必元陽無可歸而氣又遽亡故必須用熟者同入於人參之中既能逐陰寒之外出又且引元陽之內歸得附子之益去附子之損所謂大勇而成其大仁也或問附子陽藥宜隨陽藥以祛除何以偏用之陰藥以滋補乎蓋附子大熱之品也入於陽藥之中者所以救一時之急入於陰藥之中者所以治久滯之疴凡陽虛之症宜用陽藥救之故附子可多用以出奇陰虛之病宜用陽藥養之故附子可少用以濟勝陽得陰而功速陰得陽而功遲各有妙用也或疑附子之功有以少而成功者又是何故夫急症宜多而緩症宜少此用附子之法也但古人有用附子只一片而成功非藉其斬關奪門之神也蓋附子無經不達得其氣而不必得其味入於經而不必留於臟轉能補氣以生氣助補血而生血而不至有增火增熱之虞反成其健土關胃之效也或問附子何以必得人參以成功豈他藥獨不可制之乎夫人參得附子則直前無堅不破附子得人參則功成血脈不傷至於他藥未嘗不可兼投然終不知人參與附子實有水乳之合也或問繆仲醇論附子之害其言又可採否噫仲醇之心則仁矣而論證尚未盡善也如言外寒脾陰不足以致飲食無味喜飲冷漿及鮮果血虛腹痛按之即止火炎欲嘔或乾霍亂或大瘧寒熱並盛老人精絶陽痿少年縱欲傷精陰精不守精滑腦漏婦人血枯無子血枯經閉腎虛小便餘瀝夢寐紛紜行履重滯痹症中風僵仆不語中風口眼歪斜中風言語蹇澀中風半身不遂中風痰多神昏陰症癰疽未潰其三十一症皆必須附子十補陰三補陽始能奪命奏功仲醇一概戒人勿用庸醫執滯不通堅信不用附子以回陽又何以生陰以續命乎雖仲醇過於謹慎與其亂用殺人於頃刻不若煩用以聽其自生然病實可生任其悠忽因循失救而奄奄坐已又行醫之過也鐸所以將仲醇所忌七十二症之中摘其宜用附子者表而出之以亦其救病之延生勿坐視聽死也或問繆仲醇之過慎未必非全生之道吾子以其所忌者摘出以交之必自萬一殺人過不在子乎嗟乎仲醇之所慎者正病所不必慎者也豈獨不必慎實症之不可慎者也宜慎而不慎與不可慎而又慎者非至中之道也天南星天南星味苦辛氣平可升可降陰中陽也有毒入脾肺心三經善能化痰利膈下氣散瘀血墜胎破堅積消癰腫治中風不語極能開關兼治破傷風又斬關奪門之將可一用而不可再用也三生飲用之佐附子以出奇祛痰而化滯非借其清肺而安心故只可暫用耳雖然三生飲中若無人參為君則附子南星皆無用矣即一三生飲可以悟用藥之妙也或問天南星消頑痰以開關破積堅搗陳其勇往之氣實又藉附子以鼓勇無附子恐不能如是之猛矣或三生飲不可常用在他方或可以常用乎蓋消痰之藥未有如南星峻猛者也中風閉關不得不用之斬關直入若其他痰病原未有關之堅閉又何必用南星哉半夏半夏味辛微苦氣平生寒熟溫沉而降陰中陽也入膽脾胃三經研末每一兩用入枯礬二錢薑汁一合捏餅楮葉包裹陰乾又名半夏曲也片則力峻曲則力柔統治痰涎甚驗無論火痰寒痰濕痰老痰與痰飲痰核痰涎痰結痰迷俱可用但不可治陰火之痰孕婦勿用恐墜胎元然有不可不用之時暫用亦無礙吐血家亦不可用恐性愈動火也片半夏為末吹鼻中可救五絶併産後血暈甚效人身原無痰也飲食入胃化精而不化痰惟腎中真火虛則火沸為痰亦腎之真水虛則水泛為痰矣火沸為痰與水泛為痰雖原於腎而痰乃留於脾也半夏既治痰豈難消化況痰已入脾中安在不能化之然而終不能消者以其能消已入脾中之痰而不能斷其將入脾中之痰也蓋腎中之痰也必須腎氣丸始得逐之非半夏所能祛也半夏泄痰之標不能治痰之本半夏性沉而降似乎能入至陰之中然而陽多於陰止可淺入脾陰而不能深入腎陰也況半夏瀉陰而不補陰而腎又可補而不可瀉半夏欲入於腎而腎所以不受也半夏既不能入腎之內又何以化腎中之痰哉可見痰在脾為標痰在腎為本以脾之痰出於腎也消脾之痰不可以見標本之異哉腎氣丸治痰是擇其本也水不上泛為痰何必更消其痰火不上沸為痰何必再清其痰用腎氣丸而痰已絶用半夏以治標恐及動其祛痰也半夏燥氣之藥再耗腎中之氣氣一耗則火動水燥不生精而生痰勢所必至不特無益反害之矣故既治本不必更治標也或疑半夏性燥故便子治濕痰也不識用何藥以制其燥並可以治熱痰乎夫燥濕之性各殊雖制之得宜只可去其大過而不能移其性也然而未制其燥與已制其燥自然少異鐸有製法並傳於此用半夏一斤生薑片四兩先煮數沸取起曬乾用桑葉一百片水十碗煎汁二碗將半夏泡透又曬乾復用鹽一兩滾水一碗又泡透切片用之則燥性去其六濕之性得其四寒熱之痰與水火泛沸之痰俱可少用以為權宜之計矣然又只可暫用而不可據之為久治也或疑製半夏以治燥熱之痰妙矣恐反不宜於寒濕之痰奈何此則無容慮也半夏性燥治寒濕之痰正宜制過燥而無傷氣之憂與損肺之失可用之而無恐也或疑半夏治濕痰而不可治燥痰治寒痰而不可治熱痰俱聞命矣痰之中更有吐黑痰者其故何也吾觀其人則甚健謂是火而口不渴謂是虛而腎不虧又可以半夏治之乎此乃邪結於腎之中非痰塞於肺之竅也此症本起於久曠之夫思女色而不可得又不敢御外色以泄精於是邪入於腎中精即化痰而若吐有如墨之黑者矣宜用於降火之藥佐之白芥子以消痰而更用於荊芥之類以散其火於血分之中否則必有失血之患溫瘧之苦矣數劑之後身必畏寒然後用於加味逍遙散大用於半夏以清於其表裡之邪則寒熱乃除去而黑痰又乃以漸愈矣也此等之病症嘗實親試之而往往有效驗也故敢論之於書也莪朮莪朮味苦辛氣溫無毒入肝脾二經血分中藥也專破氣中之血痃癖可去止心疼通月經消瘀血治霍亂瀉積聚理中氣乃攻堅之藥可為佐使而不可久用專入於氣分之中以破血雖破血然不傷氣也莪朮與京三稜同是攻堅之藥余舍三稜而取蓬莪者以莪朮破血三稜破氣也夫血乃有形之物破血而氣猶不傷氣乃無形之物破氣而血必難復氣不傷易於生血氣不復艱於生氣耳或問莪朮入於氣分之中以破血吾疑血破而氣亦破矣夫入氣以破血又賢於入血以破氣乎莪朮入氣以破血三稜入血以破氣雖氣血俱不可傷而血鬱於氣之中不得不消血也然而消藥必傷氣血與其消氣不若消血況原病於血之瘀也莪朮專消氣中之血但破血而不破氣血有可破而破之氣無壅滯無可破也又寧破氣哉骨碎補骨碎補味苦氣溫無毒入骨用之以補接傷碎最神療風血積疼破血有功止血亦效同補血藥用之尤良其功用真有不可思議之妙同補腎藥用之可以固齒同失血藥用之可以填竅不止祛風接骨獨有奇功也或問骨碎補入骨且能接續於損傷不知亦可用之以補腎乎骨碎補雖能入腎而不能益腎也夫骨者乃腎之餘接骨即補腎也何在腎之不能益乎雖然腎中之水無形之水腎中之火亦無形之火也骨碎補但能補有形之齒骨不能補無形之水火然而有形之齒骨乃無形之水火所生即謂骨碎補之能益補也又何獨不可哉澤漆澤漆大戟之苗也味辛氣寒陰中微陽也退皮膚邪熱卻面目浮腫尤消水氣或問澤漆氣味與大戟同既刪大戟又取澤漆豈玉樞丹中可不用大戟而用澤漆乎玉樞丹若改大戟為澤漆則其功效更神惟其用大戟而不用澤漆故止可祛邪不可調和正氣然則何不添入澤漆不知只用大戟尚有正氣大傷之虛烏可增其黨羽以損乎三七根三七根味甘辛氣微寒入五臟之經最止諸血外血可遏內血可禁崩漏可除世人不知其功余用之治吐血衄血咯血與臍上出血毛孔滲血無不神效然皆用之於補血藥之中而收功獨捷大約每用必須三錢研為細末將湯劑煎成調三七根末於其中飲之若減至二錢與切片煎藥皆不能取效三七根止血神藥也無論上中下之血凡有外越者一味獨用亦效加入於補血補氣之中則更神蓋止藥得補而無沸騰之患補藥得止而有安靜之休也三七根各處皆産皆可用惟西粵者尤妙以其味初上口時絶似人參少頃味則異於人參耳故止血而又兼補他處味不能如此然以治止血正無不宜也萬年青萬年青味苦澀氣微寒入腎經專通任督之脈亦能入肺殺癆蟲治尸氣尤善黑鬚發入之烏芝麻山藥熟地何首烏小黃米白糖之中極效但最難乾必人身懷之三日方可磨為粉入煎藥內惟是性寒忌多用多用則損氣大約烏芝麻前藥各用一斤萬年青只可用十片斷斷莫多用也萬年青最能殺蟲於無形之中然多用則殺蟲於頃刻必須吐而出未免大傷肺氣反有性命之憂不若用之於補陰之內潛移點奪正既無傷而蟲又盡殺無遺也萬年青之子更佳於葉凡葉用三片者子只消用一粒其功用與葉相同亦烏須黑髮殺癆蟲解尸氣也人家種此花更能闢祟或疑萬年青古人並未有言及烏須者子何足徵乎鐸實聞諸異人之言至於殺癆蟲又實親試而驗者也嘗遊楚寓漢口有醎艖主人患久嗽説胸中微癢則嗽不能止若痛則必吐血矣問何以得此云因泊舟潯江偶颶風夜起呼舵工整備蓬纜一時驟雨至灑熱背覺寒甚自此便嗽至今初嗽時無癢痛之症自癢而痛自痛而吐血余曰此寒雨透入於肺俞必肺生蟲矣渠不信未幾而胸痛曰必吐血矣奈何余曰急服烏梅則可止乃服之而安渠問故余曰此權宜之法以試蟲之有無也蟲得酸則伏今飲烏梅湯而痛定非蟲而何渠乃信服余用萬年青搗汁用酒沖一碗候胸中痛時急服至夜分胸果痛乃服萬年青服下疼甚幾不欲生欲飲荼豫禁不與渴甚勸其再服萬年青不聽余固請飲之而痛益加喉中癢甚余曰此蟲欲出也急再飲萬年青汁又飲之乃吐血而蟲隨湧出長二寸半大如指形如促織長腿如螳螂其色純紫燈下視之如火有焰額上有須二條長寸許背上有翅尚未長而腹尚未全生仍如大指大一血塊倘羽毛豐滿身腹俱全豈肯久安於人膈乎一艖之人無不驚歎為神醫也病者見之暈絶余曰今後不必再憂死亡矣乃用人參麥冬當歸熟地滋陰之藥十劑又用健脾補氣之藥十劑調理而愈前後用萬年青不過一株也嗚呼異哉使余不遵異人之教必不知萬年青之殺癆蟲也然非生人確信吾言亦不能奏功之神如此其蟲數日尚活客有勸主人煅火以服之謂能復還從前氣血余曰不可主人狐疑不決余曰蟲得人之靈氣以生於胸中安知不如蠍蝗水蛭見水而再生乎主人聞之色怯余乃用火燒死而埋之江邊萬年青殺蟲之疑驗如此之神而言烏須之效又可比類而共信矣兩頭尖兩頭尖味甘氣溫無毒入脾胃大腸之經尤善降氣化食尤善化痞結癥瘕近人錯認鼠糞為兩頭尖誰知是草木之藥生在隴右土人以之治小兒食積神效妙在攻堅又不耗氣也兩頭尖治痞最神余在通渭親見此草其根絶似麥冬但色帶丹氣亦香考之縣志俱載之可見兩頭尖非鼠糞也柘木枝柘木即柞木也柞木苦平最消酒毒一缸佳釀只消一枝柘木入之即變為水尤能開産門交骨同人參當歸川芎服下少刻即骨響而兒門大開兒隨之而下矣此物必須兒頭在産門邊始可用否則先開交骨又變生不測矣柘木枝開産門交骨尤神下喉不須一時立開余親試而奏效者也但服後斷須安眠則骨開自易三吳臨産之時每教産婦繞室而走走則骨堅轉難開矣非柘木之不效也或柘木枝既是開産門交骨神藥則交骨一開兒即易生又何必諄諄致戒於兒首之到門哉不知難産之病非交骨之不開也兒未轉身則兒頭斷不至門也蓋生産必兒轉身而始産兒不轉身斷不即産兒不欲産而先開産門則風易入也風入不特母病於須臾而亦必變生於意外非生下有臍口之驚必産後有牽搐之苦故必問兒首到門而後用柘木以開關既慶生余又無後患也蜀漆蜀漆常山之苗也常山不可用而苗則可取味苦純陰散火邪錯逆破癰瘕症堅除痞結積凝闢蠱毒鬼疰久瘧兼治咳逆且調或問蜀漆即常山之苗子刪常山而取其苗何謂也蓋常山性烈而功峻雖取效甚速而敗壞元氣亦最深世人往往用常山治瘧一劑即愈而身體狼狽將息半載尚未還元設再不慎疾一朝重犯得免於死亡幸也其不可輕用亦明矣蜀漆雖是常山之苗不比根之猛烈蓋苗發於春其性輕揚且得春氣之發生散邪既速而破氣亦輕可借之以攻堅不必慮其損內此所以舍常山而登蜀漆也白頭翁白頭翁味苦氣溫可升可降陰中陽也無毒一云味甘苦有小毒者非主溫瘧陽狂寒熱治癥瘕積聚逐血愈金瘡祛風暖腰療血衄疝腫並療百節骨疼痛赤毒之痢所必用也或問白頭翁人多錯認是鳥名誰知是本草之藥耶本草言其功效頗多皆不足深信惟傷寒中之下利乃熱毒也芩連梔子不足以解其毒必用白頭翁以化大腸之熱而又不損脾氣之陰逐瘀積而留津液實有奇功也若胃虛寒不思食及下利完穀不化不由於濕毒者俱宜忌之也牡丹皮牡丹皮味辛苦氣微寒陰中微陽無毒種分赤白性味卻同入腎肝二經兼入心包絡涼骨蒸之熱止吐血衄血嘔血咯血兼消瘀血除症堅定神志更善調經止驚搐療癰腫排膿住痛亦臣佐使之藥而不可為君也仲景張夫子入之八味丸中所以治漢武帝消渴之症也消渴本是熱症方中加入桂附以火治火奇矣蓋此火乃相火而非火相火者虛火也實火可瀉虛火必須滋補陽火可以水折陰火必須火引地黃湯中既用熟地山藥以滋陰不用桂附以引火則火不歸源而渴終不可止但既用桂附以引火而火歸於下焦而上焦餘熱何能頓清吾恐命門之火已歸於腎宮心包之火仍炎於心位熱必余焰尚存而渴仍不止也故方中又加入牡丹皮調和於心肝腎之際滋腎而清其肝中之木使木不助心包之火而牡丹皮又自能直入於膻中以涼其熱下火既安而上火亦靜火宅之中不成為清涼之境乎此仲景夫子制方之神而亦牡丹皮之功實有如是者也不特此也牡丹皮在六味地黃丸中更有奇議腎有補無瀉用熟地山藥以補腎又何必用牡丹皮以滋其骨中之髓耶若云瀉火則已有澤瀉矣若云健脾則已用茯苓矣若云澀精則已用山萸矣然則何所取而又用牡丹皮哉不知牡丹皮所以佐五味之不足也補陰之藥過於寒則陰不能生而過於熱則陰亦不能生六味丸中不寒不熱全賴牡丹皮之力調和於心肝脾腎之中使骨中之髓溫和而後精閉於腎內火瀉於膀胱水濕化於小便肺氣清肅脾氣健旺而陰愈生矣或問地骨皮治有汗之骨蒸牡丹皮治無汗之骨蒸此前人之成説吾子何略而不談豈牡丹皮非治無汗之骨蒸耶鐸所亟欲辨者也夫地骨皮未嘗不治無汗之骨蒸牡丹皮未嘗不治有汗之骨蒸也元素將二藥分有汗無汗為骨蒸之法余不知其何所見而分據其論牡丹皮牡而不牝其色丹象離陽中之火能瀉似乎牡丹皮乃陽中之陰亦宜治有汗之骨蒸而不宜治無汗之骨蒸矣總之牡丹皮乃治骨蒸之聖藥原不必分有汗無汗也或問仲景張公制八味丸經吾子之闡發奇矣不知更有異聞乎曰醫道何盡請於前論而再窮其義夫火有上下之分下火非補不能歸其在上之火非涼不能息補其在下之火則火安而上不炎涼其在上之火則火靜而下亦戢雖然牡丹皮補腎水而不補腎火似乎下火之炎上不能使其歸於下也然而牡丹皮雖不能補腎中之火實能補腎中之水補水之不足即能制火之有餘火有所制自然不敢沸騰然後用附子肉桂引其下伏則火藏於至陰之腎矣牡丹皮亦補腎以益心而不能補腎以克心者也似乎上火趨下不能使其靜於上也然牡丹皮雖不能補腎水克心實能補腎水以益心氣之不足即能制心氣之有餘必有所養自然常能寧定然後用附子肉桂導其上通則暗交於至陰之心矣此前論所未及者而闡發其奇又如此矣或又問仲景張公八味丸已發異論不識六味丸亦有異論乎曰六味丸中別有微義也牡丹皮用之於六味丸中豈獨涼骨中之髓以生陰水哉夫獨陰不生獨陽不長六味丸中乃純陰之藥也苟不用陰中微陽之藥入於群陰之內雖以水濟火似亦為陰虛者之所喜然而孤陰無陽僅能制火之有餘不能生水之不足丹皮雖亦是陰藥入於腎經但性帶微陽入於六味丸使陽氣通於陰之中而性亦微寒但助陰以生水而不助陽以動火此仲景夫子立方之本意鐸實有以窺其微而盡發之也或問牡丹皮陰中微陽又入於群陰之內恐陽氣更微雖各藥亦有兼於陽者畢竟陰重而陽微也不知他藥如茯苓澤瀉山藥之類入於群陰之中全忘乎其為陽矣惟牡丹皮雖在陰藥之中而陽之氣不絶子試將六味丸嗅之牡丹皮之氣未嘗全消不可以悟其微陽之獨存不為群陰所奪之明驗乎惟牡丹皮於群陰之中獨全其微且能使茯苓澤瀉山茱萸熟地山藥之陽氣不散以助其生陰之速故牡丹皮用之於地黃丸中尤非無意也或問牡丹皮能退骨蒸之虛熱是亦地骨皮之流亞也乃先生譽地骨皮之解骨蒸而不及牡丹皮豈別有意歟夫牡丹皮之解骨蒸雖同於地骨皮而微有異者非解有汗與無汗也牡丹皮之解骨蒸解骨中之髓熱也地骨皮之解骨蒸解骨中之血熱也骨中不止髓髓之外必有血以裹之骨中之髓熱必耗其骨中之血矣骨外之血熱必爍其骨中之髓矣故治骨蒸者二味必須兼用不可以有汗用地骨皮無汗用牡丹皮也此等論實前人所未談言之必驚世人然豫實聞之吾師非鑿空而論也髓中有血斯亦何奇余嘗見人骨折者骨中流血與髓俱出非明驗乎獨是地骨皮涼骨中之血牡丹皮涼骨中之髓無人證吾言耳大薊小薊大小薊味甘苦氣涼無毒入肺脾二經破血止血甚奇消腫安崩亦效去毒亦神但用於初起之血症大得奇功而不能治久傷之血症也蓋性過於涼非胃所喜可以降火而不可以培土故耳或問大小薊皆是止血聖藥一時急症用鮮尤佳倘無鮮者乾者亦可用乎夫鮮者難遽得勢必用乾者矣但必須將大小薊用水先煎取汁然後煎補血生血止血之藥同飲才妙不比鮮者搗汁即可用也或問大小薊同是血分之品畢竟何勝二者較優劣大薊不如小薊之佳小薊用一兩者大薊必須加五錢其功用實未嘗殊也或問大小二薊北人以之治吐血多功南人以之往往鮮效何也蓋二薊過於寒涼北人秉性剛強非患熱症不易吐血南人柔弱不必犯熱即能吐血也故宜北而不宜於南然而北人不因熱而致吐血者服之未必相宜南人偶因熱而致吐血者服之未必不相宜也或問大小薊即分大小畢竟功效亦別豈盡同而無異乎曰同者止血異者止熱也大薊止熱而小薊則力不勝故遇熱症不妨用大薊一二錢使熱退而不動血耳劉寄奴劉寄奴味苦氣溫無毒入心脾膀胱之經下氣止心腹痛下血消腫解癰毒滅湯火熱瘡並治金瘡本草諸書言其能卻産後余疾則誤之甚者也寄奴性善走迅入膀胱專能逐水凡白濁之症用數錢同車前子茯苓利水之藥服之立時通快是走而不守産後氣血大虧耶有瘀血豈可用此迅逐之乎夫走而不守之藥何以能止金瘡之血蓋寄奴非能止血能逐血也血欲外出寄奴逐之血不敢外出矣此反治之道也或問劉寄奴以治金瘡得名而子謂非治金瘡之藥非好異乎夫寄奴逐血以止血與治金瘡之説兩無妨也然而以之治金瘡未見捷效以之治白濁實得神效吾疑劉寄奴當日治金瘡或別有他藥未必不借此惑世英雄欺人不可全信也延胡索延胡索味辛苦氣溫無毒入肺脾二經又入肝足厥陰調月水氣滯血凝止産後血暈跌撲損傷下血崩淋心腹卒痛小腸脹疼皆能主治及氣血中佐使之品可偶用見長者也産後亦宜少用非曰用之於補氣補血之內便可肆然多用耳或問延胡索乃婦人所宜用而子曰宜慎用者何也延胡索破氣破血之藥也無氣之滯無血之瘀用之能安然無恙乎用之於補血補氣之內補血而不能救其破血之傷補氣而不能救其破氣之損況全無補劑其傷損之大更何如哉鬱金鬱金味苦氣寒純陰無毒入心肺肝三經血家要藥又能開鬱通滯氣故治郁需之然而終不可輕用也因其氣味寒涼有損胃中生氣郁未必開而胃氣先弱殊失養生之道矣至於破血禁血止血亦一時權宜之用病去即已而不可恃之為家常日用也或問鬱金解鬱自然不宜多用但入之補劑之內不知可常服乎夫鬱金解鬱全恃補劑無補劑則鬱不能開多補劑則鬱且使閉故鬱金可暫用於補之中而不可久用於補之內或問範石湖文集云嶺南有采生之害於飲食中行厭勝法致魚肉生入腹而死脹鬱金可解毒得生有之乎此李巽岩侍即欺人語不足信也夫採生即蠱毒也鬱金並非解毒之藥何能消之哉或問鬱金為血家要藥而朱丹溪又有治血則誤之語何也夫鬱金乃入血分之氣藥其治諸血症正因血之上行皆屬於內熱火炎鬱金能降氣而火自降矣況性又入血分故能降下火氣則血自安經而不妄動也丹溪之論唯真正陰虛火動以致嘔血咳血非關氣分之拂逆者則宜忌之耳艾葉艾葉味苦氣溫陰中之陽無毒世人俱以蘄艾為佳然野艾佳於蘄艾蓋蘄艾乃九牛草也似艾而非艾唯香過於艾而功用殊不若野艾入脾腎肺三經祛寒氣而逐濕痹安疼痛而暖關元胎漏可止胎動可安月經可調子宮可孕且炙經穴可愈百病無如世人舍近而求遠舍賤求貴為可嘆耳或問艾葉取野而不取蘄前人已論之但未言野艾之何以佳於蘄艾耳夫蘄艾依種而生者野艾則天然自長於野者也得天地至陽之氣故能逐鬼而辟邪祛寒而散濕其功實勝於蘄艾藥何舍此而取彼哉十年之疾求三年之艾大抵即野艾非取乎蘄也但野艾實妙余啓冠而肩膊患風痛用野艾而愈地榆地榆味苦酸氣微寒陰中陽也無毒止婦人赤帶崩下及月經不斷卻小兒疳熱止熱痢下瘀血治腸風下血愈金瘡但治熱而不治寒虛寒之人不可輕用地榆涼血之品也血熱病生用之涼血正得其宜然而血熱則必動動則必有散失之虞血寒則又凝凝則必有積滯之患過用地榆以涼血則熱變為涼而陰寒結於腸胃將腹痛之症生反致血崩下血而不可止猶以為地榆之少也更佐之以涼血之藥熱必至死亡而後已良可嘆也或問地榆治大腸之血實有奇功新久皆可用之否曰不可也大腸有火則新舊皆宜無火則新舊皆忌此言其常也大腸前有火而後無火則前宜而後不宜久無火而暫有火則久當忌而暫不宜忌此言其變也審常變而察可否豈特用地榆一味為然哉或問地榆涼大腸之血單用一味往往見功而合用他藥反致無效何也蓋單用一味則功專而效速合用他藥未免拘牽矣倘所用他藥盡入大腸之經則調和於寒熱之間贊襄氣血之中功既速成而身亦甚健惟其所用之他藥非盡入於大腸經之味則彼此異宜上下違背安能奏功乎可見用藥貴純而不貴雜不在單用與不單用也或疑地榆涼血何以能止也不知地榆亦能補血也倘徒涼血則血正不能驟止惟其涼血又兼補血所以單味亦成功耳枲耳實即蒼耳子枲耳實味苦甘氣溫葉苦辛微寒俱有小毒善解大麻風之毒余病禁用各本草稱其效皆不足信也蓋此物最利關節凡邪物在臟腑者服之無不外出大麻風之毒正苦其留於臟中必藉此引出於皮毛他病原非臟毒何必借重況枲耳子與葉散盡真氣烏可輕服哉若大麻風亦畏散其氣然受毒甚熾有病則病受之尚不至十分盡耗故用之無妨然亦必入之活血涼血之藥中始得非單用一味可恃之而取效也或問蒼耳子他病亦有用處如治汗斑之去風腳膝之去濕未嘗無效而子只言其治大麻風毋乃太過乎非過也蒼耳子實只可治大麻風而不可治他病如汗斑細病也何必用此以耗元氣腳膝下病也何必用此升散舍可用之藥而求之不可用之草此世用藥之好奇非吾論之太過也茜草茜草味苦氣寒陰中微陽無毒入胃脾二經止下血崩漏始跌折損傷散瘀血女子經滯不行婦人産後血暈體黃成疸皆能治之但只行血而不補血宜同補氣之藥以行血不宜同補血之藥以散氣至於各書言其能補虛熱且治勞傷後虛語耳吾未見其功也或問茜草色紅何以止血夫茜草本行血之藥行血而反能止血者引血之歸經耳當血之逆行也少拂其性而其勢更逆茜草之色與血色相同入之血中與血相合而同行遂能引之歸經而相忘其非類此治法之功也但既引入於各經即當以補陰之藥繼之則血安而不再沸否則血症未嘗有不再發者也夏枯草夏枯草味苦氣溫曰寒者誤入肺脾心三經專散痰核鼠瘡尤通心氣頭目之火可祛胸膈之痞可降世人棄而不收誰知為藥籠中必需之物乎夫肺氣為邪所壅則清肅之令不行而痰即結於胸膈之間而不得散倘早用夏枯草同二陳湯煎服何至痰核之生心火炎上則頭目腫痛而痰即結於胸膈而成痞早用夏枯草入於芩連天花粉之內何至頭痛目腫乎蓋夏枯草直入心經以通其氣而芩連花粉之類得以解炎上之火也尤妙心火一平引火下生脾土則脾氣健旺而痰更消亡鼠瘡從何而生乎本草只言其破症堅消寒熱祛濕痹尚未深知夏枯草也或問夏枯草近人亦知用之但不能入之湯劑之內也今欲用之不知多寡宜若何耳夫夏枯草陰藥也陰藥宜多用以出奇而不可少用以待變也百部百部味甘苦氣微溫而寒無毒專入肺經亦入脾胃止肺熱咳嗽上氣治傳尸骨蒸殺寸白蛔蟲洗衣除蝨燒湯洗牛馬身蝨不生燒煙薰樹木蛀蟲即死人家燒燼盡逐蠓蠅此物殺蟲而不耗氣血尤有益於人但其力甚微用之不妨多也然必於參茯耆朮歸芎同用為佳大約用百部自一錢為始可用至三四錢止既益肺胃脾之氣又能殺蟲倘癆病有傳尸之蟲者須用地骨沙參丹皮熟地山藥共用為妙矣或問百部殺蟲之藥未有不耗氣血者而百部何以獨異乎夫百部原非補劑不補則攻然而百部非攻藥也乃和解之藥而性亦殺蟲能入於蟲之內而蟲不知其能殺也殺蟲之藥必與蟲相鬥百部不特不鬥而並使蟲之相忘其殺也又何至有氣血之耗哉或疑百部殺蟲何能使蟲之不知夫百部味甘蟲性喜甘投其所好妄甘味之能殺身也故食之而不知耳及至已食百部而蟲之腸胃盡化為水欲作祟而不能有不知其何以死而死者矣百合百合味甘氣平無毒入肺脾心三經安心益志定驚悸狂叫之邪消浮腫痞滿之氣止遍身疼痛利大小便闢鬼氣時疫除咳逆殺蟲毒治癰疽乳腫喉痹又治傷寒壞症兼能補中益氣此物和平有解紛之功扶持弱鋤強祛邪助正但氣味甚薄必須重用其功必倍是百合可為君主而又可為佐使者也用之可至一二兩若止用數錢安能定狂定痛逐鬼消癰倘用之安心益志益氣補中當與參術同施又不必多用也或問百合能止喘百合非止喘之藥也但能消痞滿耳喘生於痞滿痞滿消而喘脹除故言痞滿而治喘在其中矣也或問傷寒證中有百合病特用百合為湯治之而子何以不言耶曰傷寒門中之百合病即將成之壞證也言壞症而百合在其內矣夫壞症何以用百合正取其氣味之和平解各經之紛紜即定各經之變亂也百合有解紛之功傷寒之變然亦必須以他藥佐之未可全恃百合也旋覆花旋覆花味酸甘氣溫無毒一云冷利有小毒誤也入心肝大小腸治頭風明目逐水通便去心滿噫氣痞堅消胸結痰涎定驚怪止寒熱此物有旋轉乾坤之象凡氣逆者可使之重安但只可一用而不可再用至虛弱之人尤不宜輕用也或問旋覆花治氣逆甚神為傷寒要藥但不識可於傷寒之外而亦治之乎夫氣逆之症不止傷寒旋覆花之治氣尤於傷寒之外見奇但傷寒氣逆不必加入人參而雜症門中之氣逆非人參不能奏功必須共用耳或問旋覆花不可獨用見奇功有之乎旋覆花固不可獨用也得代赭石則能收旋轉之功凡逆氣而不能旋轉者必須用之下喉而氣即轉矣二者不止能轉氣而且能安氣亦必須人參尤奇或問旋覆花謂是走散之藥然乎夫旋覆善轉氣非走氣也故氣逆者得之而順豈氣順者反用之而散乎大黃大黃味苦氣大寒陰中之陰降也無毒入胃與大腸然有佐使各經皆達也其性甚速走而不守善蕩滌積滯調中化食通利水穀推陳致新導瘀血滾痰涎破癥結散堅聚止疼痛敗癰疽熱毒消腫脹俱各如神欲其上升須加酒製欲其下行須入芒硝欲其速馳生用為佳欲其平調熟煎尤妙欲其少留用甘草能緩也此藥有勇往直前之迅利有推堅蕩積之神功真定安奠亂之品祛邪救死之劑也但用之必須看症甚清而後下藥甚效否則殺人於眉睫也夫大黃乃君主之藥故號將軍然而將軍無參贊之賢不剿撫並用亦勇而不仁所以承氣湯中必加人參當歸以助之其他用大黃者未有不益之補氣補血之味也然而補氣之藥未可重加而補血之藥斷宜大用蓋腸胃燥結而後瘀滯不行徒用大黃以祛除而腸中乾涸無水以通舟楫大黃雖勇豈能蕩陸地之舟哉故凡有閉結必須多用補劑使之生血以出陳敗瘀以致新也至於補氣之藥似乎可止不知血必得氣而易生況大黃以祛除未免損傷腸胃之氣吾先用參耆以補之氣既不傷且助大黃之力易於推送邪去而正又不傷不必已下之後再去挽回矣但氣藥可以少用者恐過助其氣以固腸胃則大黃有掣肘之虞然而虛弱氣怯之人當大黃必用之時萬不可執可用之説減去參耆又虞有氣脫之慮總之補氣者防其氣脫補血者防其亡陰要在臨症察之而不便先為懸度之也或疑邪盛者宜瀉或用大黃至五六錢不瀉者又奈之何噫用大黃又不可拘泥也邪輕者少用猶須防其更變邪重者多用亦宜豫為圖後總以制之得宜何憂重用乎然而少則徐加多則難以收拾故邪重者不妨由少以增多斷不可嫌少而驟多也或問大黃用之於承氣湯中少若差錯下喉立亡何利而用之乎夫承氣湯乃奪命之藥也不善用之奪命變為喪命矣非大黃之過也且子亦知大黃之功乎當少腹之硬痛也求生不得求死不能一用大黃瀉之苦楚之境忽易為快樂之場不特腹中安然而身軀手足疼痛解熱冤其功之大為何如乎倘用芒硝厚朴枳實而不用大黃雖亦能逐邪蕩硬然必不能如是之功速而效神也可疑其無利而不用乎或疑大黃功多而過亦多豫終不敢信為奪命之藥而輕用之也夫用大黃治至急之症也緩症可以遲用而急症斷不宜遲逍遙觀望因循謹慎而殺人者正多凡邪入下焦而上焦喘滿中焦痞悶者斷宜速下倘手按之痛甚而不可按者急下無疑庶幾可以奪命否則氣逆而死矣胡可慮其亡陰之過而不收其救陽之功哉或曰用大黃誤下往往致不可救可不顧其亡陰單收其救陽之功乎曰亡陰之禍乃誤下之過非宜下之過也宜下而不下與不宜下而下過正相同倘慮誤下難於垂援先預防而用補劑或投而為佐使自無誤下之愆即誤下而亦無難急之禍亦何至有亡陰之失哉或疑大黃亦斬關奪門之將何以又不宜用人參大黃亦何嘗不宜人參哉第古人用人參於大黃中者絶少蓋用大黃之症多是下行而不上行上行之症邪多裹遷之不定下行之症邪有趨散之無憂用大黃以逐邪所以止加當歸以助其勢而不用人參以防其機也或疑大黃逐瘀而氣弱之人往往隨下而輒亡獨不可用人參以扶其氣乎曰吾前言大黃未嘗不宜人參者正言氣弱之人也邪在於大腸之中結燥屎而作痛非大黃之猛利何以迅逐其邪而兼去其燥屎乎倘其人為虛弱之人似宜和解為得然而邪已下趨大腸和其中焦而下焦更為急迫其痛必甚勢必下之為快然而下之而氣亦隨下而俱脫也苟不用人參以急補其氣則氣脫又何救乎然而與其下之氣脫而後救之以人參何不先用人參於大黃之中未下而先防其脫乎況人參大黃同用則人參助大黃以奏功大黃亦得人參而緩力但去其燥屎之邪而不崩其虛弱之氣是兩用之而得宜也或又問人參用於大黃之中萬一補住其邪而燥屎不得下不因用人參而誤乎夫大黃走而不守人參安得而留之乎況邪又不在上中二焦而在下焦之大腸邪在大腸原宜直下用大黃者不過順以推之而非逆以提之也順推而用人參又安得變順而轉為逆乎故人參用之於大黃之中萬無補住其邪之禍者也或疑虛人不可用攻古人有先服人參後服大黃者可乎不可乎此亦權宜之法而不可為訓也愚意不若人參大黃同用為佳先服大黃恐氣脫而不及救先服人參恐邪壅而不能攻惟同用於一時自然相制相宜大黃無過攻之虞而人參無過補之失也或問大黃性猛過於迅速似乎熟用尚非所宜何以古人不尚熟而尚生乎夫人黃過煮則氣味全散攻毒不勇攻邪不急有用而化為無用矣大黃之妙全在生用為佳將群藥煎成再投大黃略煎一沸即服功速而效大正取其迅速之氣而用之也不可畏其猛烈過煎煮以去其峻利也連翹連翹味苦氣平微寒性輕而浮升也陽也無毒入少陰心經手足少陽陽明瀉心中客熱脾胃濕熱殊效去癰毒寸白蛔蟲瘡科攸賴通月經下五淋散諸經血凝氣聚但可佐使非君臣主藥可用之以攻邪不可恃之以補正亦可有可無之品近人無論虛實一概亂投為可哂焉或問連翹為升科要藥是亦藥中之甘草也吾子以為可有可無何也連翹實不足輕重也蓋敗毒必須用甘草化毒必須用金銀花消毒必須用礬石清毒必須加用芩連梔子殺毒必須加用大黃是治毒之法無一件可勞連翹無之不加重有之不減輕但有之以為佐使則攻邪有力又未必無小補也射干射音夜射干味苦氣平微溫陰中陽也無毒入肺肝脾三經散結氣平癰毒逐瘀血通月經止喉痹氣痛祛口熱臭穢化濕痰濕熱平風邪作喘殊效仍治胸滿氣脹咳嗽氣結此物治外感風火濕熱痰症可以為君但可暫用而不可久用者也久用只可為佐使矣或問射干治外感痰喘喉中作水雞聲者必用射干湯治之是射干必用之需明矣但云可暫用而不可久用者何也夫喘症未必有不傷氣者肺氣為邪之所傷風痰隨挾之而上衝射干入肺而能散氣中之結故風痰遇之而消但有結則散結無結則散氣肺氣前為風痰所傷復為射干所損勢必實喘而實為虛喘矣也人不悟其故以為從前射干之能定喘也更用射干治之不益傷肺氣乎此豫所以謂可暫用而不可久用也推之他病何獨不然矣苦參苦參味苦氣寒沉也純陰無毒入心肝腎大腸之經治腸風下血熱痢刮痛難當療狂言心燥結胸垂死赤癩眉脫者祛風有功黃疸遺溺者逐水立效掃遍身癢疹止卒暴心疼殺疥蟲破癥瘕散結氣明目止淚解渴生津利九竅通大便第過於迅利宜少用為佐使不宜多用為君臣至稱益腎安五臟定心志不可信之辭也或問苦參非益腎之藥夫人而知之也但未知其所以損腎之故乎苦參之不益腎豈待問哉沉寒敗腎必有五更泄利之病苦寒瀉腎必有少腹作痛之疴苦參味苦而寒氣沉而降安得不敗腎而瀉腎乎而五更泄利小腹作痛必不能免矣敗瀉腎氣而反言益腎殊不可解願吾子勿信也牽牛牽牛味辛而苦氣寒有毒雖有黑白二種而功用則一入脾與大小腸兼通膀胱除壅滯氣急及痃癖蠱毒利大小便難並腳滿水腫極驗但迅利之極尤耗人元氣不可輕用雖然不言其所以不可輕用之故而概置不用亦一偏之辭也夫牽牛利下焦之濕於血中瀉水極為相宜不能瀉上焦之濕於氣中瀉水未有不損元氣者也李東垣辨之至明似無容再辨但未論及中焦也中焦居於氣血之中牽牛既利血中之水安在中焦不可半利其血中之水乎嗟乎水濕乃邪也牽牛既能利水豈分氣血但水從下受凡濕邪從下受者乃外來之水邪非內傷之水邪也牽牛隻能瀉外來之水而不能消內傷之濕上焦之水腫乃氣虛不能化水故水入之而作脹久則與水腫無異故用牽牛往往更甚下焦之水腫若是氣虛用牽牛迅逐亦每無功與上焦正相同是真正水邪用牽牛利之始效驗如響可見牽牛隻可治外來之水而不能治內傷之濕也明矣非止治血中之水而不治氣中之水也然則外來之水與內傷之水何以辨之亦辨之於皮內而已外邪之水手按皮肉必然如泥內傷之水手按皮肉必隨按隨起即或按之不起必不如泥而可團捻也按之或起或下起者又有分別按之即起者氣虛而猶有命門之火也按之久而不起者氣虛極而並少命門之火矣按之如泥者必須用牽牛以瀉水按之不如泥而或起或不起者必須用補腎中先天之氣而又加健脾開胃以益後天之氣始能奏功倘亦用牽牛豈特耗氣而已有隨利水而隨亡者矣可不慎乎豫所以表牽牛之功而並辨東垣論藥之誤也牽牛治外來之水而不治內傷之濕余已明辨之矣然而牽牛治外來之水又各有異夫外來之水有從下而外入者有從中而外入者從下而外入者乃從腳而入也從中而外入者乃從腰臍而入也世人只知外邪之水從腳而入未知從腰臍入也從腳入者其腳先腫人易識從腰臍入者其腰重而臍腫人難識也水腫不分腳與腰臍而概以牽牛瀉水之濕毋怪其有不效也然則用牽牛之法又烏可不分別之乎凡治水從腳入者用牽牛甘遂以消之若水從腰臍入者用牽牛於白朮之中一劑而腰重除而臍腫平三劑而腰臍俱利矣
