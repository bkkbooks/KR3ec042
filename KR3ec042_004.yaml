body:
  text: 卷之四徵集澤蘭澤蘭味苦甘曰辛誤氣微溫無毒入肝脾二經理胎産消身面四肢浮腫破宿血去癥瘕行瘀血療撲損散頭風目痛逐癰腫瘡膿長肉生肌利關開竅此係女科佳品然亦佐使之藥也本草稱其能治百病未考為訓也或問澤蘭每每用之婦人而不用於男子豈亦有説乎夫男女之病本無分別而藥味又何須分別惟是女子善懷一不得志而閨中怨憂無以解其鬱郁無聊之氣而經血不行行經作痛千般怪病後此生焉澤蘭氣味和平又善於解鬱尤宜於婦人故為婦科妙藥非單宜婦人而不宜於男子也或問澤蘭吾於解鬱而世人未知豈前人未嘗用之乎曰澤蘭解鬱前人多用之近人不知者以其辨之不真耳世以澤蘭為澤草誰知澤蘭別是一種草藥非蘭蕙馨香之藥也生於楚地無花而葉似蘭而根則宛如蘭也蘭生於山而澤蘭發生於水澤故不曰蘭而曰澤蘭也萆薢萆薢味苦甘氣平無毒俗呼為土茯苓入腎肝二經善治痹症祛風寒濕痹腰背冷痛止筋骨掣疼縮小便明目逐關節久結能消楊梅瘡毒此物敗毒祛邪不傷元氣但功用甚緩可治緩病而不可治急症者也近人以之治輕粉結毒正取其緩消而不損傷元氣故耳然而經年纍月殊無功效者單藉一味以作湯而不加補氣血之味也苟用補氣血之藥加人參耆朮茯苓麥冬熟地山藥元參地骨皮沙參之類用草精數兩先煮湯以煎藥不須十劑而輕粉之毒全消楊梅之毒亦散矣或問萆薢非土茯苓別一種也萆薢生於川蜀而土茯苓處處有之未可以二物而合為一也曰萆薢即土茯苓也豈特一特而兩名之一曰拔葜一曰冷飯塊一曰岐良是一物而五名生於川蜀者曰萆薢其生於他處者隨俗名之正不止四名已也大約川蜀所産為第一他處用一兩者川蜀只消用五錢故古人取川中萆薢而不取他處也然而生他處者未嘗不可解楊梅結毒要之地産雖殊而秉性無各別耳豨蘞豨蘞味苦氣寒有小毒一云性熱無毒者非入腎療暴中風邪口眼喎斜治久濕濕痹腰腳痠痛主熱匿煩滿然散人之真氣尤不宜服不宜用而入之茲編者何也蓋腎經之藥藥品中尤少腎犯風邪濕氣又尤難治姑存之以治腎中風濕之病不知何故古人盡稱此品近人亦多樂用之且有贊其百服則耳目聰明千服則鬚髮烏黑追風逐濕猶作泛等間語此真殺人之語也余客閩有一貴人卒然中風餘切其脈絶無浮象甚微細欲絶余曰此真氣虛絶將脫之症急用參耆熟地山茱麥冬五味之藥大劑投之一劑而神思清再劑而語音出余咎其平日之縱欲也貴人曰余已絶欲數年矣尚恐欠健日服補劑病乃中風而先生絶不治風竟用大補血氣填益精髓之品以救吾命此僕所不解也余問所用是何補藥曰客有勸余服豨蘞丸者服之已一年矣余曰是矣豨蘞耗人真氣豈可常服曰然余服之久不見功效心竊疑之今聞先生之教乃恍然大悟瓶中余藥呼兒盡棄之恪遵吾方而全愈嗟乎貴人幸遇吾得不死此吾所見治而知豨蘞之殺人也而余所不及是聞者不甚多乎雖然豨蘞亦非能殺人不善用之多致殺人耳而善用之若何中風之症必問其腰間素有水濕之癬否有水濕之癬又必問其腎囊之乾溼若何腎中有風其人必然腰痛而重腎中有濕其人必然囊破而瘡即用豨蘞亦必與人參白朮大劑共用又何至誤殺人乎至於濕痹腰腳痠疼之症又必加入薏仁茯苓黃耆芡實同施始萬全也或問豨蘞為舉世嘉尚而先生棄之至此乎夫豨蘞未嘗無功余慮人誤認補味而常用之耳風濕入腎者尤難治存豨蘞而不刪去者正備妙用耳不然防己可祛腎內之風濕存防己可必復取豨蘞正以豨蘞功用勝防己其耗散精血亦遜於防己所以存防己而仍存豨蘞蓋防己治腎內之風濕止可一用以出奇不可再用以貽害若豨蘞則不妨一用而至於再用但不可久用耳海藻海藻味苦咸氣寒無毒云有毒者非反甘草入脾治項間瘰癧頸下癭囊利水道通癃閉成淋瀉水氣除脹滿作腫闢百邪鬼魅止偏墜疝疼此物專能消堅硬之病蓋咸能軟堅也然而單用此一味正未能取效隨所生之病加入引經之品則無堅不散矣或問海藻消堅緻效亦有試而言之乎夫藥必有試而言之則神農氏又將何試哉雖然言而未試不若試而後言之為驗豫遊燕趙遇中表之子談及伊母生癭求於余余用海藻五錢茯苓五錢半夏一錢白朮五錢甘草一錢陳皮五分白芥子一錢桔梗一錢水煎服四劑而癭減半再服四劑而癭盡消海藻治癭之驗如此其他攻堅不因此而可信乎甘遂甘遂味苦甘氣大寒有毒反甘草入胃脾膀胱大小腸五經破症堅積聚如神退面目浮腫祛胸中水結尤能利水此物逐水濕而功緩牽牛逐水濕而功速二味相配則緩者不緩而速者不速矣然而甘遂亦不可輕用也甘遂只能利真濕之病不能利假濕之病水自下而侵上者濕之真者也水自上而侵下者濕之假者也真濕可用甘遂以開其水道假濕不可用甘遂以決其上泄真濕為水邪之實假濕乃元氣之虛虛症而用實治之法不犯虛虛之戒乎故一決而旋亡也可不慎哉或問牽牛甘遂仲景張公合而成方以治水腫鼓脹者神效無比但牽牛利水其功甚捷何必又用甘遂以牽其時耶嗟乎此正張夫子用藥之神非淺學者所能窺也子不見治河之法乎洪水滔天九州皆水也治水從何處治起必從上流而先治之上流疏浚而清其源則下流無難治也倘只開決其下流水未嘗不竟精大泄然而只能泄其下流之水而上流之水壅塞存貯於州湖者正多尾閭氣泄而上遊澎湃民能寧居乎故治水者必統上下而兼治人身何獨不然仲景夫子因甘遂於牽牛之中者正得此意而通之以利濕也牽牛性迅正恐太猛瀉水太急肢體皮毛之內頭面手足之間未必腸胃脾內之易於祛逐加入甘遂之迂緩則寬猛相濟緩急得宜在上之水既易於分消而在下之水又無難於迅決於是肢體皮毛頭面手足之水不能少留盡從膀胱而出即脾胃大小腸內之水亦無不從大小便而罄下矣倘只用牽牛不用甘遂則過於急迫未免下焦乾涸而上焦喘滿反成不可救援之病倘只用甘遂不用牽牛則過迂徐未免上焦寬快而下焦阻塞又成不可收拾之疴仲景夫子合而成方所以取效甚神既收其功又無其害也或問牽牛性急甘遂性緩故合而成功吾子只言其上下二焦之利益尚未言及中焦也得毋二味合用可不利於中焦乎夫牽牛甘遂合而用之使上下二焦之利益者正所以顧中焦也下焦阻塞水必返於中焦而成壅閉矣上焦喘滿水必流於中焦而成痞脹矣今用牽牛並用甘遂則上下二焦均利而中焦有不安然者乎或疑甘遂雖性緩然祛逐水濕未嘗不峻烈也或用牽牛又用甘遂不更助其虐乎夫甘逐真正之水濕何患其虐若非水濕之症單用甘遂尚且不可況益之以牽牛乎惟其真是水濕故並用而不相悖也或問筆峰雜興載治轉脬用甘遂末一錢豬苓湯調下立通可以為訓乎不可為訓乎夫轉脬多由於火而甘遂大寒泄之似乎相宜不知轉脬之火乃腎中之火不通於膀胱虛火遏抑而不得通非脬之真轉也人之脬轉立死矣安能久活哉白芨白芨味苦辛氣平微寒陽中之陰也入肺經功專收斂亦能止血敗症潰瘍死肌腐肉皆能去之敷山根止衄血塗疥癬殺蟲此物近人皆用之外治殊不知其內治更神用之以止血者非外治也將白芨研末調入於人參歸芎黃耆之內一同吞服其止血實神夫吐血未有不傷胃者也胃傷則血不藏而上吐矣然而胃中原無血也血在胃之外傷胃則胃不能障血而血入於胃中胃不藏而上吐白芨善能收斂同參耆歸芎直入胃中將胃中之竅斂塞竅閉則血從何來此血之所以能止也況白芨又不止治胃中之血凡有空隙皆能補塞烏可徒借外治而不亟用以內治乎或問白芨能填補肺中之損聞昔年有賊犯受傷曾服白芨得愈後賊被殺開其胸膛見白芨填塞於所傷之處果有之乎此前人已驗之方也何必再疑白芨實能走肺填塞於所傷之外但所言只用一味服之此則失傳之誤也豫見野史載此則又不如此史言受刑時自云我服白芨散五年得以再生不意又死於此人問其方賊曰我遇雲遊道士自稱越人傳我一方白芨一斤人參一兩麥冬半斤教我研末每日飢服三錢吐血症全愈然曾誡我云我救汝命汝宜改過否則必死於刑不意今死於此悔不聽道士之言也我傳方於世庶不沒道士之恩也野史所載如此方用麥冬為佐以養肺用人參為使以益氣則白芨填補肺中之傷自易奏功立方甚妙惜道士失載其姓名所謂越人意者即扁鵲公之化身也白附子白附子味甘辛氣溫純陽無毒云有小毒者非此物善行諸氣之藥可恃之為舟楫者也用於人參之中可開中風之失音用於茯苓薏苡仁中可去寒濕之痹症用於當歸川芎之中可通枯血之經脈用於大黃中可以去滯而逐瘀近人未知只用之外治以減瘢下治以收囊濕為可惜也再其性甚燥凡氣血枯稿雖有風似不可用即痰涎壅塞而若繫有火之症亦非所宜也王不留行王不留行味苦甘氣平陽中之陰無毒主金瘡止血逐痛催生調經除風痹風症內寒消乳癰背癰下乳止衄祛煩尤利小便乃利藥也其性甚急下行而不上行者也凡病逆而上衝者用之可降故可恃之以作臣使之用也但其性過速宜暫而不宜久又不可不知也或問王不留行止可下乳是上亦可行之物也不知乳不能下而下之畢竟是下行而非上行也上中焦有可下者皆可下通非下行於下焦而不行於上焦也蒲公英蒲公英味苦氣平無毒入陽明太陰潰堅腫消結核解食毒散滯氣至賤而有大功惜世人不知用之陽明之火每至燎原用白虎湯以瀉火未免大傷胃氣蓋胃中之火盛由於胃中之土衰也瀉火而土愈寒矣故用白虎湯以瀉胃火乃一時之權宜而不恃之為經久也蒲公英亦瀉胃火之藥但其氣甚平既能瀉火又不損土可以長服久服無礙凡系陽明之火起者俱可大劑服之火退而胃氣自生試看北地婦女當飢饉之時三五成群採蒲公英以充食而人不傷者正因其瀉火以生土也夫飢餓之人未有不胃火沸騰者用之實有相宜不可以悟蒲公英之有益而無損乎但其瀉火之力甚微必須多用一兩少亦五錢始可散邪補正耳或問蒲公英既有大功自宜多用以敗毒去火但其體甚輕不識可煎膏以入於藥籠之中乎夫蒲公英煎膏實可出奇尤勝於生用也而煎膏之法若何每次必須百斤石臼內搗爛鐵鍋內用水煎之一鍋水煎至七分將渣瀝起不用止用汁盛於布袋之內瀝取清汁每大鍋可煮十斤十次煮完俱取清汁入於大鍋內再煎至濃汁然後取入砂瓶內盛之再用重湯煮之俟其汁如蜜將汁傾在盆內牛皮膏化開入之攪均為膏曬之自干矣大約濃汁一斤入牛皮膏一兩便可成膏而切片矣一百斤蒲公英可取膏七斤存之藥籠中以治瘡毒火毒尤妙凡前藥內該用草一兩者只消用二錢尤簡妙法也無鮮草可用乾草干則不必百斤三十斤便可熬膏取七斤也或問蒲公英只可治瘡毒而先生謂可瀉火豈瀉火即所以治瘡毒乎此又不盡然也夫瘡毒雖多成於火而火症不盡生瘡癰蒲公英妙在善能消瘡毒而又善於消火故可兩用之也或問蒲公英瀉火只瀉陽明之火不識各經之火亦可盡消之乎曰火之最烈者無過陽明之焰陽明之火降而各經餘火無不盡消蒲公英雖非各經之藥而各經之火見蒲公英則盡伏即謂蒲公英能瀉各經之火亦無不可也或問蒲公英與金銀花同是消癰化瘍之物二味畢竟孰勝夫蒲公英只入陽明太陰之二經而金銀花則無經不入蒲公英不可與金銀花同論功用也然金銀花得蒲公英而其功更大蓋蒲公英攻多於補非若金銀花補多於攻也或問圖經載治惡刺及狐尿剌摘取蒲公英根莖白汁塗之立瘥果有之乎曰此思邈孫真人自言其效不出十日全愈此則可信者也但愚見取蒲公英之汁以塗瘡口之上更須用其根葉一兩煎湯內外合治更易收功也狐剌乃狐所傷亦用莖汁塗之而更服湯為妙耳或問蒲公英北地甚多野人取以作菜未見不生瘡毒也嗟乎瘡毒之成成於旦夕野人作羹能日日用之哉野人採取之時半在春間而瘡毒之成又在夏秋之際安知春間之毒不因食此而消乎旱蓮草旱蓮草一名鱧腸味甘酸氣平無毒入腎能烏須鬢止赤痢治火瘡雖能烏須鬢然不與補腎之藥同施未見取效之捷煎膏染須鬢亦必同倍子明礬為佳世人動欲變白而不知其道毋怪其不效也夫鬚髮之早白也雖由於腎水之乾燥亦由於任督之空虛任督之脈上通於唇口之間下入於腰臍之內腎虛而任督未虛者老年發白而須不白中年發未白須先白者任督之虛也欲使已白者重變為烏必補任督而更補腎也然而補任督之藥無多仍宜補腎以生任督蓋任督原通於腎故補腎而任督之氣自生旱蓮草只能入腎而不能入任督又何能上通唇口哉所以必宜與補腎之藥同施方有濟耳或疑旱蓮草入腎故能變白今既不能入任督何能變白哉然而變白之藥仍不外旱蓮草也是入腎者其説正而入任督者其説非矣吾子謂其入腎而不入任督何也夫旱蓮草之不通任督也非私説也豫實聞之岐天師之訓迪也謂旱蓮草性寒而任督則喜溫而不喜寒故能降腎中之火以解其焦枯而不能暖任督之髓以滋其潤澤也燈心草燈心草味辛甘氣寒無毒入心小腸膀胱經通陰竅利小便除癃閉成淋消水濕作腫此物用之以引經並非佐使之藥也或問燈心能除心熱而子不言者何也夫燈心能通心而入小腸心與小腸為表裡既通水道則小便無壅滯之苦小腸既通利而心中之熱隨之下行入於膀胱從前陰而出矣其實燈心草不能除心中之熱也山慈菰根山慈菰根味辛苦有小毒消癰疽無名疔毒散隱疹惡瘡蛇蟲齧傷治之並效此物玉樞丹中為君可治怪病大約怪病多起於痰山慈菰正消痰之聖藥治痰而怪病自可除也或疑山慈菰非消痰之藥乃散毒之藥也不知毒之未成者為痰而痰之已結者為毒是痰與毒正未可二視之也貫衆貫衆味苦氣微寒有小毒入陽明胃經亦入心入肺祛諸毒理金瘡惡毒殺三蟲去寸白蟲仍除頭風更破癥瘕尤祛時氣亦止心疼此物有毒而能去毒所謂以毒攻毒也人家小缸內置貫衆一枝永無疫癧之侵然須三月一易為妙否則味散無益耳或曰解毒用貫衆不可用貫衆以祛毒以貫衆能消毒於毒之未至不能逐散於毒之已成也是未知貫衆矣貫衆實化毒之仙丹毒未至可以預防已至可以善解毒已成可以速祛正不可以前後而異視之惟毒來之重單用貫衆則力薄勢絶必須佐之以攻毒之藥始易奏功耳山豆根山豆根味苦氣寒無毒入肺經止咽喉腫痛要藥亦治蛇傷蟲咬然只能治肺經之火邪止咽痛實神故治實火之邪則可治虛火之邪則不可也倘虛火而誤用之為害非淺也或問山豆根瀉喉痹之痛既神凡有喉痛而盡治之矣而吾子曰宜實火而不宜於虛火虛實何以辨之乎夫虛實亦易分耳得於外感者為實火實火者邪火之實也得於內傷者為虛火虛火者相火之虛也雖二火同入肺經而虛實各異實火宜瀉用山豆根瀉之苦寒以正析之也虛火宜補亦用山豆根苦寒以瀉其火則火且更甚壅塞於咽喉之中而不得瀉必須用桂附甘溫之藥引其火以歸源下熱而上熱自消也羊躑躅羊躑躅味辛氣溫有大毒入脾經主風濕藏肌肉之裡識識痹麻治賊風在於皮膚之中淫淫掣痛鬼痓蠱毒瘟瘡惡毒並能祛之此物必須外邪難外越者始可偶爾一用以出奇斷不可頻用以眩異也近人將此物炒黃為丸以治折傷亦建奇功然只可用至三分重傷者斷不可越出一錢之外耳或問羊躑躅乃迷心之藥何以子取之而治病嗟乎無病之人服羊躑躅則迷心有病之人服羊躑躅則去疾此反用以出奇勝於正用之平庸淫羊藿淫羊藿一名仙靈脾味辛氣溫無毒云寒誤用不必羊脂炒亦不必去刺入命門治男子絶陽不興治婦人絶陽不産卻老景昏耄除中年健忘益腎固筋增力強志補命門而又不大熱勝於肉桂之功近人未知也夫男女雖分陰陽而五臟六腑正各相同並無小異男子命門寒則陽不舉女子命門寒則陽不容非男子絶陽不能生女子絶陽尚可産也本草言女人絶陰不産者乃訛寫也淫羊藿補陽而不補陰取補男女之陽則彼此之化生不息陰中有陽則男子精熱而能施女子亦精熱而能受倘謂補其陰絶則純陰無陽何以生育乎此等藥中年以後之人正可朝夕吞服庶幾無子者可以有子而本草又戒久服有損想因命門有火而言之也命門有火者初服即不相宜又何待日久始有損哉或疑淫羊藿溫補命門之火故能興陽然男子有陽道之勢服之翹然興舉故知其興絶陽也若女子又從何起驗之乎曰女子亦未嘗不可驗也女子無陽則小腹寒而痛服淫羊藿則不痛矣然此又無形不足以驗也更有有形之物可以相驗女子無陽則玉戶之內有一物如含花之蕊者必升舉而不可以手指相探服淫羊藿則含花之蕊必下降而手指可探矣此蕊即胞胎之門戶受精之口也寒則縮而溫則伸猶男子寒則痿而溫則堅也以此相驗斷不爽矣而豫更有説無陽者無命門之火也夫命門之火原在腎之中而不在腎外淫羊藿補命門之火亦在腎之中而不在腎之外亦何必求驗於男女陰陽之物哉或問補命門之火者宜於男子而不宜於婦人婦人火動又安可救乎夫婦人之欲火盛非命門之火旺乃命門之火衰命門火衰無以安龍雷之火而火必越出於肝中以助肝木之旺肝木旺則欲火之心動矣木能生火又何制哉往往有思男子而不可得者矣治方瀉肝木之火乃一時之權宜也肝木既平仍宜補命門之火龍雷而下安於腎宮而火無浮動之虞可見婦人亦必須補命門也婦人既宜補命門之火安在淫羊藿但宜於男子而不宜婦人哉況淫羊藿婦人用之又不止溫補命門也更能定小腹之痛去陰門之癢暖子宮之寒止白帶之濕豈可疑只利於男子而不用之於婦科哉凡用藥之權宜實非一途可論定也或疑淫羊藿助男子之陽多用之於丸內未聞用之於湯劑不識湯劑中亦可用之乎曰凡藥用之於湯者即可用於丸豈用於丸者而獨不可用於湯乎世醫之不用於湯劑以體輕而不便入箱中鐸實有煎膏之法備於藥籠中尤便因附載之用淫羊藿每次五斤略揉碎以滾水泡缸內三日大鍋煮汁至濃者先取起又添水煎之以色淡為度去滓將濃汁再煎如糊乃用錫鍋盛之再蒸煮如厚糊少投鹿角膠取其黏也候冷切塊曬之則成膠矣入湯劑中調服佳甚入丸亦妙也沒食子沒食子一名無食子味苦氣溫無毒切忌犯銅鐵器入骨入腎益血生精安神和氣可染鬢髮治瘡潰肌肉不生主腹冷滑利不禁用之以治骨肉虛寒實有奇功故齒牙之病所不可缺也其餘功效亦多譽言然有益無損不妨久服也或問沒食子有雌雄之分果有之乎曰此好事者言之也猶小丁香而曰公大丁香而曰母其實功用相同亦何必多其名目哉肉桂肉桂味辛甘香辣氣大熱沉也陽中之陰也有小毒肉桂數種捲筒者第一平坦者次之俱可用也入腎脾膀胱心胞肝經養精神和顏色興陽耐老堅骨節通血脈療下焦虛寒治秋冬腹痛泄瀉奔豚利水道溫筋暖臟破血通經調中益氣實衛護營安吐逆疼痛此肉桂之功用也近人亦知用之然而肉桂之妙不止如斯其妙全在引龍雷之火下安腎臟夫人身原有二火一君火一相火君火者心火也相火者腎火也君火旺則相火下安於腎君火衰而相火上居於心欲居於心者仍下安於腎似乎宜補君火矣然而君火之衰非心之故仍腎之故也腎氣交於心而君火旺腎氣離於心而君火衰故欲補心火者仍須補腎火也夫腎中之火既旺而後龍雷之火沸騰不補水以制火反補火以助火無乃不可乎不知腎水非相火不能生而腎火非相火不能引蓋實火可瀉而虛火不可瀉也故龍雷之火沸騰舍肉桂又何以引之於至陰之下乎譬猶春夏之間地下寒而龍雷出於天秋冬之間地下熱而龍雷藏於地人身何獨不然下焦熱而上焦自寒下焦寒而上焦自熱此必然之理也我欲使上焦之熱變為清涼必當使下焦之寒重為溫暖用肉桂以大熱其命門則腎內之陰寒自散以火拈火而龍雷收藏於頃刻有不知其然而然之神於是心宮寧靜火宅倏化為涼風之天矣然而肉桂之妙又不止如斯其妙更在引龍雷之火上交於心宮夫心腎兩不可離之物也腎氣交於心則晝安心氣交於腎則夜適苟腎離於心則曉欲善寢而甚難心離於腎則晚欲酣眠而不得蓋心中有液未嘗不欲交於腎腎內有精未嘗不欲交於心也乃時欲交接而終不能交接者其故何也一由於君火之上炎一由於相火之下伏耳試看盛夏之時天不與地交而天乃熱隆冬之時地不與天交而天乃寒人身何獨不然君火熱而能寒則心自濟於腎相火寒而能熱則腎自濟於心亦必然之理也我欲使心氣下交於腎致夢魂之寧貼必先使腎氣上交於心致寤寐之恬愈用肉桂於黃連之中則炎者不炎而伏者不伏腎內之精自上通於心宮心內之液自下通於腎臟以火濟水而龍雷交接於頃刻亦有不知其然而然之神於是心君快樂燥室忽化為華胥之國矣肉桂之妙如此其他功用亦可因斯一者而旁通之矣或問肉桂墮胎有之乎曰有曰有則古人産前間用之而胎不墮者何也曰肉桂墮胎乃單用之為君而又佐之以墮胎行血之藥所以墮胎甚速也若以肉桂為佐使入於補氣補血之中何能墮胎乎胎前忌用者恐其助胎氣之熱未免兒生之日有火症之多非因其墮胎而切忌之者也或問肉桂溫補命門乃腎經之藥而君子謂上通於心得毋亦心經之藥乎肉桂非心經之藥也非心經何以交接於心宮不知心之表膻中也膻中乃心君之相臣心乃君火而膻中乃相火也相火非君火不生肉桂補相火之藥相代君以出治肉桂至膻中以益相火而膻中即代肉桂以交接於心此肉桂所以能通於心而非肉桂之能至於心也或疑肉桂用之於六味湯中名為七味湯此後世減去附子而名之也可為訓乎曰肉桂用之於六味湯中暫用則可也而久用則不可也蓋肉桂溫命門之火而又引龍雷之火而下伏也暫用之以引雷火則火下歸於腎臟倘久用之丸中則力微而不足以溫補命門之火則火仍有奔騰之患故必與附子同用於丸中而日久吞咽則火生而水愈生水生而火自安而龍雷永藏斷無一朝飛越之失者也或疑肉桂用之於六味丸補火之不足然則加麥冬五味子於其中以補肺氣勢必至補水之有餘似不可以為訓也嗟乎六味丸加此三味則又甚神名為九味地黃丸唯六味地黃丸增肉桂五味子名為都氣丸非仲景夫子之原方也其去附子而加北五味子實有妙義我今更暢發之夫都氣丸之用肉桂北五味子也因五味之酸收以佐肉桂之斂虛火也肉桂在六味丸中僅可以引火之歸元而不能生火之益腎得北五味子之助則龍雷之火有所制伏而不敢飛騰於霄漢且五味子又自能益精水足而無不足肉桂既不必引火之歸元又不致引火之升上則肉桂入於腎中欲不生火而不可得矣此則都氣丸之所以神也至九味地黃丸又因都氣丸而加者也麥冬補肺金之氣與五味子同用於七味地黃丸中則五味子又可往來於肺腎之中既可以助麥冬而生水又可以助肉桂而伏火上下相資彼此俱益此又善用地黃丸愈變而愈神者也又未可疑非仲景夫子之原方而輕議之也或疑肉桂何以必與附子同用於六味地黃丸中易之以他藥如破故紙沉香之類何不可者曰肉桂可離附子以成功而附子斷不能離肉桂以奏效蓋附子之性走而不守肉桂之性守而不走也雖附子迅烈入於群陰之內柔緩亦足以濟剛然而時時飛越無同類之朋相親相愛眷戀有情未必不上騰於上焦矣有肉桂之堅守於命門而不去則附子亦安土重遷不能飛越此八味丸中仲景夫子用附子而不得不用肉桂者又有此妙義耳至於破故沉香之類雖與附子同性或慮過於沉淪或少嫌於浮動皆不如肉桂不沉不浮之妙也或疑肉桂用之於八味丸中經先生之闡揚真無微不悉矣但肉桂之於金匱腎氣丸尚未説破豈即八味丸之義耶夫八味丸用肉桂者補火以健脾也腎氣丸用肉桂者補火以通膀胱也雖腎氣丸用茯苓至六兩未嘗不利水以通於膀胱然而膀胱之氣必得肉桂而易通茯苓得肉桂而氣溫而水化矣雖丸中用附子則腎火亦可通於膀胱然而附子之性走而不守無肉桂之引經未必不遍走一身而不能專入膀胱以行其利水之功也肉桂用於腎氣丸其義又如此矣或疑肉桂于都氣丸中未必非利小便何以治水者不用都氣而用腎氣丸乎夫肉桂雖能入膀胱而利水不能出膀胱而瀉水也都氣丸中以熟地為君而以茯苓為佐是補多於利也腎氣丸中以茯苓為君而以熟地為佐使是利多於補也補多於利則肉桂佐熟地而補水補先於利而利不見其損利多於補則肉桂佐茯苓而利水利先於補而利實見其益故治水者必用腎氣丸而不用都氣丸也或問肉桂用之於黃柏知母之中東垣治膀胱不通者神效則黃柏知母前人用之矣未可咎丹溪也曰膀胱熱結而小水不通用黃柏知母而加之肉桂者此救一時之意也用之正見東垣之妙若毋論有熱無熱而概用知母黃柏減去肉桂即膀胱之水且不能通又何以補腎哉夫人生於火而死於寒命門無火則膀胱水凍而水不能化矣若用黃柏知母更加寒涼則膀胱之中愈添其冰堅之勢欲其滴水之出而不可得安得不腹痛而死哉治法用肉桂五錢茯苓一兩乘熱飲之下喉而腹痛除少頃而便出此其故何也蓋膀胱寒極得肉桂之熱不啻如大寒之得陽和溪澗溝渠無非和氣而雪消冰泮矣或問肉桂性熱守而不走當火可引以歸於命門之中但已歸之後不識可長用之否曰肉桂性雖不走補火則火之焰不升然過於補火則火過旺未免有燃燒之禍矣大約火衰則益薪而火盛宜抽薪也又不可因肉桂之守而不走但知補火而不知損火也桂枝桂枝味甘辛氣大熱浮也陽中之陽有小毒乃肉桂之梢也其條如柳故又曰柳桂能治上焦頭目兼行於臂調榮血和肌表止煩出汗疏邪散風入足太陽之腑乃治傷寒之要藥但其中有宜用不宜用之分辨之不明必至殺人矣夫桂枝乃太陽經之藥邪入太陽則頭痛發熱矣凡遇頭痛身熱之症桂枝當速用以發汗汗出則肌表和矣夫人身有榮衛之分風入人身必先中於衛由衛而入營由營衛而入腑由腑而入臟原有次第而不可紊也太陽病頭痛而身熱此邪入於衛而未入於營桂枝雖是太陽經之藥但能祛入衛之邪不能祛入營之邪也凡身熱而無頭疼之症即非太陽之症不可妄用桂枝即初起身熱頭疼久則頭不疼而身尚熱此又已離太陽不可妄用桂枝矣且桂枝乃發汗之藥也有汗宜止無汗宜發此必然之理也然而有有汗之時仍可發汗無汗之時不可發汗者又不可不辨傷寒汗過多者乃用他藥以發汗以至汗出過多而太陽頭痛尚未解故不可不仍用桂枝以和解非惡桂枝能閉汗也傷寒無汗正宜發汗乃發汗而竟至無汗此外邪盡解不止太陽之邪亦解也故不可輕用桂枝以再疏其腠理非防桂枝能出汗也知其宜汗不宜汗之故辨其可汗不可汗之殊用桂枝祛邪自無舛錯又何至動輒殺人耶或謂桂枝發汗亦能亡陽何故仲景張公全然不顧凡有表症未散者須用桂枝湯吾甚懼之而不敢多用也嗟乎桂枝解表之藥非亡陽之藥也用桂枝湯而亡陽者乃不宜解表而妄用桂枝以表散遂至變症蜂起於桂枝何咎哉或謂桂枝湯治寒傷衛之聖藥凡身熱而有頭痛項強之症用桂枝湯仍然不除反加沉重者又何説也此必多用桂枝以致此也夫太陽經者陽經也桂枝熱藥也寒氣初入於太陽寒猶未甚少用桂枝以祛邪則太陽之火自安而寒邪畏熱而易解若多用桂枝則味過於熱轉動太陽之火熱以生熱反助胃火之炎而寒邪乘機亦入於胃寒亦變為熱而不一解而太陽之本症仍在也故用桂枝者斷不可用多以生變惟宜少用以祛邪也或疑桂枝湯之治傷寒以熱散寒也以熱散寒祛寒出外非祛汗出外也何以有亡陽之慮想非傷寒而誤用桂枝也夫用桂枝湯必須冬日之患傷寒而又兼頭痛項強者才是寒傷衛之症傷寒若不是冬天發熱即發熱而不頭痛項強皆非傷寒入衛之症安得不變為亡陽之禍非桂枝之過也或疑桂枝湯宜用而不用以致傳入於各經而頭痛項強如故不識桂枝湯仍可用否夫寒傷衛而不速用桂枝以散表致邪入於裡自應急攻其里矣但頭痛項強如故此邪猶留於衛也雖其病症似乎變遷之不定然正喜其邪留於太陽之經在衛而不盡入於裡仍用桂枝湯而少輕其分兩多加其邪犯何經之藥則隨手奏功也不可因日數之多拘拘而專攻其入里之一經耳或疑桂枝性熱麻黃性寒性同冰炭何以解太陽之邪而仲景張公且有合用之出奇乎曰識得陰陽之顛倒寒熱之異同始可用藥立方以名神醫也夫人身榮衛之不同也邪入衛則寒邪入榮則熱正不可謂榮衛俱屬太陽混看而不分別也桂枝祛衛中之寒麻黃祛營中之熱桂枝麻黃合用祛榮衛寒熱之半又何疑乎惟邪將入於營未離於衛或寒多而熱少或寒少而熱多之間倘分解之未精治療之不當恐不能速於解邪轉生他變耳然在仲景夫子桂枝麻黃合用立方固未嘗不奇而且神也或疑桂枝散寒邪散衛中之邪也一用桂枝宜衛中之寒邪盡散矣何以又使其入於營中也似乎桂枝不能盡散衛中之邪也不知可別有他藥佐桂枝之不足乎曰桂枝散衛中之寒吾慮其有餘而君慮其不足乎用桂枝湯而邪入於營者非桂枝之不足以散衛中之邪乃遲用桂枝而邪已先入於榮中桂枝將奈何哉此傷寒之病所以貴療之早也或疑桂枝湯傷寒症祛邪之先鋒也用之當則邪易退用之不當則邪難解首先用桂枝湯何以使之無不當耶夫治傷寒而不知症用藥未有不誤者也故古人有看症不看脈之論然而脈亦未可不講也仲景夫子論症未嘗不論脈而無如世人之昧昧也讀仲景夫子傷寒之書亦何至首先用桂枝湯而有誤者乎南昌喻嘉言尚論仲景夫子傷寒之書卓識明眼超越前人近今未有其亞但其中少有異同鐸不揣再為辨論庶可免舛錯之譏則自今以後讀傷寒之書亦何至於昏昧哉柏實柏葉柏子仁甘辛氣平無毒入心肝腎膀胱四經聰耳目卻風痹止疼益氣血去恍惚虛損斂汗治腎冷腰冷膀胱冷尤能潤燥腰腎身體顏面燥澀者皆治之興陽道殺百蟲止驚怪安五臟頭風眩痛亦可煎調久服不飢增壽耐老此藥尤佳乃延生之妙品也但必須去油用之否則過潤反動大便尤宜與補心腎之藥同用則功用尤神柏葉苦澀只能斂肺遏吐血衄血亦生鬚髮但非補陽要藥不可與柏子仁同類而並稱也或疑柏子仁益心而不益腎以其必去油而用之也油去則性燥心喜燥而腎惡燥非明驗耶噫以此論藥失之鑿矣夫柏子仁最多油去油者恐過滑以動便非欲其燥以入心且柏子仁油去之亦不能盡腎得之未嘗燥也凡藥皆宜制其中和何獨於柏子仁疑之耶或疑柏子仁補心之藥何以補腎火之藥反用之耶夫心腎相通心虛而命門之火不能久閉所以躍躍欲走也用柏子仁以安心君心君不動而相火奉令惟謹何敢輕泄乎此補心之妙勝於補腎也世人但知補腎以興陽誰知補心以興陽之更神哉黃柏黃柏味苦微辛氣寒陰中之陰降也無毒乃足少陰妙藥又入足太陽專能退火解熱消渴最效去腸風止血痢逐膀胱結熱治赤帶瀉腎中相火亦能平肝明目其餘本草所載功效俱不可盡信也蓋黃柏乃至陰之物其性寒冷只可暫用以降火而不可長用以退熱試思陰寒之地不生草木豈陰寒之藥反生精髓黃柏有瀉而無補此可必信者也如遇陰虛火動之人用黃柏以瀉火不若用元參以降火也萬不得已而用黃柏亦宜與肉桂同用一寒一熱水火有相濟之妙庶不致為陰寒之氣所逼至於損胃而傷脾也或疑丹溪朱公專以陰虛火動立論其補陰丹溪以黃柏肉桂同用未嘗教人盡用黃柏知母也而吾子譏其太過毋乃已甚乎嗟乎人生於火原宜培火不宜損火也火之有餘實水之不足因水之不足乃現火之有餘火盛者補水而火自息不必去瀉火也自丹溪創陰虛火動之説其立論為千古之不磨而其立方不能無弊用黃柏知母於肉桂之中不用熟地山茱為君烏可為訓乎或疑黃柏苦寒瀉火是瀉火有餘而補水不足入於大補陰之內少用之以退陰虛之火不識亦可乎曰不可也黃柏瀉火而不補水也惟是陰虛火大動用黃柏於大補真陰之藥如熟地山茱萸北五味之類可暫用以退火倘陰虛而火微動者亦斷不可用蓋陰火之大盛者退火而火少息陰火之微動者退火而火愈起總之虛火旺宜瀉而虛火衰宜補也或問知母黃柏同是苦寒之藥用一味以瀉虛火未必無功必要加用二味與仲景張公並駕齊驅反致誤事使後人譏之是則丹溪之失也嗟乎虛火之沸騰乃真水之虧損用六味以生水制火尚恐水不能以遽生而火不可遽制況用苦寒之黃柏知母使水之不生又何以制火哉在丹溪欲制火以生水誰知制火而水愈不生耶用知母黃柏之一味似乎輕於二味並用然而水一遇寒涼即不生正不必二味之兼用也楮實子楮實子味甘氣微寒無毒入腎肝二經陰痿能強水腫可退充肌膚助腰膝益氣力補虛勞悅顏色輕身壯筋骨明目久服滑腸此物補陰妙品益髓神藥世人棄而不用者因久服滑腸之語也凡藥俱有偏勝要在制之得宜楮實滑腸者因其潤澤之故非嫌其下行之速也防其滑而先用茯苓薏苡仁山藥同施何懼其滑乎或問楮實子入於打老之丸自是延年之物何獨不言其益算耶曰延年益壽亦在人之服藥何如耳吞添精填髓之神丹而肆然縱欲欲其周花甲之年而不得況楮實子庸庸者乎苟節房幃而慎起居損飲食而戒氣惱即不用楮實亦可長年余所以略而不談也淡竹葉竹茹竹瀝淡竹葉味甘淡氣平寒陰中微陽無毒入心脾肺胃逐上氣咳喘散陽明之邪熱亦退虛熱煩燥不眠專涼心經尤祛風痙竹茹主胃熱厄逆療噎膈嘔噦尤止心煩竹瀝卻陰虛發熱理中風噤口小兒天吊驚癇入口便定婦人胎産悶暈下喉即蘇止驚怪卻痰痰在手足四肢非此不達痰在皮裡膜外非此不卻世俗以大寒置之不知竹瀝系火燒出瀝佐之薑汁水火相宜又何寒哉以上三味總皆清痰瀉火之藥因其氣味寒不傷元氣可多用以佐參苓耆術健脾開胃也或疑竹葉竹茹竹瀝同一物也何必強分其功效不知有不可不分者在也竹葉輕於竹茹雖涼心而清肺竹茹輕於竹瀝雖清心而清胃若竹瀝則重於竹葉竹茹雖清心而兼補陰也或問古人以竹瀝治中風似於中風皆痰也痰生於風乎曰中風未有不成於痰者也非痰成之於風也使果成於風似外邪之中矣古人何以復用此甘寒滑利之竹瀝以化消其痰哉或問淡竹葉世疑是草本是耶非耶曰即竹葉耳但不可用苗竹紫竹之葉蓋二葉之味多苦不堪入藥其餘諸竹之葉味皆淡者也故以淡名之非草本之葉也若草本之葉非是竹葉乃俗名暢腳者也其性雖寒能止咳嗽然而終不能入心以消痰也茯苓茯神茯苓味甘淡氣平降也陽中陰也無毒有赤白二種白者佳亦可用入心脾肺肝腎五臟兼入膀胱大小腸膻中胃經助陽利竅通便不走精氣利血僅在腰臍除濕行水養神益智生津液暖脾去痰火益肺和魂練魄開胃厚腸卻驚癇安胎孕久服耐老延年茯神即茯苓之一種但茯神抱松木之根而生者也猶有顧本之義故善補心氣止恍惚驚悸尤治善忘其餘功用與茯苓相同此二種利中有補久暫俱可用也可君可臣而又可佐使惟輕重之宜分無損益之可論或謂汗多而陰虛者宜忌少用之何損哉或言小便素利者勿服恐助燥損陰微用之何妨初病與久病相殊而健脾正宜於久病何必盡去夫茯苓也丹溪曰茯苓有行水之能久服損人八味丸用之亦不過接引諸藥歸就腎經去胞中積陳而以為搬運之功也夫八味丸有桂附熟地山萸之直入於腎何藉茯苓之引經耶仲景張夫子用茯苓於八味丸中大有深意以熟地純陰而性過於膩滯雖澤瀉利水熟地之滋潤已足相制然而澤瀉過於利水未必健脾以去濕故亦用茯苓以佐之利腰臍而又不走氣使澤瀉亦不過於滲泄則瀉中有補助熟地山藥山茱速於生陰實非徒為接引而用之也或問茯苓健脾而張仲景公用之益腎意者脾腎同治耶夫茯苓雖亦入脾而張夫子用之全非取其健脾止取其益腎耳夫腎惡燥而亦惡濕過燥則水乾而火易熾過濕則邪住而精難生用茯苓於六味丸中瀉腎中之邪水以補腎中之真水也故與健脾之意全不相干勿認作脾腎同治也或問茯苓不健脾而益腎而茯苓實健脾之物也意者腎健而脾亦健乎夫腎健而脾亦健此六味湯之功用也茯苓只能益腎以通胃耳胃為腎之關門腎氣足而關門旺不可單歸功於茯苓也然而茯苓之氣實先通於胃夫茯苓下利之物如何能上行於胃不知茯苓尤通上下之竅而胃亦是水穀之海利水而水不入海將何注乎故下通膀胱而上通於胃胃氣得腎氣之升騰而胃氣有不更開飲食有不更進乎似乎脾健而能容實亦胃健而能受焉也或疑茯苓澤瀉同是利水之物而或言過於利水或言未能健脾皆是與人相反謂先生不好奇得乎曰非好奇也二味實各有功用不得不分言之耳澤瀉瀉之中有補表其補之功則其瀉正可用也茯苓補中有瀉論其瀉之益則其補亦可用也凡藥有功有過明辨功過於胸中自然臨症無差也或問六味丸中闡發已盡不識茯苓於前説之外尚有異論乎前説不足以盡茯苓之義也仲景夫子用茯苓於六味丸中也豈特瀉腎中之邪水以補腎中之真水哉茯苓更能入腎以通腎中之火氣腎中火氣上通胃而下通膀胱二經苟無腎火之氣以相通則上水不能入而下水不能出矣上水不能入者非不能飲也飲水而水之氣不消下水不能出者非不能容而水之氣不泄不消而水勢必奔迫於中焦而不能化矣惟有火氣以相通而上下之水始周流而無滯六味補腎中之水而不補腎中之火則火不能自通於胃與膀胱矣得茯苓代為宣化而上下之水得行何致有不消不泄之慮哉茯苓用之於六味丸中者尚有如此妙義也又問茯苓用之於六味丸中奇義如此而用之於八味丸中亦別有意義乎曰有茯苓瀉水亦能瀉火瀉水者瀉腎中之邪水則瀉火者獨不瀉腎中之邪火乎八味丸用桂附以補火者補腎中之真火也然補腎中之真火而腎中之邪火不去則真火不生反助邪火而上升矣仲景夫子用茯苓於八味丸中正取其瀉邪火以補真火也桂附得茯苓之助無邪火之相干自然真火之速長於是火生而脾土得其益受水穀而能容胃土得其益進飲食而無礙肺氣調而心氣降肝氣平矣又問茯苓用之四君子湯與六君子湯似非盡利水也何獨不言其奇乎夫茯苓用之於陰藥之內可以出奇茯苓用之於陽藥之間無以顯異不過佐人參白朮分消其水濕以固其脾土而開胃氣也又問茯苓用之於都氣丸中亦未見出奇必得肉桂而後瀉水安在入腎氣丸中即能出奇乎曰腎氣丸之妙全在茯苓茯苓利水人人知之利水之中得群陰之助更能於補水中以行其利水之權得二陽之助更能於補火之中以全其化水之神止利其邪水而不使波濤泛溢又不損其真水而轉使熱氣薰蒸通上下三焦消內外二濕皆茯苓為君之功也倘以茯苓為臣而君以熟地勢必中焦阻滯水積於皮膚而不得直入於膀胱矣又何以瀉之哉或問夏子益集奇異治病之方有人十指節斷壞惟有筋連無節肉蟲出如燈心長數寸遍身緑毛以茯苓胡黃連煎飲而愈豈亦有義乎曰是濕熱出蟲耳茯苓以去濕黃連以解熱濕熱散而蟲自死矣惟是蟲身長緑毛實有祕義此人必手弄青蛙戲於池塘之中緑毛之龜在池內欲吞之而不可得故氣衝而手久之而手爛得至陰之毒而不散故皮爛而肉腐生長蟲緑毛也惜吾發異議無人證之耳或問今人用茯苓多用人乳浸泡久制則白色變紅其有益於人乎夫補藥而用茯苓者恐純補之臟滯故用之通達使於瀉之中以助其補之力也若過用乳制則通利之性全失一味呆補反不能佐補藥以成功此近人不知用藥之功而妄為制變不可以為法也槐實槐米槐花槐實味苦辛咸氣寒無毒入大腸止涎唾補絶傷涼大腸之火消乳瘕除男子陰瘡濕癢卻女人産戶痛癢仍理火瘡且墮胎孕酒吞七粒催産尤良大約槐樹枝葉花根共同治療而子尤佳然只可暫用為佐使而不可久服久服則大腸過寒轉添泄利之苦矣或問槐實與槐米之功效何如夫槐米即花未開之蕊也其氣味與槐子正同但子味太重槐米輕清入湯劑似勝於槐實若用入丸藥之中槐蕊不若槐實也或問太清草木方中載槐應虛星之精以十月上己日採子服之去百病長生通神而梁書亦言庾肩吾常服槐實年七旬余髮鬢皆黑目看細字非通神之驗耶嗟乎槐實非長生之藥其性苦寒而屬陰久服則傷脾胃庾肩吾服之而有效者必陽旺而非陰虛實熱而非虛熱也枳實枳殼枳實味苦酸氣寒陰中微陽無毒枳實本與枳殼同為一種但枳實夏收枳殼秋採枳殼性緩而治高高者主氣治在胸膈枳實性速而治下下者主血治在心腹故胸中痞肺氣結也用枳殼於桔梗之中使之升提而上消心下痞脾血積也用枳實於白朮之內使之蕩滌而下化總之二物俱有流通破結之功倒壁推牆之用凡有積滯壅塞痰結瘕痞必須用之俱須分在上在下上用枳殼緩治下用枳實急治斷斷無差也然而切不可單用必附之補氣補血之藥則破氣而氣不耗攻邪而正不傷逐血而血不損尤為萬全耳或問枳殼枳實同是一種枳殼乃秋收之物其味之重宜厚於枳實何以不下沉而反上浮也不知枳殼之性愈熟則愈浮枳殼收金之氣故能散肺金之結氣非枳殼性緩而留中也或問枳實收於夏其性輕宜薄於枳殼何以反峻烈於枳殼量其未熟而然乎曰枳實之性小而猛大而弱收於夏得夏令之威也脾乃土臟也宜於夏氣故能下行而推蕩其脾中之積滯非枳實性急而速行也或問枳實過於迅利病宜消導者何不用枳殼之為善乎夫枳殼與枳實不可同用一治上而一治下枳殼之功不如枳實之大枳實攻堅佐大黃以取勝實為破敵之先鋒非若枳殼居中調劑僅可以攻城內之狐鼠也或問枳實無堅不破佐之大黃則祛除蕩積之功更神以之治急何不可者而必戒之諄諄乎夫看症既清用藥之更當何必顧瞻而不用惟是病有變遷之不同人有虛實之各異苟辨之不確而妄用枳實不幾殺人乎我有一辨之之法腹中疼痛而不可手按者可用無疑倘按之不疼痛而確是有堅積者又將何法辨之辨之於口中之舌如有紅黑者即用無疑如此則何至有失乎或問枳殼治胎氣不安古人入於瘦胎藥中以防難産何子不言及耶曰婦人懷孕全藉氣血以養胎氣血足而易産氣血虧而難産用枳殼以安胎必至胎動不安而生産之時亦必艱澀是枳殼非安胎之藥乃損胎之藥非易産之劑乃難産之劑也況古人瘦胎飲為湖陽公主而設以彼生長皇家奉養太過其氣必實不得已而損其有餘則胎易養也豈執之而概治膏梁之婦乎膏梁之婦既不可用枳殼以安胎況荊布之家原非豐厚又胡可損其不足哉余所以略而不談也或問枳殼治心下痞滿與心中痞痛何也蓋胃之上口名曰賁門賁門與心相連胃氣壅住則心下亦急而不舒故痞滿也邪塞於中焦則欲升不能欲降不可必然氣逆而上衝而肝經本郁又不能條達而開暢則脅亦脹滿而心中痞痛矣得枳殼之破散消導而痞滿痞病盡去也女貞子女貞子味苦甘氣平無毒入腎經黑鬚烏髮壯筋強力安五臟補中氣除百病養精神多服補血祛風健身不老近人多用之然其力甚微可入丸以補虛不便入湯以滋益與熟地枸杞南燭麥冬首烏旱蓮草烏芝麻山藥桑椹茄花杜仲白朮同用真變白之神丹也然又為丸則驗不可責其近效也或問女貞既善黑鬚又有諸益自宜入湯劑中以收其功何以不宜乎夫女貞子功緩入在湯劑中實無關於重輕無之不見損有之不見益若必欲入湯劑非加入一兩不可然而過多則又與胃不相宜蓋女貞少用則氣平多用則氣浮也女貞子非冬青也冬青子大而女貞子小冬青子長而女貞子圓也若用冬青更為寒涼尤無功效未可因本草言是一種而採家園之冬青子以入藥也或疑女貞子為長生之藥而子以為無足重輕何以又譽之為變白之神丹乎曰余前言其有功者附之於諸補陰藥中為丸以變白也後言其無足重輕者欲單恃之作湯難速效也女貞子緩則有功而速則寡效故用之速實不能取勝於一時而用之緩實能延生於永久亦在人用之得宜耳厚朴厚朴味甘辛氣大溫陰中之陽可升可降無毒入脾胃大腸主中風寒熱治霍亂轉筋止嘔逆吐酸禁瀉利淋露消痰下氣乃佐使之藥不可為君臣蓋攻而不補有損無益之味也然而善用之收功正多未可棄而不用大約宜與諸藥同用同大黃枳實則瀉實滿矣同人參蒼朮陳皮則瀉濕滿矣同桂枝則傷寒之頭痛可除同檳榔枳實則痢疾之穢物可去同苦藥則瀉同溫藥則補同和藥則止痛同攻藥則除痞亦在人善用之倘錯認為補益虛人用之脫元氣矣或問厚朴收功甚多不補而能之乎夫疑厚朴為補固不可然而厚朴實攻藥能於攻處見補此厚朴之奇也若論其性實非補劑也或厚朴能升清降濁有之乎曰厚朴可升可降非自能升清而降濁也用之補氣之中則清氣能升用之於補血之中則濁氣能降升降全恃乎氣血之藥與厚朴何所與哉或問厚朴佐大黃以攻堅仲景張公入於承氣湯中有奇義乎曰承氣湯中用大黃者以邪結於大腸也大黃迅拂之速何藉於厚朴不知大黃走而不守而厚朴降中有升留大黃而不驟降則消導祛除合而成功自然根株務絶無有少留此厚朴入之大承氣湯佐大黃之義也或問厚朴入於平胃散中以平胃氣似厚朴乃益胃之品而非損胃之藥然平胃散非益胃之品也彼其命名之意謂胃之不平者而平之也是瀉胃氣之有餘非補胃氣之不足胃氣既無所補又何所益乎平胃散用厚朴瀉胃實而不補胃虛人奈何錯認為益胃之品哉桑白皮桑葉桑椹桑白皮味甘而辛氣寒可升可降陽中陰也入手太陰肺臟助元氣補勞怯虛羸瀉火邪止喘嗽唾血利水消腫解渴祛痰刀刃傷作線縫之熱雞血塗合可愈桑葉之功更佳於桑皮最善補骨中之髓添腎中之精止身中之汗填腦明目活血生津種子安胎調和血脈通利關節止霍亂吐瀉除風濕寒痹消水腫腳浮老男人可以扶衰卻老老婦人可以還少生兒桑椹專黑髭鬚尤能止渴潤燥添精益腦此三品相較皮不如椹而椹更不如葉也前人未及分晰世人不知余得岐伯天師親講老人男女之不能生子者制桑葉為方使老男年過八八之數老女年過七七之數者服之尚可得子始知桑葉之妙為諸補真陰者之所不及所用桑葉必須頭次為妙採後再生者功力減半矣或疑桑椹乃桑樹之精華其功自勝於葉而吾子謂椹不如葉意者桑葉四季皆可採用而桑椹必須四月採之為艱乎曰椹與葉功用實同因椹艱於四季之採用且制之不得法功遜於葉多矣我今備傳方法使人盡知可也四月採桑椹數斗飯鍋蒸熟曬乾即可為末桑椹不蒸熟斷不肯幹即干而味已盡散無用且尤惡鐵器然在飲鍋內蒸熟雖鐵鍋而無礙也此皆岐天師傳余之祕同熟地山茱萸五味子人參同用實益算仙丹誠恐世人不知製法所以單言桑葉之奇蓋無椹用葉功實相同耳桑椹紫者為第一紅者次之青則不可用桑葉採葉如茶種大者第一再大者次之再小者又次之與其小無寧大也過大則只可煎湯以入藥不堪為丸散矣洗目宜取老桑葉自落者無用矣山梔子山梔子味苦氣寒可升可降陰中陽也無毒入於肝肺亦能入心有佐使之藥諸經皆可入之專瀉肝中之火其餘瀉火必借他藥引經而後瀉之也止心脅疼痛瀉上焦火邪祛濕中之熱消五痹黃病止霍亂轉筋赤痢用之吐則吐用之利則利可為臣佐之藥而不可以為君雖然山梔未嘗不可為君也當兩脅大痛之時心君拂亂之後苟不用山梔為君則拂逆急迫其變有不可言者矣用山梔三五錢附之以甘草白芥子白芍蒼朮貫衆之類下喉而痛立止亂即定其神速之效有不可思議者然則山梔又似君臣佐使而無不宜者要在人善用之而非可拘泥也或問山梔子能解六經之鬱火子何以未言豈謂其性寒不宜解鬱乎曰山梔子非解鬱之藥非因其性寒而略之也夫郁病非火也郁之久斯生火矣不用香附柴胡白芍川芎之解鬱而遽投山梔子以瀉火則火不能散而鬱氣更結矣然則謂山梔子之解鬱尚不可況謂解六經之鬱火乎獨是山梔實瀉火之藥安在郁中之火獨不降之然而止可謂是瀉火而終不可謂是解鬱也或問山梔子消火消肝中之火也何以各經之火俱能消之曰山梔子非盡能消各經之火也人身之火止肝中之火有長生之氣肝火不清則諸火不息肝火一平則諸火無不平矣故瀉肝火即所以瀉各經之火也況又有引經之藥引入於各經之中火安得而不平哉或問山梔子瀉火能瀉膻中之火膻中相火也既瀉膻中之火則腎中之相火無難瀉矣乃用山梔子瀉膻中之火而不傷瀉腎中之火而不入何也曰山梔子入肝瀉肝火即瀉腎火也夫肝為腎之子子虛則母亦虛子衰則母亦衰瀉肝火即瀉腎火則山梔子乃腎之仇見仇而肯納仇乎此腎之所以不受也若膻中乃肝之子也山梔子瀉肝則肝母之火必遁入於膻中之子矣膻中驚肝母之受傷火自不散升泄母衰而子亦衰此膻中之所以無傷也或問山梔子每用於傷寒湯中以之為吐藥仲景張公亦有祕義乎曰梔子味苦而瀉火傷寒火旺上焦用苦寒以瀉火則火性炎上反擊動其火勢之騰天不若因勢而上越隨火之氣一湧而出之為得梔子性本可升同瓜蒂散用之則尤善於升故下喉即吐火出而邪亦出因其可吐而吐之也仲景夫子豈好為吐哉或問梔子亦寒涼之藥子何以不闢之而稱道之耶嗟乎余非盡惡寒涼也惡錯用寒涼者耳醫道寒熱並用攻補兼施倘單喜用熱而不喜用寒只取用補而不用攻亦一偏之醫何足重哉吾所尚者宜用熱則附子肉桂而亟投宜用寒則黃柏知母而急救宜用補則人參熟地而多加宜用攻則大黃石膏而無忌庶幾危者可以復安死者可以重生必如此而醫道始為中和之無弊也枸杞子地骨皮枸杞子味甘苦氣微溫無毒甘肅者佳入腎肝二經明耳目安神耐寒暑延壽添精固髓健骨強筋滋陰不致陰衰興陽常使陽舉更止消渴尤補勞傷地骨皮即枸杞之根也性甚寒涼入少陰腎臟併入手少陽三焦解傳尸有汗肌熱骨蒸療在表無汗風濕風痹去五內邪熱利大小二便強陰強筋涼血涼骨二藥同是一本所出而溫寒各異治療亦殊者何也蓋枸杞秉陰陽之氣而生親於地者得陰之氣親於天者得陽之氣也得陽氣者益陽得陰氣者益陰又何疑乎惟是陽之中又益陰而陰之中不益陽者天能兼地地不能包天故枸杞子益陽而兼益陰地骨益陰而不能益陽也然而二物均非君藥可為褊裨之將枸杞佐陽藥以興陽地骨皮佐陰藥以平陰也或疑枸杞陽衰者尤宜用之以其能助陽也然吾獨用一味煎湯服之絶不見陽興者何故恐枸杞乃地骨皮所生益陰而非益陽也曰興陽亦不同也陽衰而不至大虧者服枸杞則陽生古人云離家千里莫服枸杞正因其久離女色則其陽不衰若再服枸杞必致陽舉而不肯痿故戒之也否則何不戒在家之人而必戒遠行之客其意可知矣然則吾子服枸杞而陽不興者乃陽衰之極也枸杞力微安得有效乎或問地骨皮治骨蒸之熱用之不見效者何也夫骨蒸之熱熱在骨髓之中其熱甚深深則涼亦宜深豈輕劑便可取效乎勢必多用為佳世人知地骨皮之可以退熱而不知多用故見功實少耳曰黃柏知母亦涼骨中之熱也闢黃柏知母而勸多用地骨皮何也不知地骨皮非黃柏知母之可比地骨皮雖入腎而不涼腎止入腎而涼骨耳涼腎必至瀉腎而傷胃涼骨反能益骨而生髓黃柏知母瀉腎傷胃故斷不可多用以取敗地骨皮益腎生髓不可少用而圖功欲退陰虛火動骨蒸勞熱之症用補陰之藥加地骨皮或五錢或一兩始能涼骨中之髓而去腎中之熱也或問地骨皮用至五錢足矣加至一兩毋乃太多乎恐未必有益於陰虛內熱之人耳不知地骨皮非大寒之藥也而其味又輕清如用之少則不能入骨髓之中而涼其骨大寒恐其傷胃微寒正足以養胃也吾言用一兩猶少之辭蓋既有益於胃自有益於陰矣辛夷辛夷味辛氣溫無毒入肺膽二經止腦內風疼面腫引齒痛眩目除身體寒熱通鼻塞止鼻淵清涕生鬚髮此物通竅而上走於腦舍鼻塞鼻淵之症無他用存之以備用可耳且辛散之物多用則真氣有傷亦可暫用而不可久服總之去病即已不可因其效甚而縱用之非獨辛夷之為然也酸棗仁酸棗仁味酸氣平無毒入心肝膽與胞絡四經寧心志益肝膽補中斂虛汗祛煩止渴安五臟止手足痠痛且健筋骨久服多壽以上治療俱宜炒用惟夜不能眠者必須生用或神思昏倦久苦夢遺者亦宜生用可為臣佐多用尤佳常服亦妙也或問酸棗仁只能益心何以補腎之藥古人往往用之乎蓋心腎原不可兩治也因世人貪色者多仲景夫子所以隻立六味八味以補腎中之水火宜然而腎火原通於胞絡而腎水原通於心補心未嘗不能益腎古人所以用棗仁以安心即安腎也且世人入房而強戰者心君不動而相火乃克其力以用命心君一移而相火即懈精即下泄可見補心所以補腎心氣足而腎氣更堅不信然哉或問酸棗仁之治心也不寐則宜炒多寐則宜生又云夜不能寐者必須生用何其自相背謬耶不知此實用藥之機權也夫人不寐乃心氣之不安也酸棗仁安心宜用之以治不寐矣然何以炒用棗仁則補心也夫人多寐乃心氣之大昏也炒用則補心氣而愈昏生用則心清而不寐耳夜不能寐者乃心氣不交於腎也日不能寐者乃腎氣不交於心也腎氣不交於心宜補其腎心氣不交於腎宜補其心用棗仁正所以補心也補心宜炒用矣何以又生用不知夜之不寐正心氣之有餘清其心則心氣定而腎氣亦定矣此所以必須生用若日夜不寐正宜用炒而不宜用生矣或疑棗仁安心人人知之安心而能安腎此則人未知也曰棗仁豈特安心以安腎而已乎更能安五臟之氣蓋心腎安而五臟有不安者乎不必其入脾入肺入肝而後能安也杜仲杜仲味辛甘氣平溫降也陽也無毒入腎經補中強志益腎添精尤治腰痛不能屈伸者神效亦能治足陰囊濕癢止小水夢遺此物可以為君而又善為臣使但嫌過燥與熟地同用則燥濕相宜自然無火動之憂也或問腎惡燥而杜仲性燥何以入腎以健腰吾子加熟地尤宜然亦似熟地之滋腎終非杜仲之益腎矣曰補腎原不必熟地余用熟地者不過取其相得益彰也夫腎雖惡燥而濕氣侵之腰即重著而不可俯仰是腎又未嘗不惡濕也杜仲性燥燥腎中之邪水而非爍腎中之真水也去熟地而腎中之燥不相妨用熟地而腎中之濕亦無礙蓋杜仲自能補腎而非借重於熟地之助也或問杜仲非燥藥也而吾子謂是燥藥何據而云然乎曰論杜仲之有絲其非燥藥也然而杜仲之燥正有有絲之不肯斷夫太剛則折大柔則不肯折矣杜仲之絲經火炒則斷其中之柔軟為何如而獨謂其性燥者別有義也杜仲不經火則濕經火則燥不斷之絲非火炒至無絲則不可為未非受火氣迫急而為燥乎腎惡燥而以燥投燥遽入往往動火我所以教人與熟地同用也至於腎經中濕不特宜同熟地並施且宜生用為妙並不可火炒蓋腎既有濕得熟地則增潤反牽制杜仲一加火則失其本性但補而不攻而濕邪反不得遽散夫杜仲不炒則濕何反宜於治濕蓋杜仲燥中有濕濕非水氣之謂也邪濕得真水而化生用正存其真氣耳或問杜仲補腎仲景公何故不採入八味丸中不知杜仲補腎中之火而有動腎氣動則桂附不安於腎宮恐有飛越之虞故用桂附而不用杜仲然則固不可用乎腎中有濕氣正宜加用於八味丸中取其動而能散濕也又不可拘執不用而盡棄之耳或問杜仲補腎世人竟以破故紙佐之毋乃太燥乎杜仲得破故紙而其功始大古人嫌其太燥益胡桃仁潤之有魚水之喻其實杜仲得破故紙正不必胡桃仁之潤也蓋破故紙溫補命門之火而杜仲則滋益腎中之水水火有既濟之美又何必胡桃仁之潤哉雖杜仲得胡桃仁之相助亦無礙其益腎之功然而杜仲實無借於胡桃仁也或云胡桃仁滋破故紙之燥也夫破故紙用之於他藥之中未見用胡桃仁之助何獨入於杜仲之中而加胡桃仁也謂非因杜仲而入之吾不信也使君子使君子味甘氣溫無毒入脾胃大腸去白濁除五疳殺蛔蟲止瀉痢用之以治小兒傷食生蟲者實妙以其不耗氣也然而大人用未嘗不佳但宜用鮮而不宜用陳用熟而不宜用生入藥之時宜現煨熟去殼口嚼咽下以湯藥送之始能奏功也或問使君子殺蟲小兒食之往往蟲從口出殺蟲者固如是乎曰蟲在上焦則蟲犯使君子之氣味必上竄而越出蟲從口出正殺蟲之驗也奈何疑之乎夫殺蟲分上中下也蟲在上焦者則吐蟲在中焦者則和蟲在下焦者則瀉焉也山茱萸山茱萸味酸澀氣平微溫無毒入腎肝二經溫肝經之血補腎臟之精興陽道以長陰莖暖腰膝而助陽氣經候可調小便能縮通水竅去三蟲強力延年輕身明目其核勿用用則滑精難收實益陰之聖丹補髓之神藥仲景夫子所以採入於八味丸中取其固精而生水也本經謂其九竅堪通而世人疑之者以其味過於澀則竅閉而不能開恐難以通之也豫以為不然夫人五臟安則九竅自利而五臟之內一臟不安則四臟因之不安矣所謂一臟者何即腎臟也腎為四臟之本腎安而四臟俱安安四臟而利九竅又何疑乎山茱萸佐八味以補腎正安腎以安五臟之藥也五臟既安而謂九竅之不能利乎且山茱萸不止利九竅也三焦六腑無不藉其庇廕受其滋益此八味湯中之所必用而岐伯天師新立補腎諸方無不用之以救垂絶之症也或問山茱萸入六味丸中不過佐熟地之生精耳先生謂其能利九竅毋乃誇乎非誇也熟地得山茱萸則功始大山茱萸得熟地則其益始弘蓋兩相須而兩相成也有此二品則生精而人生無此二品則不能生精而人死山茱萸關人之死生豈特利九竅而已哉或問補陰之藥甚多何必用山茱萸以佐熟地乎曰補陰之藥未有不偏勝者也獨山茱萸大補肝腎性專而不雜既無寒熱之偏又無陰陽之背實為諸補陰之冠此仲景夫子所以採入於六味丸中以為救命之藥也或問山茱萸為救命之藥所救者何病乎籲天下之死於病者半好色之徒也好色者泄精必多精泄則髓空精泄則神散非用九味地黃湯以大填補其精則髓空者何以再滿而能步履神散者何以再返而能摻哉雖六味丸中之功效不止山茱萸之一味然舍山茱萸之佐熟地又何生精之速添髓而益神乎所謂救命之藥真非虛語耳或問六味丸之妙義已將各藥闡發無遺不知山茱萸亦可再為宣揚乎曰山茱萸乃六味丸中之臣藥也其功必大中諸藥是以仲景公用之耳山茱萸補腎中之水而又有澀精之妙精澀則氣不走而水愈生更使利者不至於全利而瀉者不至於全瀉也雖六味丸中如茯苓澤瀉亦非利瀉之藥然補中有利瀉之功未必利瀉無補益之失得山茱萸之澀精則所瀉所利去腎中之邪而不損腎中之正故能佐熟地山藥以濟其填精增髓之神功也或又問子既闡山茱萸用於八味丸中者非僅補水以制火實補水以養火也腎中之火非水不能生亦非水不能養火生於水之中則火不絶火養於水之內則火不飛山茱萸補而且澀補精則精盛而水增澀精則精閉而水靜自然火生而無寒弱之虞火養而無炎騰之禍助熟地山藥而成既濟之功輔附子肉桂而無亢陽之失矣或問山茱萸用於六味八味妙義如此未知舍二方之外亦可獨用以出奇乎曰人有五更泄瀉用山茱萸二兩為末米飯為丸臨睡之時一次服盡即用飯壓之戒飲酒行房三日而泄瀉自愈蓋五更泄瀉乃腎氣之虛則水不行於膀胱而盡入於大腸矣五更亥子之時也正腎水主事腎氣行於此時則腎不能司其權而瀉作山茱萸補腎水而性又兼澀一物二用而成功也非單用之以出奇乎推之而精滑可止也小便可縮也三蟲可殺也單用奏效又烏能盡宣其義哉或疑山茱萸過於澀精多服有精不出而內敗之虞嗟乎此猶臨飯而防其不能咽也山茱萸澀精又不閉精為補精之獨絶仲景夫子所以用之於地黃丸中若精不出而內敗者乃人入房精欲泄而強閉或有老人與大虛之人見色而畏怯而不敢戰而心又怦怦動也相火內炎而遊精暗出於腎宮亦能精不出而內敗服山茱萸正足以治之焉有精閉而內敗之虞彼不出而內敗者乃不服山茱萸致大小便牽痛欲便不能不便不可愈痛則愈便愈便則愈痛服山茱萸而痛與便立愈矣可見山茱萸乃治精不出而內敗之神藥如之何其反疑之乎或疑山茱萸性溫陰虛火動者不宜多服夫陰虛火動非山茱萸又何以益陰生水止其龍雷之虛火哉凡火動起於水虛補其水則火自降溫其水則火自安倘不用山茱萸之益精溫腎而改用黃柏知母瀉水寒腎吾恐水愈干而火愈燥腎愈寒而火愈多勢必至下敗其脾而上絶其肺脾肺兩壞人有生氣乎故山茱萸正治陰虛火動之神藥不可疑其性溫而反助火也或又疑山茱萸性溫動火不宜於火動夢遺之症夫夢遺之症愈寒而愈遺何忌于山茱萸乎山茱萸性澀精安有澀精而反致遺精乎蓋夢遺而至玉關不閉正因於腎火之衰也腎火衰則火不能通於膀胱而膀胱之水道閉矣水道閉而水竅塞水竅塞而精竅反不能塞也於是日遺精而不止然則欲止其精舍溫腎又何以止之乎人以為山茱萸性溫動火恐不可以治遺精之病吾以為山茱萸之性僅溫尚不足以助火恐未能竟治遺精之病也或問繆仲醇闡山茱萸之誤云命門火熾陽強不痿忌用茱萸而先生所談六味八味又似命門火熾者服之無礙然則仲醇非歟曰是仲醇過慎藥餌之失也命門火熾非山茱萸純陰之藥又何以制之既不敢輕用山茱萸又不能捨山茱萸而他用制火之藥又云當與黃柏同加則惑矣也接骨木接骨木味苦辛氣平有小毒入骨節專續筋接骨易起死回生折傷吞酒風癢湯浴只用之以接續骨節産前産後皆不用存之以備折傷之需生接骨木獨用之接骨固奇然用之生血活血藥中其接骨尤奇但宜生用為佳至干木用之其力減半炒用又減半也蓋取其生氣則神而已矣蔓荊子蔓荊子味苦辛甘氣溫微寒陽中之陰無毒入太陽經主筋骨寒熱濕痹拘攣本經頭痛頭沉昏悶利關節長髮通九竅去蟲散風淫明目耳鳴乃止齒動尤堅此物散而不補何能輕身耐老胃虛因不可用氣血弱衰者尤不可頻用也或問蔓荊子止頭痛聖藥凡有風邪在頭面者俱可用而吾子又以為不可頻用謂其攻而不補也但藥取其去病能去病又何慮用之頻與不頻哉不知蔓荊子體輕而浮雖散氣不至於太甚似乎有邪者俱可用之然而虛弱者少有所損則氣怯神虛而不勝其狼狽矣豫言不可頻用者為虛者言之也若形氣實邪塞於上焦又安在所禁之內哉蔓荊子佐補藥中以治頭痛尤效因其體輕力薄藉之易於上升也倘單恃一味欲取勝於頃刻則不能也或問蔓荊子入太陽經能散風邪何仲景張公不用之以表太陽之風邪得毋非太陽之藥乎不知蔓荊子入太陽之營衛不能如桂枝單散衛而不散營麻黃單散營而不散衛各有專功傷寒初入之時邪未深入在衛不可引入營在營不可仍散衛蔓荊子營衛齊散所以不宜矣豬苓豬苓味苦甘淡氣平降也陽也無毒入腎與膀胱經通淋消腫滿除濕利小便泄滯助陽利竅功專於行水凡水濕在腸胃膀胱肢體皮膚者必須豬苓以利之然而水濕之症有陽有陰有虛有實未可一概利之也倘陰虛之症輕用豬苓以瀉其水水去陰亦消亡必有口乾舌燥之症況原無水濕之症利之則重亡津液陰愈虛矣甚則有利小便欲行點滴而不可得者非誤利之明驗乎雖然水濕之邪既在人身豈可以陰虛難治竟置於不治哉用豬苓利水之藥仍入之陰藥中陰既不虛而濕亦自利安在豬苓之不可用乎或問豬苓利水胡為利水而水不通且多急悶而不可解何也此火蓄膀胱而上焦之氣不升肺金清肅之令不行於下焦之故也夫膀胱瀉水也然必得肺金之氣清肅下行而乃水走於陰器而出豬苓但利水而不能升上焦之氣上焦有火過抑肺金清肅之令不能行於下焦不用降火之品而唯從事於利水所以用豬苓而不效非豬苓之不能利水也或問豬苓導水使火邪從小便而出是引火邪之下出也然仲景張公往往用豬苓湯以散邪何也蓋豬苓之性不特下走於陰竅而且兼走於皮毛之竅仲景夫子用豬苓湯者惡邪不走膀胱而走皮膚慮亡陽之症所以用之即引火邪從皮毛而外出也然則豬苓不特引水下泄而亦能引火外瀉也或問豬苓利水何能解口之不渴也夫小便數而口不渴者火蓄於膀胱也火蓄則熬干其水水沸而為熱所以作渴用豬苓以利水實所以瀉火火瀉而水獨存則津液通而上潤於口舌之間矣然則豬苓非利水之藥乃生津之藥也或疑豬苓為生津之藥終不可為訓曰豬苓利水盡則口益干而欲其口舌之生津難矣所謂生津者止能生於多水之症而不能生於無水之症無水之症瀉水則水涸而火起多水之症瀉水則火降而水升水既升矣而津液有不潤於口齒者乎是豬苓之生津生於利水以去火而非概生於利水也或疑豬苓澤瀉同是利水之物而吾子偏分出功用之不同非好奇耶曰豬苓澤瀉用既不同義自各別有異言異有同言同何好奇之有南燭枝葉南燭即烏米飯樹也味苦氣平無毒入腎治一切風痰悅顏色耐老堅筋骨健行久服身輕不飢多服發白變黑此物草木之王專益精而變白老人尤宜服之味雖苦而不寒氣甚平有益乃續命之津延齡之液也世人不知用之殊可惜春間採嫩葉約二十斤用蒸籠在飯鍋蒸之雖歷鐵器無妨否則必須砂鍋內蒸熟曬乾為末飯鍋不能蒸可用米煮粥上蒸之亦妙不蒸熟而陰乾者無用大約一斤南燭葉末加入桑葉一斤熟地二斤山茱萸一斤白果一斤花椒三兩白朮二斤為末蜜為丸白滾水送下一兩每日於早晨服之不特變白甚速而且助陽補陰延年益算鄙意加入人參二兩尤神之神也倘命門寒者加入巴戟天一斤殊妙南燭葉固佳而南燭子尤佳深秋結實先紅後紫其味甘而酸入腎肝二經勝於南燭之葉添精益髓舒筋明目久服延年余更有一方用南燭子者二斤搗爛入白果去殼四兩同搗入山藥末一斤茯苓四兩芡實半斤同搗為餅火焙乾為末入枸杞子一斤熟地一斤山茱萸一斤桑葉末一斤嫩葉為妙巨勝子半斤共為末蜜為丸每日早晨老酒送下五錢一月白髮變黑矣且能顏色如童子此方不寒不熱自是生精聖方修服必有利益也或問變白藥多何吾子獨稱南燭之子蓋烏須藥多是氣苦寒恐有礙於脾胃惟南燭氣味和平而子尤加甘溫益腎之餘更能開胃健脾真變白之神品滋顏之妙藥牧童採食輒止飢此非明驗歟或問南燭之黑鬚吾子大肆闡揚然未見子之自驗也曰吾尚論本草實欲闡發各藥之微南燭黑鬚古人有服之而驗者不必鐸之自驗也江南人多采之以煮飯白米輒變為黑故俗名烏米飯非有據之談乎蜀椒蜀椒味辛氣溫大熱浮也陽中之陽有毒入心脾腎之經卻心腹疼痛及寒溫痹疼殺鬼疰蠱毒並蟲魚毒蛇除皮膚骨節死肌療傷寒溫瘧退兩目翳膜驅六腑沉寒通氣脈開鬼門乃調關節堅齒髮暖腰膝尤縮小便理風邪禁咳逆之邪治噫氣養中和之氣消水腫黃疸止腸癖痢紅多食乏氣失明久服黑髮耐老功用實多不只書上所載然而少用則益多用則轉損入於補陰之藥可以久服入於補陽之劑未可常施也按蜀椒功用實勝於近處所産以蜀椒味輕轉有益也土産之椒其辛香倍於蜀産雖功用少薄未嘗不可用也大約蜀椒用一兩者土産必須一兩二錢何必專覓蜀椒哉或問蜀椒可以烏須而烏須之方似可用之也夫蜀椒未能烏須也取其引烏須之藥入任督之路耳大約烏須藥多寒而蜀椒性熱相侔同用尤能制陰寒之氣所以易於奏功而變黑甚速也但熱藥宜少用不可多用耳吳茱萸吳茱萸味辛苦氣溫大熱可升可降陽中陰也有小毒入肝脾腎之經主咽塞氣不通散氣膈冷氣窒塞驅脾胃停寒臍腹成陳絞痛逐膀胱受濕陰囊作疝剜痛開腠理解風邪止嘔逆除霍亂因順折肝木之性治吞吐酸水如神厥陰頭疼引經必用氣猛不宜多食令人目瞪口開久服亦損元氣腸虛泄者尤忌可逆用之以祛寒復可順用之以解熱大約祛寒可以多用而解熱難以多投也按吳萸入四神丸中以治腎泄非用之以祛寒耶然而四神丸中用吳茱萸者非盡去寒也亦借其性燥以去濕耳夫腎惡燥而瀉久則腎正苦濕也吳茱萸正喜其燥以投腎之歡入諸腎臟之逐其水而外走於膀胱不走於大腸也或疑吳茱萸性熱祛寒恐不可用之以解熱不知從治之道宜順而不宜逆逆其性致有相格之憂順其性始有相投之慶也鉤藤鉤藤味甘苦氣微寒無毒入肝經治寒熱驚癇手足瘛瘲胎風客忤口眼抽搐此物去風甚速有風症者必宜用之然尤能盜氣虛者勿投或問鉤藤為手少陰足厥陰要藥少陰主火厥陰主風風火相搏故寒熱驚癇之症生但風火之生多因於腎水之不足以致木燥火炎於補陰藥中少用鉤藤則風火易散倘全不補陰純用鉤藤以祛風散火則風不能息而火且愈熾矣大腹皮大腹皮味辛苦氣微溫降也無毒入肺脾胃三經主冷熱諸氣通大小二腸止霍亂痰隔醋心攻心腹大腸壅毒消浮腫亦佐使之藥若望其一味以攻邪則單寒力薄必至覆亡矣或問大腹皮即檳榔之外皮也繆仲醇謂氣味所主與檳榔同而實不同也大腹皮之功尤專消腫然亦必與白朮薏苡茯苓車前桑白皮人參同用始有功耳檳榔檳榔味辛苦氣溫降陰中陽也無毒入脾胃大腸肺四經消水穀除痰癖止心痛殺三蟲治後重如神墜諸氣極下專破滯氣下行若服之過多反瀉胸中至高之氣善消瘴氣兩粵人至今噬之如始古人疑其耗損真氣勸人調胃而戒食檳榔此亦有見之言然而非通論也嶺南煙瘴之地其蛇蟲毒氣借炎蒸勢氛吞吐于山巔水溪而山嵐水瘴之氣合而侵人有立時而飽悶暈眩者非檳榔口噬又何以迅解乎天地之道有一毒必生一物以相救檳榔感天地至正之氣即生於兩粵之間原所以救兩粵之人也況此物降而不升雖能散氣亦不甚升但散邪而不散正此兩粵之人所以長服而無傷至身離粵地即不宜長服無邪可散自必損傷正氣矣或問檳榔乃消瘴之物似宜止治瘴氣何以治痢必須曰檳榔雖可治痢亦只宜於初起而不宜於久痢也痢無止法用檳榔所以下其積穢也故初起之痢斷須用之痢久則腸中無積穢之存若仍如初痢之治法則虛者益虛而痢者益痢矣是久痢斷不可用檳榔也然吾以為初痢亦不可純用檳榔用當歸白芍為君而佐之檳榔則痢疾易痊而正氣又復不損實可為治痢之權衡也或疑檳榔去積滯即宜獨用之何以反佐之以當歸當歸雖補猶滑以助其攻也何以更用白芍之酸收偏能奏功哉不知檳榔必得補以行其攻也夫積滯之不行也由於氣血之乾涸倘徒用檳榔以攻其積滯則氣血愈傷而瘀穢愈阻而不通故必須當歸以生氣血則大腸自潤有可通之機然而肝木克脾木旺則火旺火旺必爍干氣血當歸所生不足以濟其所克故必須益之芍藥以平肝則肝不克脾而芍藥酸中又能生血以助當歸之潤故同群共濟以成檳榔之功然則收之正所以能其攻也五倍子五倍子一名文蛤味辛酸氣平無毒入腎經療齒宣疳𧈟及小兒面鼻疳瘡治風癬癢瘡並治大人五痔下血洗目消赤腫止疼痛染須髭變黑專為收斂之劑又禁瀉痢腸虛解消渴生津卻頑疼去熱百藥煎亦此造成此藥外治之功居多內治之功甚少存之以備瘡毒之用耳或問五倍子乃收斂之藥用之外治更宜然而內治以固滑瀉未嘗不佳何子著本草單為外治留之乎曰痢無止法用澀藥以止痢前人所戒況五倍子止痢乃不得已而用之止痢之品甚多何必藉此不可用之藥此鐸所以只取外治而不取內治皂莢皂莢味辛咸氣溫有小毒入足厥陰手少陰手太陰三經理氣疏風搐鼻噴噎可救五絶痰迷中風不語諸症敷腫痛即除吐風痰殺癆蟲精物起風痹治死肌利竅開關破症墮孕此物備急用之藥藥籠中不可無者也或問皂莢開關之藥單用以取捷乎夫皂莢之功用不止此也凡心疼之病隨愈而隨發者必用皂莢始可除根此本草所未言也張夫子曾傳余治心痛之方實有皂莢火炒一兩炒梔子一兩炙甘草五錢白芍二兩廣木香三錢為細末老黃米煮粥為丸如米大滾水送下即愈永不再發是皂莢又可以治心疼也然而皂莢非治心疼之藥借其開竅引入於心之中使諸藥直攻其邪也或問皂莢生用乎抑熟用之乎皂莢熟用則無益矣必生用為佳然而生用切不可用蛀者蓋皂莢蟲尤細凡研末之時蛀蟲乘開關之際直入肺中反成大害故必須揀不蛀者研為細末即包在紙包之內亦必須常取出經風以防其再蛀我有一方制之最佳用麝香同包斷無再蛀之理且又可借麝香之香引入鼻竅而開關更靈也或問用皂莢末以治中風吐其痰而不愈反成偏枯之症何也曰皂莢用末以吹鼻使中風之人關開實治方之功也若入於稀涎散中吐之非治也蓋近來中風者皆非真中風盡由於陰陽水火之虛或陰虛火炎煎熬津液結而為痰熱極生風猝然僕厥使更吐痰則愈損其津液矣津液重傷經絡無水以相養或氣虛而無以相通安得不變為拘攣偏廢之症哉或疑神仙傳載崔言逢異人傳皂莢刺三斤燒灰調大黃末以治大麻風雖將死尚可救何子注本草略之乎曰皂角刺安能救大麻風哉此誤傳也用此方以救之是速之死耳烏藥烏藥味辛氣溫陽也無毒入足少陰腎經及陽明胃腑性多走泄不甚剛強諸冷能除凡氣堪順止翻胃消積食作脹縮小便逐氣衝致疼闢疫瘴時行解蠱毒卒中攻女人滯凝血氣去小兒積聚蛔蟲此品功多而效少蓋佐使之至微者也力微似可多用然而多用反不見佳不若少用之以佐君臣之用耳烏藥無關輕重其實過多功少近人未知耳産婦虛而胎氣不順者切不可用用則胎立墮人以為順氣用之誰知烏藥能順胎氣之實而不能順胎氣之虛乎不獨胎氣凡氣虛者俱不能順惟氣血虛而帶鬱滯者宜之耳血竭血竭味辛咸氣平有小毒入腎治跌打傷損消惡毒癰疽專破積血引膿驅邪氣止痛外科多用之然治諸痛內治實神效存之以備採用血竭內科可用而近人不敢用之不知血竭得補氣血之藥其功更神惜人未諳故再表之也沉香沉香味辛氣微溫陽也無毒入命門補相火抑陰助陽養諸氣通天徹地治吐瀉引龍雷之火下藏腎宮安嘔逆之氣上通於心臟乃心腎交接之妙品又溫而不熱可常用以益陽者也沉香溫腎而又通心用黃連肉桂以交心腎者不若用沉香更為省事一藥而兩用之也但用之以交心腎須用之一錢為妙不必水磨切片為末調入於心腎補藥中同服可也乳香乳香味辛苦氣溫陽也無毒入脾肺心肝腎五臟療諸般惡瘡及風水腫毒定諸經卒痛並心腹急疼亦入散膏止痛長肉更催生産且理風邪內外科皆可用大約內治止痛實為聖藥研末調服尤神或問諸痛皆屬於火而乳香性溫宜與痛病不相合何以定諸經之卒痛耶蓋乳香氣雖溫而味實苦溫為熱苦為寒氣溫則先入於火之中相合而不相礙味苦則後居於痛之內相制而不相違此所以能定諸痛而無不宜也丁香丁香有雌雄之分其實治病無分彼此味辛氣溫純陽無毒入腎胃二經又走太陰肺臟善祛口舌潰爛伐逆氣殊功止噫厄氣逆翻胃嘔吐霍亂除心腹冷疼暖腰膝壯陽殺疳𧈟堅齒治奶頭綻裂消蟲毒膨脹亦有旋轉天地之功直中陰經之病尤宜可用之但不可用之於傳經之傷寒也世人重母丁香而輕公丁香不知何故謂母丁香能興陽道也夫丁香而曰母其屬陰可知陰不能助陽亦明矣丁香公者易得而母者難求此世所以重母丁香也舍易而求難世人類如是夫阿魏阿魏味辛氣平無毒熱入脾胃大腸殺蟲下惡氣破症積闢瘟禁瘧卻鬼祛邪蠱毒能消傳尸可減乃消毒攻邪之物宜於外治而不宜於內治者也阿魏以臭者為佳無臭氣者皆假然亦有臭者不可用乃取蒜搗為汁而亂人者也然我有辨真假之法臭阿魏投之水中半沉半浮者上也浮者次之沉者假物而不堪入藥也沒藥沒藥味苦辛氣平無毒入脾腎二經消腫突惡瘡癰疽潰腐破血止痛如神療墜墮跌打損傷尤效亦內外可用之藥而外治更奇也沒藥亦有贋者尤難辨辨法亦投之水中立時色黯者為真否則假物無益於用不如勿用也雷丸雷丸味苦咸氣寒有小毒入脾胃與大腸胃熱可解力能殺蟲不論各蟲皆能驅逐男婦皆利非利男子而不利婦人也主癲癇狂走墮鬼胎甚速遇怪病在腹無藥可治者加入輒應如響名曰雷丸者言如雷之迅如丸之轉也走而不留堅者能攻積者能去實至神之品但有小毒未免損傷胃氣去病則已不可多服宜以之逐邪不宜以之耗正也或問聞雷丸善治奇病有之乎雷丸何能治奇病也用之有理則奇用之無事則拙吾深怪世人無理而欲眩異也或問雷丸可以逐邪亦可以逐鬼乎既可逐邪獨不可以逐鬼乎惟是逐鬼與逐邪少異逐邪須用攻邪之藥為佐而逐鬼必須用補正之藥為君未可單用攻劑也或問邪與鬼何分曰寒熱之有常此邪氣而非鬼祟也寒熱之無常此邪祟而非邪氣矣然亦不可拘也天下有鬼祟憑之而無寒熱者亦有寒熱未解而鬼祟先去者雖曰逐邪用攻邪之藥逐鬼用補正之藥苟能以補正為主而佐之逐邪逐鬼也則無往而非宜也或問雷丸性至急不識可少制而緩之乎夫雷丸一制則無用矣大凡逐邪之藥正取其迅速制之則失其性安能施其功用乎設於同群之中而佐之和平之味則彼此調劑自得其宜亦不制之制也麥芽大麥芽味鹹氣溫無毒入脾胃二經尤化米食消痰亦效孕婦勿服多用恐墮胎元若只用一二錢亦無妨惟大麥煎糖孕婦切戒多食極消腎水必損胎元矣或問麥芽亦米穀之類何以能消米食不知麥芽雖與米穀同類而氣味相剋麥鍾四時之氣而尤得夏氣俱多米穀則得秋氣者也夏氣克秋米穀逢麥猶秋得夏氣也安得不消化乎或問麥芽消食亦能消痰江北中州之人尤善食麵宜痰食之咸化矣何以消食多痰之比比乎夫麥芽乃大麥之芽非小麥之芽也大麥與小麥性殊而功用各別小麥養人而大麥傷人且麥芽與未發芽之麥功用亦殊也未芽之大麥性靜已芽之大麥性動動則變變則化矣又何之疑乎或問小麥亦得夏氣何以不克米穀不知小麥雖與大麥同類而早晚之性實異大麥得夏之初氣小麥得夏之中氣初氣克削中氣和平故大麥消穀而小麥養胃且小麥無須芒房亦易脫形體亦甚不同試看大麥芒能消無形之水腫而小麥之房不能消濕非一補一消之明驗乎赤小豆赤小豆味辛甘酸氣溫而平陰中之陽無毒入脾經下水治黃爛瘡解酒醉燥濕浸手足腫大療腳氣入臍高突但專利水逐津久服令人枯燥亦可暫用以利水而不可久用以滲濕濕症多屬氣虛氣虛利水轉利轉虛而濕愈不能去矣況赤小豆專利下身之水而不能利上身之濕蓋下身之濕真濕也用之而效上身之濕虛濕也用之而益甚不可不辨也或問赤小豆即家園之紅豆乎曰別是一種其色如朱而發光頭上一點黑如漆若家園之紅豆名曰紅而色實紫能療飢而不能利水去濕多食亦敗血功用與赤小豆迥別切勿以家園之紅豆而錯用之也白扁豆白扁豆味甘氣微溫無毒入脾胃二經下氣和中除霍亂吐逆解河豚酒毒善治暑氣佐參茯二術止瀉實神但味輕氣薄單用無功必須同補氣之藥共用為佳矣或謂白扁豆非固胎之藥前人安胎藥中往往用之何故蓋胎之不安者由於氣之不安白扁豆尤能和中故用之以和胎氣耳母和而安即謂之能安胎也亦可但單用此味以安驟動之胎吾從未見其能安者矣或問白扁豆氣味涼薄亦可有可無之物先生刪藥味甚多何獨不刪白扁豆夫扁豆乃五穀中最純之味淡而不厭可以適用者不止入湯劑也或入於丸劑或磨粉而調食均能益人況功用不獨安胎尤善種子凡婦人之不受孕者半由於任督之傷也白扁豆善理任督又入脾胃二經同人參白朮用之引入任督之路使三經彼此調和而子宮胞胎自易容物豫所以特登此味以為育麟之資豈漫然而收録乎哉烏芝麻烏芝麻味甘氣溫無毒入腎經並通任督之脈功擅黑鬚圖經未載故近人無知之者凡黑鬚髭之藥缺烏芝麻則不成功蓋諸藥只能補腎而不能通任督之路也唇口之間正在任督之路烏芝麻通任督而又補腎且其汁又黑所以取神效也但功力甚薄非久服多服益之以補精之味未易奏功也或問烏芝麻黑鬚髭神農未書本草不志何吾子創言之哉曰烏芝麻變白豫親試而驗者乃不慎色故餘年四十早衰鬚髯半白服烏芝麻重黑後因變亂不慎酒色復白可見服烏須藥必須斷欲不可歸咎烏芝麻之無效驗焉哉或疑烏芝麻即白芝麻同類未聞白芝麻之潤腎烏芝麻之變白恐亦好事者之言不知烏芝麻之變白實有義也芝麻性潤而汁烏烏自入腎既入腎自能潤髭矣況又通任督之脈乎然而烏芝麻之義又不止此烏芝麻更能上潤於心使心火不炎不燒任督之路引補腎之藥至於唇口故能變白也巨勝子巨勝子非胡麻也味甘氣溫平無毒丹溪盛稱之原有功益也入心腎二經補虛羸耐飢渴寒暑填堅髓骨益氣力長肌膚明目輕身延年不老益元陽興陰莖尤生津液入口即生與人參相同其補益之功不可思議惟其體尤輕內實者正無多也然亦不必盡是內實者始可用亦不必盡去其殼但投之水中半沉半浮者即可用將浮者棄去取出沉與半沉者用地黃汁泡之一日曬乾磨末用為妙此藥宜入丸而不宜煎湯煎則味不能出也或問巨勝子胡僧用入桑葉中為丸果有益乎此奇方也先君曾服之年愈六十鬚髯未白後不服此藥即白可見此方之奇蓋巨勝子得桑葉更神者或問巨勝子載之參同契書中謂是長生之藥但不知何法服食便可長生嗟乎長生即不死之謂也世人安有服草木之味而即能長生者乎夫欲求長生舍金丹之法無他藥也雖然金丹不可得而巨勝子則易得胡僧之方雖佳尚未盡妙鐸有一方名延景丸用巨勝子二斤熟地一斤山藥一斤桑葉乾者二斤三月盡採之曬乾為末者佳老葉不可用茯苓三兩薏苡仁三兩芡實三兩淫羊霍半斤巴戟天一斤山茱萸半斤北五味三兩菟絲子一斤各為末蜜為丸每日白滾水送下五錢長年可服如脾氣欠健加白朮一斤氣虛加人參六兩黃耆一斤陽道欠舉加肉桂三兩此方不寒不熱實延齡妙法雖治百歲外尚可服也是乃南嶽道士所傳謂鐸最宜服可登百歲外鐸用是公之天下願共珍之火麻子火麻子味甘氣平無毒入陽明大腸經及足太陰脾臟益氣補中催生下乳去中風汗出皮膚頑痹潤大腸風熱結澀便難止消渴而小水能行破精血而血脈可復産逆橫生易順沐發可潤此物性過於潤凡燥結者可借之以潤腸而脾氣虛者斷難多服至於吞之可以見魅祝之可以闢瘟俱非近理之談而不老神仙尤為荒誕産後宜戒慎勿輕投之也或問火麻子宜於大便燥結之人本草所載其功用亦果多乎夫火麻子實有功用但宜於實症而不宜於虛症而已神麯神麯味甘氣平無毒入脾胃二經下氣調中止瀉開胃化水穀消宿食破癥結逐積痰療婦人胎動不安治小兒胸腹堅滿行而不損與健脾胃之藥同用多寡勿忌但世人所造神麯之法欠妙豫師傳製法擇六月六日用白麵三斤蒼甘草搗爛取汁一合以井水調勻又桑葉十斤搗研爛取布瀝出汁再用赤小豆一升磨末拌麵勻以前二汁拌之成餅以野蓼蓋之十四日取出紙包之懸於風處陰乾臨時用最佳由二三分用至二錢其效如響也或疑製法異於前人不可為訓不知前人之方過於刻削惟此方和平可為攻補之佐使也酒酒味苦甘辛氣大熱有毒無經不達能引經藥勢尤捷速通行一身之表高中下皆可至也少飲有節養脾扶肝駐顏色榮肌膚通血脈厚腸胃御露霧瘴氣敵風雪寒威諸惡立驅百邪竟闢消愁遺興揚意宣言此酒之功也若恣飲助火則亂性損身爛胃腐腸蒸筋潰髓傷生減壽此酒之過也嗟乎酒何過哉知酒之功受其益知酒之過而防其損何害於人況酒又實能愈人之病乎或問酒味甘者多熱味苦者多寒仲景張公用苦酒以治咽喉之腫痛與黃汗之淋漓似乎飲甘香不若飲苦辣不致燒腸腐胃耳醋醋味酸寒氣溫無毒入胃大腸尤走肝臟散水氣殺邪毒消癰腫斂咽瘡祛胃脘氣疼並堅積症塊治産後血暈及傷損金瘡按醋乃食物中必需用之入藥絶少然亦有不得不用之時其功用必宜知也故存之以備稽考矣或問米醋可以入藥不是米醋亦可入藥否夫醋必米造始得溫熱之氣否則味過於酸入肝不能收斂及走筋而縮澀矣故入藥必取米醋凡吐血與肢體肚臍出血與毛孔標血者用醋二升煮滾傾在盆內以雙足心泡之少頃即止血此則不必米醋凡米醋皆可用正取其過酸易於斂澀而寧謐耳冬葵子冬葵子味甘氣寒性滑利無毒主五臟六腑寒熱羸瘦五癃利小便療婦人乳難內閉久服堅骨長肌肉冬葵子本非佳品然藥籠中必備者以其能順胎也橫生倒産子死腹中必藉此以滑之也或問冬葵子治難産未見神效何子獨取之曰冬葵子治難産亦要人必用之耳當橫生倒産之時或卻一足下而一足不下或於一臂伸而一臂不伸欲開産門而兒頭未順也不可遽用柞木枝以先啓産戶以針利之而兒已死疾痛不知徒刺無益若不用冬葵子以助其胞胎之順利又何以救危亡於頃刻乎然而徒用冬葵子不知加入人參當歸川芎之類補氣血以生水則胞胎乾涸亦本能活利順生變危為安也生薑生薑味辛辣大熱通暢神明闢疫癧且助生髮之氣能祛風邪薑通神明古志之矣然徒用一二片欲遽通神明亦必不得之數或用人參或用白朮或用石菖蒲或用丹砂彼此相濟而後神明可通邪氣可闢也生薑性散能散風邪傷風小恙何必用桂枝用生薑三錢搗碎加薄荷二錢滾水沖服邪即時解散真神妙方也或問生薑發汗不宜常服有之乎曰生薑四時皆可服但不宜多服多服散氣豈特發汗哉或問生薑辛散既能散氣似不宜常服然而多服則正氣受傷少服則正氣無害又不可過於避忌坐視而不收其功也至於偶受陰寒如手足厥逆腹痛繞腹而不可止不妨多用生薑搗碎炒熱慰於心腹之外以祛其內寒也乾薑炮薑乾薑味辛炮薑味苦皆氣溫大熱半浮半沉陽中陰也解散風寒濕痹鼻塞頭痛發熱之邪者乾薑也調理痼冷沉寒霍亂腹痛吐瀉之痰者炮薑也蓋乾薑治表而炮薑溫中其所以治表者乾薑走而不收能散邪於外也其所以溫中者炮薑止而不動能固正於內也雖然薑性大熱而辛散俱能散邪補正安在炮製而異宜乾薑散邪之中未嘗無溫中之益炮薑固正之內未嘗無治表之功但乾薑散多於溫而炮薑固多於散耳或問乾薑用之於理中湯中佐附子以成功豈有妙義乎曰無妙義仲景夫子不用之矣理中湯理中焦也雖有白朮是理中焦之藥然氣味與附子溫熱之性尚不相同故入用乾薑之辛熱與附子同性專顧中焦則附子亦顧戀同氣而不上越共逐中焦之寒以成其健脾還陽之功也或問傷寒門中有薑附湯其用乾薑之義想亦與理中湯同意曰薑附湯中用人參似與理中湯相同而孰知別有意義理中湯理中焦薑附湯治下焦也附子領人參直入於至陰之中專祛腹中之寒而軀外皮膚之寒邪則未遑驅逐加乾薑走而不守如大將親搗巢穴而偏裨旁掠於外自然內外肅清遠近安奠也倘只用附子人參未嘗不可奏功然而攻彼失此仲景夫子所以必加入乾薑使同隊而並逐也或問四逆湯亦用乾薑其義豈有異乎夫四逆湯之用乾薑又非前二條之意四逆湯乃救逆也救氣之逆必須同群共濟故用附子肉桂為君必用乾薑為副否則氣逆而不能遽轉矣或問乾薑用之白通湯中以通脈吾懼其散氣則脈隨氣而散矣又何以通脈哉嗟乎脈非氣通又用何物以通之乾薑原非通脈之藥正取其通氣耳氣通則脈通矣夫脈之不通者乃寒凝而不通非氣絶而不通也用乾薑以散寒寒氣散脈氣有不通乎或問乾薑既能通氣用乾薑足矣何以又用蔥耶曰蔥性亦散氣者也單用乾薑恐通氣有餘而通脈則不足單用蔥恐通脈有餘而通氣又不足合而用之氣通又不傷脈脈通又不傷氣兩相濟而成功何傷氣之足憂乎或問乾薑炒熟入於健脾藥中謂能補脾以生氣然乎曰乾薑溫熱原有益於脾氣何在炒熟始能補土以生氣但乾薑性走脾氣不獨受其惠一經炮製則乾薑守而不走獨留於脾中諸經不得而奪之自然較生用更效也白芥子白芥子味辛氣溫無毒入肝脾肺胃心與胞絡之經能去冷氣安五臟逐膜膈之痰闢鬼祟之氣消癖化瘧降息定喘利竅明目逐瘀止疼俱能奏效能消能降能補能升助諸補藥尤善收功近人不知用白芥以化痰而頻用半夏南星以耗氣所不解也白芥子善化痰涎皮裡膜外之痰無不消去實勝於半夏南星半夏性燥而爍陰南星味重而損胃獨白芥子消化痰涎又不耗損肺胃肝心之氣入於氣分而實宜即用於血分而亦當者也或疑白芥子止能消膜膈之痰而不能消胃肺之痰似乎消肺之痰必須貝母消胃之痰必須半夏也而誰知不然夫膜膈之痰統胃肺而言之也胃肺中之膜膈尤善藏痰者也白芥子消膜膈之痰是有痰之處無不盡消況且肺胃淺近之間豈有反不能消之理試看瘧疾正痰藏於膜膈之中也用白芥子一兩炒為末米飲為丸一日服盡而久瘧頓止非消痰之明驗乎瘧止之後神氣不倦非消痰而不耗氣之明驗乎故白芥子消痰實勝於貝母半夏誰謂肺胃之痰不能消也或謂白芥子雖消膜膈之痰未必氣之不耗天下安有消痰之藥而不耗氣者乎曰白芥子實不耗氣能安五臟耗氣則五臟不安矣豈有五臟安而耗氣者乎其餘消痰之藥或安肺而不安胃或安胃而不安肺總不如白芥子之能安五臟也此所以實勝於各消痰之藥耳或疑白芥子消痰而不耗氣然用之而痰仍未消是消膜膈之痰未可全信也曰白芥子只可消膜膈之痰而腎中之痰不能消也服白芥子而仍有痰者宜補其腎腎足而痰自化何疑白芥子非消膜膈之痰乎或疑白芥子消陰分之痰不消陽分之痰然乎曰非也芥子陰分陽分之痰無不盡消不必分陰陽也但腎經水泛火沸之痰不能化余則盡消而無疑矣或問白芥子即芥菜之子人食芥菜覺消食之甚多是白芥子大能消食似未可多食也誰知芥菜消食而芥子消痰各不相同不可疑其菜而戒其子也或疑白芥子消膜膈之痰而不耗氣發明幾無遺議但不知膜膈之痰在於何處曰在胃脘之上下之中而不在胃脘上下之外雖痰分五臟六腑要皆存於胃脘膜膈之中白芥子善消膜膈之痰亦於胃脘中消之豈各入五臟六腑而後消之乎萊蔔子即蘿蔔子蘿蔔子味辛辣氣溫無毒入胃脾二經卻喘咳下氣甚神解麵食至效治風痰消惡瘡善止久痢除脹滿亦奇但宜少少用之補氣之藥得之而無大過之憂利濕之劑入之而有善全之妙多服則損氣久服則傷陰也或疑蘿蔔子能治喘脹然古人用之於人參之中反奏功如神人參原是除喘消脹之藥萊蔔子最解人參何以同用而奏功乎夫人參之除喘消脹乃治虛喘虛脹也虛症反現假實之象人參遽然投之直至其喘脹之所未能驟受往往服之而愈喘愈服者有之雖所增之喘脹乃一時之假象少頃自然平復然終非治之之善少加蘿蔔子以制人參則喘脹不敢增而反得消喘消脹之益此所謂相制而相成也或問蘿蔔子專解人參用人參而一用蘿蔔子則人參無益矣此不知蘿蔔子而並不知人參者也人參得蘿蔔子其功更補蓋人參補氣驟服氣必難受非止喘脹之症也然得蘿蔔子以行其補中之利氣則氣平而易受是蘿蔔子平氣之有餘非損氣之不足實制人參以平其氣非制人參以傷其氣也世人動謂蘿蔔子解人參誤也瓜蒂瓜蒂味苦性寒有小毒凡邪在上焦致頭目四肢面上浮腫與胸中積滯並下部有脈上部無脈者皆宜用瓜蒂以吐之也或問瓜蒂可療黃疸吾子略而不言何也夫黃疸之症多從下受用瓜蒂吐之是從上療之也似乎相宜然而黃疸乃濕熱壅於上中下三焦下病而止治上將置中焦於不問乎此瓜蒂不可治黃疸亦明矣余所以作缺疑之論矣也或問瓜蒂能去鼻中息肉子亦不論是何説乎曰鼻中生息肉者因肺中之熱也用瓜蒂以吐去痰涎則肺熱除而鼻火亦泄似乎相宜然而肺熱雖移熱於鼻上吐以泄鼻中之火勢必中傷肺中之氣肺氣既傷胃氣自逆肺心反動其火火動鼻中更添熱氣前之息肉未消而後之息肉又長矣豫所以削而不道也至於瓜蒂性易上湧不宜輕用不獨鼻中生息肉也若胸中無寒胃家無食皮中無水心中無邪以致諸虛各症均宜慎用誤用則禍不旋踵矣也蔥蔥味辛氣溫升也陽也無毒入足陽明胃經及手太陰肺脈疏通關節祛逐風邪理霍亂轉筋治傷寒頭痛殺魚肉之毒通大小腸散面目腫浮止心腹急痛去喉痹愈金瘡折傷血出疼搗爛炒熱傅之血止安娠妊塞衄血除腳氣奔豚之邪療蛇傷蚯蚓之毒功專發散食多神昏病屬氣虛尤勿沾口可為佐使而亦可為君臣大約為佐使者內治也為君臣者外治也外治宜多內治宜少也蔥有益而亦有損益者通氣而散邪損者昏目而神奪也北人喜食蔥往往壞目習俗使然不能禁耳蔥善通脈仲景夫子所以制通脈湯也蓋蔥空中而善通氣通氣即通脈也溫其里之寒解其表之熱故脈之不通者即通世人疑用蔥以散邪則失用蔥之意矣韭韭子韭味辛微散氣溫性急溫中下氣歸心益陽暖膝脛和臟腑除胸腹痃癖痼冷止莖管白濁遺精活血解毒少用則有益於腎多食則有損於心蜜食殺人不可不戒韭子善止遺精功勝於葉然亦不可多用也或問神農本草云病人可久服韭而吾子曰不可多食豈神農非歟嗟乎神農本草因傳世既久遠落誤傳耳夫韭性辛溫尤善通利雖曰益腎未免消多於補多食能令人神昏正傷心之明驗此豫所以戒之也蒜大蒜味辛氣大溫有毒入五臟解毒去穢除瘧闢瘟消肉消食止吐止瀉外治塗足心可以止衄此物亦可救急但不宜多食過傷損胃脾之氣耳古人云蒜有百益其損在目然而損不止在目也耗肺氣傷心氣動胃氣消脾氣伐腎氣觸肝氣發膽氣此人之未知也但有損而有益祛寒氣闢臭氣止逆氣解毒氣除瘧氣消肉氣此則人之所知也兩相較之損多而益少未可謂益百而損一也
