body:
  text: 卷之一宮集人參人參味甘氣溫微寒氣味俱輕可升可降陽中有陰無毒乃補氣之聖藥活人之靈苗也能入五臟六腑無經不到非僅入脾肺心而不入肝腎也五臟之中尤專入肺入脾其入心者十之八入肝者十之五入腎者十之三耳世人止知人參為脾肺心經之藥而不知其能入肝入腎但肝腎乃至陰之經人參氣味陽多於陰少用則泛上多用則沉下故遇肝腎之病必須多用之於補血補精之中助山茱熟地純陰之藥使陰中有陽反能生血生精之易也批呂道人曰人參功用誠如所言無奈世人錯看了非單用以出奇即亂用以眩異反致無功而收敗蓋天地之道陽根於陰陰亦根於陽無陰則陽不生而無陽則陰不長實有至理非好奇也有如氣喘之症乃腎氣之欲絶也宜補腎以轉逆故必用人參始能回元陽於頃刻非人參入腎何能神效如此批腎虛氣不歸元而喘乃是虛喘人參定喘嗽須多用一服即止若是肺家實火而喘斷不可用又如傷寒厥症手足逆冷此肝氣之逆也乃用四逆等湯亦必多加人參而始能定厥非人參入肝又何能至此是人參入肝腎二經可共信而無疑也惟是不善用人參者往往取敗蓋人參乃君藥宜同諸藥共用始易成功如提氣也必加升麻柴胡如和中也必加陳皮甘草如健脾也必加茯苓白朮如定怔忡也必加遠志棗仁如止咳嗽也必加薄荷蘇葉如消痰也必加半夏白芥子如降胃火也必加石膏知母如清陰寒也必加附子乾薑如敗毒也必加芩連梔子如下食也必加大黃枳實用之補則補用之攻則攻視乎配合得宜輕重得法耳然而人參亦有單用一味而成功者如獨參湯乃一時權宜非可恃為常服也蓋人氣脫於一時血失於頃刻精走於須臾陽絶於旦夕他藥緩不濟事必須用人參一二兩或四五兩作一劑煎服以救之否則陽氣遽散而死矣此時未嘗不可雜之他藥共相挽回誠恐牽制其手反致功效之緩不能返之於無何有之鄉一至陽回氣轉急以他藥佐之才得保其不再絶耳否則陰寒逼人又恐變生不測可見人參必須有輔佐之品相濟成功未可專恃一味期於必勝也或疑人參乃氣分之藥而先生謂是入肝入腎意者亦血分之藥乎夫人參豈特血分之藥哉實亦至陰之藥也肝中之血得人參則易生世人以人參為氣分之藥絶不用之以療肝腎此醫道之所以不明也但人參價貴貧人不能長服為可傷耳批人參療肝腎才得精血之長生妙論也或疑人參既是入腎之藥腎中虛火上衝以致肺中氣滿而作嗽亦可用乎此又不知人參之故也夫腎中水虛用參可以補水腎中火動用參反助火矣蓋人參入肝入腎止能補血添精亦必得歸芍熟地山茱同群以共濟欲其一味自入於肝腎之中勢亦不能如腎中陰虛火動此水不足而火有餘必須補水以制火而凡有溫熱之品斷不可用即如破故杜仲之類未嘗非直入腎中之味亦不可同山茱熟地而並用況人參陽多於陰之物烏可輕投其不可同用明甚不知忌而妄用之則肺氣更滿而嗽且益甚所謂肺熱還傷肺者此類是也至火衰而陰虛者人參斷宜重用腎中下寒之劇則龍雷之火不能下藏於至陰之中勢必直衝而上至於咽喉往往上熱之極而下身反畏寒兩足如冰者有之倘以為熱而投以芩連梔柏之類則火焰愈熾苟用人參同附子桂薑之類以從治之則火自退藏消歸烏有矣蓋虛火不同有陽旺而陰消者有陰旺而陽消者正不可執之概用人參以治虛火也或問人參乃純正之品何故攻邪反用之耶不知人參乃攻邪之勝藥也凡人邪氣入身皆因氣虛不能外衛於皮毛而後風寒暑濕熱燥之六氣始能中之是邪由虛入而攻邪可不用參以補氣乎然而用參以攻邪亦未可冒昧也當邪之初入也宜少用參以為佐及邪之深入也宜多用參以為君及邪之將去也宜專用參以為主斟酌於多寡之間審量於先後之際又何參之不可用而邪之不可攻哉故邪逼其氣陷之至陰之中非人參何能升之於至陽之上邪逼其氣拒於表裡之間非人參何能散於腠理之外邪逼其氣逆於胸膈之上非人參何能瀉之於膀胱之下近人一見用人參病家先自吃驚而病人知之有死之心無生之氣又胡能取效哉誰知邪之所湊其氣必虛用人參於攻邪之中始能萬無一失余不得不暢言之以活人於萬世也批人參不是攻邪之藥而遇邪氣盛正氣虛佐之以攻邪則取勝也用人參於攻邪之中亦自有説邪之輕者不必用也人之壯實者不必用也惟邪之勢重而人之氣虛不得不加人參於攻藥之中非助其攻乃補其虛也補虛邪自退矣或問人參陽藥自宜補陽今曰兼陰又宜補陰是人參陰陽兼補之藥何以陽病用參而即宜陰病用參反未安也不知人參陽多陰少陽虛者陰必虛陽旺者陰必旺陽虛補陽無礙於陰故補陽而陽受其益補陽而陰亦受其益也陽旺補陽更助其陽必有火盛之虞陽火盛則陰水必衰陰水衰而陽火更盛陽且無補益之宜又安望其補陰乎故謂人參不能補陰非也人參但能補陽虛之陰不能補陽旺之陰耳又何疑於人參之是陽而非陰哉批人參補陽虛之陰千古定論或問人參不能補陽旺之陰自是千秋絶論然吾以為補陰之藥中少加人參似亦無礙使陰得陽而易生不識可乎此真窺陰陽之微而深識人參之功用也但用參於補陰之中不制參於補陰之內亦有動火之虞而制參之法何如參之所惡者五靈脂五靈脂研細末用一分將水泡之欲用參一錢投之五靈脂水內即時取起入於諸陰藥之內但助陰以生水斷不助陽以生火此又千秋不傳之祕余得異人之授親試有驗公告天下以共救陽旺陰虛之症也批此人未知用參以救陽旺陰虛者所以寡效今得此法可以善用之矣或問喘脹之病往往用參而更甚是人參氣藥以動氣也吾子不言治喘脹深有卓見嗟乎人參定喘之神方除脹之仙藥如何説氣藥動氣耶夫喘症不同有外感之喘有內傷之喘有外感之脹有內傷之脹外感之喘乃風邪入於肺也用山豆根柴胡天花粉桔梗陳皮黃芩之類即愈固非人參所能治也若內傷之喘乃平日大虧其脾胃之氣一時氣動挾相火而上衝於咽喉覺臍下一裹之氣升騰出由胸膈直奔而作喘欲睡不能欲行更甚其狀雖無抬肩作聲之象然實較外感之症而大重蓋病乃氣不歸原腎氣虛絶下無藏身之地不得不上而相沖看其氣若盛而實虛非有餘之症乃不足之症也此時若用外感之藥則氣更消亡不得不用人參以挽回於垂絶然而少用則泛上轉覺助喘必須用至一二兩則人參始能下行生氣於無何有之鄉氣轉其逆而喘可定也批氣絶非多用參不能救不獨救喘症也外感之脹乃水邪也按之皮肉必如泥土之可捻用牽牛甘遂各二錢瀉之一利水而症愈不必借重人參也若內傷之脹似水而非水乃脾胃之氣大虛虛脹而非實脹也此時若作水治則氣脫而脹益甚不得不用人參以健脾胃之氣然而驟用人參則脾胃過弱轉不能遽受反作飽滿之狀久則胃氣開而脾氣亦健漸漸加用人參飽滿除而脹亦盡消也誰謂人參非治喘脹者哉批氣虛中滿非參不除先少後多實有次第用參必加行氣之藥漸漸引之使入於胃方投或問人參乃升提氣分之藥今用之以定喘是又至陰之藥也吾子言人參入腎信矣然何以舍喘之外別不能用參以補腎此豫所未解也曰人參入腎乃一時權宜非中和之道也大凡氣絶者必皆宜用人參以救之蓋氣絶非緩藥可救而腎水非補陰之藥可以速生人參是氣分之藥而又兼陰分所以陽生而陰亦生救元陽正所以救真陰也君以為舍喘之外別不能用參以補腎吾以為凡用參救絶者無非補腎也腎氣不生絶必難復然則救絶者正救腎也故腎不至絶不必用參腎既至絶不得不用參矣批人參救氣絶即救腎氣之絶也論特精妙或問人參生氣者也有時不能生氣而反破氣其故何也夫人參生氣而不破氣者也不破氣而有時如破氣者蓋肺氣之太旺也肺氣旺則脾氣亦旺肺氣之旺因脾氣之旺而旺也用人參以助氣則脾愈旺矣脾旺而肺有不益旺乎於是咳嗽脹滿之病增人以為人參之破肺氣也誰知是人參之生脾氣乎夫脾本生肺助氣以生肺之不足則肺受益助氣以生肺之有餘則肺受損惟是肺氣天下未有有餘者也何以補其不足而反現有餘之象因肺中有邪火而不得散不制其克肺金之邪而反補其益肺金之氣此肺金之全不受生而轉且受克也然則治之法制其邪火而兼益其肺氣則自得人參之生不得人參之破矣又烏可舍人參而徒瀉肺氣哉或問人參健脾土之旺以剋水者也何以水濕之症用人參而愈加腫脹乎曰此非人參之不健脾土乃脾土之不能制腎水耳腎水必得脾土之旺而水乃不敢泛濫於中州惟其土之不堅而後水之大旺欲制水必健土矣健土之藥舍人參何求然而土之所不堅者又因於火之太微也火在水之中不在水之外補土必須補火則補火必在水之中補之用人參以健土是剋水也剋水則火愈微矣火愈微則水愈旺水愈旺而土自崩又何能剋水哉故水脹之病愈服人參而愈脹也然則治之法奈何先補水以生火後補火以生土用人參於補腎之中亟生火於水之內徐用人參於補腎之內再生土於火之中自然腎生水而水不泛腎生火而土不崩又何必去人參以防其增脹哉批補腎中之火乃是真火不可誤認作心中之陽火或又問補火以生土則土自不崩補水以生火欲水之不泛難矣豈人參同補腎藥用之即可制水以生火乎曰水宜補以消之不宜制以激之水火之不相離也補火不補水則火不能生補水更補火則水不能泛補水以生火者即於水中補火也益之以人參者以人參同補腎之藥兼施則人參亦能入腎使陽氣通於腎內而火尤易生蓋陰無陽不長腎水得陽氣而變化腎火即隨陽氣而升騰然而人參終是健脾之物自然引火而出於腎內入於脾矣火既入脾土自得養是人參乃助水以生火非剋水以生土也又何疑於補水而水泛哉批人參助水以生火非剋水以生土議論真泄天地之奇或疑人參功用非一言可盡宜子之辨論無窮然吾恐議論多而成功少反不若從前簡約直捷痛快之為妙也嗟乎余豈好辨哉其不得已之心竊比於子輿氏耳蓋當今之世非畏人參即亂用人參畏用之弊宜用而不用亂用之弊不當用而妄用二者皆能殺人余所以辨人參之功增畏用者之膽辨人參之過誅亂用者之心或疑人參補氣血之虛虛即用人參可矣何必問其症而先生多論若此恐世人心疑反不敢用人參矣曰用人參不可無識而識生於膽之中故必講明其功過使功過既明膽識併到自然隨症用參無先後之背繆無多寡之參差無遲速之舛錯既收其功而又絶其害矣吾猶恐言之少無以助人之膽識而子反以論多為慮乎或問人參陽藥何以陰分之病用之往往成功先生謂陰非陽不生是矣然而世人執此以治陰虛之病有時而火愈旺豈非陰虛不宜用參之明徵乎古人云肺熱還傷肺似乎言參之能助肺火也夫人參何能助火哉人參但能助陽氣耳陰陽雖分氣血其實氣中亦分陰陽也陰氣必得陽氣而始生陽氣必得陰氣而始化陰陽之相根原在氣之中也人參助陽氣者十之七助陰氣者十之三於補陰藥中少用人參以生陽氣則陽生而陰愈旺倘補陰藥中多用人參以生陽氣則陽生而陰愈虧故用參補陰斷宜少用而非絶不可用也或問先生闡發各病用人參之義既詳且盡而獨於傷寒症中略而不言豈傷寒果不可以用參乎不知傷寒虛症必須用參而壞症尤宜用參也虛症如傷寒脈浮緊遍身疼痛自宜用麻黃湯矣但其人尺脈遲而無力者又不可輕汗以榮中之氣血虧少故耳氣血虧少不勝發汗必須仍用麻黃湯而多加人參以補之使元氣充足能生氣血於無何有之鄉庶乎可矣倘少用人參而多加麻黃則元氣既虛力難勝任亦取敗之道也批於傷寒門中用參者另開生路或問傷寒臟結亦可用人參以救之乎夫臟結之病乃陰虛而感陰邪原是死症非人參可救然舍人參又無他藥可救也蓋人參能通達上下回原陽之絶返丹田之陰雖不能盡人而救其必生亦可於死中而療其不死也或問傷寒煩燥亦可用人參乎夫煩躁不同有下後而煩躁者有不下而煩躁者不下而煩躁者乃邪感而作祟斷不可用人參若下後而煩躁乃陰陽虛極不能養心與膻中也必須用人參矣但其中陰虛陽虛之不同必須分別陰虛者宜於補陰之中少用人參以補陰陽虛者宜於補陽之中多用人參以補陽而陰虛陽虛何以辨之陰虛者夜重而日輕陽虛者日重而夜輕也或問陽明病譫語而發潮熱脈滑而疾明是邪有餘也用承氣湯不大便而脈反變為微澀而弱非邪感而津液干乎欲攻邪而正氣益虛欲補正而邪又未散此際亦可用人參乎嗟乎舍人參又何以奪命哉惟是用參不敢據為必生耳法當用人參一兩大黃一錢同煎治之得大便而氣不脫者即生否則未可信其不死或問先生謂傷寒壞症尤宜用參不識何以用之夫壞症者不宜汗而汗之不宜吐而吐之不宜下而下之也三者皆損傷胃氣救胃氣之損傷非人參又何以奏功乎故不宜汗而汗之必用人參而汗始收不宜吐而吐之必用人參而吐始安不宜下而下之必用人參而下始止也用人參則危可變安死可變生然不多加分兩則功力有限亦未必汗吐下之可皆救也或問傷寒傳經入於少陰手足四逆惡寒嘔吐而身又倦臥脈復不至心不煩而發躁是陽已外越而陰亦垂絶也用人參於附子之中亦能救乎嗟乎陰陽兩絶本不可救然用人參於附子之中往往有生者蓋真陰真陽最易脫而最難絶也有一線之根則救陽而陽即回救陰而陰即續也以真陰真陽原自無形非有形可比寧用參附以生氣於無何有之鄉斷不可先信為無功盡棄人參不用使亡魂夜哭耳或問傷寒傳經入少陰脈微細欲絶汗出不煩上吐而下又利不治之症也亦可用人參以救之乎夫舍人參又何以救之哉但須加入理中湯內急固其腎中之陽否則真陽擾亂頃刻奔散單恃人參亦無益矣批更闡發得妙或問傷寒下利每日十餘次下多亡陰宜脈之虛矣今不虛而反實亦可用人參以補其虛乎夫下利既多脈不現虛而反現實非脈之正氣實乃脈之邪氣實也邪實似乎不可補正殊不知正虛而益見邪盛不亟補正則邪盛而正必脫矣論此症亦死症也於死中求生舍人參實無別藥雖然徒用人參而不用分消水邪之味佐之則人參亦不能建非常之功宜用人參一二兩加茯苓五六錢同服庶正氣不脫而水邪可止也批探本窮源故能盡其變也呂道人總批曰今天不比古人之強壯無病之時尚不可缺人參以補氣況抱病之時消爍真氣乎是人參非惟宜用實宜多用也但不知人參之功用冒昧用之而不中肯綮往往不得參之益反得參之損此陳子遠公憫之欲辨明人參功用以告世著人參因著本草也余讀之而驚其奇逐條評之有讚歎而無褒貶因其所論折衷於正非一偏之辭也況本草何書一言之誤流害萬世可阿其所好乎道人實心醉此書又總評之如此黃耆黃耆味甘氣微溫氣薄而味厚可升可降陽中之陽也無毒專補氣入手太陰足太陰手少陰之經其功用甚多而其獨效者尤在補血夫黃耆乃補氣之聖藥如何補血獨效蓋氣無形血則有形有形不能速生必得無形之氣以生之黃耆用之於當歸之中自能助之以生血也夫當歸原能生血何藉黃耆不知血藥生血其功緩氣藥生血其功速況氣分血分之藥合而相同則血得氣而速生又何疑哉或疑血得氣而生少用黃耆足矣即不少用與當歸平用亦得何故補血湯中反少用當歸而倍用黃耆不知補血之湯名雖補血其實單補氣也失血之後血已傾盆而出即用補血之藥所生之血不過些微安能遍養五臟六腑是血失而氣亦欲失也在血不能速生而將絶未絶之氣若不急為救援一旦解散頃刻亡矣故補血必先補氣也但恐補氣則陽偏旺而陰偏衰所以又益之當歸以生血使氣生十之七而血生十之三則陰陽有制反得大益生氣而又生血兩無他害也至於補中益氣湯之用黃耆又佐人參以成功者也人參得黃耆兼能補營衛而固腠理健脾胃而消痰食助升麻柴胡以提氣於至陰之中故益氣湯中無人參則升提乏力多加黃耆白朮始能升舉倘用人參白朮而減去黃耆斷不能升氣於至陰也故氣虛之人毋論各病俱當兼用黃耆而血虛之人尤宜多用惟骨蒸癆熱與中滿之人忌用然亦當臨症審量批無黃耆不能提氣於至陰創論亦是確論或問黃耆性畏防風而古人云黃耆得防風其功愈大謂是相畏而相使也其説然乎此説亦可信不可信之辭也黃耆無毒何畏防風無畏而言畏者以黃耆性補而防風性散也合而用之則補者不至大補而散者不至大散故功用反大耳批黃耆欲防風者以防風能通達上下周身之氣得黃耆而生黃耆達表防風御風外來之風得黃耆而拒絶也或問黃耆補氣反增脹滿似乎黃耆不可補氣也豈有藥以解其脹抑可不用黃耆耶夫黃耆乃補氣藥氣虛不用黃耆又用何藥然服之而增脹滿者非黃耆之助氣乃黃耆之不助氣也陰陽有根而後氣血可補陰陽之根將絶服補藥而反不受補藥見病不能受亦不去補病矣此黃耆補氣而反增脹滿乃不生氣之故然亦因其不可生而不生也又豈有別藥以解其脹哉或問黃耆氣分之藥吾子以為補血之品是凡有血虛之症俱宜用黃耆矣何以古人用補血之藥多用四物湯佛手散絶不見用黃耆之補血者豈古人非歟古人未嘗非也第以血症不同有順有逆順則宜用血藥以補血逆則宜用氣藥以補血也蓋血症之逆者非血逆而氣逆也氣逆而後血逆耳血逆而仍用血分之藥則氣不順而血愈逆矣故必須補氣以安血也氣逆則血逆氣安則血安此不易之理也凡血不宜上行嘔咯吐衄之血皆逆也血猶洪水水逆則泛濫於天下血逆則騰沸於上焦徒治其血又何易奏平成哉故必用補氣之藥於補血之中雖氣生夫血亦氣行夫血也此黃耆補血湯所以獨勝於千古也批補血分氣逆氣順確有見解或問黃耆以治氣逆之血發明獨絶然而亦有用四物湯佛手散以止血而效者又是何故洵乎吾子之善問也夫血逆亦有不同有大逆有小逆大逆者必須補氣以止血小逆者亦可調血以歸經用四物湯佛手散治血而血止者血得補而歸經也蓋血最難歸經何以四物佛手偏能取效正因其血逆之輕耳逆輕者氣逆之小也逆重者氣逆之大也以四物湯佛手散治血而血安雖亦取效終必得效之遲不若補血湯治氣而血止得效之捷也或問黃耆補氣初作脹滿而少頃安然者何也此氣虛見補反作不受也黃耆補氣之虛而胃中之望補更甚於別臟腑黃耆一入胃中惟恐有奪其補者乃閉關而不肯吐此脹滿所由生也治之法用黃耆不可單用增入歸芎麥冬三味使之分散於上下之間自無脹滿之憂矣故服黃耆脹滿有二症一不能受而一過於受也過於受者服下脹而少頃寬不能受者初脹輕而久反重以此辨之最易別耳或問黃耆補氣之聖藥宜乎凡氣虛者俱可補之矣何喘滿之病反不用者恐其助滿而增脹也先生既明陰陽之道深知虛實之宜必有以教我也曰黃耆補氣而不可治脹滿者非黃耆之故不善用黃耆之故也夫人喘大滿乃腎氣欲絶奔騰而上升似乎氣之有餘實是氣之不足古人用人參大劑治之者以人參不能助脹而善能定喘耳用之實宜然天下貧人多而富人少安得多備人參救急哉古人所以用黃耆代之而喘滿增劇遂不敢復用且志之書曰喘滿者不可用黃耆因自誤而不敢誤人也誰知黃耆善用之以治喘滿實神鐸受異人傳不敢隱也黃耆用防風之汁炒而用之再不增脹增滿但制之實有法防風用少則力薄不能制黃耆用多則味厚又嫌過制黃耆不惟不能補氣反有散氣之憂大約黃耆用一斤用防風一兩先將防風用水十碗煎數沸漉去防風之渣泡黃耆二刻濕透以火炒之乾再泡透又炒乾以汁干為度再用北五味三錢煎湯一大碗又泡半乾半濕復炒之火焙乾得地氣然後用之凡人參該用一兩者黃耆亦用一兩定喘如神而又不增添脹滿至妙之法亦至便之法也凡用黃耆俱宜如此制之雖古人用黃耆加入防風治病亦能得效然其性尚未制伏終有跳梁之虞不若先制之為宜彼此畏忌而成功更神又何喘病之不可治哉批用制黃耆以治喘者救貧寒之人也若富貴膏梁之子畢竟宜用人參或疑黃耆得防風其功更大用黃耆加入防風足矣而必先制而後用毋乃太好奇乎不知用黃耆而加防風則防風之性與黃耆尚有彼此之分不若先制之調和其性情制伏其手足使之兩相親而兩相合絶不知有同異之分如異姓之兄弟勝於同胞相顧而收其全功也或疑黃耆補氣之虛止可補初起之虛而不可補久病之虛豫問其故曰初虛之病用黃耆易受久虛之病用黃耆難受也嗟乎虛病用補宜新久之皆可受其不可受者非氣之虛乃氣之逆也氣逆之虛必用人參而不可用黃耆在初虛氣逆之時即忌黃耆矣何待久病而後不可用哉若氣雖虛而無逆則久病正宜黃耆未有不服之而安然者也誰謂黃耆之難受乎批黃耆不能補氣逆之虛妙論或疑黃耆補氣何以必助之當歸以補血豈氣非血不生耶不知氣能生血而血不能生氣不能生氣而補氣必補血者非取其助氣也蓋氣虛之人未有不血亦隨之而俱耗者也我大用黃耆以生氣則氣旺而血衰血不能配氣之有餘氣必至生血之不足反不得氣之益而轉得氣之害矣故補氣必須補血之兼施也但因氣虛以補氣而復補其血則血旺而氣仍衰奈何不知血旺則氣不去生血故補血而氣自旺不必憂有偏勝之虞然多補其氣而少補其血則又調劑之甚宜也或問黃耆何故必須蜜炙豈生用非耶然瘡瘍之門偏用生黃耆亦有説乎曰黃耆原不必蜜炙也世人謂黃耆炙則補而生則瀉其實生用未嘗不補也甘草甘草味甘氣平性溫可升可降陽中陽也他書説陰中陽者誤無毒反甘遂不可同用同用必至殺人入太陰少陰厥陰之經能調和攻補之藥消癰疽癤毒實有神功尤善止諸痛除陰虛火熱止渴生津但其性又緩凡急病最宜用之故寒病用熱藥必加甘草以制桂附之熱熱病用寒藥必加甘草以制石膏之寒下病不宜速攻必加甘草以製大黃之峻上病不宜遽升必加甘草以制梔子之動緩之中具和之義耳獨其味甚甘甘則善動吐嘔家不宜多服要亦不可拘也甘藥可升可降用之吐則吐用之下則下顧善用之何如耳或問中滿症忌甘恐甘草助人之脹乎不知中滿忌甘非忌甘草也中滿乃氣虛中滿氣虛者脾胃之氣虛也脾胃喜甘安在反忌甘草因甘草性緩緩則入於胃而不即入於脾胃氣即虛得甘草之補不能遽然承受轉若添其脹滿者亦一時之脹而非經久之脹也故中滿之症反宜用甘草引人參茯苓白朮之藥入於中滿之中使脾胃之虛者不虛而後脹者不脹但不可多用與專用耳蓋多用則增滿而少用則消滿也專用則添脹而同用則除脹也誰謂中滿忌甘草哉批中滿忌甘草反用之以成功可見藥宜善用何獨甘草哉或問甘草乃解毒之聖藥古人盛稱而吾子約言豈甘草不可以解毒也嗟乎甘草解毒無人不知然盡人皆知解毒而盡人不知用之也愚謂甘草解毒當分上中下三法上法治上焦之毒宜引而吐之中法治中焦之毒宜和而解之下法治下焦之毒宜逐而瀉之批甘草解毒分上中下三法實確而妙吐之奈何用甘草一兩加瓜蒂三枚水煎服凡有毒一吐而愈和之奈何用甘草一兩五錢加柴胡三錢白芍三錢白芥子三錢當歸三錢陳皮一錢水煎服毒自然和解矣瀉之奈何用甘草二兩加大黃三錢當歸五錢桃仁十四粒紅花一錢水煎服毒盡從大便出矣此三者雖不敢謂解毒之法盡乎此然大約亦不能出乎此毋論服毒中毒與初起瘡毒皆可以三法治之此用甘草解毒之法人亦可以聞吾言而善用之乎或問甘草乃和中之藥攻補俱用不識亦有不宜否夫甘草國老也其味甘甘宜於脾胃然脾胃過受其甘則寬緩之性生水穀入之必不迅於傳導而或至於停積瘀滯夫水穀宜速化者也宜速化而不速化則傳於各臟腑未免少失其精華而各臟腑因之而不受其益者有之世人皆謂甘草有益而無損誰知其益多而損亦有之乎知其益而防其損斯可矣或疑甘草在藥中不過調和無大關係此論輕視甘草矣甘草實可重用以收功而又能調劑以取效蓋藥中不可缺之藥非可有可無之品也或疑甘草視之平平世醫無不輕之先生獨重者何好惡與人殊乎曰甘草乃奪命之藥如之何而忽之誠觀上中下解毒之妙神效無比亦可以悟甘草之宜重而不宜輕矣況調和百藥更有殊功乎或問細節甘草其性少寒可瀉陰火不識陰虛火動之症亦可多用之乎吾謂甘草乃瀉火之品原不在細小也細小瀉火豈粗大者反助火乎惟是甘草瀉火用之於急症者可以多用用之於緩症者難以重加蓋緩症多是虛症虛則胃氣必弱而甘草性過於甘多用難以分消未免有飽脹之虞不若少少用之則甘溫自能退大熱耳若陰虛之症正胃弱也如何可多用乎毋論粗大者宜少用即細小者亦不可多用也白朮白朮味甘辛氣溫可升可降陽中陰也無毒入心脾胃腎三焦之經除濕消食益氣強陰尤利腰臍之氣批白朮利腰臍之氣原是利腎中之濕也腎不濕則腰不疼濕去而腰臍自利矣有汗能止無汗能發與黃耆同功實君藥而非偏裨往往可用一味以成功世人未知也吾今泄天地之奇如人腰疼也用白朮二三兩水煎服一劑而疼減半再劑而痛如失矣夫腰疼乃腎經之症人未有不信腎虛者用熟地山茱以補水未效也用杜仲破故紙以補火未效也何以用白朮一味而反能取效不知白朮最利腰臍腰疼乃水濕之氣浸入於腎宮故用補劑轉足以助其邪氣之盛不若獨用白朮一味無拘無束直利腰臍之為得夫二者之氣原通於命門臍之氣通而腰之氣亦利腰臍之氣既利而腎中之濕氣何能久留自然濕去而痛忽失也通之而酒濕作瀉經年纍月而不愈者亦止消用此一味一連數服未有不效者而且濕去而瀉止瀉止而脾健脾健而胃亦健精神奮發顏色光彩受益正無窮也是白朮之功何亞於人參乎不特此也如人患瘧病用白朮二兩半夏一兩米飯為丸一日服盡即愈夫瘧病至難愈之病也用柴胡青皮散邪不效用鱉甲首烏逐邪不效用草果常山伐邪不效何以用白朮二兩為君半夏一兩為臣即以奏功不知白朮健脾開胃之神藥而其妙尤能去濕半夏去痰無痰不成瘧而無濕亦不成痰利濕則痰已清其源消痰則瘧已失其黨況脾胃健旺無非陽氣之升騰瘧鬼又於何地存身哉此效之所以甚捷也由此觀之則白朮非君藥而何推之二陳湯必多加白朮所以消痰也四君子湯必多加白朮所以補氣也五苓散必多加白朮所以利水也理中湯必多加白朮所以祛寒也香薷飲必多加白朮所以消暑也至於産前必多加白朮以安胎産後必多加白朮以救脫消食非多用白朮何以速化降氣非多用白朮何以遽定中風非多用白朮安能奪命於須臾痞塊非多用白朮安能救困於敗壞哉人知白朮為君藥而留心於多用也必能奏功如神矣或問白朮利腰臍而去濕若濕不在腰臍者似非可利胡為凡有濕病皆不能外耶此未明乎腰臍之義也人之初生先生命門命門者腎中之主先天之火氣也有命門而後生五臟六腑而臍乃成是臍又後天之母氣也命門在腰而對乎臍腰臍為一身之主宰腰臍利而人健腰臍不利而人病矣凡有水濕必侵腰臍但有輕重之分耳治水濕者一利腰臍而水即入於膀胱從小便而化出所以得水必須利腰臍而利腰臍必須用白朮也況白朮之利腰臍者利腰臍之氣非利腰臍之水也腰臍之氣利則氣即通於膀胱而凡感水濕之邪俱不能留盡從膀胱外泄是白朮不利之利正勝於利也批利氣非瀉氣之謂正利其氣通膀胱也膀胱非氣不行氣閉則塞氣通則開白朮利氣以利水所以必用之也或問白朮健脾去濕為後天培土聖藥真緩急可恃者也雖然人知白朮益人而不知白朮之損人也白朮利水則其性必燥世人濕病十居其四而燥症十居其六肺氣之燥也更用白朮以利之則肺氣爍盡津液必有干嗽之憂胃氣之燥也更用白朮以利之則胃氣炎蒸津液必有口渴之慮脾氣之燥也更用白朮以利之則脾氣焦枯津液必有腸結之苦蓋宜於濕者不宜於燥也去濕既受其益則添燥安得不受其損哉或疑白朮乃去濕生津之上品而先生謂其性燥不可治肺胃脾三家之燥病吾不得其義也夫白朮生津但能生水火既濟之津不能生水火未濟之津也如濕病宜去其濕則燥病宜解其燥亦明矣乃不解其燥而反用燥以治之即能生津亦為火所爍矣況白朮去濕則內無津液而外無水氣又從何而生津乎此白朮止可治濕而不可治燥也雖然白朮性雖燥終是健脾之物脾健而津液自生用潤藥以佐其燥則白朮且自失其燥矣又何能助燥哉批性燥而潤制之白朮何往不可善用乎或疑白朮健脾生胃有時用白朮而脾胃不能受補者何也此虛不受補也脾胃之氣喜生髮而不喜閉塞白朮正開胃開脾之聖藥何至用之而反無功明是土崩瓦解之象而土崩瓦解之故由於腎火之大敗也土非火不生火非土不旺脾胃之土必得腎中之火相生而土乃堅剛以消水穀今因腎水既枯而腎火又復將絶土既無根培之又何益乎徒用白朮以健脾開胃而腎中先天之火已耗盡無餘如爐中燼絶益之薪炭而熱灰終難起焰此生之不生乃脾不可生非白朮能生而不生也批無根之土必須培火或又問脾土固腎火所生而胃土實心火所生腎火絶而心火未絶宜用白朮以健胃尚可以生土也夫胃土非心火不生而心火必得腎火以相濟腎火絶又何以濟心之不足乎心火因腎火之絶而心火欲救腎火而未遑又何能救胃哉胃既不可救則胃無二火之生胃氣欲不亡不可得矣胃氣既亡而白朮雖能健脾而欲生胃無從也批脾土生於腎火胃土生於心火雖有所分其實脾胃皆生於腎火也故腎一絶而脾胃兩無可救矣或又問心腎二火既絶故用白朮而無功吾救心腎之火而兼用白朮則不生者可以生矣嗟乎先天之火雖絶而未絶也後天之火一絶而俱絶矣腎中之火先天之火也心中之火後天之火也後天火絶者由於先天之火先絶也救先天之火則後天之火自生救後天之火則先天之火難活故救火者必須先救腎中之火腎火生則心火不死腎火絶則心火不生故欲救脾胃之生不可徒救心火之絶非心火之不宜救也救腎火正所以救心火耳倘腎火之絶不及救而徒救夫心火多用桂附於白朮人參之中欲救心以救腎也終亦必亡而已矣況僅用白朮又何以救之哉批闡發白朮之義得如許奇論真石破天驚或疑白朮性燥脾胃有火者不宜用恐其助熱也此等議論真民生之大不幸也夫白朮甘溫正能去熱脾胃有火者安在不相宜批白朮甘溫正解火熱惟胃中邪火沸騰不可用之以助邪倘胃中虛火作祟非白朮之甘溫又何以解熱哉世人一見白朮無論有火無火與火之是虛是邪一概曰白朮助火不宜用更有疑白朮為閉氣者尤為可笑白朮利腰臍之氣豈有腰臍利而脾胃反不利者乎或疑白朮閉氣閉上焦之氣也先生謂利腰臍之氣乃利下焦之氣上下各不相同恐未可以利下而並疑上焦之俱利也曰腰臍為生氣之根豈有根本大利而枝葉不舒發之理彼言白朮之閉氣者言氣虛散失者白朮能補而收閉其耗散之氣也世人錯認閉字致使白朮利氣之藥反同閉氣之品而棄之此千古之冤也或問白朮陽藥能益脾土之陰是白朮自能生陽中之陰乎抑必有藉於補陰之味以生陽也曰陽藥補陽而白朮偏能於陽中補陰是白朮亦陰分之藥也白朮既陰陽兼補得陰陽之藥皆相濟而成功安在入諸補陰以生陽入諸補陽而不能生陰哉或疑白朮陽藥而補脾氣之陰是陽能生陰也又何以陽又能生陽乎夫陰陽原兩相生也陽以生陽不若陽以生陰之速但不可謂陽不生陽也白朮陽藥以生脾中之陰者十之八而生脾中之陽者十之二耳蒼朮蒼朮氣辛味厚性散能發汗入足陽明太陰經亦能消濕去胸中冷氣闢山嵐瘴氣解瘟疫尸鬼之氣尤善止心疼但散多於補不可與白朮並論神農經曰必欲長生當服山精此言白朮非指蒼朮也蒼朮可辟邪而不可用之以補正各本草諸書混言之誤矣然而蒼朮善用之效驗如響如人心氣疼乃濕挾寒邪上犯膻中也蒼朮不能入膻中然善走大腸而祛濕實其專功也故與川烏同用引濕邪下行使寒氣不敢上犯膻中而心痛立定若不用蒼朮而用白朮則白朮引入心中反大害矣或問蒼朮陽藥最能辟邪宜乎凡有邪氣皆可盡除何以有效有不效也夫邪之所湊其氣必虛然而氣虛亦有不同有氣虛而兼濕痰者有氣虛而帶燥痰者蒼朮補氣兼善去濕以治氣虛濕痰而中邪者自是神效以治氣虛燥痰之中邪者則蒼朮性燥不燥以增燥乎勢必邪得燥而更甚又何以祛邪哉此所以治之而不效也或問蒼朮發汗不及白朮遠甚謂白朮能止汗也嗟乎蒼朮之妙全在善於發汗其功勝於白朮凡發汗之藥未有不散人真氣者蒼朮發汗雖亦散氣終不甚也虛人感邪欲用風藥散之者不若用蒼朮為更得蓋邪出而正又不大傷汗出而陽又不甚越也批蒼朮散氣虛之邪實勝諸風藥或疑蒼朮之功不及白朮遠甚何神農本草不分別之耶不知蒼朮與白朮原是兩種以神農首出之聖智豈在後人下哉是必分辨之明矣因傳世久遠疊遭兵火散失不存耳今經後人闡發甚精其不可同治病也既彰彰矣又何可二術之不分用哉或問蒼朮與白朮性既各別而神農未辨明者必有其故吾子謂是世久散失似乎臆度之辭非定論也嗟乎白朮止汗蒼朮出汗其實相反關係甚巨安有此等之懸殊以神農之聖而不亟為指示乎吾故信其必先辨明而後乃遺失也熟地熟地味甘性溫沉也陰中之陽無毒入肝腎二經生血益精長骨中腦中之髓真陰之氣非此不生虛火之焰非此不降洵奪命之神品延齡之妙味也世人以其膩滯棄而不用亦未知其功效耳夫腎有補而無瀉是腎必宜補矣然而補腎之藥正苦無多山茱萸牛膝杜仲北五味之外舍熟地又用何藥哉況山茱萸牛膝不可為君而杜仲又性過於溫可以補腎火之衰而不可補腎水之乏此熟地之必宜用也熟地系君藥可由一兩以用至八兩蓋補陰之藥與補陽之藥用之實有不同補陽之藥可少用以奏功而補陰之藥必多用以取效以陽主升而陰主降陽升少用陽藥而氣易上騰陰降少用陰藥而味難下達熟地至陰之藥尤與他陰藥有殊非多用之奚以取勝或謂熟地至陰之藥但其性甚滯多用之而膩膈生痰萬一助痰以生喘亦甚可危也此正不知熟地之功力也自神農嘗草之後將此味失談遂使後世不知其故雖歷代名醫多有發明而亦未嘗言其祕奧夫熟地豈特不生痰且能消痰豈特不滯氣且善行氣顧人用之何如耳夫痰有五臟之異痰出脾肺者用熟地則助其濕用之似乎不宜倘痰出於心肝腎者舍熟地又何以逐之耶故人有吐痰如清水者用二陳消痰化痰之藥百無成功乃服八味湯而痰氣之洶湧者頃刻即定非心肝腎之痰用熟地之明驗乎批心火鬱肝氣逆腎水衰皆能生痰非熟地不能化也更有一種朝夕之間所吐皆白沫日輕而夜重甚則臥不能倒用六味湯大加熟地山茱萸一邊數服而痰即大減再服數十劑白沫盡消而臥亦甚安又非熟地消痰之明驗乎熟地消痰而不生痰又何疑哉至於氣之滯也服地黃湯而消痰於頃刻猶謂氣之不行也可乎批熟地行氣而不滯氣論實創開人生飲食脾腎之氣行水穀入腹不變痰而變精惟其脾腎之虛也水穀入腹不化精而化痰矣用地黃湯而痰消者往往多能健飯是熟地乃開胃之聖品也其所以能開胃者何也胃為腎之關腎水旺而胃中之津液自潤故腎氣足而胃氣亦足腎氣升而胃氣亦升也然則熟地行氣而非滯氣不又可共信哉氣行痰消烏能作喘尤所不必疑者矣批陰虛之人胃氣不開用熟地反易飢而嗜食胃中陰邪散而正氣伸故開胃或問熟地既是君藥亦可單用一味以奏功乎夫熟地雖是君藥不可獨用之以取勝蓋陽藥可以奇用而陰藥必須耦用也況熟地乃至陰之品性又至純非佐之偏勝之藥斷斷不能成功此四物湯補血所以必益之當歸白芍川芎也推之而與人參同用可以補心腎之既濟與白朮同用可以補脾腎之有虧與麥冬五味同用可以滋肺腎之將枯與白芍同用可以益肝腎之將絶與肉桂同用可以助命門之火衰與棗仁同用可以安膻中之火沸與地榆同用可以清大腸之血與沙參同用可以涼胃中之炎與元參同用可以瀉陽明之焰然必用至一兩二兩為君而加所佐之味或五錢或八錢自易取勝於萬全也倘熟地少用其力不全又何以取勝哉內惟肉桂止可用一二錢不可用至三錢之外余則可與熟地多用而無忌者也或問産前必用熟地以補血不識産後亦可重用乎曰産後正宜重用也産婦血大虧不用熟地以生新血用何藥乎雖佛手散乃産後聖藥然能加入熟地則生血尤奇凡産後血暈諸病同人參當歸並用必建殊功不特産後臍腹急痛者始可用之也夫腎中元氣為後天之祖熟地稟先天之氣而生産婦虧損血室元氣大耗後天之血既不能速生正藉先天之氣以生之用熟地以助後天實有妙理非泛論也或問熟地膩膈生痰世人以薑汁砂仁制之可乎顧熟地何嘗膩膈也熟地味甘而性溫味甘為脾胃所喜性溫為脾胃所宜脾胃既不相忤又何所忌而膩膈哉況熟地乃陰分之藥不留胃中即留腎中胃為腎之關門胃見腎經之味有不引導至腎者乎膩膈之説起於不知醫理之人而不可惑深知醫理之士也雖薑汁開胃砂仁蘇脾無礙於熟地而終不可謂熟地之膩膈生痰耳批自膩膈生痰之説出世人畏熟地而不敢用今得遠公闡發可以破惑矣或謂熟地既不膩膈何以六味地黃丸中加茯苓山藥澤瀉非因其膩隔而用之乎是以茯苓山藥澤瀉為制熟地之品亦何其輕視茯苓山藥澤瀉哉腎宜補而不宜瀉既用熟地以補腎豈可復用利藥以瀉腎況又用利藥以制補腎之藥使之有瀉而無補乎是熟地之不宜制也明矣熟地既不宜制用茯苓山藥澤瀉之三味非因制熟地也亦明矣熟地既不宜制用茯苓山藥澤瀉之三味非因熟地之膩膈也抑又明矣然則用三味之意謂何因熟地但能滋陰而不能去濕但能補水而不能生陽用三味以助其成功非用三味而掣其手足也或問熟地既不膩膈何以生痰前人言之豈無見而云然乎曰熟地實消痰聖藥而世反沒其功此余所以堅欲辨之也凡痰之生也起於腎氣之虛而痰之成也因於胃氣之弱腎氣不虛則胃氣亦不弱腎不虛則痰無從生胃不弱則痰無由成也然則欲痰之不成必須補胃而欲痰之不生必須補腎腎氣足而胃氣亦足腎無痰而胃亦無痰熟地雖是補腎之藥實亦補胃之藥也胃中津液原本於腎補腎以生胃中之津液是真水升於胃矣真水升於胃則胃中邪水自然難存積滯化而痰涎消有不知其然而然之妙熟地消痰不信然乎而可謂其膩膈而生痰乎或問熟地補腎中之水何必又用山藥山萸以相佐蓋腎水非得酸不能生山茱萸味酸而性又溫佐熟地實有水乳之合然而山茱萸味過於酸非得熟地之甘溫山茱萸亦不能獨生腎水也配合相宜如夫婦之好合以成既濟之功也或問熟地入於八味地黃丸中何獨為君蓋八味丸補腎中之火也然火不可以獨補必須於水中補之補火既須補水則補水之藥必宜為君矣方中諸藥惟熟地乃補水之聖藥故以之為君有君則有臣而山藥山茱佐之有臣則有佐使而丹皮澤瀉茯苓從之至於桂附反似賓客之象蓋桂附欲補火而無能自主不得不推讓熟地為君補水以補火也或問熟地可獨用以治病乎熟地亦可以獨用者也凡遇心腎不交之病只消熟地二兩煎湯飢服而心腎交於眉睫人以為熟地乃腎經之藥誰知其能上通於心乎夫心腎不交之病多是心火太過而腎水大虧也用熟地以滋其腎中之枯乾腎得水之滋而腎之津即上濟於心心得腎之濟而心之氣即下交於腎又何黃連肉桂之多事哉或問熟地既可單用以成功凡遇心腎不交之病竟用熟地一味為丸朝夕吞服之得乎此則又不宜也熟地單用只可偶爾出奇要必須輔之以茯神山藥佐之以山茱棗仁始可久用以成功耳或問熟地宜多用以奏功抑宜少用以取效乎熟地宜多不宜少也然而用之得宜雖重用數兩不見多用之失宜雖止用數錢未見少用之於腎水大虧之日多用猶覺少用之於脾土大崩之時少用亦覺多用之於腎火沸騰之病用多而殊欠其多用之於胃土喘脹之症用少而殊憎其少全在用之得宜而多與不多不必計也或疑熟地膩滯補陰過多終有相礙未可單用一味以取勝然前人亦有用一味以成功者何也愚謂熟地單用以出奇實偶然權宜之法不若佐之他味使兩味以建功之更勝如治心腎之虧也加入龍眼肉如肝腎之虧也加入白芍如治肺腎之虧也加入麥冬如治脾腎之虧也加入人參或加白芍既無膩膈更多捷效是在人之權變耳批又開無數法門或疑腎虛者宜用熟地以陰補陰也何以補胃者亦用之補膽者亦用之耶此固古人權宜之法然亦至當之法也夫胃為腎之關門腎虛則胃亦虛補腎正所以補胃也膽雖附於肝而膽之汁必得腎之液滲入始無枯涸之憂腎虛則膽亦虛補腎正所以補膽也倘見胃之虛而徒用補胃之藥則香燥之品愈爍其腎水之干見膽之虛而只用補膽之味則酸澀之劑愈耗其腎水之竭腎水既虛而胃膽愈弱矣惟用熟地以補腎而胃與膽取給於腎而有餘自然燥者不燥而枯者不枯誰謂陽症不宜補陰哉或疑熟地至陰之藥多用之以滋腎宜也然何以至陽之病古人亦用以奏效豈熟地亦陽分藥乎熟地非陽分藥也非陽分之藥而偏用之以治陽病者陽得陰而平也陽非陰不伏用熟地以攝至陽之氣則水升火降陰陽有既濟之美矣或疑熟地滋陰而不能開胃孰知熟地正開胃之神藥也胃為腎之關門腎中枯稿全藉胃之關門搬運水穀以濟其困乏豈有腎中所喜之物而胃反拒絶之理況腎虛無水則胃中無非火氣亦望真陰之水以急救其乾涸也然則熟地正胃之所喜不獨腎之所喜也安有所喜者投之不亟為開關以延入者乎所以腎虛之人必用熟地以開胃耳至於腎水不虧胃中無火一旦遽用熟地未免少加脹悶是不善用熟地也誰謂熟地盡閉胃之物哉生地生地味苦甘氣寒沉也陰也入手少陰及手太陰涼頭面之火清肺肝之熱亦君藥也其功專於涼血止血又善療金瘡安胎氣通經止漏崩俱有神功但性寒脾胃冷者不宜多用夫生地既善涼血熱血妄行或吐血或衄血或下血宜用之為君而加入荊芥以歸其經加入三七根末以止其路又何熱之不除而血之不止哉然而此味可多用而不可頻用可暫用而不可久用也當血之來也其勢甚急不得已重用生地以涼血而止血若血一止即宜改用溫補之劑不當仍以生地再進也今人不知其故驚生地止血之神視為靈丹妙藥日日煎服久則脾胃太涼必至泄瀉元氣困頓而血又重來不悟生地用多反疑生地用少仍然更進且有增其分兩至死而不悟者亦可悲也夫或問生地與熟地同是一物而寒溫各別入湯煎服非生地變為熟地耶曰生地不先製為熟則味苦苦則涼生地已製為熟則味甘甘則溫何可同日而語譬如一人先未陶淑其性剛後加涵養其性柔生熟地何獨不然或問生地涼血以止血是生地實救死妙藥也吾見世人服生地以止血不敢再用改用他藥而仍然吐血一服生地而血又即止安在生地之不宜久服乎曰服生地止血之後改用他藥而仍吐血者非不用生地之故乃改用他藥不得其宜之故耳夫止血之後不可不補血然而補血實難補血之藥未有不溫者而吐血之後又最忌溫恐溫熱之性引沸其血也補血之藥又未有不動者而吐血之後又最忌動恐浮動之氣又催迫其血也然則用生地止血當用何藥以善其後乎六味地黃湯加五味麥冬則平而不熱靜而不動服之則水升火降永無再犯之憂又安在生地之必宜服哉或疑生地雖涼要亦不甚以治虛熱之病似應相宜何禁用甚嚴也不知生地之涼不特沁入於胃且沁入於脾不特沁入於脾又沁入於腎故久服則脾腎俱傷往往致大瘕之瀉不可不慎用也或疑生地止血甚神而瀉中有補似亦與元參之類可齊驅而並駕也然而元參尚可重用而生地斷宜輕用也蓋生地沉陰之性涼血是其所長退火是其所短不比元參既退浮遊之火而又滋枯涸之水也生地涼血則血雖止而不行生地不能退火則火欲炎而難靜久則火上騰而血亦隨沸矣或疑生地寒涼可以止血以血得寒而止乎抑血得補而止乎夫生地涼中有補血得涼而止亦得補而止也蓋血非涼則無以遏其上炎之勢非補亦無以投其既濟之歡故生地止血建功實神者正以涼中有補也或疑生地清肺肝之熱肺肝俱屬陰補陰即不能奏功之速自宜久服之為得安在生地只可暫用而不可常服耶曰生地清肺肝之熱亦只清一時之熱耳肺肝之火初起多實久病多虛生地清初起之熱則熱變為寒清久病之熱則熱愈增熱蓋實火得寒而勢解虛火得寒而焰起也故生地只可一時暫用而斷斷不可長用耳當歸當歸味甘辛氣溫可升可降陽中之陰無毒雖有上下之分而補血則一東垣謂尾破血者誤入心脾肝三臟但其性甚動入之補氣藥中則補氣入之補血藥中則補血入之升提藥中則提氣入之降逐藥中則逐血也而且用之寒則寒用之熱則熱無定功也功雖無定然要不可謂非君藥如痢疾也非君之以當歸則腸中之積穢不能去如跌傷也非君之以當歸則骨中之瘀血不能消大便燥結非君之以當歸則硬糞不能下産後虧損非君之以當歸則血暈不能除肝中血燥當歸少用難以解紛心中血枯當歸少用難以潤澤脾中血乾當歸少用難以滋養是當歸必宜多用而後可以成功也倘畏其過滑而不敢多用則功用薄而遲矣而或者謂當歸可臣而不可君也補血湯中讓黃耆為君反能出奇以奪命敗毒散中讓金銀花為君轉能角異以散邪似乎為臣之功勝於為君然而當歸實君藥而又可以為臣為佐使者也用之彼而彼效用之此而此效充之五臟六腑皆可相資亦在人之用之耳用之當而攻補並可奏功用之不當而氣血兩無有效用之當而上下均能療治用之不當而陰陽各鮮成功又何論於可君而不可臣可臣而不可佐使哉或問當歸補血而補氣湯中何以必用豈當歸非血分之藥乎曰當歸原非獨補血也實亦氣分之藥因其味辛而氣少散恐其耗氣故言補血而不言補氣耳其實補氣者十之四而補血者十之六子試思産後非氣血之大虧乎佛手散用當歸為君川芎為佐人以為二味乃補血之聖藥也治産後血少者似乎相宜治産後氣虛者似乎不足乃何以一用佛手散而氣血兩旺非當歸補血而又補氣烏能至此是當歸亦為氣分之藥不可信哉或問當歸性動而滑用之於燥結之病宜也用之下利之症恐非所宜何以痢症必用之耶夫痢疾與水瀉不同水瀉者脾瀉也痢疾者腎瀉也脾瀉最忌滑腎瀉最忌澀而腎瀉之所以忌澀者何故蓋腎水得邪火之侵腎欲利而火阻之腎欲留而火迫之故有後重之苦夫腎水無多宜補而不宜瀉也若下多亡陰腎水竭而愈加艱澀矣故必用當歸以下潤其大腸大腸潤而腎水不必來滋大腸則腎氣可安腎氣安而大腸又有所養火自不敢阻迫於腎矣自然火散而痢亦安此當歸所以宜於下痢而必用之也批水瀉忌滑痢疾喜滑當歸潤滑正其所宜或問當歸既是君主之藥各藥宜佐當歸以用之矣何以時為偏裨之將反易成功得毋非君主之藥乎士鐸曰當歸性動性動則無不可共試以奏功也所以入之攻則攻入之補則補然而當歸雖為偏裨之將其氣象自有不可為臣之意倘駕御不得其方未必不變勝而為負反治而為亂也或問當歸不宜少用亦可少用以成功乎曰用藥止問當與不當不必問多與不多也大約當歸宜多用者在重病以救危宜少用者在輕病以杜變不敢多用固非療病之奇不肯少用亦非養病之善也或問當歸滑藥也有時用之而不滑者何故凡藥所以救病也腸胃素滑者忌用當歸此論其常也倘變生意外內火沸騰外火凌逼不用潤滑之當歸又何以滋其枯稿哉當是時吾猶恐當歸之潤滑尚不足以救其焦涸也烏可謂平日畏滑而不敢用哉或問當歸專補血而又能補氣則是氣血雙補之藥矣曰當歸是生氣生血之聖藥非但補也血非氣不生氣非血不長當歸生氣而又生血者正其氣血之兩生所以生血之中而又生氣生氣之中而又生血也苟單生氣則胎産之門何以用芎歸之散生血於氣之中苟單生血則止血之症何以用歸耆之湯生氣於血之內惟其生氣而即生血血得氣而自旺惟其生血而即生氣氣得血而更盛也或問當歸氣味辛溫雖能活血補血然終是行走之性每致滑腸繆仲醇謂與胃不相宜一切脾胃惡食與食不消並禁用之即在産後胎前亦不得入是亦有見之言也嗟嗟此似是而非不可不亟辨也當歸辛溫辛能開胃溫能暖胃何所見而謂胃不相宜耶夫胃之惡食乃傷食而不能受也辛以散之則食易化食不消者乃脾氣寒也脾寒則食停積而不能化矣溫以暖之則食易消至於産前産後苟患前症尤宜多用則胃氣開而脾氣健始可進飲進食産前無墮産之憂産後無退母之怯試問不用當歸以救産後之重危又用何物以救之豈必用人參而後可乎夫人參止可治富貴之家而不可療貧寒之婦天下安得皆用人參以盡救之哉此當歸之不可不用而不可誤聽仲醇之言因循坐視束手而不相救也如畏其滑腸則佐之白朮山藥之味何不可者或疑當歸滑腸産婦血燥自是相宜然産婦亦有素常腸滑者産後亦可用當歸乎曰産後不用當歸補血實無第二味可以相代即平素滑腸時當産後腸亦不滑正不必顧忌也或過慮其滑即前條所謂佐之白朮山藥則萬無一失矣或疑當歸乃補血之聖藥凡見血症自宜用之然而用之有效有不效者豈當歸非補血之品乎當歸補血何必再疑用之有效有不效非當歸之故乃用而不得其法之故也夫血症有兼氣虛者有不兼氣虛而血虛者有氣血雙虛而兼火者原不可一概用當歸而單治之也血症而兼氣虛吾治血而兼補其氣則氣行而血自歸經血症而氣血雙虛吾平補氣血而血亦歸經血症氣血雙虛而兼火作祟吾補其氣血而帶清其火則氣血旺而火自消又何至血症之有效有不效哉或問繆仲醇謂疔腫癰疽之未潰者忌用當歸亦何所見而云然耶夫仲醇之謂不可用者恐當歸性動引毒直走胃中不由外發致傷胃氣故耳殊不知引毒外散不若引毒內消之為速用當歸於敗毒化毒藥中正取其性動則引藥內消直趨大便而出奏功實神故已潰者斷宜大用使之活血以生肌即未潰者尤宜急用使之去毒而逐穢也牛膝牛膝味甘酸氣平無毒蜀産者佳善走十二經絡寬筋骨補中絶續益陰壯陽除腰膝痠疼最能通尿管澀痛引諸藥下走近人多用此藥以治血症血瘕絶無一效亦未取其功用而一思之也夫血症血瘕乃脾經之病牛膝能走於經絡之中而不能走於腸腹之內況癥瘕之結痰包血也牛膝乃陰分之藥總能逐血而不能逐痰此所以終歲而無效耳至於血暈血虛兒枕作痛尤不宜輕用而近人用之往往變生不測亦未悟用牛膝之誤也牛膝善走而不善守産暈血虛之極也無血以養心所以生暈不用歸芎以補血反用牛膝以走血不更下之石乎雖兒枕作痛似乎有瘀血在腹然而産後氣血大虧多有陰寒之變萬一不是瘀血而亦疑是兒枕之作痛妄用牛膝以逐瘀去生遠矣故必手按之而痛甚者始可少用牛膝于歸芎之內否則勿輕用耳或問牛膝最善墮胎是非補劑似産前均宜忌之然前人間用於産前而胎安然不損者何耶夫牛膝豈墮胎藥哉乃補損藥也凡有斷續者尚可再接豈未損者而反使之墮乎古人有用牛膝合之麝香之中外治以墮胎取其性走之意然而墮胎實麝香之故而非牛膝也從未聞用牛膝內治而能墮胎者但性既善走在胎産亦不宜多用而終不可謂牛膝是墮胎之物也或問牛膝乃下部之藥用之以補兩膝往往未見功效豈牛膝非健步之藥乎夫牛膝治下部前人言之未可盡非但膝之堅實非牛膝之可能獨健也膝之所以健者由於骨中之髓滿髓空斯足弱矣故欲膝之健者必須補髓然而髓之所以滿者又由於腎水之足腎水不足則骨中之髓何由滿故欲補骨中之髓者又須補腎中之精也雖牛膝亦補精之味而終不能大補其精則單用牛膝以治腎虛之膝又何易奏效哉或問牛膝健足之藥近人見下部之病輒用之而取效甚少得毋止可健膝而不可健足耶不知健膝即所以健足而健膝不可徒健夫膝也凡足之所以能步者氣充之也不補氣以運足而徒用牛膝以健膝膝且不能健又何以健足哉批健足由於健膝膝健由於氣充至論也或疑牛膝血分之藥入氣分藥中轉易成功其故何也蓋牛膝性善走氣亦善走兩相合則氣無止遏而血無凝滯自然血易生而氣易旺又安有不成功者哉或疑牛膝乃補中續絶之聖藥何子反略而不談曰牛膝補中續絶前人已言之矣何必再論惟是補中續絶實別有説蓋牛膝走而不守能行血於斷續之間而不能補血於斷續之內必須用牛膝於補氣補血之中而後能收其續絶之效此補中續絶之義實前人所未及也遠志遠志味苦氣溫無毒而能解毒安心氣定神益智多服強記亦能止夢遺乃心經之藥凡心經虛病俱可治之然尤不止治心也肝脾肺之病俱可兼治此歸脾湯所以用遠志也而吾以為不止治心肝脾肺也夫心腎常相通者也心不通於腎則腎之氣不上交於心腎不通於心則心之氣亦不下交於腎遠志定神則君心寧靜而心氣自通於腎矣心之氣既下通於腎謂遠志但益心而不益腎所不信也是遠志乃通心腎之妙藥故能開心竅而益智安腎而止夢遺否則心腎兩離何能強記而閉守哉或問遠志既是心經之藥心氣一虛即宜多加以益心何故前人少用也不知心為君主君心寧靜則火不上炎心虛而少益其火則心轉受大補之益倘多用遠志以益心必至添火以增焰是益心而反害心矣所以遠志止可少用而斷不可多用也批添火增炎新或問遠志益心而子又曰益腎畢竟補心多於補腎抑補腎多於補心乎蓋遠志益心自是心經主藥補心多於補腎何必辨哉雖然心腎之氣實兩相通也既兩相通則遠志之補心腎又何有於兩異惟是用藥者或有重輕則補心補腎亦各有分別補心之藥多用遠志重在補心補腎之藥多用遠志重在補腎補心補腎雖若有殊而通心通腎正無或異也或問遠志上通心而下通腎有之乎曰有之有則何以上通心者每用遠志而下通腎者絶不用遠志耶不知腎藥易通於心而心藥難通於腎故用腎藥不必又用遠志而用心藥不可不用遠志也批遠志補心而不補腎然能通腎通腎自然補腎矣亦宜活看或問遠志益心而不效豈多用之故乎然未嘗多用而仍然不效者何也蓋腎氣乘之也夫腎益心者也雖曰水剋火實水潤心也然則腎何以乘心也腎之乘心者非腎氣之旺乃腎氣之衰腎水旺則腎益心腎水衰則腎克心也不滋腎以益水徒用遠志以益火則火愈旺而心愈不安矣毋怪其少用而亦不效也苟用遠志於熟地山茱之內則腎得滋而心火胥受益矣或問陳言三因方用遠志酒治一切癰疽發背陰毒有效子何略而不言非不言也陳言單舉遠志一味以示奇其實酒中不止遠志也單藉遠志以治癰未有不敗者蓋癰毒至於發背其勢最橫最大豈區區遠志酒汁傳之即能奏功乎此不必辨而知其非也或用金銀花為君佐之遠志則可然亦蛇足之説不若竟用金銀花半斤加當歸一二兩甘草四五錢治之之為神或疑遠志不可治癰前人何故載之書册以誤後人想亦有功於癰吾子未識耳嗟乎遠志治癰余先未嘗不信每用之而不效今奉岐夫子之教不覺爽然自失悔從前誤信耳至於用金銀花方治癰屢獲奇效故敢闢陳言而特載用新方無使後人再誤如鐸也或疑遠志益心而不益腎而吾子必曰兼益腎似乎心腎之虧者單用遠志一味而心腎兩補矣何以腎虛者必另加補腎之藥不單用遠志乎不知遠志可引腎之氣以通心非助腎之水以滋心也故通心腎者用遠志一味而心腎已受兩益矣若心腎兩虛者烏或全恃遠志哉批總之遠志並非可單用之藥石菖蒲石菖蒲味辛而苦氣溫無毒能開心竅善通氣止遺尿安胎除煩悶能治善忘但必須石上生者良否則無功然止可為佐使而不可為君藥開心竅必須君以人參通氣必須君以耆術遺尿欲止非多加參耆不能取效胎動欲安非多加白朮不能成功除煩悶治善忘非以人參為君亦不能兩有奇驗也或問石菖蒲必得人參而始效是石菖蒲亦可有可無之藥也此吾子過輕石菖蒲矣石菖蒲實有專功也凡心竅之閉非石菖蒲不能開徒用人參竟不能取效是人參必得菖蒲以成功非菖蒲必得人參而奏效蓋兩相須而兩相成實為藥中不可無之物也或問石菖蒲何故必取九節者良市上易者且不止九節節之多寡可不問乎石上菖蒲凡細小者俱可用而前人取九節者取九竅之俱可通也其實菖蒲俱能通心竅心竅通而九竅俱通矣或疑石菖蒲能治健忘然善忘之症用之絶少效驗何耶善忘之症因心竅之閉耳心竅之閉者由於心氣之虛補心之虛舍人參無他藥也不用人參以補虛惟恃菖蒲以開竅竅開於一時而仍閉又何益哉夫開心竅尚君以人參豈治善忘而反遺人參能取效乎
