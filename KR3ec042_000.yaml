body:
  text: 凡例十六則本草自神農以來數經兵燹又遭秦火所傳書多散軼魯魚亥豕不能無誤一字舛錯動即殺人鐸躬逢岐伯天師於燕市得聞軒轅之道而本草一書尤殷質詢凡有所誤盡行改正此書刪繁就簡凡無關醫道者概不入選即或氣味峻烈損多益少與尋常細小之品無大效驗者亦皆屏棄本草善本首遵綱目其次則遜經疏二書鐸研精有素多有發明非闢二公實彰祕奧本草諸書多首列出産收採修制等項鐸概不登列者以前人考核精詳無容再論惟七方十劑之義尚多缺略所以暢為闡揚更作或問或疑附後使醫理昭明少為用藥之助是書刪神農原本者十之三採名醫增入者十之二總欲救濟生人非好為去取氣運日遷人多柔弱古方不可治今病者非言補劑也乃言攻劑耳故所登諸品補多於攻本草非博通內典遍覽儒書不能融會貫通以闡揚祕旨鐸見聞未廣而資性甚鈍所讀經史每善遺忘記一遺萬之譏實所未免尤望當代名公之教鐸也本草貴多議論發微不尚方法矜異鐸所以敘功效於前發尚論於後欲使天下後世盡知草木之精深人物金石之奧妙庶不至動手用藥有錯此書多得之神助異想奇思命筆時有不自知其然而然之象世有知心自能深識不敢誇詡也鐸素學刀圭頗欲闡揚醫典邇年來未遑尚論甲子秋遇純陽呂夫子於獨秀山即商訂此書輒蒙許可後聞異人之教助鐸不逮者皆呂夫子賜也是書得於岐天師者十之五得於長沙守仲景張夫子者十之二得於扁鵲秦夫子者十之三若鐸鄙見十中無一焉鐸少喜浪遊凡遇名山勝地往往探奇不倦登眺時多逢異人與之辨難刀圭實能開蕩心胸增益神智苟有所得必書笥中每入深山見琪花瑤草異獸珍禽與昆蟲介屬異於凡種者必咨詢土人考訂靡已倘獲奇聞必備志之今罄登茲編行醫不讀本草則陰陽未識攻補茫然一遇異症何從用藥況坊刻諸書苦無善本非多則略鐸斟酌於二者之間繁簡得宜使讀者易於觀覽是書藥味無多而義理詳盡功過不掩喜忌彰明庶攻補可以兼施寒熱可以各用倘謂鐸多事翻前人以出奇或咎鐸無文輕當世而鬥異則鐸豈敢著書非居勝地則識見不能開拓鐸幸客舟中目觀江濤洶湧云巒層疊助人壯懷故得暢抒獨得頗無格格之苦然同心甚少考訂未弘終覺畫守一隅不能兼談六合鐸晚年逢異人於燕市傳書甚多著述頗富皆發明靈素祕奧絶不拾世音淺瀋有利於疾病匪淺惜家貧不能災梨倘有救濟心殷肯損資剞劂者鐸當罄囊與之斷不少吝以負異人之託山陰陳士鐸遠公別號朱華子識勸醫六則人生斯世無病即是神仙能節欲寡過使身心泰然俯仰之間無非樂境覺洞天丹丘無以過也無如見色忘命見財忘家營營逐逐墮於深淵沉於苦海憂愁怨恨之心生嗔怒鬥爭之事起耗精損氣而疾病隨之矣苟或知非悔悟服藥於將病之時覓醫於已病之日則隨病隨痊又何慮焉乃求人之過甚明求己之過甚拙而且諱病忌醫因循等待及至病成始嘆從前之失醫也已無及矣鐸勸世人幸先醫治人病難痊宜多服藥蓋病之成原非一日則病之愈豈在一朝無如求速效於目前必至墮成功於旦夕更有射利之徒企圖酬謝之重忘顧僥幸之危或用輕粉劫藥取快須臾未幾毒發病生往往不救何若攻補兼施損益並用既能去邪復能反正雖時日少遲而終身受惠無窮鐸勸世人毋求速效病關生死醫能奏效厥功實弘世有危急之時懸金以許病痊而報之甚薄逮至再病醫生望門而不肯入是誰之咎歟等性命於鴻毛視金錢如膏血亦何輕身而重物乎鐸勸世人毋惜酬功病痊忘報俗子負心病痊索報亦醫生慚德蓋治病有其功已報而功小治病忘其功不報而功大要當存一救人實意不當惟利是圖勿以病家富遂生覬覦心勿以病家貧因有懶散志或養癰貽患或恐嚇取錢皆入惡道鐸勸行醫幸毋索報人不窮理不可以學醫醫不窮理不可以用藥理明斯知陰陽識經絡洞臟腑悟寒熱虛實之不同攻補滑澀之各異自然守經達權變通於指下也否則徒讀脈訣空覽本草動手即錯開口皆非欲積功反損德矣鐸勸學醫幸務窮理醫道講而愈明集衆人議論始可以佐一人識見倘必人非我是堅執不移則我見不化又何能受益於弘深乎邇來醫術紛紜求同心之助杳不可多得然而天下之大豈少奇人博採廣咨裒獲非淺鐸勸學醫幸尚虛懷大雅堂主人遠公識七方論注本草而不論方法猶不注也本草中草木昆蟲介屬之氣味寒熱必備悉於胸中然後可以隨材任用使胸次無出奇制勝方略則如無制之師雖野戰亦取勝於一時未必不致敗於末路與其焦頭爛額斬殺無遺何如使敵人望風而靡之為快哉此七方之必宜論也七方者大小緩急奇偶復也吾先言其大方岐伯夫子曰君一臣三佐九制之大也凡病有重大不可以小方治之者必用大方以治之大方之中如用君藥至一兩者臣則半之佐又半之不可君藥少於臣藥臣藥少於佐使設以表裡分大小是里宜大而表宜小也然而治表之方未嘗不可大設以奇偶分大小是奇宜大而偶宜小也然而用偶之方未嘗不可大設以遠近分大小是遠宜大而近宜小也然而治近之方又未嘗不可大故用大方者乃宜大而大非不可大而故大也或問大方是重大之劑非輕小之藥也重大必用藥宜多而不可少矣何以君一而臣三佐用九耶是一方之中計止十三味似乎名為大而非大也不知大方者非論多寡論強大耳方中味重者為大味厚者為大味補者為大味攻者為大豈用藥之多為大乎雖大方之中亦有用多者而終不可謂多者即是大方也或疑大方不多用藥終難稱為大方不知大方之義在用意之大不盡在用藥之多也譬如補也大意在用參之多以為君而不在用白朮茯苓之多以為臣使也如用攻也大意在用大黃之多以為君而不在用厚朴枳實之多以為臣使也推之寒熱表散之藥何獨不然安在衆多之為大哉批更説得圓通或疑大方在用意之大豈君藥亦可小用之乎夫君藥原不可少用也但亦有不可多用之時不妨少用之然終不可因少用而謂非君藥並疑少用而謂非大方也小方若何岐伯夫子曰君一臣三佐五制之中也君一臣二制之小也中即小之義凡病有輕小不可以大方投者必用小方以治之小方之中如用君藥至二錢者臣則半之佐又半之亦不可以君藥少於臣臣藥少於佐也夫小方所以治輕病也輕病多在上上病而用大方則過於沉重必降於下而不升於上矣小方所以治小病也小病多在陽陽病而用大方則過於發散必消其正而裒其邪矣故用小方者亦宜小而小非不可小而故小也批小貴得宜不使膽怯而不敢用大者藉口或問小方是輕小之劑所以治小病也然君一臣三佐五方未為小也若君一臣二而無佐使無乃太小乎不知小方者非論輕重論升降耳論浮沉耳方中浮者為小升者為小也豈用藥之少者為小乎雖小方多用而要不可謂少用藥之方即是小方也或疑小方不少用藥終不可名為小方不知小方之義全不在用藥之少也病小宜散何嘗不可多用柴胡病小宜清何嘗不可多用麥冬病小宜提何嘗不可多用桔梗病小宜降何嘗不可多用厚朴要在變通於小之內而不可執滯於方之中也批論得大妙或疑小方變通用之是小可大用矣小方而大用仍是大方而非小方也曰小方大用非大方之可比藥雖多用方仍小也緩方若何岐伯夫子曰補上治上制以緩緩者遲之之謂也上虛補上非制之以緩則藥趨於下而不可補矣上病治上非制之以緩則藥流於下而不可治矣然而緩之法不同有甘以緩之之法凡味之甘其行必遲也有升以緩之之法提其氣而不下陷也有丸以緩之之法作丸而不作湯使留於上焦也有作膏以緩之之法使膠黏於胸膈間也有用無毒藥以緩之之法藥性平和功用亦不驟也有緩治之方庶幾補上不補下治上不治下矣批又增前人之所未備或問緩方以治急也然急症頗有不可用緩之法豈一概可用緩乎曰宜緩而緩未可概用緩也若概用緩必有不宜緩而亦緩者矣或疑緩方故緩恐於急症不相宜不知急症緩治古今通議然而緩方非治急也大約治緩症者為多如痿症也必宜緩如脫症也不宜急安在緩方之皆治急哉或問緩方君論至備不識更有緩之之法乎曰緩之法在人而不在法也執緩之法以治宜緩之病則法實有窮變緩之方以療至緩之病則法何有盡亦貴人之善變耳何必更尋緩方之治哉急方若何岐伯夫子曰補下治下制以急夫病之急也豈可以緩治哉大約治本之病宜於緩治標之病宜於急然而標本各不同也有本宜緩而急者急治其本有標不宜急而急者急治其標而急之方實有法焉有危篤急攻之法此邪氣壅阻於胸腹腸胃也有危篤急救之法此正氣消亡於陰陽心腎也有急用濃煎大飲湯劑之法使之救火濟水援絶於旦夕也有急用大寒大熱毒藥之法使之上湧下泄取快於一時也有急治之方庶幾救本而不遺於救標救標而正所以救本矣或問急方治急不識亦可以治緩症乎曰緩方不可以治急而急方實所以治緩遇急之時不用急方以救其垂危將絶逮病勢少衰而後救之始用緩治之法不已晚乎然則急方治急非即所以治緩乎批急方治急正治緩也真探本之論或疑急方救急似乎相宜急方救緩恐不相合不知緩急同治者用藥始神耳或疑緩急相濟固為治病妙法然畢竟非治急之急方也曰以急救急因病之急而急之也以急救緩亦因病雖緩而實急故急之也然則緩急相濟仍治急而非治緩也或疑急症始用急方則急方不可用緩也明矣然古人急病緩治往往有之似乎急方非救急也曰急方不救急又將何救乎急病緩治者非方用緩也於急方之中少用緩藥以緩其太急之勢非於急方之中純用緩藥以緩其太急之機也奇方若何岐伯夫子曰君一臣二君二臣三奇之制也所謂奇之制者言數之奇也蓋奇方者單方也用一味以出奇而不必多味以取勝藥味多未免牽制反不能單刀直入凡臟腑之中止有一經專病者獨取一味而多其分兩用之直達於所病之處自能攻堅而奏功如神也或問奇方止取一味出奇但不知所用何藥夫奇方以一味取勝本草中正未可悉數也吾舉其至要者言之用白朮一味以利腰臍之濕也用當歸一味以治血虛頭暈也用川芎一味以治頭風也用人參一味以救脫救絶也用茯苓一味以止瀉也用菟絲子一味以止夢遺也用杜仲一味以除腰疼也用山梔子一味以定脅痛也用甘草一味以解毒也用大黃一味以攻堅也用黃連一味以止嘔也用山茱萸一味以益精止腎泄也用生地一味以止血也用甘菊花一味以降胃火也用薏仁一味以治腳氣也用山藥一味以益精也用肉蓯蓉一味以通大便也用補骨脂一味以溫命門也用車前子一味以止水瀉也用蒺藜子一味以明目也用忍冬藤一味以治癰也用巴戟天一味以強陽也用荊芥一味以止血暈也用蛇床子一味以壯陽也用元參一味以降浮遊之火也用青蒿一味以消暑也用附子一味以治陰虛之喉痛也用艾葉一味以溫脾也用地榆一味以止便血也用蒲公英一味以治乳瘡也用旱蓮草一味以烏須也用皂莢一味以開關也用使君子一味以殺蟲也用赤小豆一味以治濕也用花蕊石一味以化血也以上皆以一味取勝擴而充之又在人意見耳或疑奇方止用一味則奇雖奏功甚神竊恐有偏勝之弊也顧藥性未有不偏者也人陰陽氣血亦因偏勝而始病用偏勝之藥以制偏勝之病則陰陽氣血兩得其平而病乃愈然則奇方妙在藥之偏勝不偏勝不能去病矣或疑方用一味功雖專而力必薄不若多用數味則力厚而功專不知偏勝之病非偏勝之藥斷不能成功功成之易正因其力厚也誰謂一味之方力薄哉偶方若何岐伯夫子曰君二臣四君二臣六偶之制也又曰遠者偶之下者不以偶蓋偶亦論數耳是偶方者重味也乃二味相合而名之也如邪盛用單味以攻邪而邪不能去不可仍用一味攻邪必更取一味以同攻其邪也如正衰用單味補正而正不能復不可仍用一味補正必另取一味以同補其正也非兩方相合之為偶亦非汗藥三味為奇下藥四味為偶也或問奇方止取一味以出奇而偶方共用兩味以取勝吾疑二味合方正不可多得也夫二味合而成方者甚多吾不能悉數示以成方不若商以新方也人參與當歸並用可以治氣血之虛黃耆與白朮同施可以治脾胃之弱人參與肉桂同投可以治心腎之寒人參與黃連合劑可以治心胃人參與川芎並下則頭痛頓除人參與菟絲並煎則遺精頓止黃耆與川芎齊服則氣旺而血驟生黃耆與茯苓相兼則利水而不走氣黃耆與防風相制則去風而不助脹是皆新創之方實可作偶之證至於舊方若參附之偶也薑附之偶也桂附之偶術苓之偶耆歸之偶歸芎之偶甘芍之偶何莫非二味之合乎臨症裁用存乎其人批又開許多法門矣快哉或疑偶方合兩味以制勝似乎有相合益彰之慶但不知有君臣之分佐使之異否乎夫方無君臣佐使者止奇方也有偶則君臣自分而佐使自異矣天無二日藥中無二君也偶方之中自有君臣之義佐使之道烏可不分輕重多寡而概用之耶批方無君臣不成方矣又何論偶不偶乎復方若何岐伯夫子曰奇之不去則偶之偶之是謂重方重方者復方之謂也或用攻於補之中復用補於攻之內或攻多而補少或攻少而補多調停於補攻之間斟酌於多寡之際可合數方以成功可加他藥以取效或分兩輕重之無差或品味均齊之不一神而明之復之中而不見其復斯可謂善用復方者乎或問復方乃合衆方以相成不必拘拘於繩墨乎曰用藥不可雜也豈用方而可雜乎用方而雜是雜方而非復方矣古人用二方合之不見有二方之異而反覺有二方之同此復方之所以神也否則何方不可加減而必取於二方之相合乎批説得精細明爽或疑復方合數方以成一方未免太雜有前六方之妙何病不可治而增入復方使不善用藥者妄合方以取敗乎曰復方可刪則前人先我而刪矣實有不可刪者在也雖然知藥性之深者始可合用復方否則不可妄用恐相反相惡反致相害批神而明之存乎其人然好用聰明則不可也或疑復方不可輕用寧用一方以加減之即不能奏效亦不致取敗曰此吾子慎疾之意也然而復方實有不可廢者人苟精研於本草之微深造於內經之奧何病不可治亦何法不可復乎而猶謹於復方之不可輕用也未免徒讀書之譏矣十劑論有方則必有劑劑因方而制也劑不同有宣劑有通劑補劑瀉劑輕劑重劑滑劑澀劑燥劑濕劑劑各有義知其義可以用藥倘不知十劑之義而妄用藥是猶棄繩墨而取曲直越規矩而為方圓也雖上智之士每能變通於規矩繩墨之外然亦必先經而後權先常而後變苟昧常求變必詭異而不可為法離經用權必錯亂而不可為型深知十劑之義則經權常變折衷至當又何有難治之病哉此十劑之必宜論也一論宣劑岐伯夫子曰宣可去壅又曰木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之皆宣之之謂也夫氣鬱則不能上通於咽喉頭目口舌之間血鬱則不能上通於胸腹脾胃經絡之內故上而或噦或咳或嗽或嘔之症生中而或痞或滿或塞或痛或飽或脹之症起下而或腫或瀉或利或結或畜或黃之症出設非宣劑以揚其氣則氣壅塞而不舒設非宣劑以散其血則血凝滯而不走必宣之而木鬱可條達矣必宣之而火鬱可啓發矣必宣之而金鬱可疏泄矣必宣之而水鬱可曲折矣必宣之而土鬱可殺奪矣或問吾子發明宣劑幾無剩義醫理無盡不識更可發明乎曰鬱症不止五也而宣郁之法亦不止二有郁之於內者有郁之於外者有郁之於不內不外者鬱於內者七情之傷也鬱於外者六淫之傷也鬱於不內不外者跌撲墜墮之傷也治七情之傷者開其結治六淫之傷者散其邪治跌撲墜墮之傷者活其瘀皆所以佐宣之之義也批宣揚氣血之外又舉三法以盡宣變或疑宣劑止開鬱解鬱遂足盡宣之之義乎夫宣不止開鬱解鬱也邪在上者可宣而出之邪在中者可宣而和之邪在下者可宣而泄之邪在內者可宣而散之邪在外者可宣而表之也宣之義大矣哉或疑宣劑止散邪而已乎抑不止散邪而已乎夫宣之義原無盡也可宣而宣之不必問其邪宜宣而宣之不必問其鬱總不可先執宣邪之意以試吾宣之之湯並不可先執宣郁之心以試吾宣之之藥也二論通劑岐伯夫子曰通可去滯蓋留而不行必通而行之是通劑者因不通而通之也通不同或通皮膚或通經絡或通表裡或通上下或通前後或通臟腑或通氣血既知通之異而後可以用通之法通營衛之氣即所以通皮膚也通筋骨之氣即所以通經絡也通內外之氣即所以通表裡也通肺腎之氣即所以通上下也通膀胱之氣即所以通前後也通脾胃之氣即所以通臟腑也通陰陽之氣即所以通氣血也雖因不通而通之亦因其可通而通之耳批通之義如許明其義何患閉症之不通哉或問子論通劑暢哉言之矣然而通之意則出通之藥未明也曰通之藥又何不可示也通營衛則用麻黃桂枝通筋骨則用木瓜仙靈脾通內外則用柴胡薄荷通肺腎則用蘇葉防己通膀胱則用肉桂茯苓通脾胃則用通草大黃通陰陽則用附子蔥薑雖所通之藥不止於此然亦可因此而悟之矣或疑通劑藥甚多子何僅舉數種以了義將使人執此數味以概通之劑乎不知通不同而通劑之藥又何可盡同乎雖然通藥不可盡用通也用通於補之中用通於塞之內而後不通者可通將通者即通已通者悉通也然則用通之劑全在善用通也善用通而吾所舉之藥已用之而有餘又何不可概通之劑哉或疑通劑之妙用之如神但我何以用通劑之妙使之有如神之功乎嗟呼通之法可以言而通之竅不可言也不可言而言之亦惟有辨虛實耳虛之中用通劑不妨少而輕實之中用通劑不妨多而重雖不能建奇功亦庶幾可無過矣批辨虛實以用通通人之論三論補劑岐伯夫子曰補可去弱然而補之法亦不一也補其氣以生陽焉補其血以生陰焉補其味以生精焉補其食以生形焉陽虛補氣則氣旺而陽亦旺陰虛補血則血盛而陰亦盛精虛補味則味足而精亦足形虛補食則食肥而形亦肥雖人身之虛不盡於四者而四者要足以盡之也批補法不盡於四者我增一法行吐納以生神焉或問補法盡於氣血味食乎曰補法盡於四者而四者之中實有變化也補氣也有朝夕之異有臟腑之異有前後之異補血也有老少之異有胎産之異有衰旺之異有寒熱之異補味也有軟滑之異有消導之異有溫冷之異有新久之異有甘苦之異有燔熬烹炙之異補食也有南北之異有禽獸之異有果木之異有米穀菜豆之異有魚鱉蝦蟹之異補各不同而變化以為法又何能一言盡哉總在人臨症而善用之也或疑虛用補劑是虛病宜於補也然往往有愈補愈虛者豈補劑之未可全恃乎籲虛不用補何以起弱哉愈補愈虛者乃虛不受補非虛不可補也故補之法亦宜變補中而少增消導之品補內而用制伏之法不必全補而補之不必純補而補之更佳也批補中有消補中有制才非徒補或疑補劑無多也吾子雖多舉其補法而終不舉其至要之劑畢竟補劑以何方為勝曰補不同烏可舉一方以概衆方乎知用補之法則無方不可補也況原是補劑又何必問何方之孰勝哉四論瀉劑岐伯夫子曰泄可去閉然而瀉之法亦不一也有淡以瀉之有苦以瀉之有滑以瀉之有攻以瀉之有寒以瀉之有熱以瀉之利小便者淡以瀉之也利肺氣者苦以瀉之也利大腸者滑以瀉之也逐痛祛滯者攻以瀉之也陷胸降火者寒以瀉之也消腫化血者熱以瀉之也雖各病之宜瀉者甚多或於瀉之中而寓補或於補之中而寓瀉總不外瀉之義也或問瀉之義古人止曰葶藶大黃而吾子言瀉之法有六豈儘可用葶藶大黃乎曰執葶藶大黃以通治閉症此誤之甚者也吾言瀉之法有六而瀉之藥實不止葶藶大黃二味所謂淡以瀉之者用茯苓豬苓苦以瀉之者用黃芩葶藶滑以瀉之者用當歸滑石攻以瀉之者用芒硝大黃寒以瀉之者用栝蔞厚朴熱以瀉之者用甘遂巴豆也夫瀉之藥不止此廣而用之全恃乎人之神明批瀉藥原不必多或疑瀉劑所以治閉乎抑治開乎開閉俱可用也不宜閉而閉之必用瀉以啓其門不宜開而開之必用瀉以截其路然而治開即所以治閉而治閉即所以治開正不可分之為二治也或疑瀉劑用之多誤易致殺人似未可輕言瀉也曰治病不可輕用瀉劑而論劑又烏可不言瀉法乎知瀉劑而後可以治病知瀉法而後可以用劑也五論輕劑岐伯夫子曰輕可去實夫實者邪氣實而非正氣實也似乎邪氣之實宜用重劑以祛實矣誰知邪實者用祛邪之藥藥愈重而邪反易變藥愈輕而邪反難留人見邪實而多用桂枝反有無汗之憂人見邪實而多用麻黃又有亡陽之失不若少用二味正氣無虧而邪又盡解此輕劑之妙也或問輕劑所以散邪也邪輕者藥可用輕豈邪重者亦可用輕乎曰治邪之法止問藥之當與否也用之當則邪自出原不在藥之輕重也安在藥重者始能蕩邪哉批祛邪不必重用祛邪之藥極得或疑邪氣既重何故輕劑反易去邪蓋邪初入之身其勢必泛而浮乘人之虛而後深入之故治邪宜輕不宜重也倘治邪驟用重劑往往變輕為重變淺為深不可遽愈何若先用輕劑以浮泛之藥少少發散乘其不敢深入之時易於祛除之為得乎或疑用輕劑以散邪雖邪重者亦散似乎散邪在藥味之輕而不在藥劑之輕也曰藥味之輕者藥劑亦不必重蓋味愈輕而邪尤易散劑愈重而邪轉難解也六論重劑岐伯夫子曰重可去怯夫怯者正氣怯而非邪氣怯也正氣強則邪氣自弱正氣損則邪氣自旺似乎扶弱者必須鋤強補損者必須抑旺矣然而正氣既怯不敢與邪相鬥攻邪而邪愈盛矣故必先使正氣之安固無畏乎邪之相凌相奪而後神無震驚之恐志有寧靜之休此重劑所以妙也或問正氣既怯扶怯可也何必又用重劑吾恐虛怯者反不能遽受也曰氣怯者心驚血怯者心動心驚必用止驚之品心動必用安動之味不用重藥又何以鎮靜之乎惟是重藥不可單用或佐之以補氣則鎮之而易於止驚或佐之以補血則靜之而易於制動也或疑重劑止怯似乎安膽氣也曰怯之意雖出於膽而怯之勢實成於心以重劑鎮心正所以助膽也批此論出奇或疑重劑去怯怯恐不止心與膽也天下惟腎虛之極者必至傷肺肺傷則不能生精成癆怯矣恐用重劑者重治腎與肺也不知怯不同五臟七腑皆能成怯治怯舍重劑何以治之哉又在人之善於變通耳七論滑劑岐伯夫子曰滑可去著邪留於腸胃之間不得驟化非滑劑又何以利達乎然而徒滑之正無益也有潤其氣以滑之者有潤其血以滑之者有潤其氣血而滑之者物礙於上焦欲上而不得上吾潤其氣而咽喉自滑矣食存於下焦欲下而不得下吾潤其血而肛門自滑矣滯穢積於中焦欲上而不得欲下而不得欲留中而又不得吾潤其氣血而胸腹自滑矣滑劑之用又胡可少乎批瀉劑亦總不能外氣血或問滑劑分上中下治法為得宜矣然而用三法以治澀而澀仍不解者豈別有治法乎夫滑之法雖盡於三而滑之變不止於三也有補其水以滑之有補其火以滑之補水者補腎中真水也補火者補腎中真火也真水足而大腸自潤真火足而膀胱自通又何澀之不滑哉此滑之變法也批又開一法門或疑補水以潤大腸是劑之滑也補火以通膀胱恐非劑之滑矣不知膀胱得火而不通者乃膀胱之邪火也膀胱有火則水澀膀胱無火水亦澀也蓋膀胱之水必得命門之火相通而膀胱始有流通之樂然則補火正所以滑水謂非滑之之劑乎批補火以滑水實闡軒岐之祕或疑滑劑治澀然亦有病非澀而亦滑之者何也蓋滑劑原非止治澀也滑非可盡治夫澀又何可見澀而即用滑劑乎不宜滑而滑之此滑劑之無功也宜滑而滑之雖非澀之病偏收滑之功八論澀劑岐伯夫子曰澀可去脫遺精而不能止下血而不能斷瀉水而不能留不急用藥以澀之命不遽亡乎然而澀之正不易也有開其竅以澀之者有遏其流以澀之者有因其勢以澀之者精遺者尿竅閉也吾通尿竅以閉精則精可澀水瀉者脾土崩也吾培土氣以疏水則水瀉可澀血下者大腸熱也吾滋金液以殺血則血下可澀矣澀劑之用又胡可少乎或疑澀劑古人皆以澀為事吾子反用滑於澀之中豈亦有道乎曰徒澀何能澀也澀之甚斯滑之甚矣求澀於澀之內則澀止見功於一旦而不能收功於久長用滑於澀之中則澀難收效於一時而實可奏效於永遠誰云澀之必舍滑以澀之耶或疑滑以治澀終是滑劑而非澀劑曰滑以濟澀之窮澀以濟滑之變能用滑以治澀則滑即澀劑也況澀又不全澀乎欲謂之不澀不可也或疑澀劑治脫而脫症不止三病也不識可廣其法乎曰澀劑實不止三法也舉一可以知三舉三獨不可以悟變乎九論燥劑岐伯夫子曰燥可去濕夫燥與濕相反用燥所以治濕也然濕有在上在中在下之分濕有在經在皮在裡之異未可一概用也在上之濕苦以燥之在中之濕淡以燥之在下之濕熱以燥之在經之濕風以燥之在皮之濕薰以燥之在裡之濕攻以燥之燥不同審虛實而燥之則無不宜也或問濕症甚不一吾子治濕之燥亦可謂善變矣然而濕症最難治何以辨其虛實而善治之乎夫辨症何難亦辨其水濕之真偽而已真濕之症其症實偽濕之症其症虛知水濕之真偽何難用燥劑哉或疑燥劑治濕而濕症不可全用燥也吾恐燥劑之難執也曰濕症原不可全用燥然舍燥又何以治濕哉燥不為燥則濕不為濕矣或疑濕症必尚燥劑而吾子又謂不可全用燥似乎燥劑無關輕重也然而濕症有不可無燥劑之時而燥劑有不可治濕症之日此燥劑必宜講明實有關輕重而非可有可無之劑也十論濕劑岐伯夫子曰濕可去枯夫濕與燥相宜用濕以潤燥也然燥有在氣在血在臟在腑之殊有在內在外在久在近之別未可一概用也氣燥辛以濕之血燥甘以濕之臟燥咸以濕之腑燥涼以濕之內燥寒以濕之外燥苦以濕之久燥溫以濕之近燥酸以濕之燥不同審虛實而濕之則無不宜也或問燥症之不講也久矣幸吾子暢發燥症之門以補六氣之一又闡揚濕劑以通治燥症豈氣血臟腑內外久近之濕遂足以包治燥之法乎嗟乎論燥之症雖百方而不足以治其常論濕之方若八法而已足以盡其變正不可見吾燥門之方多即疑吾濕劑之法少也或疑濕劑治燥而燥症實多執濕劑以治燥而無變通之法吾恐前之燥未解而後之燥更至矣曰變通在心豈言辭之可盡哉吾闡發濕劑之義大約八法盡之而變通何能盡乎亦在人臨症而善悟之耳或疑濕劑之少也人能變通則少可化多然而能悟者絶少子何不多舉濕劑以示世乎嗟乎燥症前代明醫多不發明故後世無聞焉鐸受岐天師與張仲景之傳內經已補注燥之旨六氣門已暢論燥之文似不必本草重載燥症然而濕劑得吾之八法治燥有餘又何必多舉濕劑之法哉批須參看內經六氣之書則治燥有餘矣以上十劑明悉乎胸中自然直捷於指下然後細閲新注之本草通經達權以獲其神守常知變以造於聖亦何死者不可重生危者不可重安哉闢陶隱居十劑內增入寒熱二劑論陳遠公曰十劑之後陶隱居增入寒熱二劑雖亦有見繆仲醇闢寒有時不可以治熱熱有時不可以治寒以熱有陰虛而寒有陽虛之異也此論更超出陶隱居但未嘗言寒熱二劑之宜刪也後人偏信陶隱居妄自增寒熱二劑又多岐路之趨不知寒熱之病甚多何症非寒熱也七方十劑之中何方何劑不可以治寒熱若止用寒熱二劑以治寒熱則宜於寒必不宜於熱宜於熱必不宜寒亦甚拘滯而不弘矣故分寒熱以治寒熱不可為訓或問陶隱居增入寒熱二劑甚為有見吾子何黨仲醇而刪之雖曰七方十劑俱可治寒熱然世人昧焉不察從何方何劑以治之乎不若增寒熱二劑使世人易於治病也嗟乎子言則美矣然非用劑之義也寒熱之變症多端執二劑以治寒熱非救人正殺人也豫所以刪之豈黨仲醇哉或疑寒熱之變端雖多終不外於寒熱之二病安在不可立寒熱之二劑耶曰寒之中有熱熱之中有寒有寒似熱而實寒有熱似寒而反熱有上實寒而下實熱有上實熱而下實寒有朝作寒而暮作熱有朝作熱而暮作寒有外不熱而內偏熱有外不寒而內偏寒更有虛熱虛寒之分實熱實寒之異偏寒偏熱之別假寒假熱之殊不識寒熱二劑何以概治之耶豫所以信寒熱二劑斷不可增於十劑之內故闢陶隱居之非而嘉繆仲醇之是也批如此説來寒熱二劑斷不可增或疑寒熱不常方法可定臨症通變全在乎人不信寒熱二劑之不可增也嗟乎立一方法必先操於無弊而後可以垂訓乃增一法非確然不可移之法又何貴於增乎故不若刪之為快耳闢繆仲醇十劑內增升降二劑論陳遠公曰繆仲醇因陶隱居十劑中增入寒熱二劑闢其虛寒虛熱之不可用也另增入升降二劑雖亦有見而終非至當不移之法夫升即宣之義降即瀉之義也況通之中未嘗無升通則氣自升矣補之中未嘗無升補則氣自升矣推而輕重滑澀燥濕無不有升之義在也況通之內何常非降通則氣自降矣補之內何常非降補則氣自降矣推而輕重滑澀燥濕無不有降之義在也是十劑無劑不可升陽何必再立升之名無劑不可降陰何必重多降之目夫人陽不交於陰則病陰不交於陽則亦病十劑方法無非使陽交陰而陰交陽也陽既交陰則陽自降矣陰既交陽則陰自升矣陽降則火自安於下何必愁火空難制陰升則水自潤於上何必虞水涸難濟此升降二劑所以宜刪而前聖立方實無可議也或問升降二劑經吾子之快論覺十劑無非升降也但不識於吾子所論之外更可闡其微乎曰升降不外陰陽而陰陽之道何能以一言盡有升陽而陽升者有升陽而陽反降者有降陰而陰降者有降陰而陰愈不降者又不可不知也然而升降之法實包於十劑之中有十劑之法則可變通而甚神舍十劑之法而止執升降之二劑未免拘滯而不化此升降之二劑所以可刪耳或疑執升降二劑不可盡升降陰陽也豈增入之全非耶曰升降可增則前人早增之矣何待仲醇乎正以陰陽之道無窮升降之法難盡通十劑以為升降可以盡症之變倘徒執升降之二劑又何以變通哉批升降一言破的何必執升降以為升降或疑可升可降十劑中未嘗言也何不另標升降之名使世人一覽而知升降哉曰有升有降者病之常也宜升宜降者醫之術也切人之脈即知陰陽之升降矣陰陽既知升降何難辨哉使必覽劑而後知之無論全用十劑不可升降人之陰陽即單執升降二劑又何能治陰陽之升降哉夫十劑之中皆可升可降之劑也人知陰陽即知升降矣何必另標升降之多事哉
