front:
  text: 序一人不學醫則不可救人醫不讀本草則不可用藥自神農氏嘗藥以來發明本草者數十家傳疑傳信未克折衷至正識者憂之冀得一人出而辨論不可得吾弟子陳遠公實有志未逮丁卯失意肆志軒岐學著內經未已著六氣書今又取本草著之何志大而書奇乎嗟乎陳子欲著此書者久矣而陳子未敢命筆也陳子少好遊遍歷名山大川五嶽四瀆多所瞻眺頗能抒發胸中之奇且所如不偶躬閲於兵戈患難興亡榮辱者有幾親視於得失疾病瘴疫死生者又有幾身究於書史花木禽獸鱗蟲者又有幾是陳子見聞廣博而咨詢精詳兼之辨難縱橫又足佐其筆陳宜其書之奇也而陳子之奇不在此陳子晚年逢異人燕市多獲祕傳晨夕研求幾廢寢食竟不知身在客也嗟乎真奇也哉然而陳子雅不見其奇遇異人忘其遇著奇書忘其書若惟恐人不可救而用藥誤之也汲汲於著書為事著內經六氣之書甫竣復著本草嗟乎真奇也哉而陳子更奇謂醫救一世其功近醫救萬世其功遠欲夫用藥之人盡為良醫也則本草之功用又烏可不亟為辨論哉甚矣陳子之奇也豫評閲而序之首喜得人仍出吾門而折衷至正實可為萬世法是則余之所深幸者乎呂道人岩題於大江之南時康熙己巳燈宵後三日序二山陰陳子遠公壯遊宇內得老湖叢著軒岐之書其見聞所暨及既廣且博宜其書之奇也雖然無識不可著書無膽亦不可著書閲覽于山川草木禽獸魚龍昆蟲之內而識不足以辨其義膽不足以揚其論欲書之奇得乎陳子之識上下千古翻前人舊案闡厥精微絶非詭異一皆理之所必有也異膽橫絶浩浩落落無一語不窮厥祕奧絶無艱澀氣晦於筆端是識足以壯膽而膽又足以濟識也欲書之不奇難矣吾與天師岐伯純陽呂公嘉陳子有著作下使再讀碧落文其奇應不止此丁卯秋訪陳子燕市陳子拜吾三人於座上天師將碧落文盡傳之余傳六氣諸書陳子苦不盡識余牖迪三閲月陳子喜曰吾今後不敢以著述讓後人也著內經靈樞六氣告竣又著本草奇矣而陳子未知奇也百傷不遇嘆息異才之湮沒不彰嗟乎有才不用亦其常也抱可以著作之才不用之於著作致足惜也今陳子不遇仍著書以老是有才而不違其才矣又胡足惜乎況陳子得碧文助其膽識則書之奇實足傳遠然則陳子之不遇老而著書正天之厚陳子也陳子又何必自傷哉康熙己巳莫春望後漢長沙守張機題於蕪江序三粵稽神農氏首嘗百草憫生民夭折不救也歷代久遠疊嬰兵燹祖龍一炷竹簡化燼雖醫人諸書詔告留存士民畏秦法盡棄毀靡遺收藏汲冢繕寫訛舛非復神農氏古本嗣後醫者多有附會是本草在可信不可信間近更創揚異説競尚陰寒殺人草木中世未識也豫甚憫之神農氏救世著本草後人因本草禍世失帝心矣純陽子呂岩與余同志招余長沙使君張機遊燕市訪陳子遠公辨晰刀圭陳子再拜受教古書盡傳之張公又授六氣諸書因勸陳子著述不可讓之來者也陳子著內經成著六氣今又著本草勤矣陳子幼讀六籍老而不遇借本草之味發揚精華其文弘而肆其書平而奇世必驚才大而學博也誰知皆得之吾三人助哉天下有才學者甚衆吾輩何獨厚陳子救世心殷無異神農氏則本草新編其即救世之書乎雲中逸老岐伯天師題於大江之南時康熙乙巳孟春念九日也序四陳子遠公所著石室祕録皆傳自異人而於青囊肘後闡發尤多故撥盲起疲捷如響應余既序之梓以行世矣無何復郵本草新編余讀竟而益嘆其術之奇也服其心之仁也粵稽烈山氏躬嘗百草教後世以醫軒轅岐伯相與論性命之學即今金匱靈樞素問難經一以天地陰陽四時寒燠五行屈伸悔吝之道通於人身之風寒暑熱五臟六腑相生互伐強弱通塞之機蓋古先哲王明乎天人合一之理而後頤指意會將使天下之人之病無有不治且並其病也而無之而後快焉是道也猶之政也先王固以不忍人之心行之矣後世若淳于意華元化孫思邈許胤宗龐安時諸公咸以醫鳴而長沙張公能集大成者得是道也得是心也其間繼起立論著方或少偏畸猶滋訾議而況其凡乎自挽近以來家執一言人持一見紛然雜然之説行天人合一之旨晦由是習焉莫測其端狃焉莫窮其變而冀得心應手也必無幾矣陳子乃慨然以著作自任上探羲皇密證仙真寤寐通之著書纍千萬言而本草一編略人所詳詳人所略考綱目辨疑諸善本惟探注方與真贋與甘溫涼熱治病炮製而已茲則一藥必悉其功用權其損益入某經通某臟人能言之入某經而治陰中之陽陽中之陰通某臟而補水中之火火中之水人不能言也至或問辨疑繭抽蕉剝愈入愈細舉靈樞以上諸書後世有誤解誤用者必引經據史以辨明之使人不墮雲霧中洵乎陳子術之奇也且其論滋補則往復流連論消散則殷勤告誡而於寒涼之味則尤其難其慎不翅涕泣而道之固唯恐輕投於一二人貽害者衆錯置於一二時流毒者遠也斯其心可不謂仁矣乎今醫統久替似續殊難其人若陳子所云岐伯雷公仲景純陽諸先哲或顯形而告語或憑乩而問答殆亦憫醫理之不明欲以斯道屬斯人也陳子何多讓焉謀也三載薪勞一官叢脞不能仰副聖主如天之仁以廣仁政而獨於民人死生之際三致意焉故得是書而樂為之序又減俸而付諸梓亦欲舉世讀是書者務求盡乎其心之仁而不徒驚乎其術之奇焉則夫古先哲王之所傳賢士大夫之所述庶不至如伯牙海上知音曠絶而於以濟世利物也思過半矣康熙三十年歲次辛未仲春中浣之吉華川金以謀敬書於上元署中
