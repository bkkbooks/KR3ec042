body:
  text: 卷之二商集天門冬天門冬味苦而甘性涼沉也陰也陰中有陽無毒入肺腎二經補虛癆殺蟲潤五臟悅顏色專消煩除熱止嗽定咳尤善止血消肺癰有神但性涼多服頗損胃世人謂天門冬善消虛熱吾以為此說不可不辨天門冬止可瀉實火之人也虛寒最忌而虛熱亦宜忌之蓋虛熱未有不胃虛者也胃虛而又加損胃之藥胃氣有不消亡者乎胃傷而傳之脾則脾亦受傷脾胃兩傷上不能受水穀而下不能化糟粕矣又何望其補哉大約天冬凡腎水虧而腎火炎上者可權用之以解氛腎大寒而腎水又弱者斷不可久用之以滋陰也或謂天冬性潤可以解火即可以益水先生謂不可久用者以腎火之寒也但腎火寒者自不可用矣腎水未竭而腎火未寒者亦可用之乎此則愚所未言也腎水未竭而腎火又未寒是平常無病之人也似乎服天冬可以無礙然而補之藥勝於天冬者甚多何必擇此性涼者以日伐其火乎夫人非水火不生活且水非火不生火非水不養止補其水而瀉其火初則火漸衰而水旺久則火日去而水亡此天冬所以只可暫以補水而不可久以瀉火也或問天冬同地黃用之可以烏鬚髮此久治之法以滋腎者而吾子謂天冬只宜瀉實火之人豈烏鬚髮而亦可謂實火耶夫鬚髮之早白雖由於腎水之不足亦因於腎火之有餘也夫火之有餘既因於水之不足則寒涼以補水正寒涼以瀉火也況天冬與地黃同用則天冬之涼者不涼腎得其滋補之益而鬚髮之焦枯有不反黑者哉然則天冬之烏鬚髮仍瀉實火而非瀉虛火矣或問天門冬治癆瘵之病甚佳而吾子謂止可暫服豈治癆疾者可一二劑愈乎嗟乎天門冬治癆瘵者必脾健而大腸燥結肺氣火炎者宜之然亦只可少服而不可多服也夫寒涼之物未有不損胃者也脾健則胃氣亦健大腸燥結則肺氣亦必燥結天冬涼肺而兼涼胃宜其無惡但久用天冬胃涼則脾亦涼肺涼則大腸亦涼又勢所必至也烏可不先事而預防哉或問濕熱不去下流於腎能使骨痿腎欲堅急食苦以堅之天門冬黃柏之類是也是天門冬味苦氣寒正入腎以除熱可以治痿而竟置不言何也此吾子知其一不知其二也夫治痿必治陽明骨痿雖屬腎而治法必兼治胃天門冬大寒不利胃氣暫服可以治痿久服必至損胃胃損而腎又何益耶況胃又腎之關門關門無生氣之固而欲腎宮堅牢以壯骨生髓必不得之數也世人遵黃柏知母之教以損傷胃氣鐸又何敢復揚天門冬治痿之說以勸人再用寒涼乎此所以寧缺以志豫過也或疑天冬瀉實火不瀉虛火虛火禁用實火安在不可常用耶夫火雖有虛實之分而瀉火之藥只可暫用而不可常用也天門冬瀉實火未嘗不佳特怪世人久服耳人非火不活暫損其有餘使火不爍水已耳烏可經年纍月服瀉火之藥哉瀉之日久未有實火而不變為虛火者也此常服之斷宜戒也或疑天門冬性雖寒以沙糖蜜水煮透全無苦味則寒性盡失不識有益陰虛火動之病乎夫天門冬之退陰火正取其味苦澀也若將苦澀之味盡去亦復何益或慮其過寒少去其苦澀而加入細節甘草同糖蜜共制庶以之治陰虛咳嗽兩有所宜耳或問天門冬古人有服而得仙吾子貶其功用謂多服必至損胃然則古語荒唐乎嗟乎神農本草服食多載長生豈皆不可信乎大約言長生者言其能延生也非即言不死也天門冬食之而能卻病吾實信之謂採服飛升尚在闕疑麥門冬麥門冬味甘氣微寒降也陽中微陰無毒入手太陰少陰瀉肺中之伏火清胃中之熱邪補心氣之勞傷止血家之嘔吐益精強陰解煩止渴美顏色悅肌膚退虛熱神效解肺燥殊驗定嗽咳大有奇功真可恃之為君而又可藉之為臣使也但世人未知麥冬之妙往往少用之而不能成功為可惜也不知麥冬必須多用力量始大蓋火伏於肺中爍干內液不用麥冬之多則火不能制矣熱熾於胃中熬盡真陰不用麥冬之多則火不能息矣夫肺為腎之母肺燥則腎益燥腎燥則大小腸盡燥矣人見大小腸之乾燥用潤腸之藥然腸滑而脾氣愈虛則傷陰而腎愈虛矣腎虛必取給於肺金而肺又素燥無氣以滋腎而乾咳嗽之症起欲以些小之劑益肺氣以生腎水必不得之數也抑肺又胃之子也胃熱則土虧土虧而火愈熾火熾必須以水濟之而胃火太盛腎水細微不特不能制火而且熬干津液苟不以汪洋之水速為救援水立盡矣然而大旱枯涸滂沱之水既不可驟得倘腎水有源尚不至細流之盡斷雖外火焚爍而淵泉有本猶能浸潤不至死亡也故胃火之盛必須補水而補水之源在於補肺然而外火既盛非杯水可解陰寒之氣斷須深秋白露之時金氣大旺而後湛露湑湑多且濃也故欲肺氣之旺必用麥冬之重苟亦以些小之劑益其肺氣欲清胃火之沸騰也又安可得哉更有議者肝木畏肺金之克者也然肺過於弱則金且不能剋木而肝且欺之於是木旺而挾心火以刑金全不畏肺金之克肺欲求救腎子而腎水又衰自顧不遑又安能顧肺金之母哉乃咳嗽脹滿之病生氣喘痰塞之疾作人以為肺之病也用瀉肺之藥益虛其肺氣而肝木更熾心火愈刑病有終年纍月而不痊者苟不用麥冬大補肺氣肝木之旺何日能衰乎此麥冬之必須多用又不可不知也更有膀胱之火上逆於心胸小便點滴不能出人以為小便大閉由於膀胱之熱也用通水之藥不效用降火之劑不效此又何故乎蓋膀胱之氣必得上焦清肅之令行而火乃下降而水乃下通批大用麥冬助肺氣以通膀胱更無人易知其義夫上焦清肅之令稟於肺也肺氣熱則清肅之令不行而膀胱火閉水亦閉矣故欲通膀胱者必須清肺金之氣清肺之藥甚多皆有損無益終不若麥冬清中有補能瀉膀胱之火而又不損膀胱之氣然而少用之亦不能成功蓋麥冬氣味平寒必多用之而始有濟也或問麥冬以安肺氣救肺即可生腎子矣何以補肺者仍須補腎乎曰肺腎之氣未嘗不兩相須也肺之氣夜必歸於腎腎之氣晝必升於肺麥冬安肺則肺氣可交於腎而腎無所補則腎仍來取給於肺母而肺仍不安矣此所以補肺母者必須補腎子也腎水一足不取濟於肺金之氣則肺氣自安且能生水而肺更安也麥冬只可益肺不能益腎古人所以用麥冬必加入五味子非取其斂肺正取其補腎也或問麥冬加五味以補腎敬聞命矣何孫真人加入人參為生脈散吾子善辨幸明以教我此則子不下問而鐸亦急欲闡明之也夫肺主氣也人參補氣湯名補氣誰曰不然而孫真人不言生氣而言生脈者原有祕旨心主脈是生脈者生心之謂也或疑心主火而肺主金生心火必至克肺金矣益氣之謂何而詎知心之子乃胃土也肺金非胃土不生胃弱以致肺金之弱補心火自生胃土矣胃土一生而肺金之氣自旺又恐補心以克肺金加麥冬以清肺則肺不畏火之炎加五味以補腎則腎能制火之盛調和制伏之妙為千古生人之法示天下以補心之妙不必畏心之刑金也所以不言生氣而曰生脈者其意微矣人未之思爾或問麥冬補肺金而安肺氣肺氣之耗者宜加用麥冬以補肺金矣然而日用麥冬而不見肺金之氣旺者何故蓋肺金之母胃土之衰也胃喜溫而不喜寒日用麥冬之寒以益肺而反致損胃胃寒而氣不能生金徒用麥冬何益哉必須用溫胃之藥以生胃氣而後佐之以麥冬則子母兩補自然胃氣安而肺氣亦安也或疑胃中有火最宜麥冬以清之而吾子曰胃喜溫不喜寒不相反耶非反也胃乃土也土自喜溫胃中宜火何以惡火夫火多宜瀉而火少宜補況胃中之火乃邪火非正火也邪火宜瀉而正火亦宜補服麥冬而胃寒者乃正火衰微自宜補之未可以胃中之正火錯認作邪火而並觀也批須辨得清或問麥冬滋肺氣者也何以有時愈用而愈不效豈麥冬非滋肺藥乎夫麥冬不滋肺氣又何藥以滋肺然用之不效者非麥冬不滋肺氣乃肺絶不受麥冬之滋也肺為嬌臟治肺原不宜直補肺也肺至麥冬之不可滋者脾胃之母氣腎經之子氣已先絶於肺之前而欲用麥冬以救肺絶之際又何可得哉或疑用麥冬以救肺氣肺絶而不可救是麥冬為無用矣不識舍麥冬又用何藥可救耶曰脾胃已絶金不能生矣腎經已絶金無以養矣實無藥可以相救惟胃氣不絶者尚有可救之機仍用麥冬為君加於人參熟地山藥山茱萸之內尚可延留一線然不節欲慎疾亦徒然也或問麥冬乃肺經之藥凡肺病固宜用之不識於治肺之外尚有何症宜用也夫麥冬不只治肺也胃火用之可降腎水用之可生心火用之可息肝木用之可養膽木用之可滋心包火用之可旺三焦火用之可安膀胱水用之可瀉所治之病甚多何獨於治肺耶或問麥冬但聞可以內治成功未知亦可以治外症乎曰麥冬之功效實於內治獨神然又能外治湯火世人固不識也凡遇熱湯滾水泡爛皮肉疼痛呼號者用麥冬半斤煮汁二碗用鵝翎掃之隨掃隨干隨干隨掃少頃即止痛生肌神效之極誰謂麥冬無外治哉批傳外治法五味子五味子味酸氣溫降也陰中微陽非陽中微陰也無毒此藥有南北之分必以北者為佳南者不可用古人為南北各有所長誤也最能添益腎水滋補肺金尤善潤燥非特收斂肺氣批五味子收斂肺氣正所以生腎水也蓋五味子入肺腎二經生津止渴強陰益陽生氣除熱止瀉痢有神但不宜多用多用反無功少用最有效尤不宜獨用獨用不特無功且有大害必須同補藥用入湯丸之內則調和無礙相得益彰耳或問五味子乃收斂之藥用之生脈散中可以防暑豈北五味亦能消暑耶批生脈散非卻暑之藥乃防暑之藥也論得是曰五味子非消暑藥也凡人當夏熱之時真氣必散故易中暑生脈用人參以益氣氣足則暑不能犯用麥冬以清肺肺清則暑不能侵又佐之北五味以收斂其耗散之金則肺氣更旺何懼外暑之熱是五味子助人參麥冬以生肺氣而非輔人參麥冬以消暑邪也或問五味子補腎之藥人皆用之於補肺而吾子又言宜少用而不宜多用不愈示人以補肺而不補腎乎曰北五味子補腎正不必多也其味酸而氣溫味酸則過於收斂氣溫則易動龍雷不若少用之反易生津液而無強陽之失也或問五味子古人有獨用以閉精而吾子謂不宜獨用不獨無功且有大害未知所謂大害者何害也夫五味子性善收斂獨用之者利其閉精而不泄耳精宜安靜不宜浮動服五味子而能絶欲者世無其人保其遇色而不心動乎心動則精必離宮無五味子之酸收則精將隨小便而暗泄惟其不能不心動也且有恃五味子之閉澀搏久戰以貪歡精不泄而內敗變為癰疽發背而死者多矣所謂大害者如此而可獨用一味經年纍月知服以圖閉澀哉或為五味子滋不足之腎水宜多用為佳乃古人往往少用豈能生汪洋之腎水耶曰天一生水原有化生之妙不在藥味之多也孫真人生脈散雖名為益肺其實全在生腎水蓋補腎以生腎水難為力補肺以生腎水易為功五味子助人參以收耗散之肺金則金氣堅凝水源淵徹自然肺足而腎亦足也又何必多用五味子始能生水哉況五味子多用反不能生水何也味酸故也酸能生津而過酸則收斂多而生髮之氣少轉奪人參之權不能生氣於無何有之鄉即不能生精於無何有之宮矣此古人所以少用勝於多用也批五味子少用則止精持論純正或問北五味補腎益肺然有時補腎而不利於肺或補肺而不利於腎何也曰腎乃肺之子肺乃腎之母補肺宜益於腎補腎宜益於肺何以有時而不利耶此邪火之作祟補腎則水升以入肺而肺且恃子之水與邪相鬥而肺愈不安矣益肺則金剛以克肝而肝且恃母之水與邪相爭而腎亦不安矣然則五味子之補腎益肺宜於無邪之時而補之益之也批五味子補無邪之肺腎論更出奇或疑精不足者補之以味未必非五味子之味也嗟乎何子言之妙也實泄天地之奇精不足者宜補五味之補也世人見五味子不可多用並疑五味子不能生水誰知此物補水妙在不必多也古云精不足者補之以味人參羊肉是也誰知人參五味子之更勝哉批又補內經之不足妙甚或問五味子生精斂氣之外更有何病可以兼治之乎五味子斂耗散之肺金滋涸竭之腎水二治之外原無多治法也然子既求功於二者之外我尚有一法以廣其功五味子炒焦研末敷瘡瘍潰爛皮肉欲脫者可保全如故不至全脫也批妙法菟絲子菟絲子味辛甘氣溫無毒入心肝腎三經之藥益氣強陰補髓添精止腰膝疼痛安心定魂能斷夢遺堅強筋骨且善明目可以重用亦可一味專用世人未知也余表而出之遇心虛之人日夜夢精頻泄者用菟絲子三兩水十碗煮汁三碗分三服早午夜各一服即止且永不再遺其故何也蓋夢遺之病多起於淫邪之思想思想未已必致自泄其精精泄之後再加思想則心火暗爍相火乘心之虛上奪君權火欲動而水亦動矣久則結成夢想而精遺於是玉關不閉不必夢而亦遺矣此乃心肝腎三經齊病水火兩虛所致菟絲子正補心肝腎之聖藥況又不雜之別味則力尤專所以能直入三經以收全效也他如夜夢不安兩目昏暗雙足乏力皆可用至一二兩同人參熟地白朮山茱之類用之多建奇功古人云能斷思交則不盡然也或問菟絲可多用以成功何千古無人表出直待吾子而後示奇乎曰軒岐之祕不傳於世也久矣吾躬受岐夫子真傳而祕之則是軒岐之道自我而傳亦自我而絶矣故鐸寧傳之天下使當世懷疑而不敢用斷不可不傳之天下使萬世隱晦而不知用也或疑菟絲子無根之草依樹木而生其治病亦宜依他藥而成功似未可專用也噫何論之奇也夫菟絲子神藥也天下有無根草木如菟絲子者乎亡有也故其治病有不可思議之奇人身夢遺之病亦奇病也無端而結想無端而入夢亦有不可思議之奇雖靈樞經有淫邪發夢之篇備言夢症而終不得其所以入夢之故雖聖人亦難言也用菟絲子治夢遺者以異草治異夢也乃服之而效驗如響亦有不可思議之奇吾不意天地間之多奇如此雖然菟絲治夢遺者何足奇奇在吾子之發論余得共闡其奇耳惟其奇故菟絲專用以出奇又胡必依草木共治而後成功哉批理明而胸無芥蒂筆順而詞有光口謂有神助信然或問菟絲子治夢遺奇矣亦可更治他病能收奇功乎夫菟絲子實不止治夢遺也更能強陽不倒用一味至二兩煎湯服則陽堅而不泄矣或人不信吾方之奇不知菟絲子實神藥也以神通神實有至理批方奇而論更奇妙在出言至理凡人入房而易泄者以心君之神先怯耳心之神怯則相之神旺矣相之神旺則陽易舉亦易倒心之神旺則相之神嚴肅而不敢犯君則君之權尊君之權尊則令專而不可搖動故陽不舉則已舉則堅而不易倒也菟絲子能安心君之神更能補益心包絡之氣是君火與相火同補陽安有不強者乎況菟絲子更善補精髓助陽之旺又不損陰之衰此強陽不倒之可以無虞而不至有陰虛火動之失也雖然鐸創此論宣菟絲子之神奇非導淫也倘陽火衰微服此方可以獲益而種子設或陰虛火盛服此方必有虛陽亢炎之禍至癆瘵而不可救者非鐸之過也甘菊花甘菊花味甘微苦性微寒可升可降陰中陽也無毒入胃肝二經能除大熱止頭痛暈眩收眼淚翳膜明目有神黑鬚鬢頗驗亦散濕去疸除煩解燥但氣味輕清功亦甚緩必宜久服始效不可責以近功惟目痛驟用之成功甚速余則俱迂緩始能取效也近人多種菊而不知滋補方間有用之者又只取作茶茗之需以為明目也然而甘菊花不但明目可以大用之者全在退陽明之胃火蓋陽明內熱必宜陰寒之藥以瀉之如石膏知母之類然石膏過於太峻未免太寒以損胃氣不若用甘菊花至一二兩同元參麥冬共濟之既能平胃中之火而不傷胃中之氣也批甘菊花退胃火而不損胃氣實有奇功或問甘菊花治目最效似乎肝經之專藥而吾子獨云可退陽明之胃火不識退陽明何等之火病耶夫甘菊花凡有胃火俱可清之而尤相宜者痿病也痿病責在陽明然而治陽明者多用白虎湯而石膏過於寒涼恐傷胃氣而痿病又多是陽明之虛熱白虎湯又瀉實火之湯也尤為不宜不若用甘菊花一二兩煎湯以代茶飲既退陽明之火而又補陽明之氣久服而痿病自痊甘菊花退陽明之火病其在斯乎批痿病乃陽明之虛火作祟也甘菊花正治陽明之虛火所以相宜或問甘菊花人服之延齡益算至百歲外仙去者有之乎抑好事者之言也吾子既遇異人傳異術必有所聞幸勿自祕曰豫實未聞也或人固請乃喟然嘆曰吾今而後不敢以異術為一人延齡益算之資也敢不罄傳與天下共之乎夫菊得天地至清之氣又後群卉而自芳傲霜而香挹露而葩而花又最耐久是草木之種而欲與松柏同為後凋也豈非長生之物乎但世人不知服食之法徒作茶飲之需又不識何以修合是棄神丹於草莽可惜也我今將異人所傳備書於後原人依方服食入仙不難豈獨延齡益算已哉方名菊英仙丹採家園黃菊花三斤曬乾入人參三兩白朮六兩黃耆十兩干桑椹十兩熟地一斤生地三兩茯苓六兩當歸一斤遠志四兩巴戟天一斤枸杞子一斤花椒三兩山藥四兩茯神四兩菟絲子八兩杜仲八兩各為細末蜜為丸白滾水每日服五錢三月之後自然顏色光潤精神健強返老還童可以久服既無火盛之虞又有添精之益實可為娛老之方也勿以鐸之輕傳而易視之為無能蓋菊英為仙人所採實有服之而仙去者非好事者之談乃成仙之實録也或疑甘菊花藥味平常未必服之可以延齡古人採食而仙去者徒虛語耳嗟乎採菊英而仙去吾不敢謂古必有是人然菊英仙丹實異人授鐸吾睹其方中之配合得宜既無燥熱之忌實多滋益之良服之即不能成仙未必不可藉以難老也或疑甘菊花治目杭人多半作茶飲而目疾未見少者是菊花非明目之藥而菊英仙丹亦不可信之方矣嗟乎菊花明目明虛人之目而非明有病人之目也有病之目即可用菊花治亦必與發散之藥同治而不可單恃之以去風去火也夫人之疾病不常而人之慎疾各異菊花之有益於人目者甚多豈可因一二病目成於外感而即疑菊花之非明目也亦太拘矣若菊英仙丹純是生氣生精之神藥非止明目已也又烏可因杭城之病目疑菊而並疑仙丹哉或疑真菊益齡野菊泄人有之乎曰有之或曰有之而子何以不載也夫菊有野種家種之分其實皆感金水之精英而生者也但家種味甘補多於瀉野菊味苦瀉多於補欲益精以平肝可用家菊欲息風以制火當用野菊人因本草之書有泄人之語竟棄野菊不用亦未知野菊之妙除陽明之焰正不可用家菊也薏苡仁薏苡仁味甘氣微寒無毒入脾腎二經兼入肺療濕痹有神舒筋骨拘攣止骨中疼痛消腫脹利小便開胃氣亦治肺癰但必須用至一二兩始易有功少亦須用五錢之外否則力薄味單耳薏仁最善利水又不損耗真陰之氣凡濕感在下身者最宜用之視病之輕重準用藥之多寡則陰陽不傷而濕病易去人見用藥之多動生物議原未知藥性無怪其然余今特為闡明原世人勿再疑也凡利水之藥俱宜多用但多用利水之藥必損真陰之氣水未利而陰且虛矣所以他利水之藥不敢多用惟薏仁利水而又不損真陰之氣諸利水藥所不及者也可以多用而反不用與不可多用而反大用者安得有利乎故凡遇水濕之症用薏仁一二兩為君而佐之健脾去濕之味未有不速於奏效者也倘薄其氣味之平和而輕用之無益也批薏仁利水而不走氣與茯苓同功或問薏仁味薄而氣輕何以利水之功猶勝蓋薏仁感土氣而生故利氣又不損陰所以可多用以出奇而不必節用以畏縮也或問薏仁有取之釀酒者亦可藉為利濕之需乎夫薏仁性善利濕似乎所釀之酒亦可以利濕也然用薏酒以治濕而濕不能去非特濕不能去而濕且更重其故何哉酒性大熱薏仁既化為酒則薏仁之氣味亦化為熱矣既化為熱獨不可化為濕乎濕熱以治濕熱又何宜哉此薏仁之酒斷不可取之以治濕熱之病也或問薏仁可以消瘴氣而未言及豈忘之耶非忘也薏仁只能消濕氣之瘴而不能消嵐氣之瘴雖嵐氣即濕氣之類然而濕氣從下受而嵐氣從上感又各不同薏仁消下部之濕安能消上部之濕哉批薏仁消下濕而不消上濕確論不磨或問薏仁得地之燥氣兼稟乎天之秋氣似與治痿相宜何子忘之也亦未曾忘也經曰治痿獨取陽明陽明者胃與大腸也二經濕熱則成痿濕去則熱亦隨解故治痿者必去濕也吾前言用薏仁至一二兩者正言治痿病也天下惟痿病最難治非多用薏仁則水不易消水不消則熱不能解故治痿病斷須多用耳推之而凡有諸濕之症無不宜多用正不可因鐸之未言即疑而不用也或問薏仁功用甚薄何不用豬苓澤瀉可以少用見功而必多用薏仁何為乎不知利水之藥必多耗氣薏仁妙在利水而又不耗真氣故可重用之耳山藥山藥味甘氣溫平無毒入手足太陰二臟亦能入脾胃治諸虛百損益氣力開心竅益知慧尤善止夢遺健脾開胃止瀉生精山藥可君可臣用之無不宜者也多用受益少用亦受益古今頗無異議而余獨有微辭者以其過於健脾也夫人苦脾之不健健脾則大腸必堅牢胃氣必強旺而善飯何故獨取而貶之不知脾胃之氣太弱必須用山藥以健之脾胃之氣太旺而亦用山藥則過於強旺反能動火世人往往有胸腹飽悶服山藥而更甚者正助脾胃之旺也人不知是山藥之過而歸咎於他藥此皆不明藥性之理也蓋山藥入心引脾胃之邪亦易入心山藥補虛而亦能補實所以能添飽悶也因世人皆信山藥有功而無過特為指出非貶山藥也山藥舍此之外別無可議矣或問山藥乃補陰精之物而吾子謂是健脾胃之品何子之好異也曰山藥益人無窮損人絶少余談本草欲使其功過各不掩也山藥有功而無過言其能助脾胃之火者是求過於功之中也然而天下之人脾胃太旺者千人中一二不可執動火之說概疑於脾胃之未旺者而亦慎用之也脾胃未旺則腎氣必衰健脾胃正所以補陰精也豫道其常何好異之有或問山藥補腎仲景張公所以用之於六味地黃丸中也然而山藥實能健脾開胃意者六味丸非獨補腎之藥乎曰六味丸實直補腎水之藥也山藥亦補腎水之藥同群共濟何疑然而六味丸中之用山藥意義全不在此山藥乃心肝脾肺腎無經不入之藥也六味丸雖直補腎中之水而腎水必分資於五臟而五臟無相引之使又何由分布其水而使之無不潤乎倘別用五臟佐使之品方必雜而不純故不若用山藥以補腎中之水而又可遍通於五臟此仲景張夫子補一顧五實有鬼神難測之機也批山藥補水而又通五臟仲景公所以用之於六味丸中自有此方無此妙論或問山藥入於六味丸中之義豫既已聞之不識入於八味丸中亦有說乎曰八味丸由六味而加增者也似乎知六味即可知八味之義矣誰知八味丸中之用山藥又別有妙義乎六味補腎中之水而八味則補腎中之火也補腎中之火者補命門之相火也夫身之相火有二一在腎之中一在心之外補腎中之相火則心外之相火必來相爭相爭則必相亂宜豫有以安之勢必下補腎中之火即當上補心下之火矣然而既因腎寒而補其下又顧心熱以補其上毋論下不能溫其寒而上且變為熱矣用藥之雜可勝嘆哉妙在用山藥於八味丸中山藥入腎者十之七入心者十之三引桂附之熱多溫於腎中少溫於心外使心腎二火各有相得而不致相爭使腎之氣通於心而心之氣通於腎使脾胃之氣安然健運於不息皆山藥接引之功也仲景公豈漫然用之哉批八味丸補命門之火也補命門之火慮及心包之火必來相爭用山藥解紛使心腎相通胃脾兩健何論奇而理確如此真仲景公入室之藥也或疑山藥不宜多用何以六味地黃丸終年久服而無害也得毋入於地黃丸可以多用而入於他藥之中即宜少用耶不知山藥可以多用而無忌吾前言脾健之人宜忌者慮助火以動燥而非言其不可以多用也或疑山藥津滑何能動燥曰山藥生精自然非助燥之物吾言其助燥者助有火之人非助無火之人也或問山藥色白何能烏須何吾子用之為烏須聖藥曰山藥何能烏須哉山藥入腎而尤通任督任督之脈上行於唇頰故借山藥用之於烏芝麻黑豆地黃南燭何首烏之內導引以黑鬚鬢非山藥之能自烏也或又問山藥既為引導之藥則不宜重用之為君矣不知山藥雖不變白而性功實大補腎水者也腎水不足者須鬢斷不能黑我所以重用山藥而奏功也知母知母味苦辛氣大寒沉而降陰也無毒入足少陰陽明又入手太陰最善瀉胃腎二經之火解渴止熱亦治久瘧此物只可暫用而不可久服丹溪加入六味丸中亦教人暫服以瀉腎中浮游之火非教人長服也近世竟加知母黃柏謂是退陰虛火熱之聖方令人經年長用以致脾胃虛寒不能飲食成癆成瘵者不知幾千萬人矣幸薛立齊趙養葵論知母過寒切戒久食實見到之語有功於世總之此物暫用以瀉胃中之火實可奪命久用以補腎中之水亦能促命謂知母竟可殺人固非立論之純謂知母全可活人亦非持說之正也或問知母瀉腎腎有補而無瀉不可用知母宜也若用之以瀉胃似可常用何吾子亦謂只可暫用乎曰胃火又何可常瀉也五臟六腑皆仰藉於胃胃氣存則生胃氣亡則死胃中火盛恐其消爍津液用石膏知母以救胃非瀉胃也然而石膏過於峻削知母過於寒涼胃火雖救而胃土必傷故亦宜暫用以解氛斷不宜常用以損氣也批胃為腎之關門胃與腎俱不可用石膏久瀉其火胃寒則腎亦寒也或問知母古人皆言是補腎滋陰妙藥吾子乃言是瀉火之味此余所以疑也不知母疑也天下味溫者能益人未聞苦寒者而亦益也知母苦而大寒其無益於脾胃又何必辨惟是既無益於脾胃何以瀉胃中之火能奪命於須臾乎似乎瀉即補之之義也然而暫用何以相宜久用何以甚惡是瀉火只可言救腎而終不可言補腎也批用知母以救腎非用知母以補腎分別獨妙或問知母性過寒涼久服損胃何不改用他藥以救胃而白虎湯中必用知母以佐石膏之橫不以寒濟寒乎嗟乎何問之善也夫白虎湯乃治胃火之初起單用石膏以救胃猶恐不勝故又加知母以止其腎中之火使胃火之不增焰也若胃火已熾之後與將衰之時知母原不必加入之也或去知母而易之天冬元參之味亦未為不可也或問知母黃柏用之於六味丸中朱丹溪之意以治陰虛火動也是豈無見者乎嗟乎陰虛火動六味湯治之足矣何必又用知母黃柏以瀉火乎夫火之有餘因水之不足也補其水則火自息矣丹溪徒知陰虛火動之義而加入二味使後人膠執而專用之或致喪亡非所以救天下也或問知母既不宜輕用何不竟刪去之乃既稱其功又闢其過耶嗟乎吾言因丹溪而發豈謂知母之等於鳩毒哉蓋知母止可用之以瀉胃火之有餘而不可用之以瀉腎火之不足故瀉胃火則救人而瀉腎火則殺人也丹溪止主瀉腎而不主瀉胃此生死之大關不可不辨也或問李時珍發明知母是氣分之藥黃柏是血分之藥黃柏入腎而不入肺知母下潤腎而上清肺金二藥必相須而行譬之蝦之不能離水母也是黃柏知母必須同用為佳而吾子謂二藥不可共用得毋時珍非歟曰時珍殆讀書而執者也不知黃柏未嘗不入氣分而知母未嘗不入血分也黃柏清腎中之火亦能清肺中之火知母瀉腎中之熱而亦瀉胃中之熱胃為多氣多血之腑豈止入於氣分而不入於血分耶是二藥不必兼用不可即此而悟哉金叉石斛金叉石斛味甘微苦性微寒無毒不可用竹斛木斛用之無功石斛卻驚定志益精強陰尤能健腳膝之力善起痹病降陰虛之火大有殊功今世吳下之醫頗喜用之而天下人尚不悉知其功用也蓋金叉石斛生於粵閩巖洞之中巖洞乃至陰之地而粵閩又至陽之方也秉陰陽之氣以生故寒不為寒而又能降虛浮之熱夫虛火相火也相火宜補而不宜瀉金叉石斛妙是寒藥而又有補性且其性又下行而不上行若相火則易升而不易降者也得石斛則降而不升矣夏月之間兩足無力者服石斛則有力豈非下降而兼補至陰之明驗乎故用黃柏知母瀉相火者何如用金叉石斛之為當乎蓋黃柏知母瀉中無補而金叉石斛補中有瀉也或問金叉石斛降陰虛之火乃瀉陰之物也何以能健腳膝之力其中妙義尚未暢發曰腎有補而無瀉何以金叉石斛瀉腎而反補腎宜子之疑也余上文雖已略言之而今猶當罄言之夫腎中有水火之分水之不足火之有餘也火之有餘水之不足也是水火不能兩平者久矣腳膝之無力者腎水之不足也水不足則火覺有餘火有餘則水又不足不能制火矣不能制火則火旺而熬干骨中之髓欲其腳膝之有力也必不得之數矣金叉石斛本非益精強陰之藥乃降腎中命門虛火之藥也去火之有餘自然益水之不足瀉腎中之虛火自然添骨中之真水矣故曰強陰而益精此腳膝之所以健也然則黃柏知母亦瀉腎火之藥何以不能健腳膝不知腎中之火大寒則瀉而不補微寒則補而能瀉此金叉石斛妙在微寒以瀉為補也批相火者虛火也虛火必補而後息石斛之補腎豈及熟地然以輕虛之體潛入於命門陰火之中能引入命門之火仍歸於腎舍石斛更無他藥可代大寒之藥有瀉而無補微寒之藥有補而無瀉發前人所未發或問子惡用黃柏知母之瀉火何又稱金叉石斛不知金叉石斛非知母黃柏可比知母黃柏大寒直入於至陰使寒入於骨髓之中金叉石斛不過微寒雖入於至陰使寒出於骨髓之外各有分別也或疑金叉石斛使寒出於骨髓實發前人之未發但無徵難信耳曰石斛微寒自不傷骨骨既不傷則骨中之熱自解骨中熱解必散於外此理之所必然不必有徵而後信也肉蓯蓉肉蓯蓉味甘溫而咸酸無毒入腎最善興陽止崩漏久用令男女有子暖腰膝但專補腎中之水火余無他用若多用之能滑大腸古人所以治虛人大便結者用蓯蓉一兩水洗出鹽味另用淨水煮服即下大便正取其補虛而滑腸也然雖補腎而不可專用佐人參白朮熟地山茱萸諸補陰陽之藥實有利益使人陽道修偉與驢鞭同用更奇但不可用瑣陽蓋瑣陽非蓯蓉可比蓯蓉乃馬精所化故功效能神瑣陽非馬精所化之物雖能補陰興陽而功效甚薄故神農薄而不取近人舍蓯蓉而用瑣陽余所以分辨之也至於草蓯蓉尤不可用凡用肉蓯蓉必須揀其肥大而有鱗甲者始可用否則皆草蓯蓉而假充之者買時必宜詳察或問肉蓯蓉既大補又性溫無毒多用之正足補腎何以反動大便不知肉蓯蓉肉乃馬精所化之物馬性最淫故能興陽馬精原系腎中所出故又益陰然而馬性又最動故驟用之多易動大便非其味滑也批近情切理之言或問肉蓯蓉之動大便恐是攻劑而非補藥也夫蓯蓉乃有形之精所生實補而非瀉試觀老人不能大便者用之以通大便夫老人之閉結乃精血之不足非邪火之有餘也不可以悟其是補而非攻乎或疑肉蓯蓉性滑而動大便凡大腸滑者可用乎抑不可用乎夫大腸滑者多由於腎中之無火肉蓯蓉興陽是補火之物也補火而獨不能堅大腸乎故驟用之而滑者久用之而自澀矣或疑肉蓯蓉未必是馬精所生此物出之邊塞沙土中歲歲如草之生安得如許之馬精耶曰肉蓯蓉是馬精所生非馬精所生吾何由定但此說實出於神農之本草非後人之私臆也肉蓯蓉不得馬精之氣而生於苦寒邊塞之外又何能興陽而補水火哉或問王好古曾云服蓯蓉以治腎必妨於心何子未識也曰此好古不知蓯蓉而妄誡之也凡補腎之藥必上通於心心得腎之精而後無焦枯之患蓯蓉大補腎之精即補心之氣也又何妨之有批實是補骨脂補骨脂即破故紙也味苦辛氣溫無毒入脾腎二經治男子勞傷療婦人血氣止腰膝痠疼補髓添精除囊澀而縮小便固精滑而興陽事去手足冷疼能定諸逆氣但必下焦寒虛者始可久服倘虛火太旺只可暫用以引火歸原否則日日服之反助其浮游之火上升矣古人用破故紙必用胡桃者正因其性過於燥恐動相火所以制之使潤非故紙必須胡桃也或問補骨脂既不可輕用而青娥等丸何以教人終日吞服又多取效之神耶不知青娥丸治下寒無火之人也下寒無火者正宜久服如何可禁其少用乎命門火衰以致腰膝之痠疼手足之逆冷甚則陽痿而泄瀉苟不用補骨脂急生其命門之火又何以回陽而續命乎且補骨脂尤能定喘腎中虛寒而關元真氣上衝於咽喉用降氣之藥不效者投之補骨脂則氣自歸原正藉其溫補命門以回陽而定喘也是補骨脂全在審其命門之寒與不寒而用之耳余非不教人之久服也或問破故紙雖善降氣然亦能破氣何子未言也曰破故紙未嘗破氣人誤見耳破故紙乃納氣歸原之聖藥氣之不歸者尚使之歸豈氣之未破者而使之破乎惟是性過溫恐動命門之火火動而氣動氣動而破氣者有之然而用故紙者必非單用得一二味補陰之藥以濟之則火且不動又何能破氣哉批破故紙納氣而非破氣前人雖言之矣但無此痛快耳或問補骨脂治瀉有神何以脾瀉有宜有不宜乎不知補骨脂非治瀉之藥不治瀉而治瀉者非治脾泄治腎泄也腎中命門之火寒是脾氣不固至五更痛瀉者必須用補骨脂以溫補其命門之火而瀉者不瀉矣若命門不寒而脾自瀉者是有火之瀉用補骨脂正其所惡又安能相宜哉或問補骨脂無胡桃猶水母之無蝦然否嗟乎破故紙何藉於胡桃哉破故紙屬火收斂神明能使心包之火與命門之火相通不必相桃之油潤之始能入心入腎也蓋破故紙自有水火相生之妙得胡桃仁而更佳但不可謂破故紙必有藉於胡桃仁也批剖析甚當或疑破故紙陽藥也何以偏能補腎夫腎中有陽氣而後陰陽有既濟之美破故紙實陰陽兩補之藥也但兩補之中補火之功多於補水制之以胡桃仁則水火兩得其平矣或問破故紙補命門之火然其氣過燥補火之有餘恐耗水之不足古人用胡桃以制之者未必非補水也不知胡桃以制破故紙者非制其耗水也乃所以助腎中之火也蓋腎火非水不生胡桃之油最善生水腎中之水不涸則腎中之火不寒是破故紙得胡桃水火有兩濟之歡也批生水生火相得益彰妙論羌活獨活羌活味苦辛氣平而溫升也陽也無毒入足太陽足少陰二經又入足厥陰善散風邪利周身骨節之痛除新舊風濕亦止頭痛齒疼古人謂羌活系君藥以其撥亂反正有旋轉之力也而余獨以為只可充使而並不可為臣佐批說羌活不可為君臣之藥見明論確救世之深心也蓋其味辛而氣升而性過於散可用之為引經通達上下則風去而濕消若恃之為君臣欲其調和氣血燮理陰陽必至變出非常禍生反掌矣故羌活止可加之於當芎朮苓之內以逐邪返正則有神功耳羌活與獨活本是兩種而各部本草俱言為一種者誤仲景夫子用獨活以治少陰之邪東垣先生用羌活以治太陽之邪各有取義非取緊實者謂獨活輕虛者謂羌活也蓋二物雖同是散邪而升降之性各別羌活性升而獨活性降至於不可為君臣而只可充使者則彼此同之也或問九味羌活湯古人專用之以散風寒之邪今人無不宗之而吾子貶羌活為充使之藥毋乃太輕乎曰羌活雖散風邪而實能損正邪隨散解正亦隨散而俱解矣九味羌活湯雜而不純余最不取外感風邪治法安能出仲景夫子之範圍內傷而兼外感治法安能出東垣先生之範圍余治外感遵仲景夫子治內傷之外感遵東垣先生又何風邪之不去而必尚九味羌活湯為哉批讀書窮理深知二公之妙或疑潔古老人創造九味羌活湯以佐仲景公之不逮是其半生學問全在此方而先生薄羌活而並輕其方竊謂先生過矣嗟乎潔古創造九味羌活湯者因仲景公方法不明於天下而東坦先生尚未創制補中益氣之湯不得已而立此方以治外感實所以治內傷也今東垣先生既立有補中益氣湯實勝於九味羌活湯遠甚又何必再用潔古之方哉至於治外感之法莫過仲景公傷寒書之備外感善變豈羌活區區一方即可以統治六經傳經之外感耶況仲景公傷寒書經鐸與喻嘉言之闡發而益明故外感直用其方斷乎無疑若九味羌活湯實可不用潔古老人半生精力徒耗於此方雜而不純亦何足尚余是以輕之豈為過哉或謂羌活獨活同是散藥羌活性升而獨活性降升則未免有浮動之虞與其用羌活不若用獨活之為安嗟乎有邪宜散升可也降亦可也無邪可散散藥均不可用又何論於升降乎況二味原自兩種散同而升降各別又烏可亂用之哉柴胡柴胡味苦氣平微寒氣味俱輕升而不降陽中陰也無毒入手足少陽厥陰之四經瀉肝膽之邪去心下痞悶解痰結除煩熱尤治瘡瘍散諸經血凝氣聚止偏頭風胸脅刺痛通達表裡邪氣善解潮熱傷寒門中必須之藥不獨瘧症鬱症之要劑也婦人胎産前後亦宜用之目病用之亦良但可為佐使而不可為君臣蓋柴胡入於表裡之間自能通達經絡故可為佐使而性又輕清微寒所到之處春風和氣善於解紛所以用之無不宜也然世人正因其用無不宜無論可用不可用動即用之如陰虛癆瘵之類亦終日煎服耗散真元內熱更熾全然不悟不重可悲乎夫柴胡只可解鬱熱之氣而不可釋骨髓之炎也能入於裡以散邪不能入於裡以補正能提氣以升於陽使參耆歸術共健脾而開胃不能生津以降於陰使麥冬丹皮同益肺以滋腎能入於血室之中以去熱不能入於命門之內以去寒無奈世人妄用柴胡以殺人也余所以探辨之耳批柴胡散半表半裡之邪開手即宜用之遠公闡發獨精斟酌盡詳或問柴胡不可用之以治陰虛之人是矣然古人往往雜之青蒿地骨皮丹皮麥冬之內每服退熱者又謂之何曰此陰虛而未甚者也夫陰虛而火初起者何妨少用柴胡引諸補陰之藥直入於肝腎之間轉能瀉火之速所惡者重加柴胡而又久用不止耳用藥貴通權達變豈可拘泥之哉又問柴胡既能提氣能補脾而開胃何以亦有用之而氣上衝者何故此正見柴胡之不可妄用也夫用柴胡提氣而反甚者必氣病之有餘者也氣之有餘必血之不足也而血之不足也必陰之甚虧也水不足以制火而反助氣以升陽則陰愈消亡而火愈上達氣安得而不上衝乎故用柴胡以提氣必氣虛而下陷者始可至於陰虛火動之人火正炎上又加柴胡以升提之火愈上騰而水益下走不死何待乎此陰虛火動斷不可用柴胡不更可信哉批柴胡提氣止宜提陽氣之虛不宜提陰火之旺不可不知或問柴胡乃半表半裡之藥故用之以治肝經之邪最效然而肝經乃陰臟也邪入於肝已入於裡矣又何半表半裡之是云乃往往用柴胡而奏效如神者何也夫肝經與膽經為表裡邪入於肝未有不入於膽者或邪從膽而入於肝或邪已入肝而尚留於膽彼此正相望而相通也柴胡乃散肝邪而亦散膽邪之藥故入於肝者半而入於膽者亦半也所以治肝而膽之邪出治膽而肝之邪亦出也或問柴胡既是半表半裡之藥邪入於裡用柴胡可引之以出於表則病必輕邪入於表亦用柴胡倘引之以入於裡不病增乎不知柴胡乃調和之藥非引經之味也邪入於內者能和之而外出豈邪入於內者反和之而內入乎此傷寒汗吐下之病仲景夫子所以每用柴胡以和解於半表半里之間使反危而為安撥亂而為治也又問柴胡既是調和之藥用之於鬱症者固宜然有時解鬱而反動火又是何故此必婦女鬱於懷抱而又欲得男子而不可得者也論婦女思男子而不可得之脈肝脈必大而弦出於寸口然其懷抱既郁未用柴胡之前肝脈必澀而有力一服柴胡而澀脈必變為大而且弦矣郁開而火熾非柴胡之過正柴胡之功仍用柴胡而多加白芍山梔則火且隨之而即散矣或問柴胡為傷寒要藥何子不分別言之曰傷寒門中柴胡之症甚多何條宜先言何條宜略言乎雖然柴胡之症雖多而其要在寒熱之往來邪居於半表半裡之言盡之矣用柴胡而顧半表半裡也又何誤用哉批傷寒用柴胡之症雖多數言已足包括或問柴胡開鬱凡男子有郁亦可用之乎蓋一言郁則男婦盡在其中矣豈治男一法而治女又一法乎世人治郁多用香附誰知柴胡開鬱更易於香附也或問柴胡本散風之味何散藥偏能益人此豫之未解也蓋克中不克克即是生也柴胡入肝而性專剋木何以剋木而反能生木蓋肝屬木最喜者水也其次則喜風然風之寒者又其所畏木遇寒風則黃落葉既凋零而木之根必然下生而剋土矣土一受傷而胃氣即不能開而人病似乎肝之不喜風也誰知肝不喜寒風而喜溫風也木一遇溫風則萌芽即生枝葉扶疏而下不生根又何至剋土乎土不受傷而胃氣輒開人病頓愈柴胡風藥中之溫風也肝得之而解鬱竟不知抑滯之氣何以消釋也故忘其性之相制轉若其氣之相宜克既不克非克即所以生之乎克即是生克非真克生乃是克生實非生全生於克之中制克於生之外是以反得其生之之益而去其克之之損也或疑柴胡用之於補中益氣湯實能提氣何以舍補中益氣湯用之即不見有功意者氣得補而自升無藉於柴胡耶曰柴胡提氣必須於補氣之藥提之始易見功舍補氣之藥實難奏效蓋升提之力得補更大非柴胡之不提氣也或疑柴胡用之補中益氣湯中為千古補氣方之冠然吾以為柴胡不過用之升提氣之下陷耳胡足奇此真不知補中益氣湯之妙也補中益氣湯之妙全在用柴胡不可與升麻並論也蓋氣虛下陷未有不氣鬱者也惟郁故其氣不揚氣不揚而氣乃下陷徒用參歸耆術以補氣而氣鬱何以舒發乎即有升麻以提之而脾胃之氣又因肝氣之郁來克何能升哉得柴胡同用以舒肝而肝不剋土則土氣易於升騰方中又有甘草陳皮以調和於胸膈之間則補更有力所以奏功如神也是柴胡實有奇功而非提氣之下陷一語可了使柴胡止提氣之下陷何風藥不可提氣而東垣先生必用柴胡以佐升麻之不及耶夫東垣先生一生學問全在此方為後世首推蓋不知幾經躊度精思而後得之也豈漫然哉批闡發補中益氣之妙東垣自己亦不過或問大小柴胡湯俱用柴胡何以有大小之分豈以輕重分大小乎不知柴胡調和於半表半里原不必分大小也而仲景張夫子分之者以大柴胡湯中有攻下之藥故以大別之實慎方之意教人宜善用柴胡也於柴胡何豫哉升麻升麻味苦甘氣平微寒浮而升陽也無毒入足陽明太陰之經能升脾胃之氣得白芷蔥白同用又入手陽明太陰二經其餘他經皆不能入能闢疫氣散肌膚之邪熱止頭齒咽喉諸痛並治中惡化斑點瘡疹實建奇功療肺癰有效但必須同氣血藥共用可佐使而亦不可以為君臣世人慮其散氣不敢多用是也然而亦有宜多用之時本草如綱目經疏尚未及言況他書乎夫升麻之可多用者發斑之症也凡熱不太甚必不發斑惟其內熱之甚故發出於外而皮毛堅固不能遽出故見斑而不能驟散也升麻原非退斑之藥欲退斑必須解其內熱解熱之藥要不能外元參麥冬與芩連梔子之類然元參麥冬與芩連梔子能下行而不能外走必藉升麻以引諸藥出於皮毛而斑乃盡消倘升麻少用不能引之出外勢必熱走於內而盡趨於大小腸矣夫火性炎上引其上升者易於散任其下行者難於解此所以必須多用而火熱之毒隨元參麥冬與芩連梔子之類而行盡消化也批闡義甚精大約元參麥冬用至一二兩者升麻可多用至五錢少則四錢三錢斷不可只用數分與一錢已也或問升麻能止衄血先生置而不講豈仲景張夫子非歟曰以升麻為止血之藥此不知仲景夫子用升麻之故也夫吐血出於胃衄血出於肺止血必須地黃非升麻可止用升麻者不過用其引地黃入於肺與胃耳此等病升麻又忌多用少用數分便能相濟以成功切不可多至於一錢之外也又問升麻升而不降何以大便閉結反用升提必取於升麻豈柴胡不可代耶曰升麻與柴胡同是升提之藥然一提氣而一提血大便燥急大腸經之火也大腸有火又由於腎水之涸也欲潤大腸舍補血之藥無由而補血又責之補腎使腎之氣通於大腸而結閉之症可解然則通腎之氣以生血可也而必加升麻於補腎補血之中者蓋陰之性凝滯而不善流動取升麻而升提其陰氣則肺金清肅之令行況大腸與肺又為表裡肺氣通而大腸之氣亦通肺氣通而腎之氣更通所以閉者不閉而結者不結也若用柴胡雖亦入肝能提升血分之氣終不能入於大腸通於肺腎之氣此柴胡之所以不可代升麻也批講得細微入神或問升麻與犀角迥殊何以古人有無犀角用升麻代之之語以升麻犀角同屬陽明也然否夫升麻雖與犀角同屬陽明而仲景夫子用升麻以代犀角非特為其同屬陽明也犀角地黃湯所以治肺經之火也犀角引地黃以至於肺而升麻亦能引地黃以至於肺也肺與大腸為表裡清肺而大腸陽明之火自降瘀血必從大便而出是升麻清肺正所以清陽明也或問升麻用之於補中益氣湯中豈慮柴胡不能升舉故用之以相佐耶曰柴胡升麻同用之補中益氣湯者各升提其氣兩不相顧而兩相益也柴胡從左而升氣升麻從右而提氣古人已言之矣然而柴胡左升氣而右未嘗不同提其氣升麻右提氣而左亦未嘗不共升其氣又兩相顧而兩相益也車前子車前子味甘咸氣微寒無毒入膀胱脾腎三經功專利水通尿管最神止淋瀝泄瀉能閉精竅祛風熱善消赤目催生有功但性滑利水可以多用以其不走氣也瀉宜於少用以其過於滑利也近人稱其力能種子則誤極矣夫五子衍宗丸用車前子者因枸杞覆盆過於動陽菟絲五味子過於澀精故用車前以小利之用通於閉之中用瀉於補之內始能利水而不耗氣水竅開而精竅閉自然精神健旺入房始可生子非車前之自能種子也批妙論鑿鑿大約用之補藥之中則同群共濟多有奇功未可信是種子之藥過於多用也或問車前利水之物古人偏用之以治夢遺而多效者何也曰此即余上文所言尿竅開而精竅閉也然而車前之能閉精又不止此車前最瀉膀胱之火火邪作祟煽動精門則生淫邪之夢用車前以利膀胱則火隨水散精門無炎蒸之煽動則腎中之精氣自安神不外走自無淫邪之夢又何至陰精之外泄乎此種祕理前人未談豫實得之扁鵲公之傳也或問詩經載瞥芑為催生之藥瞥芑即車前子草也果可備之為催生乎曰車前子性滑自易於生産然而不可單藉車前子也凡産婦之易於生産者必以氣血旺健為主氣足則兒之身易於轉頭血旺則兒之身易於出戶使氣怯則兒無力難於速轉血涸則胞無漿難於順送使不補其氣血而惟圖車前之滑胞吾恐過利其水胎胞乾燥轉難生産必須於補氣補血之中而佐車前子之滑利庶幾催生有驗乎批辨得透或問繆仲醇注車前子說男女陰中有二竅一通精一通水命門真陽之火道家謂之君火膀胱濕熱濁陰之水滲出竅外為小便道家謂之民火民火二字甚新何以內經靈樞未言也嗟乎此臆說也夫人身之火止二一君火一相火也安有民火哉此好異而過者也其言二竅不並開水竅開而精竅閉車前利水而能閉精實闡微之論或問車前子孕婦宜戒嫌其過滑以墮胎也曰車前子利水而不耗氣氣既不耗又何能墮胎惟是過於利水日用車前未免氣不耗而胎漿太乾恐有難於生産之虞然古之婦人採瞥芑以滑胎者乃取之備臨産之用非恃之易産而日日常飲也然則孕婦因小水不利偶一用之何損於胎乎竟戒絶口不服豈知車前哉蒺藜子蒺藜子味甘辛氣溫微寒無毒沙苑者為上白蒺藜次之種類各異而明目去風則一但白蒺藜善破癥結而沙苑蒺藜則不能也沙苑蒺藜善止遺精遺溺治白帶喉痹消陰汗而白蒺藜則不能也今世專尚沙苑之種棄白蒺藜不用亦未知二種之各有功效也余所以分別而並論之或問蒺藜能催生墮胎而先生略之豈著本草者誤耶夫蒺藜無毒之藥何能落胎謂其催生而性又不速然則從前本草何所據而言之耶見白蒺藜之多刺耳凡刺多者必有礙於進取留而不進則有之未聞荊棘之中反行之而甚速者也是蒺藜既不能催生又何能墮胎哉且沙苑蒺藜乃解火之味凡婦人墮胎半由於胎氣之太熱古人謂黃芩能安胎者正取其寒而能去火也況蒺藜微寒不同於黃芩之大冷而性又兼補且能止精之滑安有止精澀味而反墮胎者乎此傳聞者之誤不足信也或問蒺藜以同州沙苑者為勝近人以之治目謂補而又明目也先生又云與白蒺藜同為明目之藥豈同州者非補而白蒺藜反補耶批賤近而貴遠世情大抵然也豈獨蒺藜哉曰二味各有功效余上文已言之矣而吾子又問余更當暢談之沙苑蒺藜補多而瀉少白蒺藜瀉多而補亦多沙苑蒺藜補肝腎而明目乃補虛火之目而不可補實邪之目也補實邪之目則目轉不明而羞明生瘴之病來矣白蒺藜補肝腎而明目乃瀉實邪之目而又可補虛火之目也補虛火之目則目更光明瀉實邪之目則目更清爽二者相較用沙苑蒺藜以明目反不若用白蒺藜之明目為佳而無如近人之未知也青黛青黛即靛之乾者本草辨其出波斯國者始真轉誤矣味苦氣寒無毒殺蟲除熱能消赤腫疔毒兼療金瘡余無功效他書盛稱之皆不足信也惟喉痹之症倘系實火可以內外兼治而本草各書反不言及大約此物止可為佐使者也惟殺蟲可以多用只消一味用至一兩研末加入神麯三錢使君子三錢同為丸一日服盡蟲盡死矣批青黛殺蟲方神效試之屢驗他病不必多用蓋青黛氣寒能敗胃氣久服則飲食不能消也或問青黛微物先生亦慎用之毋乃太過乎嗟乎用藥一味之失便殺一人況發明本草而可輕言之乎故物雖至微不敢忽也或問青黛物雖至微仲景公用以治發斑之傷寒何子未之言及曰吾前言赤腫即發斑之別名非滿身腫起為赤腫也青黛至微而能化斑者以其善涼肺金之氣肺主皮毛皮膚之發斑正肺之火也然而發斑又不止肺火必挾胃火而同行青黛又能清胃火仲景公所以一物而兩用之退肺胃之火自易解皮膚之斑矣天麻天麻味辛苦氣平無毒入肺脾肝膽心經能止昏眩療風去濕治筋骨拘攣癱瘓通血脈開竅余皆不足盡信此有損無益之藥似宜刪去然外邪甚盛壅塞於經絡血脈之間舍天麻又何以引經使氣血攻補之味直入於受病之中乎故必須備載但悉其功用自不致用之之誤也總之天麻最能祛外來之邪逐內閉之痰而氣血兩虛之人斷不可輕用耳批天麻舉世也或問天麻世人多珍之何先生獨戒人以輕用乎曰余戒人輕用者以天麻實止可怯邪無邪之人用之未有不受害者也余所以言其功又示其過慮世之誤用以損人也蒲黃蒲黃味甘氣平無毒入肺經能止衄血妄行咯血吐血亦可用消瘀血止崩漏白帶調婦人血候不齊去兒枕痛療跌撲折傷亦佐使之藥能治實而不可治虛虛人用之必有泄瀉之病不可不慎也本草謂其益氣力延年作仙此斷無之事不可盡信或問蒲黃非急需之藥而吾子取之以備用不知何用也夫蒲黃治諸血症最效而治血症中尤效者咯血也咯血者腎火上衝而肺金又燥治腎以止咯血而不兼治肺則咯血不能止蒲黃潤肺經之燥加入於六味地黃湯中則一服可以奏功非若他藥如麥冬五味雖亦止咯而功不能如是之捷此所以備之而不敢刪耳何首烏何首烏味甘而澀氣微溫無毒神農未嘗非遺之也以其功效甚緩不能急於救人故爾失載然首烏蒸熟能黑鬚鬢但最惡鐵器凡入諸藥之中曾經鐵器者沾其氣味絶無功效世人久服而不變白者正坐此耳非首烏之不黑鬚鬢也近人尊此物為延生之寶余薄而不用惟生首烏用之治瘧實有速效治痞亦有神功世人不盡知也雖然首烏蒸熟以黑鬚鬢又不若生用之尤驗蓋首烏經九蒸之後氣味盡失又經鐵器全無功效矣不若竟以石塊敲碎曬乾為末同桑葉茱萸熟地枸杞子麥冬女貞子烏飯於黑芝麻白果共搗為丸全不見鐵器反能烏須鬢而延年至不老也或問何首烏蒸熟則味甘生用則味澀自宜制熟為黑則白易變為黑矣此情理之必然也先生獨云生用為佳亦有說乎曰首烏制黑猶生地之制熟也似宜熟者之勝生然而首烏不同生地也生地性寒而味苦制熟則苦變甘而寒變溫矣故制熟則佳首烏味本甘而氣本溫生者原本益人又何必制之耶況生者味澀凡人之精未有不滑者也正宜味澀以止益奈何反制其不澀使補者不補也余所以勸人生用之也或疑何首烏乃烏須聖藥不制之何能烏須先生謂生勝於熟讀先生之論則實有至理然未見先生之自效恐世人未必信先生之言也曰吾談其理何顧吾須之變白不變白哉況吾須之白而烏烏而白者屢矣乃自不慎酒色非藥之不驗也蓋服烏須之藥必須絶欲斷酒否則無功耳或疑何首烏既能延年而神農未嘗言先生又薄其功用之緩是此藥亦可有可無之藥也雖然何首烏烏可缺也亦顧人用之何如耳大約用之烏須延壽其功緩用之攻邪散瘧其功速近人用之多犯鐵器所以皆不能成功也或疑何首烏今人豔稱之吾子薄其功用得毋矯枉之過歟嗟乎何首烏實有功效久服烏須鬢固非虛語吾特薄其功用之緩非薄其無功用也如補氣也不若黃耆人參之捷如補血也不若當歸川芎之速如補精也不若熟地山茱之易於見勝此余之所以寧用彼而不用此也至於丸藥之中原圖緩治何首烏正宜大用烏可薄而棄之哉或問何首烏畢竟以大者為佳近人用何首烏而不甚效者大抵皆細小耳未必有大如斗者也曰古人載何首烏而稱極大者為神乃誇詡之辭非真親服而有驗也且何首烏小者之力勝於大者世人未知也近來士大夫得一大首烏便矜奇異如法修制九蒸九曬惟恐少越於古人乃終年吞服絶不見發之烏而鬢之黑可見大者功用劣於細小者矣無如今人為古人所愚舍人參熟地之奇而必求首烏為延生變白之藥絶無一效而不悔惑矣益母草益母草味辛甘氣微溫無毒胎前産後皆可用之去死胎最效行瘀生新亦能下乳其名益母有益於婦人不淺然不佐之歸芎參術單味未能取勝前人言其胎前無滯産後無虛謂其行中有補也但益母草實非補物止能佐補藥以收功故不宜多用大約入諸補劑之中以三錢為率可從中再減斷不可此外更增或問益母草以益母得名宜其有益於産母今人未産之前用之猶曰治産母也無孕之婦人雜然並進益母之謂何曰益母草實不止專益於産母凡無産之婦均能受益蓋益母草治婦人之病居十之七治産母之病反不過十之三無産之婦可以多用而有産之婦轉宜少用耳或疑益母草古今共譽而吾子何獨有貶辭曰吾言益母草佐補藥以收功正顯益母草之奇耳何為貶辭哉或疑益母草古人單用以收功而吾子必言佐補以取效何也不知益母草單用以收功不若佐補收功之更多而且捷續斷續斷味辛氣微溫無毒善續筋骨使斷者復續得名亦調血脈療折傷最神治血症亦效固精滑夢遺暖子宮補多於續但不可多用耳蓋續斷氣溫多用則生熱熱生則火熾矣少用則溫而不熱腎水反得之而漸生陰生於陽之中也他本謂其能愈乳癰瘰癧腸風痔瘻豈有氣溫之藥而能愈溫熱之病乎恐非可信之論也批實不可信或問續斷能接筋骨何以單用續斷未見奏功入之於生血活血藥中反能奏效何歟曰此正續斷之奇也夫斷者不能復續猶死者不能重生也欲使斷者復續必須使死者重生矣筋骨至於斷其中之血先死矣續斷止能接筋骨之斷不能使血之生也用之於生血活血之中則血之死者既慶再生而筋骨之斷者自慶再續批活血始可接骨補虛始能續斷真不易之論又何疑於單用之無功而共用之甚效哉或疑續斷不宜用之於補藥之中恐牽掣其手也嗟乎惟補可續不補何續耶或疑續斷因補以接骨則凡補之藥皆可接骨矣曰單補又何能接續哉惟續斷於補中接骨則補即有生之義生即有續之功也金銀花金銀花一名忍冬藤味甘溫無毒入心脾肺肝腎五臟無經不入消毒之神品也未成毒則散已成毒則消將死者可生已壞者可轉故癰疽發背必以此藥為奪命之丹但其味純良性又補陰雖善消毒而功用甚緩必須大用之批金銀花消毒神效必宜多用誠千古定論如發背癰用至七八兩加入甘草五錢當歸二兩一劑煎飲未有不立時消散者其餘身上頭上足上各毒減一半投之無不神效近人治癰毒亦多識用金銀花然斷不敢用到半斤殊不知背癰之毒外雖小而內實大非用此重劑則毒不易消且金銀花少用則力單多用則力厚尤妙在補先於攻消毒而不耗氣血敗毒之藥未有過於金銀花者也故毋論初起之時與出膿之後或變生不測無可再救之頃皆以前方投之斷無不起死回生者正勿驚訝其藥劑之重妄生疑畏也或嫌金銀花太多難於煎藥不妨先取水十餘碗煎取金銀花之汁再煎當歸甘草則尤為得法至於鬼擊作痛又治之小者止痢除溫益壽延齡則不可為訓矣或問金銀花敗毒則有之而吾子曰補陰得毋惑於本經長年益壽之語乎曰金銀花補之性實多於攻攻毒之藥未有不散氣者也而金銀花非惟不散氣且能補氣更善補陰但少用則補多於攻多用則攻勝於補故攻毒之藥未有善於金銀花者也若疑金銀花為長年益壽之藥則不可蓋至純之品始可長服以延齡偏霸之味只可暫投以奏效金銀花只宜用之以攻毒而不宜用之以補虛若惑於長年益壽之說始信金銀花為補陰之藥則余且勸人長服為添壽之助何以止言攻毒哉或問金銀花之解毒近人亦多知之然未有若吾子之讚歎甚神者子欲顯書之奇不顧言之大乎曰金銀花化毒吾言止揚其十之五余尚未盡言也今因吾子之問而罄悉之夫癰毒之初生也其身必疼痛而欲死服金銀花而痛不知何以消也當癰毒之潰膿也其頭必昏眩而不能舉服金銀花而眩不知何以去也及癰毒之收口也其口必黑黯而不能起服金銀花而陷不知何以起也然此猶陽症之癰毒也若陰症之癰毒其初生也背必如山之重服金銀花而背輕如釋負也其潰膿也心必如火之焚服金銀花而心涼如飲漿也其收口也肉必如刀之割服金銀花而皮癢如爪搔也然此猶陰症而無大變者也倘若痛癢之未知昏憒之不覺內可洞見其肺腑而外無僅存之皮骨與之食而不欲食與之湯而不欲飲懸性命於頃刻候死亡於須臾苟能用金銀花一斤同人參五六兩共煎汁飲之無不奪魂於垂絶返魄於已飛也誰謂金銀花非活人之仙草乎其功實大非吾言之大也批金銀花神妙不測真有如此世人用鐵箍散奪命丹萬應膏甚至操刀生割人肉者安識此理而用此藥乎今讀是編如當頭一針通身汗下頓失前非者何異立地成佛倘迷而不悟則永墮阿鼻矣或問金銀花散毒則有之未必如是之神曰金銀花之功效實不止此金銀花無經不入而其專入之經尤在腎胃二經癰毒止陰陽之二種陽即胃而陰即腎陽變陰者即胃之毒入於腎也陰變陽者即腎之毒入於胃也消毒之品非專瀉陽明胃經之毒即專瀉少陰腎經之毒欲既消胃毒而又消腎毒之藥舍金銀花實無第二品也金銀花消胃中之毒必不使毒再入於腎臟消腎中之毒必不使毒重流於胃腑蓋金銀花能先事而消彌復能臨事而攻突更善終事而收斂也或疑金銀花性甚緩而癰疽毒勢最急何以功用之大竟至如此豈急症緩治之法歟曰癰疽勢急治法不啻救焚烏可以緩治之哉金銀花性緩而用之治癰疽也則緩而變為急矣況用之四五兩以至半斤一斤則其力更專而氣更勇猛此正急症急治之也巴戟天巴戟天味甘溫無毒入心腎二經補虛損勞傷壯陽道止小腹牽痛健骨強筋定心氣益精增志能止夢遺此臣藥男婦俱有益不只利男人也世人謂其能使痿陽重起故云只利男子不知陽事之痿者由於命門火衷婦人命門與男子相同安在不可同補乎批巴戟天男女受益論是夫命門火衰則脾胃寒虛即不能大進飲食用附子肉桂以溫命門未免過於太熱何如用巴戟天之甘溫補其火而又不爍其水之為妙耶或問巴戟天近人罕用止用之於丸散之中不識亦可用於湯劑中耶曰巴戟天正湯劑之妙藥無如近人不識也巴戟天溫而不熱健脾開胃既益元陽復填陰水真接續之利器有近效而又有遠功夫巴戟天雖入心腎而不入脾胃然入心則必生脾胃之氣故脾胃受其益湯劑用之其效易速必開胃氣多能加餐及至多餐而脾乃善消又因腎氣之補薰蒸脾胃之氣也誰謂巴戟天不宜入於湯劑哉巴戟天溫補命門又大補腎水實資生之妙藥單用一味為丸更能補精種子世人未知也或疑巴戟天入湯劑最妙何以前人未見用之曰前人多用子未知之耳夫巴戟天補水火之不足益心腎之有餘實補藥之翹楚也用之補氣之中可以健脾以開胃氣用之補血之中可以潤肝以養肺陰古人不特用之且重用之自黃柏知母之論興遂置巴戟天於無用之地嗟乎人生於火而不生於寒如巴戟天之藥又烏可不亟為表揚哉五加皮五加皮味辛而苦氣溫而寒無毒近人多取而釀酒謂其有利益也甚則誇大其辭分青黃赤白黑配五行立論服三年可作神仙真無稽之談也此物止利風濕善消瘀血則真若言其扶陽起痿止小便遺瀝去婦人陰癢絶無一驗而舉世宗之牢不可破亦從前著書者之誤也余故辨之使世人毋再惑耳或問五加皮舉世皆以為補先生獨言非補世人飲此酒未見有損何也曰有其功則言功有其弊而言弊五加皮實有損無益之藥而舉世宗之余所以大聲疾呼也此酒江淮之間最多然飲之而未見損者亦有其故蓋江淮地勢卑濕服五加皮之酒以去濕似乎得宜若非江淮汙下之所而地處高燥則燥以益燥吾日見其損而不見其益矣或問東華真人煮石法用五加皮世為仙經所需而昔年魯定公母單服五加皮以致不死豈皆不可信耶曰此皆造酒附會之辭也五加皮實止除濕而不能延年欲藉其輕身耐老此余之所不敢信也川芎川芎味辛氣溫升也陽也無毒入手足厥陰二經功專補血治頭痛有神行血海通肝經之臟破癥結宿血産後去舊生新凡吐血衄血溺血便血崩血俱能治之血閉者能通外感者能散療頭風甚神止金瘡疼痛此藥可君可臣又可為佐使但不可單用必須以補氣補血之藥佐之則利大而功倍倘單用一味以補血則血動反有散失之憂單用一味以止痛則痛止轉有暴亡之慮若與人參黃耆白朮茯苓同用以補氣未必不補氣以生血也若與當歸熟地山茱麥冬白芍以補血未必不生血以生精也所虞者同風藥並用耳可暫而不可常中病則已又何必久任哉或問川芎既散真氣用四物湯以治癆怯毋乃不可乎不知四物湯中有當歸熟地為君又有芍藥為臣用川芎不過佐使引入肝經又何礙乎倘四物湯減去川芎轉無效驗蓋熟地性滯而芍藥性收川芎動而散氣四物湯正藉川芎辛散以動之也又未可鑑暴亡之失盡去之以治虛勞也或問佛手散用川芎佐當歸生血為産門要藥我疑其性動而太散何以産後之症偏服之而生血且生氣也夫血不宜動而産後之血又惟恐其不動也産後之血一不動即凝滯而上衝則血暈之症生矣佛手散正妙在於動也動則血活舊血易去而新血易生新血既生則新氣亦自易長又何疑川芎性動而太散哉或問川芎散氣是真何以補血藥必須用之豈散氣即生血乎曰血生於氣氣散則血從何生不知川芎散氣而復能生血者非生於散乃生於動也血大動則走而不能生血不動則止而不能生矣川芎之生血妙在於動也單用一味或恐過動而生變合用川芎何虞過動哉所以為生血藥中之必需取其同群而共濟也批不動不生血過動又失血合用川芎自然得宜或問川芎妙在於動而生血聽其動可也胡必用藥以佐之使動而不動耶不知動則變者古今之通義防其變者用藥之機權川芎得群補藥而制其動者正防其變也雖然天下不動則不變不制其動而自動者必生意外之變其變為可憂制其動而自動者實為意中之變其變為可喜蓋變出意外者散氣而使人暴亡變出意中者生血而使人健旺血非動不變血非變不化也批倡論可妙真胸有智珠或疑川芎生血出於動又慮其生變而制其動則動猶不動也何以生血之神哉曰不動而變者無為而化也川芎過動而使之不動則自忘其動矣其生血化血亦有不知其然而然之妙是不動之動正治於動也或疑川芎生血而不生氣豫獨以為不然蓋川芎亦生氣之藥但長於生血而短於生氣耳世人見其生血有餘而補氣不足又見神農本草言其是補血之藥遂信川芎止補血而不生氣絶無有用補氣之中豈特無有用之於補氣且言耗氣而相戒此川芎生氣之功數千年未彰矣誰則知川芎之能生氣乎然而川芎生氣實不能自生也必須佐參術以建功輔耆歸以奏效不可嫌其散氣而不用之也或疑川芎生氣終是創談仍藉參朮耆歸之力未聞其自能生氣也曰用川芎欲其自生氣也固力所甚難用川芎欲其同生氣也又勢所甚易蓋川芎得參朮耆歸往往生氣於須臾生血於眉睫世人以為是參朮耆歸之功也然何以古人不用他藥以佐參朮耆歸而必用川芎以佐之不可以悟生氣之說哉或疑川芎用之於佛手散中多獲奇功離當歸用之往往僨事豈川芎與當歸性味之相宜耶夫當歸性動而川芎亦動動與動相合必有同心之好毋怪其相得益彰也然而兩動相合反不全動故不走血而反生血耳或問川芎性散而能補是補在於散也補在散則補非大補而散為大散矣不知散中有補則散非全散用之於胎産最宜者蓋産後最宜補又慮過補則血反不散轉不得補之益矣川芎於散中能補既無瘀血之憂又有生血之益妙不在補而在散也批川芎之補在散未經人道芍藥芍藥味苦酸氣平微寒可升可降陰中之陽有小毒入手足太陰又入厥陰少陽之經能瀉能散能補能收赤白相無分彼此其功全在平肝肝平則不克脾胃而臟腑各安大小便自利火熱自散鬱氣自除癰腫自消堅積自化瀉痢自去痢痛自安矣蓋善用之無往不宜不善用之亦無大害無如世人畏用恐其過於酸收引邪入內也此不求芍藥之功惟求芍藥之過所以黃農之學不彰於天下而夭札之病世世難免也豫不得不出而辨之夫人死於疾病者色欲居其半氣鬱居其半縱色欲者肝經之血必虧血虧則木無血養木必生火以克脾胃之土矣脾胃一傷則肺金受刑何能制肝木寡於畏而仍來剋土治法必須滋肝以平木而滋肝平木之藥舍芍藥之酸收又何濟乎犯氣鬱者其平日腎經之水原未必大足以生肝木一時又遇拂抑則肝氣必傷夫肝屬木喜揚而不喜抑者也今既拂抑而不舒亦必下克於脾土脾土求救於肺金而肺金因肝木之旺腎水正虧欲顧子以生水正不能去克肝以制木而木氣又因拂抑之來更添惱怒何日是坦懷之日乎治法必須解肝木之憂鬱肝舒而脾胃自舒脾胃舒而各經皆舒也舍芍藥之酸又何物可以舒肝乎批宇宙有此妙文真是雍熙世界不愁生民夭札也是肝腎兩傷必有資於芍藥亦明矣然而芍藥少用之往往難於奏效蓋肝木惡急遽以酸收少濟之則肝木愈急而木旺者不能平肝鬱者不能解必用至五六錢或八錢或一兩大滋其肝中之血始足以慰其心而快其意而後虛者不虛郁者不郁也然則芍藥之功用如此神奇而可以酸收置之乎況芍藥功用又不止二者也與當歸並用治痢甚效與甘草並用止痛實神與梔子並用脅痛可解與蒺藜並用目疾可明且也與肉桂並用則可以祛寒與黃芩並用則可以解熱與參耆並用則可以益氣與芎歸熟地並用則可以補血用之補則補用之瀉則瀉用之散則散用之收則收要在人善用之烏得以酸收二字而輕置之哉或問芍藥有不可用之時先生之論似乎無不可用得毋産後亦可用而傷寒傳經亦可用乎曰産後忌芍藥者恐其引寒氣入腹也斷不可輕用即遇必用芍藥之病只可少加數分而已若傷寒未傳太陽之前能用芍藥則邪尤易出惟傳入陽明則斷乎不可用至於入少陽厥陰之經正須用芍藥和解豈特可用而已哉或問芍藥平肝氣也肝氣不逆何庸芍藥吾子謂芍藥無不可用毋乃過於好奇乎夫人生斯世酒色財氣四者並用何日非使氣之日乎氣一動則傷肝而氣不能平矣氣不平有大小之分大不平則氣逆自大小不平則氣逆亦小人見氣逆之小以為吾氣未嘗不平也誰知肝經之氣已逆乎故平肝之藥無日不可用也然則芍藥又何日不可用哉或問鬱症利用芍藥亦可多用之乎曰芍藥不多用則鬱結之氣斷不能開世人用香附以解鬱而鬱益甚一多用芍藥其鬱立解其故何也蓋鬱氣雖成於心境之拂抑亦終因於肝氣之不足而鬱氣乃得而結也用芍藥以利其肝氣肝氣利而鬱氣亦舒但肝因鬱氣之結則虛者益虛非大用芍藥以利之則肝氣未易復而鬱氣亦未易解也批郁成於肝氣之虛芍藥解鬱妙在益肝也故芍藥必須宜多用以平肝而斷不可少用以解鬱耳或問芍藥雖是平肝其實乃益肝也益肝則肝木過旺不畏肝木之剋土乎曰肝木剋土者乃肝木之過旺也肝木過旺則剋土肝木既平何至剋土乎因肝木之過旺而平肝則肝平而土已得養土得養則土且自旺脾胃既有旺氣又何畏於肝木之旺哉況肝木因平而旺自異於不平而自旺也不平而自旺者土之所畏因平而旺者土之所喜蓋木旺而土亦旺土木有相得之慶又何畏於肝木之克哉批古有青蓮談皆玉屑或問芍藥妙義先生闡發無遺不識更有異聞以開豫之心胸乎曰芍藥之義烏能一言而盡哉但不知吾子欲問者用芍藥治何經之病也或人以克胃者何以用芍藥耶夫芍藥平肝而不平胃胃受肝木之克瀉肝而胃自平矣何必疑或人曰非此之謂也余所疑者胃火熾甚正宜瀉肝木以瀉胃火何以反用芍藥益肝以生木便木旺而火益旺耶曰胃火之盛正胃土之衰也胃土既衰而肝木又旺宜乎剋土矣誰知肝木之旺乃肝木之衰乎肝中無血則乾燥而肝木欲取給於胃中之水以自養而胃土之水盡為木耗水盡則火熾又何疑乎用芍藥以益肝中之血則肝足以自養其木自不至取給於胃中之水胃水不幹則胃火自息山下出泉不可以濟燎原之火乎此蓋肝正所以益胃也或人謝曰先生奇論無窮不敢再難矣批設難固奇剖晰更奇或又問曰肝木之旺乃肝木之衰自當用芍藥以益肝矣不識肝木不衰何以亦用芍藥曰子何以見肝木之不衰也或人曰脅痛而至手不可按目疼而至日不可見怒氣而血吐之不可遏非皆肝木之大旺而非衰乎嗟乎子以為旺而我以為衰也夫脅痛至手不可按非肝血之旺乃肝火之旺也火旺由於血虛目痛至日不可見非肝氣之旺乃肝風之旺也風旺由於氣虛怒極至血之狂吐非肝中之氣血旺也乃外來之事觸動其氣而不能泄使血不能藏而外越然亦因其平日之肝木素虛而氣乃一時不能平也三症皆宜用芍藥以滋肝則肝火可清肝風可去肝氣可舒肝血可止否則錯認為旺而用瀉肝之味變症蜂起矣總之芍藥毋論肝之衰旺虛實皆宜必用不特必用而更宜多用也批灼有至理非同剿襲或又問曰肝虛益脾敬聞命矣何以心虛而必用芍藥耶夫肝為心之母而心為肝之子也子母相關補肝正所以補心烏可棄芍藥哉或人曰豫意不然以心為君主之官心虛宜五臟兼補何待補肝以益心哉嗟乎補腎可以益心必不能捨肝木而上越補脾可以益心必不能外肝木而旁親補肺可以益心亦不能捨肝木而下降蓋腎交心必先補肝而後腎之氣始可交於心之中否則肝取腎之氣而心不得腎之益矣脾滋心必先補肝而後脾之氣始足滋於心之內否則肝盜脾之氣而心不得脾之益矣肺潤心必先補肝而後肺之氣始得潤於心之宮否則肝耗肺之氣而心不得肺之益矣可見腎脾肺三經之入心俱必得肝氣而後入正因其子母之相親他臟不得而間之也三臟補心既必由於肝而肝經之藥何能捨芍藥哉非芍藥不可補肝以補心又何能捨芍藥哉或問芍藥平肝之藥也乃有時用之以平肝而肝氣愈旺何故乎曰此肺氣之衰也肺旺則肝氣自平金能剋木也今肝旺之極乃肺金之氣衰極也不助金以生肺反助木以生肝則肝愈旺矣何畏弱金之制哉此用芍藥而不能平肝之義也或問芍藥不可助肝氣之旺敬聞命矣然有肝弱而用之仍不效者又是何故此又肺氣之過旺也肝弱補肝自是通義用芍藥之益肝誰曰不宜然而肝之所畏者肺金也肺氣大旺則肝木凋零用芍藥以生肝氣而肺金輒來伐之童山之萌芽曷勝斧斤之旦旦乎故芍藥未嘗不生肝經之木無如其生之而不得也必須制肺金之有餘而後用芍藥以益肝木之不足樵採不入于山林枝葉自扶蘇於樹木此必然之勢也又何疑於芍藥之不生肝木哉批制金以生肝實有至理或問芍藥生心能之乎夫心乃肝之子也肝生心而芍藥生肝之物獨不可生肝以生心乎獨是生肝者則直入於肝中而生心者乃旁通於心外畢竟入肝易而入心難也雖然心乃君主之宮補心之藥不能直入於心宮補肝氣正所以補心氣也母家不貧而子舍有空乏者乎即有空乏可取之於母家而有餘然則芍藥之生心又不必直入於心中也或疑芍藥味酸以瀉肝吾子謂是平肝之藥甚則譽之為益肝之品此僕所未明也嗟乎肝氣有餘則瀉之肝氣不足則補之平肝者正補瀉之得宜無使不足無使有餘之謂也芍藥最善平肝是補瀉攸宜也余言平肝而瀉在其中矣又何必再言瀉哉或疑芍藥赤白有分而先生無分赤白又何所據而云然哉夫芍藥之不分赤白非創說也前人已先言之矣且世人更有以酒炒之者皆不知芍藥之妙也夫芍藥正取其寒以涼肝之熱奈何以酒製而使之溫耶既恐白芍之涼益宜用赤芍之溫矣何以世又尚白而尚赤也總之不知芍藥之功用而妄為好惡不用赤而用白不用生而用熟也不大可哂也哉批說來真可哂黃芩黃芩味苦氣平性寒可升可降陰中微陽無毒入肺經大腸退熱除煩瀉膀胱之火止赤痢消赤眼善安胎氣解傷寒鬱蒸潤燥益肺氣但可為臣使而不可為君藥近人最喜用之然亦必肺與大腸膀胱之有火者用之始宜否則不可頻用也古人云黃芩乃安胎之聖藥亦因胎中有火故用之於白朮歸身人參熟地杜仲之中自然胎安倘無火而寒虛胎動正恐得黃芩而反助其寒雖有參歸等藥補氣補血補陰未必胎氣之能固也況不用參歸等藥欲望其安胎萬無是理矣或問黃芩清肺之品也肺經之熱必須用之然亦有肺熱用黃芩而轉甚者何也曰用黃芩以清肺熱此正治之法也正治者治肺經之實邪也肺經有實邪黃芩用之可以解熱肺經有虛邪黃芩用之反足以增寒蓋實邪宜正治而虛邪宜從治也或問黃芩舉世用而無疑與用知母黃柏頗相同乃先生止咎用知母黃柏之誤而不咎用黃芩何也曰黃芩亦非可久用之藥然其性寒而不大甚但入於肺而不入於腎世人上熱多而下熱者實少清上熱正所以救下寒也雖多用久用亦有損於胃然腎經未傷本實不撥一用溫補便易還原其弊尚不至於殺人若知母黃柏瀉腎中之火矣腎火消亡脾胃必無生氣下愈寒而上愈熱本欲救陰虛火動誰知反愈增其火哉下火無根上火必滅欲不成陰寒世界得乎此用黃柏知母之必宜闢也或問黃芩乃清肺之藥肺氣熱則腎水不能生用黃芩以清肺金正所以生腎水乎曰黃芩但能清肺中之金安能生腎中之水夫肺雖為腎經之母肺處於上游居高潤下理之常也何以清金而不能生水蓋肺中之火乃邪火而非真火也黃芩止清肺之邪火耳邪火散而真水自生安在不可下生腎水不知腎水之生必得真火之養黃芩能瀉邪火而不能生真火此所以不能生腎水也豫之取黃芩者取其暫用以全金非取其久用以益水或疑黃芩之寒涼不及黃柏知母以黃芩味輕而性又善散吾子攻黃柏知母宜也並及黃芩毋乃過乎曰黃芩之多用禍不及黃柏知母遠甚余未嘗有過責之辭獨是攻擊知母黃柏在於黃芩門下而暢論之似乎並及黃芩矣誰知借黃芩以論黃柏知母意重在黃柏知母也見黃芩之不宜多用益知黃柏知母之不可重用矣世重寒涼病深肺腑不如此又何以救援哉黃連黃連味苦寒可升可降陰也無毒入心與胞絡最瀉火亦能入肝大約同引經之藥俱能入之而入心尤專經也止吐利吞酸善解口渴治火眼甚神能安心止夢遺定狂躁除痞滿去婦人陰戶作腫治小兒食土作疳解暑熱濕熱鬱熱實有專功但亦臣使之藥而不可以為君宜少用而不宜多用可治實熱而不可治虛熱也蓋虛火宜補則實火宜瀉以黃連瀉火者正治也以肉桂治火者從治也故黃連肉桂寒熱實相反似乎不可並用而實有並用而成功者蓋黃連入心肉桂入腎也凡人日夜之間必心腎兩交而後水火始得既濟火水兩分而心腎不交矣心不交於腎則日不能寐腎不交於心則夜不能寐矣黃連與肉桂同用則心腎交於頃刻又何夢之不安乎或問苦先入心火必就燥黃連味苦而性燥正與心相同似乎入心之相宜矣何以久服黃連反從火化不解心熱而反增其焰者何也曰此正見用黃連之宜少而不宜多也蓋心雖屬火必得腎水以相濟用黃連而不能解火熱者原不可再瀉火也火旺則水益衰水衰則火益烈不下治而上治則愈增其焰矣譬如釜內無水止成焦釜以水投之則熱勢上衝而沸騰矣治法當去其釜下之薪則釜自寒矣故正治心火而反熱者必從治心火之為安而從治心火者又不若大補腎水之為得蓋火得火而益炎火得水而自息耳或問黃連止痢而厚腸胃吾子略而不談何也曰此從前本草各書無不載之無俟再言也然而豫之不談者又自有在蓋黃連非治痢之物瀉火之品也痢疾濕熱用黃連性燥而涼以解濕而除熱似矣殊不如黃連獨用以治痢而痢益甚用之於人參之中治噤口之痢最神用之於白芍當歸之中治紅赤之痢最效可借之以瀉火而非用之以止痢豫所以但言其瀉火耳況上文曾言止吐利吞酸利即痢也又未嘗不合言之矣至於厚腸胃之說說者謂瀉利日久下多亡陰刮去脂膜腸胃必薄矣黃連既止瀉利則腸胃之薄者可以重厚嗟乎此臆度之語而非洞垣之說也夫黃連性燥而寒涼可以暫用而不可久用腸胃之脂膜既傷安得一時遽厚哉夫胃薄者由於氣血之衰而腸薄者由於精水之耗黃連但能瀉火而不能生氣血精水吾不知所謂厚者何以厚也或問黃連瀉火何以謂之益心可見寒涼未必皆是瀉藥曰夫君之論是欲揚黃柏知母也吾聞正寒益心未聞正寒益腎夫心中之火君火也腎中之火相火也正寒益心中之君火非益心中之相火雖心中君火每藉心外相火以用事然而心之君火則喜寒心之相火則喜熱以黃連治心之君火則熱變為寒以黃連治心之相火則寒變為熱蓋君火宜正治而相火宜從治也夫相火在心火之中尚不用寒以治熱況相火在腎水之內又烏可用寒以治寒乎昔丹溪用黃柏知母入於六味丸中未必不鑑正寒益心亦可用正寒以益腎也誰知火不可以水滅腎不可與心並論哉或疑世人用黃連不比用黃柏知母先生闢黃柏知母何必於論黃連之後而大張其文瀾哉嗟乎是有說焉不可不辨也夫人生於火不聞生於寒也以瀉火為生必變生為死矣從來脾胃喜溫而不喜寒用寒涼降火雖降腎火也然胃為腎之關門腎寒則胃寒胃寒則脾亦寒脾胃既寒又何以蒸腐水穀哉下不能消則上必至於不能受上下交困不死何待乎又肺金之氣必夜歸於腎之中腎火沸騰則肺氣不能歸矣然補其腎水而益其肺金則腎足而肺氣可復歸於腎倘腎寒則腎火不歸勢必上騰於肺而又因腎之寒不敢歸於下則肺且變熱而咳嗽之症生肺熱而腎寒不死又何待乎慨自虛火實火正火邪火君火相火之不明所以治火之錯也夫黃連瀉實火也補正火也安君火也不先將黃連之義罄加闡揚則虛火邪火相火之道終不明於天下吾所以於黃連門中痛攻黃柏知母使天下後世知治火之藥不可亂用寒涼實救其源也桔梗桔梗味苦氣微溫陽中陰也有小毒入手足肺膽二經潤胸膈除上氣壅閉清頭目散表寒邪祛脅下刺痛通鼻中窒塞治咽喉腫痛消肺熱有神消肺癰殊效能消恚怒真舟楫之需引諸藥上升解小兒驚癇提男子血氣為藥中必用之品而不可多用者也蓋少用則攻補之藥恃之上行以去病多用則攻補之藥借之上行而生殃惟咽喉疼痛與甘草多用可以立時解氛余則戒多用也或問桔梗乃舟楫之需毋論攻補之藥俱宜載之而上行矣然亦有不能載之者何故曰桔梗之性上行安有不能載之者乎其不能載者必用藥之誤也夫桔梗上行之藥用下行之藥於攻補之中則桔梗欲上而不能上勢必下行之藥欲下而不能下矣余猶記在襄武先輩徐叔岩聞餘論醫陰虛者宜用六味地黃湯陽虛者宜用補中益氣湯徐君曰余正陰陽兩虛也余勸其夜服地黃湯日服補中益氣湯服旬日而精神健旺矣別二年復聚驚其精神不復似昔問曾服前二湯否徐君曰子以二湯治豫病得愈後因客中無僕不能朝夕煎飲消息子之二方而合為丸服後氣閉於胸膈之間醫者俱言二方之不可長服豫久謝絶今幸再晤幸為我治之豫仍以前二方令其朝夕分服精神如舊徐君曰何藥經吾子之手而病即去也非夫醫而何余曰非余之能君自誤耳徐問故余曰六味地黃湯補陰精之藥下降者也補中益氣湯補陽氣之藥上升者也二湯分早晚服之使兩不相妨而兩有益也今君合而為一則陽欲升陰又欲降彼此勢均力敵兩相持而兩無升降所以飽悶於中焦不上不下也徐君謝曰醫道之淵微也如此夫桔梗與升麻柴胡同是升舉之味而升麻柴胡用之於六味湯丸之內其不能升舉如此然則桔梗之不能載藥上行又何獨不然哉正可比類而共觀也或問桔梗散邪而不耗正氣何以戒多用也曰桔梗亦有多用而成功少陰風邪致喉痛如破者多用之而邪散如響是邪在上者宜多用而邪在下者即不宜多用或問古今録驗方中載桔梗治中蠱毒下血如雞肝片者血塊石余服方寸匕七日三服而愈其信然乎曰此失其治蠱之神方止記其引導之味也中蠱必須消毒下血必須生血一定之理也桔梗既非消毒之品又非生血之藥烏能治蠱而止血乎蓋當時必有神奇之丸以酒調化同桔梗湯送之奏功而誤傳為桔梗古今録遂志之也或問桔梗不可多用而吾子又謂可以多用何言之相背也曰邪在上者宜多邪在下者宜少余已先辨之未嘗相背也雖然用藥貴得其宜要在臨症斟酌有邪在上多用桔梗而轉甚有邪在下少用桔梗而更危蓋邪有虛實之不同而桔梗非多寡之可定故實邪可用桔梗而虛邪斷不可用桔梗也批寒邪者實邪也熱邪者虛邪也又不可不知栝蔞實附天花粉栝蔞實味苦氣寒降也陰也無毒入肺胃二經最能下氣滌穢尤消郁開胃能治傷寒結胸祛痰又解渴生津下乳但切戒輕用必積穢滯氣結在胸上而不肯下者始可用之以蕩滌否則萬萬不可孟浪蓋栝蔞實最消人之真氣傷寒結胸乃不得已用之也苟無結胸之症何可輕用至於消痰解渴下乳只可少少用之亦戒不可重任他本言其能治虛怯勞嗽此殺人語斷不可信總惑於補肺之說也夫栝蔞乃攻堅之藥非補虛之品天花粉即栝蔞之根而性各不同蓋栝蔞實其性最悍非比天花粉之緩用栝蔞實不若以天花粉代之天花粉亦消痰降氣潤渴生津清熱除煩排膿去毒逐瘀定狂利小便而通月水其功用多於栝蔞實虛人有痰者亦可少用以解燥而滋枯又何必輕用栝蔞實哉或問栝蔞實能陷胸中之邪為傷寒要藥而吾子切切戒之何不刪去栝蔞獨存天花粉之為當哉曰醫道必王霸並用而後出奇制勝始能救生死於頃刻結胸之症正死在須臾也用天花粉以消痞滿其功遲用栝蔞以消痞滿其功捷但結胸之痞滿不同小痞小滿之症不妨用天花粉以消之大痞大滿之症非栝蔞斷然不可又在人臨症細辨非栝蔞之竟可不用也批真通權達變之言或疑栝蔞推胸中之食蕩胃中之邪其勢甚猛傷寒至結胸其正氣已大喪矣又用此以推蕩之不虛其虛乎先生又謂不可用天花粉相代豈傷寒之虛可以肆然不顧乎曰傷寒不顧其虛則邪且鑠盡人之元氣頃刻即死矣烏可肆然不顧乎用栝蔞以陷胸正所以顧其虛也夫陷胸之成由於邪退之時而亟用飲食則邪仍聚而不肯散夫邪之所以散者由於胃中空虛邪無所得故有不攻而散之意邪甫離胃而胃氣自開以致飢而索食此時而能堅忍半日則邪散盡矣無如邪將散而人即索食食甫下喉而邪復群聚而逐矣仲景張夫子所以又立陷胸湯用栝蔞為君突圍而出所向無前群邪驚畏盡皆退舍於是漸次調補而胸胃之氣安焉是推蕩其邪氣非即急救其正氣之明驗乎倘畏首畏尾不敢輕用栝蔞雖久則食消亦可化有事為無事然所傷正氣多矣此栝蔞之宜急用而不可失之觀望耳或問栝蔞陷胸以救胃中之正氣是矣然吾恐栝蔞祛邪以入脾走而不守則脾當其害不猶以鄰國為壑乎曰栝蔞但能陷胸而不能陷腹胸中之食可推之以入於腹脾中之食不必蕩之以入於腸蓋脾主出而易化胃主納而難消也或問栝蔞陷胸中之邪抑陷胸中之食耶曰結胸之症未有不因食而結者也陷胸湯乃陷食而非陷邪也雖然邪因食而復聚雖邪不入於胃之中而邪實布於胃之口陷胸中之食而邪解散即謂之陷邪亦可也然而食可陷而邪不可陷食陷必入於脾邪陷必入於腎入脾者栝蔞可乘勝而長驅入腎者栝蔞不能入腎勢必變生不測今用陷胸而食消邪散是陷胸湯實陷食而非陷邪也但止陷食而不陷邪而邪何以竟散耶是結胸之症因得食而結則陷胸之湯其邪亦因陷食而散也或疑陷胸湯用栝蔞不止陷胸中之邪亦陷腹中之邪也邪在腹中安知不祛之入腎乎曰陷胸湯勢最捷邪逢栝蔞即散安在又入於腎乎況邪已在腹與在胸者有別在胸者居高臨下恐有走失入腎之虞在腹者邪趨大腸其勢甚便豈返走於腎經哉或問栝蔞與天花粉同為一本何以天花粉反不似栝蔞之迅掃胸中之邪耶曰天花粉消痞滿其功緩栝蔞實消痞滿其功捷余前條已言但未言其所以緩與捷也夫栝蔞為天花粉之子而天花粉為栝蔞之根子懸於天下而性實顧根故趨於下者甚急根藏於地中而性實戀子故育於上者自緩緩捷之故分於此而陷消之功亦別於此故宜緩者用天花粉宜急者用栝蔞實又何慮功效之不奏哉紫菀紫菀味苦辛溫無毒入手太陰兼入足陽明主咳逆上氣胸中寒熱結氣去蠱毒療咳唾膿血止喘悸五勞體虛治久嗽然亦只可為佐使而不可單用以取效或問繆仲醇云觀紫菀能開喉痹取惡涎則辛散之功烈矣然而又云其性溫肺病咳逆喘嗽皆陰虛肺熱症也不宜多用等語似乎紫菀並不可以治嗽也曰紫菀舍治嗽之外原無多奇功治纏喉風喉閉者正取其治肺經咳逆陰虛肺熱也而仲醇以此相戒何哉夫喉閉未有非下寒上熱之症也紫菀性溫而又兼辛散從其火熱之性而解之乃從治之法治之最巧者也仲醇最講陰虛火動之旨何獨於紫菀而昧之此鐸所不解也或謂紫菀治肺之熱而性溫而辛散從火熱之性而解之是矣然而肺經最惡熱以熱攻熱必傷肺矣吾恐邪去而肺傷也曰久嗽則肺必寒以溫治寒則肺且受益何傷之有貝母貝母味苦氣平微寒無毒入肺胃脾心四經消熱痰最利止久嗽宜用心中逆氣多愁郁者可解並治傷寒結胸之症療人面瘡能效難産與胞衣不下調服於人參湯中最神黃疸赤眼消渴除煩喉痹疝瘕皆可佐使但少用足以成功多用或以取敗宜於陰虛火盛不宜於陽旺濕痰世人不知貝母與半夏性各不同懼半夏之毒每改用貝母不知貝母消熱痰而不能消寒痰半夏消寒痰而不能消熱痰也故貝母逢寒痰則愈增其寒半夏逢熱痰則大添其熱二品涇渭各殊烏可代用前人辨貝母入肺而不入胃半夏入脾胃而不入肺經尚不知貝母之深也蓋貝母入肺胃脾心四經豈有不入脾胃之理哉正寒熱之不相宜故不可代用也批辨得入微盡妙或問貝母之療人面瘡可信不可信乎曰此前人之成效胡必疑之然而有可疑者人面瘡口能食而面能愁蓋有祟憑之矣祟憑必須解祟何以用貝母即解豫久不得其故後遇岐天師於燕市另傳治法而後悟貝母之療人面瘡也亦消其痰而已矣夫怪病多起於痰貝母消痰故能愈也如半夏亦消痰聖藥何治人面瘡無效不知人面瘡乃熱痰結成熱毒半夏性燥燥以治熱更添熱矣貝母乃治熱痰聖藥以寒治熱而熱毒自消又何疑哉或問貝母消痰消熱痰也然火沸為痰非熱乎何以用之而絶無效耶曰火沸生痰乃腎中之火上沸非肺中之火上升貝母只可治肺中之火痰不化腎中之火痰也豈惟不能化腎中之火痰且動火而生痰矣夫腎中之火非補水不能除腎火之痰亦非補水不能消貝母消肺中之痰必鑠肺中之氣肺虛則腎水之化源竭矣何以生腎水哉腎水不生則腎火不降腎火不降又何以健脾而消痰哉勢必所用水穀不化精而化痰矣然則用貝母以治火沸為痰不猶添薪而望止沸乎毋怪沓無功效也或疑貝母不可治火沸為痰之症吾用之六味丸中亦可以治之乎曰六味湯止治火沸為痰之聖藥也加入貝母則不效矣蓋火沸為痰乃腎中之真水上沸而成痰非肺中之津液上存而為痰也六味湯補水以止沸非化痰以止火倘加入貝母則六味欲趨於腎中而貝母又欲留於肺內兩相牽掣則藥必停於不上不下之間痰既不消火又大熾不更益其沸而轉添其咳嗽哉此貝母斷不可入於六味湯丸之中治火沸為痰之病也款冬花款冬花辛甘而溫陽也無毒善止肺咳消痰唾稠黏潤肺瀉火邪下氣定喘安心驚膽怯去邪熱除煩燥平肝明目燒煙吸之亦善止嗽尤能止肺咳肝嗽近人喜用紫菀而不用款冬者殊不可解紫菀雖亦止久嗽而味苦傷胃不若款冬之味甘清中有補也余所以取款冬而棄紫菀耳或問款冬花清中有補多用之以益肺益肝益心可乎曰款冬花雖清中有補而多用亦復不宜蓋補少而清多也夫款冬花入心則安心入肝則明目入肺則止咳是其補也然入心則又瀉心之火多用則心火過衰反不生胃以健食矣入肝則又瀉肝之氣多用則心火過凋反不能生心以定神矣入肺則又瀉肺之氣多用則腎氣過寒反不能生脾以化物矣是款冬花多用則傷少用則益又何必多用哉
