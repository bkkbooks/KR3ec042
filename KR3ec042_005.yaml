body:
  text: 卷之五羽集橘皮陳皮青皮橘皮味辛苦氣溫沉也陰中之陽無毒陳皮治高青皮治低亦以功力大小不同也入少陽三焦膽腑又入厥陰肝臟太陰脾臟青皮消堅闢消瘟瘧滯氣尤脅下鬱怒痛甚者須投卻疝疏肝消食寬胃橘紅名陳皮氣味相同而功用少緩和中消痰寬脅利膈用之補則佐補以健脾用之攻則尚攻以損肺宜於補藥同行忌於攻劑共用倘欲一味出奇未有不倒戈而自敗者也或問陳皮留白為補去白為攻然乎此齊東之語也陳皮與青皮同為消痰利氣之藥但青皮味厚於陳皮不可謂陳皮是補而青皮是瀉也或問陳皮即橘紅也子何以取陳皮而不取橘紅夫陳皮之妙全在用白用白則寬中消若去白而用紅與青皮何異哉此世所以留白為補去白為攻之誤也其實留白非補和解則有之耳或問世人竟尚法制陳皮不知吾子亦有奇方否曰陳皮製之得法實可消痰兼生津液更能順氣以化飲食市上貿易者非佳惟姑蘇尤勝然又過於多制惟取生津而不能順氣余有方更妙用陳皮一斤切不可去白清水淨洗去其陳穢即取起用生薑一兩煎湯一碗拌陳皮曬乾又用白芥子一兩煮湯一碗拌陳皮曬乾飯鍋蒸熟又曬乾又用甘草薄荷一兩三錢煎湯拌陳皮又曬乾又蒸熟曬乾又用五味子三錢百合一兩煎湯二碗拌勻又蒸曬又用青鹽五錢白礬二錢滾水半碗拌勻又蒸熟曬乾又用人參三錢煎湯二碗拌勻蒸熟曬乾又用麥門冬橄欖各一兩煎湯照前曬乾收藏於磁器內此方含在口中津液自生飲食自化氣自平而痰自消咳嗽頓除矣修合時切忌行經婦人矣或問陳皮用之於補中益氣湯中前人雖有發明然非定論不識先生之可發其奇否夫補中益氣湯中用陳皮也實有妙義非取其能寬中也氣陷至陰得升麻柴胡以提之矣然提出於至陰之上而參耆歸術未免盡助其陽而反不能遽受得陳皮以分消於其間則補不絶補而氣轉得益東垣以益氣名湯者謂陳皮而非謂參耆歸術也桃核仁桃仁味苦甘氣平苦重於甘陰中陽也無毒入手足厥陰經主瘀血血閉血結血燥癥瘕邪氣殺小蟲除卒暴通潤大便活血通經止痛苦以破滯血甘以生新血花味苦三月三日採陰乾者佳然亦不必拘泥總以布單盛之自落者俱可用花摘者轉無功效也殺鬼疰令人好顏色除水腫石淋利大小便下三蟲漬酒服之能除百病也桃仁即能花所結之子而攻補實殊其故何也蓋桃花仙種也仙者陽之極鬼乃陰象陽能闢陰故能卻鬼桃花得仙人之氣而生隨風飄墮其氣發揚故利益之功多桃仁則不然花辨已謝其氣已盡樹中津液全注精於桃肉所存之仁無非陰氣耶少有微陽僅可自守以傳種又何能變攻為補乎故一木而彼此不同從來本草不言而余獨發異議者實之本岐天師之教我也桃花瓣自落者佳然制之不得法亦徒然也布單盛貯須於日下曬乾然而一日不能幹也必須夜間用扇煽干為佳蓋花瓣得風則香得火則死故不可火焙若夜間天自有風不必扇煽第二日再曬無不幹者干則用砂瓶盛貯俟泡酒時入之佳絶也或問桃仁用之於承氣湯中瀉腸中之血乎抑瀉脾中之邪也顧桃仁瀉血何待問哉但謂瀉血而不瀉邪則是又不可夫血之所以瘀者邪瘀之也血之所結者邪結之也瀉血即所以瀉邪瀉邪即所以瀉血原不可分視之也況用之於承氣湯中純是散邪之藥謂其散血而不散邪得乎獨是桃仁長於散血而短於散邪用之於承氣湯中畢竟散瘀結之血是其專功也或疑桃仁散血而不散邪何以邪結之症用之奏功如響不知瘀血之症邪結之也桃仁攻堅而散血則邪無巢穴何以能聚故血散而邪亦散其實桃仁散血而不能散邪也杏仁杏仁味甘苦氣溫可升可降陰中陽也有小毒專入太陰肺經乃利下之劑除胸中氣逆喘促止咳嗽墜痰潤大腸氣閉便難逐痹散結研納女人陰戶又治發癢蟲疽雖與桃仁同是利氣下血之藥其中亦有分別東垣分杏仁治氣桃仁治血似乎明晰而不知杏仁未嘗不治血桃仁未嘗不治氣也如大便閉結氣閉者桃仁亦能開血閉者杏仁亦能下惟真陽真陰虛者二物俱不能通所謂其陽與陰者乃腎中之真火真水非氣血之謂也真火衰則大腸冰凍非桂附不能溫真水竭則大腸枯稿非熟地山茱不能生桃杏之仁又何能潤澤而下降況加陳皮以耗散其氣血乎或問杏仁利氣而不下血而子以為未嘗不可血古人亦曾見之乎嗟乎杏仁下血仲景夫子用杏仁湯非乎蓋消血於利氣之中實有神功耳木瓜木瓜味酸氣溫無毒入手太陰足厥陰之經氣脫能固氣滯能和平胃以滋脾益肺而去濕助穀氣調榮衛除霍亂止轉筋祛腳氣禁水利但可臣可佐使而不可以為君乃入肝益筋之品養血衛脈之味最宜與參術同施歸熟並用生者可以辟邪也或疑木瓜可以為君治霍亂轉筋實神不知木瓜非君藥霍亂非香薷不能轉其逆木瓜不過助香薷而回筋不能助香薷而返氣且香薷無參術則返逆之氣亦不能驟順也誰謂木瓜是君藥哉或問木瓜利氣故能轉逆然有用木瓜而不能定逆者豈木瓜不能利氣乎曰木瓜未嘗不利氣也因用之未當耳木瓜無君主之藥愈利氣而愈無成功蓋木瓜宜於補中利氣而不宜散中利氣也烏梅烏梅味酸氣平可升可降陽也無毒收斂肝氣固澀大腸止血痢安蟲痛乃止脫之藥備之以斂滑脫可也按烏梅止痢斷瘧每有速功然效速者取快於一時往往有變生久病而不能愈不可不慎也世有夏日將烏梅作湯以止渴者腹中無暑邪者可以斂肺而止渴倘有暑邪未散而結閉於腸胃之中及至秋冬不變為痢必為瘧矣烏梅治蛔厥蛔上入膈故煩而嘔用之即定矣大棗大棗味甘氣溫無毒陽也降也入五臟通九竅和百藥養肺胃益氣潤心肺生津助諸經補五臟惟中滿及熱疾忌食齒疼並風疾禁嘗乃調和之品非補益之味本經曰其補者亦因其調和之故也按大棗仙人遺種故其味獨異於凡棗善能調和五臟之氣也雖非補益要亦無損吾浙諸暨往往棗實有大如雞蛋者真仙種也得其解者食之實能益暮惜不可多得耳龍眼肉龍眼肉味甘氣平無毒入脾心二經解毒去蟲安志定神養肌肉美顏色除健忘卻怔忡多服強魂聰明久服輕身不老此物果中之尤益人者入藥不過脾心二臟若泡酒服大有補滋之益同補氣補血之酒泡酒為佳也或問龍眼肉煎湯服之宜食其肉恐有滑腸之損不知龍眼非滑腸也但戒多食未免大腸欠實耳或問龍眼肉何以用之於歸脾湯內豈以其補脾也夫歸脾湯何物非健脾之藥而必藉龍眼肉哉龍眼肉實能調和諸藥使之分送於心肝脾胃之中不但專入心肝也棐子棐子味甘少澀氣溫入胃脾大腸之經又入肺主五痔殺三蟲堅筋骨調榮衛藥籠中斷不可缺之品殺蛔蟲而又不損氣血用之實能奏功惟有火病腸滑者不宜然暫服一二次亦復何害按棐子殺蟲尤勝但從未有用入湯藥者切片用之至妙此物吳越最多余用入湯劑蟲痛者立時安定親試屢驗故敢告人共用也或疑棐子過於殺蟲未有殺蟲之品而不耗氣血者吾謂凡殺蟲之物多傷氣血惟棐子不然以棐子殺蟲於無形也無形之味殺寓於生之中蟲不知其殺而貪食喪生自死耳臟腑正無傷也臟腑既無所傷氣血又何傷之有枇杷葉枇杷葉味苦氣平無毒入肺經止咳嗽下氣除嘔噦不已亦解口渴用時去毛但只用之以止陰虛之咳嗽他嗽不可用也枇杷葉凌冬不凋自是益陰妙藥但制之不得法反動其嗽蓋葉上尤毛多必須以水洗去不可少帶一毫始妙否則毛入喉中無益轉有害矣郁李仁郁李仁味酸苦氣平降也陰中陽也無毒入肝膽二經去頭風之痛又入脾止鼻淵之涕消浮腫利小便通關格破血潤燥又其餘枝雖非當施之品實為解急之需也關格之症最難開關郁李仁善入肝以調逆氣故能通達上下不可不備也蓮子藕花心蓮子味甘澀氣平寒無毒入心脾肝腎四臟養神定志能交君相二火善止泄精清心氣去腰疼禁痢疾花心益腎澀精固髓藕甘寒主血多驗治瘀血逐散不凝止吐衄溢妄行破産後血積煩悶解酒卻熱治金瘡生肌按蓮子花藕俱能益人而蓮子之功尤勝世人謂蓮子不宜食心恐成卒暴霍亂不知蓮子去心用之全無功效其妙全在於心不特只産後消渴也蓮子之心清心火又清腎火二火炎則心腎不交二火清則心腎自合去蓮心而止用蓮肉徒能養脾胃而不益心腎矣蓮子心單用入之於參苓耆術之中治夢遺尤神取其能交心腎也故用蓮子斷不可去心一去心則神不能養而志不能定精泄不能止而腰痛不能除矣或問蓮子清心湯前人用之未聞用心也曰蓮子而不用心此清心湯之所以不效也前人制方未必不單用蓮心歲久失傳人不知用致清心湯神效竟為無用之方此鐸所以三嘆也原世人用清心湯者用蓮子心一錢以清心未有不效應如響者矣石蓮子樹上者不可入藥也芡實芡實味甘氣平無毒入脾腎二經主濕痹止腰膝疼痛益精令耳目聰明強志補中除暴疾久食延齡益壽視之若平常用之大有利益可君可臣而又可佐使者也其功全在補腎去濕夫補腎之藥大都潤澤者居多潤澤則未免少濕矣芡實補中去濕性又不燥故能去邪水而補神水與諸補陰之藥同用尤能助之以添精不慮多投以增濕也或問芡實平平無奇而子偏譽之為益精補中之藥何也曰芡實不特益精且能澀精補腎至妙藥也子不信其功效乎夫芡實與山藥並用各為末日日米飲調服雖遺精至衰憊者不旬日而精止神旺矣至平之藥而實有至奇之功非世人所能測也或問芡實性實平淡吾子譽其功用不識益腎補精之外更有何病可大用乎曰芡實無症不可大用而尤可大用者開胃氣耳胃氣大開何病不藉之以得利平而實奇淡而無厭殆芡實之謂乎或問芡實平淡無奇而益人如若何不日食之作飯乎曰芡實雖不可作飯然日用之固宜我有一方在家作客兩食之而咸宜方用芡實二斤山藥二斤白糯米四斤白糖一斤花椒二兩去核各為末每日白滾水沖調服一兩最能開胃生精並無夢遺之病可服至百歲也或疑芡實但能止精而不能益精雖精止即是益精而終不可謂精得芡實而生也曰芡實豈但止精哉夫遺精之病必能補而後能止使芡實不能益精又何能止精況芡實不但止精而亦能生精也去脾胃中之濕痰即生腎中之真水芡實益精又何疑乎甘蔗砂糖甘蔗味甘氣平無毒入脾肺大小腸絞汁入藥養脾和中解酒毒止渴利大小腸益氣驅天行熱定狂砂糖殺疳蟲潤肺除寒熱涼心多食傷齒二味糖不可入諸藥中唯蔗可用者取其生氣以止熱自易生津耳蔗漿止渴亦權宜之法多飲又不相宜恐過多生痰耳甘蔗世人皆以為性熱不敢多食不知甘蔗甘平而兼微寒能瀉火熱潤燥之妙品也覆盆子覆盆子味甘氣平微熱無毒入五臟命門拯疴益氣溫中補虛續絶安和五臟悅澤肌膚療中風發熱成驚治腎傷精竭流滑明目黑鬚耐老輕身男子久服輕身女人多服結孕益人不淺而醫家只入於丸散之中而不用於湯劑之內誰知覆盆子用之湯劑更效應如響其功不亞於肉桂且肉桂過熱而覆盆子微熱既無陽旺之虞且有陰衰之益雖不可全倚之為君而實可大用之為臣不可視為佐使之具也或疑覆盆子一味為末酒送亦能興陽非君藥乎曰單味服之終覺效輕只可與陽微衰者為助陽之湯而不可與陽大衰者為起陽之劑蓋覆盆子必佐參耆而效乃大必增以桂附而效乃弘實可臣而不可君之品也或疑覆盆子亦可為君而子必以為臣然吾見古人有配二三味而成功者亦獨何歟曰覆盆子遇補氣之藥不可與人參爭雄遇補血之藥不可與當歸爭長遇補精之藥不可與熟地爭驅遇補脾之藥不可與白朮爭勝殆北面之賢臣非南面之英主也故輔佐贊襄必能奏最以垂勳而不能獨立建績矣或疑覆盆子興陽實有功而吾子必貶之為臣使之藥意謂必與人參同用為佳然天下之人安得盡用人參也曰覆盆子何必盡用人參歸熟耆術何者不可並用乎金櫻子金櫻子味甘微澀氣平溫無毒入腎與膀胱之經澀精滑止夢遺遺尿殺寸白蟲此物世人竟採以澀精誰知精滑非止澀之藥可止也遺精夢遺之症皆尿竅閉而精竅開不兼用利水之藥以開尿竅而僅用澀精之味以固精門故愈澀而愈遺也所以用金櫻子必須兼用芡實山藥蓮子薏仁之類不單止遺精而精滑反澀用澀於利之中用補於遺之內此用藥之祕而實知藥之深也或問金櫻子乃澀精之藥先生謂澀精而精愈遺必加利水之藥同治其論實精但恐利多而精不能澀意者治遺精者多用金櫻子為君少用利藥為佐使乎曰利水過多亦非治遺之妙法必須補多於澀之中澀多於利之內自然精足而不遺尿竅開而精竅閉也批二語定論或問金櫻子凌冬而色愈有神其得於金氣者深矣金能生水似能益精而不止澀精也不知金櫻子非益精之物使金櫻子益精則必澀精而無不效矣唯其止能澀精而不能益精所以愈澀而愈遺也金櫻子內多毛及子必去之淨方能補腎澀精其腹中之子偏能滑精煎膏不去其子全無功效木通木通即葡萄根也味苦澀氣微寒入膀胱逐水氣利小便亦佐使之藥不可不用而又不可多用多用泄人元氣或疑木通利水去滯氣亦有益之品何先生謂是泄人元氣曰木通利水何異於豬苓但嫌其苦寒損胃非若淡瀉之無害也胃氣既傷元氣必耗故用之為佐使則有功無過倘多用之為君則過於祛逐元氣必隨水而走安得不耗哉山楂山楂味甘辛氣平無毒入脾胃二經消宿食除兒枕痛去滯血理瘡瘍行結氣療㿗疝健脾胃祛臌脹煮肉少加須臾即爛故尤化肉食此傷諸肉者必用之藥也佐使實良或問山楂只消肉食並治兒枕作痛者神效未聞他有功績也曰山楂功用實不止此大約消食理滯是其所長祛臌脹療㿗疝是其所短或疑山楂有功有過未可見是傷肉食而概用之也曰山楂之功全在於消肉物使傷肉食者忌用又用何物以化之乎夫山楂之過在於消肉之過傷以消其臟腑之氣也然能用山楂於補氣補血之中不特善於消肉而更且善於利氣是山楂之功過全在用之有方與無方耳或疑山楂之功過甚輕何必危言而戒曰山楂之功用雖輕然用於氣旺陽健之人正不覺其損而用之於氣餒血衰之子實有見其傷也胡桃肉胡桃肉味甘氣溫無毒入腎經潤能生精澀能止精更益腎火兼烏鬚髮愈石淋實溫補命門之藥不必佐之破故紙始愈腰疼尤善安氣逆佐人參熟地山藥麥冬牛膝之類定喘實神世人但知為食物而不知用入於補劑其成功更奇也胡桃補腎盡人知之但多食亦能生蟲世人不識也或謂胡桃殺蟲子反謂生蟲得無誤耶夫胡桃殺蟲乃胡桃之油者也凡蟲得油即死故油胡桃殺蟲若胡桃未油者烏能殺蟲古人取胡桃加硼砂以治痞瘕者非取其殺蟲也乃取其引入於下焦至陰之處耳若與補藥同施則不能生蟲而反得其大益矣橄欖橄欖味酸甘氣溫無毒入肺胃脾三經生津開胃消酒解魚毒化魚鯁亦備急之需藥籠中不可不備者也連肉敲碎核煎湯用之煨灰香油調敷外傷無痕或問夢中有神告曰橄欖能治哮病可信乎不可信乎曰余亦夢內父鄂仍張公告豫曰橄欖治哮病最有效但用新鮮者搗汁飲半甌其哮立定乾者不能取汁煎湯飲之則無益矣余試之神效後一人患哮症無生橄欖取乾者煎湯服果無功亦一奇也因附載之白果白果味甘少澀氣微寒入心經通任督之脈至於唇口有毒多食至千者死治白濁清心性不能烏鬚髮然烏鬚髮必須用之引烏黑之汁至於唇口之間以變白也此從來本經之所未言白果不可多用然小兒又最宜食之蓋小兒過餐水果必傷任督之脈五日內與十枚熟食永無飽傷之苦並不生口疳之病或疑白果有損無益先生謂能補任督之脈此從前注本草者並未言及何説之創乎嗟乎神農嘗百草安能盡嘗則注本草者何能盡注所望於後人之闡發者實多況白果補任督又鐸聞之於純陽呂祖之教以治舍弟選之之子丙郎而親效者乎蓋丙郎多食水果脾胃兩困越中兒科治之不效適呂祖鸞降訓鐸用六君子湯加白果十枚治之不旬日全愈請問用白果之故呂祖曰丙郎乃傷任督脈也非白果不效故用之耳志之以見鐸之立論非無本之學也或謂白果小兒最不宜食有食之口吐清水而死者曰凡物不宜多服安能獨咎於白果白果少用則益於任督多用則損於包絡口吐清水者過清其心也包絡為心之相臣包絡損而心亦損矣然必心氣原虛而又食白果至數百枚者始有此禍非食數十枚便致如此也或疑白果清心多食則過於清心矣安得而不傷乎然而心不畏清也仍是過清包絡耳倘包絡火旺者食數百枚正復相宜唯包絡素虛寒者實宜戒耳白果方中所用極少唯治哮喘方有用白果者取其能滌胃中飲食之積也丹砂水銀輕粉丹砂味甘氣微寒生餌無毒煉服殺人入心經鎮養心神通調血脈殺鬼祟精魅掃疥瘻瘡瘍止渴除煩惱安魂定魄水銀即丹砂火煅而出之者也只可為外科之用輕粉又從水銀而再變者也亦外科所需此三物至毒者水銀其次輕粉又其次則丹砂也蓋水銀輕粉經火百鍊而成丹砂未經火者秉南方至精之氣可藉以安神定魄然亦只可少服以獲益也輕粉功專收斂世人治楊梅風毒用之以圖速效誰知毒未宣揚遽用輕粉以斂毒顧目前片刻之快變成終身難治之瘡鼻落身腐而死可不慎哉或問輕粉之毒多成於楊梅瘡不識有何藥可救近人多以土茯苓救之然未見其收功也曰輕粉之毒非服丹砂則毒不能出蓋輕粉即丹砂之子也子見母即化矣批子見母則出奇方至理但服丹砂則有法用丹砂一斤切不可火煅須覓明亮者研末水飛過用茯苓末二斤生甘草三兩為末共拌勻每日用白滾水調服三錢不須一月輕粉毒盡散而結毒全愈矣或問丹砂古之真人每借之飛丹煉石引納清和配以金鉛按之法象合成金丹而成變化青霞子及太清真君煉法皆載之丹經而録之各本草也先生略而不言何也曰丹法難言非有形之物也古之真人不過託言丹砂黑鉛以喻其金丹之妙也何嘗取丹砂而烹煉之哉夫丹砂最惡者火也得火則有大毒有唐以來上而人主下而縉紳服烹煉丹砂之藥未有不爛腸裂膚而死者又安能長生變化飛騰升舉哉此余所以略而不存也或問繆仲醇注疏本草謂久服水銀神仙不死之説必得鉛華相合乃能收攝真氣凝結為丹即道家所謂太陽流珠常欲去人卒得金華轉而相合之旨也吾子以為然乎否乎曰此繆仲醇不知丹訣而錯認之也金丹大道豈藉後天有形之物而成哉況水銀生用煉用無非有毒大非丹砂可比尤不可服古今來服水銀而死者比比夫水銀入耳則腦爛豈入臟腑偏能有益乎此不必辨而自明者也或問丹砂能消魚龍蛇鱉之毒有之乎曰有之但生用則不能消毒耳蓋魚龍蛇鱉之毒中於人身內外者用丹砂煮熟作湯或火煅為末服之則毒氣盡消丹砂生用則無毒而熟用則有毒以毒攻毒故能奏功獨神耳陽起石陽起石最難得真必得真者依法配合方驗非雲母石之根也明透者佳味甘氣平有毒入命門治腎氣乏絶陰痿不舉破血瘕積凝腹痛去陰囊濕癢驅子宮冷寒此物雖溫補命門而制之不得法反能動燥受害無窮金石之藥所以不及草木之味然亦有時不可不服金石藥者乃陰寒無火之人又加天厭之客也天厭之客為天所厭絶吾人行醫必欲使其陽道修偉不幾受逆天之愆乎不知醫道之大實能參贊天地之窮苟人心悔悟上至格天而竟無法以挽回使其天厭終身後嗣絶滅亦失愛育之至仁也故吾注本草不得不闡發陽起石之奇蓋此物制之得宜實可使天厭者重新再造非草木之藥可比也其法用陽起石一兩先用驢鞭肉汁煮三炷香取起白炭火燒紅即於驢鞭汁淬之七次而陽起石可用矣同驢肉汁入於人參耆朮茯神菟絲龍骨熟地枸杞山茱萸杜仲破故紙之中自然重新長肉改換筋膜內陽既興外陽亦出必非從前細小之勢矣倘舍驢鞭之汁煅煉陽起石雖亦能取效只可興平常之陽不能興天厭之陽也且口乾舌燥亦所不免非瘡瘍生即消渴患矣批遠公存心慈憫且欲參贊化育發明陽起石之奇竟至改造天厭再生子嗣不顧及天譴乎然而天心隨人心為轉移人心善則天亦隨人心而變化但人宜善承之毋負遠公好善之懷也或問陽起石但知其興陽未聞其能改造天厭先生之論自應奇絶但未知曾有驗之否曰天有缺陷煉石可以補天豈人有缺陷煉石獨不可以補人乎其有驗有不驗者因人有善不善也陽起石之能改造天厭又何必過疑哉或問先生傷人死於貪生戒丹砂之不可輕用何於陽起石而表揚其奇似乎有導淫之失矣曰吾尚論本草功過不掩丹砂實有過豫不敢隱陽起石實有功豫亦不敢沒至人之生死人自取之於余何譏焉禹餘糧禹餘糧味甘氣寒無毒入脾胃大腸療血閉瘕症止赤白漏下除寒熱煩滿咳逆邪傷經曰重可去怯禹餘糧之重正鎮固之劑可用之止滑也但只可暫用以固脫不可久服以延年本經言耐老輕身豫不敢信或問禹餘糧傳大禹治水之時棄糧于山中乃成此物故凶荒之時可掘而服食以救飢果有之乎曰此好事者之言也禹餘糧乃山中之土異於凡土則有之豈能療飢以活命夫飢饉之民腸胃未有不虛弱者也用禹餘糧之重物以充飢非充飢也正所以速之死耳呂仙曰遠公注本草憫禹餘糧之不可救荒請命於我我嘉遠公善心之無窮也傳一法以救飢遇凶荒之年朝東方日出時心中注定於太陽不必朝對太陽也用口開吸太陽之氣自覺為我吞入咽下腹中一口口中漱津一口咽送腹中如此七次不必再咽但飲滾水食青草再不死矣此救飢之妙法也特志之石膏石膏味辛甘氣大寒體重而沉降也陰中之陽無毒生用為佳火煅不靈入肺胃三焦能出汗解肌上理頭痛緩脾止渴風邪傷陽寒邪傷陰皆能解肌表而愈胃熱多食胃熱不食唯瀉胃火而痊祛痰火之積止胃脘之痛發狂可安譫語可定乃降火之神劑瀉熱之聖藥也仲景張夫子以白虎名之明示人以不可輕用而非教人之不用也乃世人畏之真如白虎竟至不敢一用又何以逢死症而重生遇危症而重安哉夫石膏降火乃降胃火而非降臟火也石膏瀉熱乃瀉真熱而非瀉假熱也辨其胃火真熱用石膏自必無差而胃火初起之時口必作渴呼水飲之必少快其汗必如雨舌必大峭雖飲水而口必燥眼必紅神必不安如見此等之症確是胃火而非臟火即可用石膏而不必顧忌而真熱者舌必生刺即不生刺舌苔必黃而有裂紋大渴呼飲飲水至十餘碗而不足輕則譫語大則罵詈見水而入棄衣而走登高而呼發狂不知人此真熱也即可用石膏大劑灌之不必疑慮倘或口雖渴而不甚與之水而不飲言語雖胡亂而不罵詈身雖熱而不躁動上身雖畏熱而下身甚寒皆假熱之症即不可輕用石膏矣以此辨火熱萬不至殺人奚必畏之如虎看其死而不救也蓋石膏實救死之藥因看症不清遂至用藥有誤救死之藥反變為傷生之藥矣今既辨之明自必用之確也或問用石膏以治真正胃火單用石膏可矣何以張仲景先生必加入人參麥冬者乎曰胃火之盛者胃土之衰也瀉胃火未有不傷胃土者也傷胃土必傷胃氣矣加人參於石膏湯中非助胃火乃顧胃土也胃土不傷則胃氣不喪似乎可不顧肺氣矣然而胃火升騰必傷肺金用人參以顧胃而不用麥冬以養肺則胃子必救肺金之母以泄胃氣則胃氣仍損雖用人參猶之無用也批顧胃土顧肺金闡義實精故又加麥冬同人參並用以助石膏之瀉火火瀉而肺金有養不耗氣於胃土則胃氣更加有養此所以既用石膏而又加人參既用人參而又加麥冬也或問石膏瀉胃火又加知母以瀉腎火何為耶蓋胃火太盛爍干腎水用石膏以瀉胃火者實所以救腎水也然而胃火既爍腎水腎水若干相火必然助胃火以升騰矣胃火得相火而益烈單瀉胃火而相火不退則胃火有源未易撲滅愈加其焰矣瀉胃火而即瀉相火則胃火失黨其火易散大雨滂沱而龍雷不興其炎熱之威自然速解此所以用石膏以瀉胃中之火者必用知母以瀉腎中之火也批瀉腎火正所以瀉胃火妙論出奇或疑石膏既瀉胃火又用知母以瀉腎火用麥冬以安肺火宜乎火之速退而熱之盡解矣何以用白虎湯往往有更甚者曰嗟乎此又非白虎湯之故乃不善用白虎湯之故也火勢不同有燎原之火有燃燒之火燃燒之火其勢已衰燎原之火其勢正熾以救燃燒者救燎原勢必愈為撲滅而愈增其光焰矣人身之胃火亦不同有輕有重輕者如燃燒之火少用白虎湯即可解其熱重者如燎原之火非多用白虎湯不足以滅其氛倘以治輕者治重安得不添其火勢之焰天乎非變為亡陽即變為發狂矣或疑石膏比為白虎明是殺人之物教人慎用之宜也今又云火重者非多用石膏不可吾恐又啓天下輕用石膏之禍未必非救人而反害人也曰嗟乎論症不可不全論藥不可不備天下有此症候即宜論此治法烏可因石膏之猛避其殺人之威而不彰其生人之益乎石膏實有功過總在看症之分明不在石膏之多寡若看症之誤多用固殺人而少用亦未嘗不殺人若看症之確少用固救人而多用亦未嘗不救人然則人亦辨症可也何必忌用石膏哉或又疑石膏可多用以救人之生先生不宜從前之過慮矣畢竟石膏宜少用而不宜多用也曰石膏原不宜多用石膏大寒戒多用者乃論其常胃火大旺戒少用者乃論其變存不可多用之心庶不至輕投以喪命存不宜少用之心庶不至固執以亡軀知不宜多用而後可多用以出奇庶幾變死為生反危為安也或疑石膏瀉燎原之火自宜多用以瀉火矣然而過多又恐傷胃若何而使胃不傷火又即熄之為快乎曰燎原之火即生於地上胃中之火即起於土中以石膏而救其胃中之火即如用水而救其燎原之火也然而燎原之火以水救之而無傷於地胃中之火以石膏救之必有傷於土蓋土即胃土也胃土非火不能生奈何反用水以滅之乎然而胃火之盛非胃中之真火盛乃胃中之邪火盛也邪火非水不可滅故不得已大用石膏以瀉其一時之火也又胃火之盛乃胃土之衰也胃火既盛而胃土愈衰胃土既衰復用寒涼以瀉火火衰而胃土更衰矣故瀉火之中即宜補土之為急倘徒瀉其火未有不土崩者矣治法宜人參同用於石膏之中大約用石膏十之七者人參用十之三相濟而相施火既易熄而胃土又不傷斷無有亡陽之禍者也批用石膏以瀉火即用人參以救土實妙論妙法也或疑石膏瀉胃火有用至一兩而仍不解几几有發狂之變又將何藥以解之乎曰舍石膏再無別法也夫發狂之病此胃火熱極不可以常法治者也必須用石膏至二三兩加人參亦必二三兩又不可拘於前説用石膏十之七而人參用十之三也批知常知變才見起死回生手段蓋火盛之極者土衰之極也不用人參以補元氣而唯用石膏以救其火炎未有不敗者也此等之病必登高而歌棄衣而走見水而入大罵大叫神欲外越此呼吸存亡之秋不得不以變法治之倘服前藥而少安便有生機否則雖多用石膏人參亦何以救之哉或疑發狂之病往往有少用石膏多用人參而愈者又是何故曰發狂有虛火邪火之不同邪火之發狂必須多用石膏人參以挽回於俄頃虛火之發狂又宜專用人參以定亂於須臾豈特石膏必宜少用且斷斷不可共用也苟虛實邪正之不明而用藥一錯未有不下喉即殺人者而虛實邪正何以辨之要不能捨驗舌之法而另求辨症也正虛而發狂者神亂而舌必潤滑邪實而發狂者神越而舌必紅黃且燥極而開裂紋也以此辨症又何誤乎或疑石膏定狂定胃中之火也何以即能定心中之狂乎不知心中之狂乃起於胃中之火也救胃火正所以救心狂也夫心乃火臟胃火宜非所畏乃胃火熱而心發狂者如本是同舟之人一時劫奪變出非常苟不誅討則心宮何安乎此救狂必瀉火也或疑寒涼之藥多能殺人者無過石膏即黃柏知母亦不同其類屏黃柏知母而不棄石膏何也曰石膏乃救死之藥也胃火熱極非石膏不能降胃火不降必變發狂而死矣用石膏救之死症立變為生彼用石膏而殺人者非胃火而妄用之也夫人身之火最烈者胃火與腎火也胃火宜瀉而腎火宜補不用石膏以瀉胃火而反用石膏以瀉腎火安得而不殺人乎但腎火與胃火補瀉之不同乃宜補而用瀉亦因黃柏知母降腎火之説而誤之也寒涼之藥未嘗不生人彼誤用之而殺人與石膏何過乎或又疑屏黃柏知母之並用是知母不可助寒涼以殺人矣先生偏稱知母助石膏能生人抑又何也曰胃火之盛原宜直降胃火用石膏不宜再用知母然而胃火之所以盛由於腎水之衰水虛而不能制火也胃火既盛勢必爍干腎水水盡而火勢焰天人即立亡矣用石膏以瀉胃火者正所以急救腎水也但徒救腎水而腎火增熱勢必胃火仍旺而不遽熄故又用知母以暫退其腎中之火則胃火無黨庶幾易於撲滅也此石膏必用知母之相助乃一時權宜之計而非永久之圖也或問石膏能瀉胃火胃火既瀉何必又用知母先生偏譽知母助石膏之有功似亦偏説也曰石膏瀉胃火以救腎水不能瀉胃火以瀉腎火也胃為腎之關門胃火息而腎火猶盛是關門路平烽熄而內火焚燒豈是安寧之象故瀉胃火即宜瀉腎火也瀉腎火非知母不可尤妙知母不唯止瀉腎火且能瀉胃火所以同石膏用之則彼此同心顧腎即能顧胃不比黃柏專瀉腎而不瀉胃也或問白虎湯發明真無微不晰而石膏用之於大小青龍湯中尚未議及豈白虎能殺人而青龍否乎曰龍性難馴用之不當其殺人同於白虎夫同一石膏也何以分稱龍虎亦在人用之何如耳用之於熱散之中則名青龍用之於寒散之中則名白虎石膏大涼用於熱之內則能解熱而不畏其涼用於寒之內過於大涼雖能退熱而常生其變似乎白虎之湯猛於青龍也然而邪在胃非白虎不可解熱邪未入胃而將入於胃非青龍不可解熱也惟是石膏得桂枝麻黃勢善升騰用之青龍湯中只可少而不可多有異於白虎湯中石膏可以重加也或問青龍湯有大小之名分在石膏之多寡乎曰石膏不可多用不獨小青龍湯也小青龍之別於大青龍者以方中用芍藥也龍性雖難馴得芍藥之酸收則石膏不能升騰矣蓋芍藥所以制石膏也譬如小龍初長頭角惟恐傷人畏首畏尾故以小名之世人但知石膏之猛誰知加入芍藥則石膏正無足忌乎惟小青龍之用石膏不得其宜亦有禍害但不若大青龍無制之橫耳又問大青龍既然過橫何不加入芍藥乎曰此又不可也邪在榮衛之間將趨入於陽明非大青龍之急用斷不能行雨以散熱若加入芍藥之酸收則風雲不能際會未免收斂有餘而優渥不足此仲景夫子特製大青龍湯雨以沛之毋單尚涼風之習習也硫黃硫黃味酸氣溫大熱有毒至陽之精入腎能化五金奇物壯興陽道益下焦虛冷元氣將絶者甚效禁止寒瀉或脾胃衰微垂命欲死者立效堅筋骨去心腹痃癖卻腳膝冷疼仍除格拒之寒此物純陽專伏純陰之氣化魄生魂破邪歸正其功甚巨故有將軍之號然而其性大熱用之不得其宜亦必禍生不測必須制伏始佳此物用寒水石制之大妙世人未知也硫黃十兩研為末加入寒水石一兩亦研為末和在一處以水化之寒水化而硫黃不化也候其水乾然後取出用之自無他患或疑硫黃大熱寒水大涼取之相制似乎得宜然而用硫黃正取其純陽也以寒水制之陽不變為陰乎不知寒水制硫黃非制其熱制其毒也去毒則硫黃性純但有功而無過可用之而得其宜也赤石脂赤石脂味甘酸辛氣溫無毒入脾與大腸凡有潰瘡收口長肉甚驗能止血歸經養心氣澀精住瀉痢此亦止澀之藥內外科俱不可缺者也赤石脂稟土金之氣而色赤則象離火寒邪之下痢白積者似可澀之若大熱暴注滯下全是濕熱似宜祛暑祛積未可用此以止澀之也或問赤石脂酸澀之味過於收斂似不可輕用曰病有泄瀉太滑者非此不能止有不可不用之時亦不宜慎重而失之也寒水石寒水石味辛甘氣寒無毒入胃經卻胃中大熱五臟伏熱亦可祛解並解巴豆丹石諸毒兼治傷寒勞復散積聚邪熱止煩悶喉痹消渴可除水腫可去此物存之以解熱毒亦藥籠中不可少之味也或問寒水石解胃中之大熱是其功與石膏正復相同何以瀉胃中之熱用石膏而不用寒水石乎曰寒水石雖解胃中大熱然不可與石膏並論寒水石卻胃中大熱但能下行而不能外散若石膏則內外上下無不可以瀉火也批寒水石至陰較石膏而更甚或問寒水石同是解熱之藥而謂不可與石膏並論豈更有他義耶曰寒水石可以瀉有餘之邪熱而不可瀉不足之虛熱此則與石膏同也更有與石膏異者石膏瀉濕熱而寒水石止可瀉燥熱耳故諸濕腫滿屬脾者最宜忌之也或問寒水石近人用之於藥中者絶少似亦可刪之品而先生收之何也曰燥症之不明於天下也久矣而潤燥之藥又無多幾味余獨存寒水石者所以救燥熱之病也石鐘乳石鐘乳味甘氣溫無毒主咳逆上氣療腳弱冷疼安五臟百節皆通下乳汁九竅並利解舌痹渴補下焦止遺精益氣強陰通聲明目久服育子亦須制伏方可入藥雷公之制自佳非研萬遍斷不可輕用鐘乳石專能化精凡人精少者最宜用之然亦必須用之於補藥中始能奏效否則亦徒然也或問鐘乳石得火有大毒先生謂入藥必須制伏經火煅耶不經火煅耶曰鐘乳石斷不可經火研極細末另用牡丹皮煮汁泡三日去汁用之最佳無毒而獲大益或問鐘乳石以明亮者為佳乎抑雜色者皆可用之乎曰用鐘乳石所以化精也化精自取明亮者始能入腎其治諸病雖雜色亦可用也或問石鐘乳其氣剽疾令陽氣暴充飲食暴進世人未免恃之為淫佚之資誰知精氣暗損石氣獨存孤陽轉肆益精之謂何李時珍戒人久嗜有益於世不淺而吾子不言及何也曰人有強弱之不同火衰之人必須服鍾乳以益精而火盛者不特不可久服而並且不可暫服也時珍備言之矣余何必再宣哉代赭石代赭石味苦而甘氣寒無毒入少陽三焦及厥陰肝臟治女人赤白崩漏帶下暨難産胎衣不下療小兒疳疾瀉痢驚癇並尿血遺溺驚風入腹可愈經曰怯者驚也怯則氣浮重劑以鎮之代赭之重以鎮虛逆也孕婦忌服恐墮胎元此物有旋轉乾坤之力藥籠中以備急用斷難輕置代赭石雖能旋轉逆氣然非旋覆花助之亦不能成功二味必並用為佳或問代赭石體重以定逆何以能轉逆耶曰代赭石非能轉逆也旋覆花實能轉逆耳然則轉逆用旋覆花足矣何以又用代赭石乎不知旋覆花雖能止逆而不能定逆用旋覆花以轉其逆復用代赭石以定之則所轉之氣不至再變為逆也滑石滑石味甘氣大寒性沉重降也陰也無毒入足太陽利九竅津液頻生行六腑積滯不阻逐瘀血而解煩渴分水道以實大腸上氣降火實有奇功此藥功專滑利凡有火積在膀胱者非此不能除故夏月犯暑口渴者必須用之以解似乎滑石乃止渴之聖藥然而滑石非止渴之藥也藉其利膀胱而去濕熱耳夫濕熱積於膀胱則火必上升而作渴利其濕熱則火隨濕解而膀胱之氣化自行膀胱之氣化既行則肺氣清肅不生火而生陰而津液自潤矣此滑石所以利尿而止渴也然而渴症不同有內火而渴有外火而渴犯暑而渴者乃外來之火而濕鬱於膀胱也陰虛而渴乃內起之火而濕流於膀胱也倘亦用滑石以利其濕熱濕不能去而轉添其燥熱矣蓋外火可瀉而內火宜補未可概以滑石而輕利其濕也否則轉利轉虛益犯虛虛之戒不可不慎耳或疑滑石性急甘草性緩相合成散緩急得宜似乎瀉火至神消暑至易矣然而有瀉火而火愈增消暑而暑益熾者何也夫天水六一本一方也然而此方只可瀉火之已燃而不能瀉火之未發能消暑之既盛而不能消暑之將殘蓋滑石有形之物安能瀉火於無形滑石甚重之物安能消暑於不重各有所長即各有所短耳或疑滑石利水何以傷寒熱病亦用之而得解其邪蓋滑石性速最能逐邪從膀胱下泄猶恐過於迅速佐之以甘草之緩使其少遲於逐邪反能祛邪之盡出從小便而下泄水去而火亦去也或又問天水散逐邪最速何以上焦之邪偏去之遲耶曰滑石下行而不上行者也雖佐以甘草之緩止能少留於中焦而不能少留於上焦也上焦既不能留又何能逐邪哉或又問滑石既能利水則膀胱之邪必能迅逐之矣何以有時逐膀胱之邪反成脹滿迫急之病乎曰此下焦之虛熱膀胱無水而強利之也夫膀胱有水則滑石利之可也無水而強利之不猶向無衣者而索衣無食者而索食乎其窘迫之狀為何如哉蓋滑石只可瀉實火之邪水而不可瀉虛火之邪水也朴硝芒硝皮硝玄明粉朴硝味苦辛咸氣寒降也陰也有毒青白者佳黃赤殺人諸石藥毒能化六腑積聚堪祛潤燥糞推陳致新消癰腫排膿散毒卻天行疫痢破留血閉藏傷寒發狂停痰作痞凡有實熱悉可瀉除又善墮胎孕婦忌用芒硝即朴硝之再煎者消痰癖通月經延發漆瘡可敷難産子胞可下洗心肝明目滌腸胃止疼經云熱淫於內治以鹹寒佐以苦寒仲景夫子所以用大黃芒硝相須為使也皮硝乃硝皮而出之者也只可用之以洗目則老眼可復明洗陰囊可以去濕洗痔瘡可以卻疼余無可用玄明粉微祛虛熱亦消老痰以上四味除皮硝乃外治之藥余俱內治之藥也硝性最緊朴硝第一芒硝次之玄明粉又次之俱宜救急而不可救緩以之治實病則宜以之治虛病則失雖玄明粉能退虛熱似可治虛然亦只可暫治虛熱而不可久治虛熱也或疑朴硝不可用用芒硝以佐大黃似乎平善矣而用之不得當往往殺人不識單用大黃而不用硝石亦可乎曰大黃下藥也用大黃似可不用芒硝然而傷寒之邪傳在臟中常有一刻不可再停之勢大黃不得芒硝則其勢不速非好用芒硝也用芒硝以助其迅掃之機邪去而正始存安可徒用大黃而不用硝石哉或問芒硝佐大黃其勢更急使大黃迅逐趨下吾恐邪氣反不盡去也曰邪在上焦用藥宜緩邪在下焦用藥宜急腸中既有硬糞不迅逐趨下則譫語能定乎子疑芒硝佐大黃慮其勢甚急而余猶恐其不急致邪之不去也或問芒硝佐大黃不過助其急也豈別有義乎曰芒硝佐大黃亦能製大黃之猛蓋大黃性速而芒硝之性更緊於大黃大黃轉不敢恃其威而過於逐北反有彼此牽制之益故功成更神也或問芒硝佐大黃而成功豈不能佐大黃而致敗何子但言其功不言其過乎曰嗟乎孟賁烏獲之將驍勇絶倫用之不得其宜有不跋扈者乎唯是宜用而用之耳用之得宜則成功於掃蕩用之不得其宜則致敗於崩摧誰謂芒硝但有功而無過哉花蕊石花蕊石治諸血證神效最化瘀血以酒調服男女俱同只可酒調服一分瘀血即化為黃水誠劫藥之至神化瘀血之至捷也外調亦驗極金瘡口敷上即合産後血暈舐舌即安真有不可思議之妙故特存之以備急用也然用不可過二分多則反有害矣花蕊石最難制非研至無聲斷不可輕用蓋此物愈細愈妙若無瘀血停滯於腹者不可服不由內傷血凝胸膈作痛如一片橫住者以致火炎血溢因而吐血者亦不可輕用之以內治也礬石礬石味酸氣寒無毒去鼻竅之肉除骨髓之熱劫喉痹止目痛禁便瀉塞齒疼洗脫肛而澀腸敷膿瘡而收水吐風痰而通竅平癰腫而護膜外治甚效而內治亦神然可暫而不可常者也或疑礬石味酸宜斂毒而不宜化毒何以癰瘍之症用之毒易化耶不知礬石之化毒正在味酸礬石有形之物也然入之湯藥之中則有形化無形矣存酸之味於散之中即行散於酸之內既消毒而又不散氣此功效之所以更神也或問岐伯有云久服礬石必傷人骨有之乎曰礬性最急而且燥能劫水故不利骨與齒耳蓋齒亦骨之餘也腎水虛者斷不可輕用恐已耗而又耗也磁石磁石味苦咸無毒一云平甘溫澀乃鐵之母也火煅七次醋淬七次研細水飛過始可用專殺鐵毒除大熱煩滿去周痹痠疼綿裹治耳聾藥和點目瞀強骨益腎臟通骨節消癰疽逐驚癇風邪祛頸核喉痛煉水旋飲令人有娠若誤吞針入喉急取系線服下引上牽出其針殊效此物體重乃去怯之劑也藥籠中亦不可缺故存之磁石能治喉痛者以喉乃足少陽少陰二經之虛火上衝也磁石咸以入腎其性鎮墜而下吸則火易歸原矣火歸於下而上痛自失夫腎乃至陰寒水之臟磁石色黑而入水故能益腎而堅骨生精而開竅閉氣而固泄也鉛鉛霜黃丹自然銅鉛味甘無毒稟北方壬癸陰極之精性懦而滑色黑而緇鎮心安神主鬼疰癭瘤止反胃嘔吐蛇蠍傷毒炙尉亦良鉛霜止驚怪嘔逆解酒毒消痰療胸膈煩悶逐中風痰實黃丹膏敷金瘡生長肌肉住痛入藥治癇疾收斂神氣鎮驚除毒熱止反胃吐逆自然銅亦鉛之類未煉礦者也火煅醋淬研細末治跌損接骨續筋療折傷散血止痛熱酒調服立建奇功若非煅成切勿誤服以上四種用之得宜俱可活人用之失宜均能殺人蓋鉛性至寒非大熱實熱之病不可用鉛霜更甚於鉛尤宜慎用黃丹力輕於鉛然外科可以多用而內治亦不宜多用也自然銅乃治折傷之神藥然而老弱之人亦宜少用蓋老人孤陽而少精弱人氣虛而少血跌損之病雖尚接續然必以生地當歸川芎牛膝之類為君臣少加自然銅為佐使則取效既捷而精血又復不傷倘止投自然銅以求速效絶不加入補血補精之味則火煅之物其性大燥以燥助燥必生大熱況又是老弱之人何能勝此乎骨雖接續而變病即生其禍有不可勝狀者矣或問繆仲醇疏黑鉛謂天一生水中含生氣為萬物之先金丹之母八石之祖五金之寶壬金為清癸水為濁清為陽氣濁為陰質陽氣為生陰質有毒範以法象招攝陰陽烹煉得宜是成丹藥餌之仙去等語是黑鉛煉服果可羽化乎嗟乎此繆仲醇誤讀丹經私臆而妄注也夫黑鉛性沉鎮墜陽氣使火入陰分或治陽氣垂絶陰陽將離等症實有奇功欲其換骨出神飛霄沖漢烏可得哉批天元服食實有此理未可盡非也鹽鹽有五色之異惟青鹽尤佳味鹹氣寒無毒堪洗下部慝瘡能吐中焦痰癖蘇心腹卒痛塞齒縫來紅驅蚯蚓毒傷殺鬼蠱邪疰少用接藥入腎過多動咳傷金走血損筋黑膚失色水腫宜忌咳嗽須禁矣青鹽益氣去氣蠱明目卻目疼止吐血堅筋骨尤勝各鹽尤能益人以咸走腎也況鹽能軟堅故又補而兼攻腎有補而無瀉故腎虛者不忌鹽然水腫之人亦腎虛也何以忌鹽乎似乎鹽亦瀉腎也不知水腫之病乃土剋水也土剋水惟宜惡土而何以惡水水陰物也土亦陰物也鹽補腎必補陰故走腎而必兼走脾水腫之病乃陰虛之至也鹽補腎自然直入於腎然而脾亦欲得鹽以相資鹽不得已欲分味以與脾而腎又不肯與脾也於是腎與脾相戰而水症不能愈即愈者必且重發而不可救以脾之益怒而不可解也然則水腫之忌鹽非鹽之瀉腎亦明矣批此段議論前人未言或問內經有云鹽走血血病無多食鹽多食則脈凝泣而色變鹽非咸乎吾子何以未言也曰人生斯世不能捨五味而資生不食鹽安能增益腎水乎況吐血衄血便血之後所虧者正咸之味也使禁之而不食鹹又將何物以助其生血生精乎然則內經之言不足盡信乎亦非也蓋內經言其常而余言其變況內經亦止教人無多食鹹非教人盡忌夫鹽也今世醫人一見血症毋論其虛實初久一概禁人不得食鹽與水腫禁鹽相同往往人益病而血愈多此過忌鹽之失豫所以因問而增入之原人勿固執內經以治血症也虎骨虎睛虎肉虎脂虎骨味辛氣微熱無毒諸骨皆可用而脛骨最良治風痹補膝酸殺邪疰止上焦驚悸虎睛能定魂魄虎肉益力止嘔惡尤靈虎脂塗發即生不必豹脂也按虎骨皆能去風健步不必皆脛骨也然而必用脛骨始佳非因其去風健步也蓋虎乃至陰之精最能補肺金而生氣力虎屬金而肺亦屬金同氣相感補肺實有至理用虎骨於補陰之中原能生精添髓而脛骨尤奇者虎之全力藏於脛尤得金之剛氣也或疑虎骨非健筋骨之藥不若用虎睛之能定魂魄也夫虎骨健骨而不健筋虎睛定魄而不定魂未可混言之也蓋虎之力出於骨以健骨補人之弱骨何疑虎屬金人魄亦屬金以金氣定金氣又何疑耶唯是虎之二物單用則全然不效必須用之於補氣補精之中始能收功非虎骨不能健骨而虎睛不能定魄也尚有虎肚烹製為君治噎如神屢試方備載青皮陳皮白朮香附南星半夏砂仁大腹皮五靈脂厚朴白茯苓蘇子白芥子皂角末神麯川芎枳殼石膏當歸身麥門冬桑白皮桔梗木香以上各一兩沉香柴胡藿香五味子各五錢丁香蒼朮各三錢黃連二錢檳榔一個共研末先用鮮虎肚一個去內垢不入水老陳酒洗淨好米酒糟浸三日去糟將虎肚入新瓦上下兩片合定用緩火焙乾和前藥末同杵數千捶神麯糊為丸如梧桐子大每服用三十丸用蘿蔔子五分麥芽五分同煎湯送下此方即名虎肚丸專治噎病並翻胃諸藥大都行氣未免過於迅利然而噎食由痰固胸膈非此不開妙在每服只用三十丸為度數甚少取其開關神速而又不損傷元氣所謂有斯病服此藥也如服後噎病痊可即宜改服大補氣血之藥而切不可仍服此丸是方得自閩中司理葉公葉有威衰老病噎人言虎肚丸可療制服隨愈因刻方傳送列敘其故余兄弟初成此丸時業師母虞久噎服之尋愈其鄰嫗四十餘喪子成噎氣與之病已且孕生一子後余媼亦患此症而藥已盡偶三伏曝書於帽藥中檢丸可兩許與服至半遂瘥余家孟制施此丸三十年無不神效敢附茲論以垂永久焉金孝芑識又虎臀大骨髓入藥為丸壯陽益精能使鬚髮黑者不白白者重黑名滋陰百補丸大懷生地八兩醇酒浸透軟砂鍋內柳枝作甑上攤生地下入水酒蒸一炷長香時取出曬乾照前仍浸蒸曬乾凡九次白雲苓去皮取白肉水淘浮去赤筋沫曬乾又浮汁和成餅陰乾三兩用牛膝硬枝者去蘆浸酒洗淨四兩川杜仲去粗皮淨酥油炙斷絲四兩西枸杞子酒淘淨曬乾四兩山茱萸肉酒洗淨曬乾四兩淮山藥甘草水浸曬乾四兩北五味子酒洗淨曬乾二兩南牡丹皮去骨酒淘淨曬乾三兩澤瀉去毛淨鹽水洗曬乾三兩綿山黃耆去頭尾蜜炙曬乾四兩天花粉酥油炙曬乾二兩虎尻尾連背正中大骨長髓用酥油四兩研勻砂鍋內溶化後入煉蜜內同用以上諸藥修合忌婦人雞犬擇天月德合日共為細末重羅羅勻煉蜜二斤同虎髓酥油調勻搗數千杵丸如桐子大每日空心服一錢或錢半淡鹽湯送下是方得之太原範道人余弱冠遊三晉相遇時年已古稀童顏漆髯飄飄如仙問其所由曰凝神導氣其功遲節欲服藥其功速道人有虎髓丸實佳今録方並藥半料奉贈余攜歸會友李若霖年僅四十鬚髯早霜即以道人丸轉贈服之歲余白復變黑余奇其方又藥皆王道滋補盡人固可服也因付梓以公同好請嘗試之金孝芑識余與水部員外心韓張公相友善偶談曾在松署得一豹闔署共食食其頭及髓中髓者覺五體發脹惟一人食其雙精遂致遍身發掙不能坐臥兩目睜而不合雙睛突出直瞪欲出眶三日而後平復可見虎豹之雄健至死其肉尤烈若識者以之共補藥調劑為丸未必不大生精力惜不可多得故亦少所試本草未之言及姑存其説以待博物之君子也金孝芑識象皮象皮味甘氣平無毒專能生肌長肉定狂止嘔吐如神世人未知也其皮最難碎人身懷之三日研之則如粉矣世人只用之外科神效而不知入之內治尤奇也或問象皮性最易收斂尤能長肉為金瘡之要藥用之外治宜也用之內治恐非所宜而子曰定狂止嘔吐何也夫象皮氣味和平調和五臟實能無忤耳所以取其性最收斂尤能長肉非止外治實能定狂止嘔也白馬莖白馬莖味甘咸氣平無毒懸壁陰乾務過百日用酒煮乾曬乾用專益陽道修偉添精益髓絶陽可興小陽可長然必加入人參白朮山茱萸麥冬杜仲熟地枸杞柏子仁淫羊藿棗仁當歸黃耆白芥子茯神牛膝之類同用尤靈否則平平也用之生子則無衍用之取樂必有禍或疑白馬莖之可以興陽已屬怪談子又曰長陽不更怪乎曰嗟乎何怪也天地生一物必供人之取用人有一缺陷必生一物以補苴白馬莖之長陽正天生之以補人世之缺陷也天下男子不能種子者非盡由於命門之寒亦非由於腎水之不足往往陽小而不足以動婦女之歡心而所泄之精隔於胞胎之門者甚遠不能直射入其中則胎不結而無嗣以絶者比比也世人不知其故徒用補陽之藥而陽實未衰也徒用補陰之藥而陰亦未虧也服藥終身嘆息於無可如何不重可悲乎鐸親受異人之傳不將此等祕旨廣傳人世不幾負上天生物生人之至意乎故罄加闡揚使天下萬世無子者盡有子也余心乃大慰矣然此長陽之説為救無子者也倘有子者竅鄙人之言修合春方單以長陽眩奇以助人之淫欲受天誅擊非鐸之咎也批白馬莖長陽前人不敢輕道者恐於天譴也遠公書言勿隱者原人生子也世人用之生子則無愆用之取樂必有禍牛黃牛黃味苦氣平有小毒入肝經專除筋病療小兒諸癇驚弔客忤口噤不開治大人癲狂發疰中風痰壅不語除邪逐鬼定魄安魂聰耳明目孕婦忌服因墮胎元蓋性大寒只可少服不宜多用宜與人參同用以治小兒諸病戒獨用牛黃反致誤事耳或問中風不宜服牛黃恐其引風入臟有白麵入油之喻固可服乎曰牛黃治中風乃治真正中風也世間真正中風者絶少此牛黃之所以不可服也真中風之病其人元氣不虛從無痰病平素必身健且系少年一時中風乃猝然之症非氣血之虛風入而生痰也其症必眼紅口渴吐痰如塊或如敗絮其色必黃必非清水口欲吐而吐不出手必捻拳不放躁動不安者乃真正中風也世間真正中風者絶少此病萬人中生一二也可用牛黃治之其餘俱作虛治切戒妄用牛黃原是寒虛又益之以寒藥輕則變成半肢之風重則痰厥喪亡頃刻矣是牛黃不可治假中風非真中風之不可服也批真中風之病吾從未見世人之中無非虛症也牛黃安可服哉或疑牛黃丸功效甚多而其功尤多於治小兒子謂用牛黃必須用人參豈防牛黃之生變乎曰嗟乎牛黃丸乃殺小兒之丸非救小兒之藥也自錢乙創造牛黃丸治小兒驚疳吐瀉等症殺過小兒無算鐸欲救之而苦未能也今幸逢岐天師之教凡用牛黃一丸即用人參五分煎湯共飲殺人之丸無不變為生人之藥始悟錢君立方之時原教人用人參送之後人略去人參此所以殺人無算也凡我同志幸加意於用參以挽回牛黃之失則陽德必承陰福子嗣必昌矣或問牛黃有用之以治水蠱可乎曰牛黃消痰開竅之物非祛濕利水之品也似與治水蠱者無涉然而亦有用之以成功者蓋水入於心胞之宮非牛黃不能化牛黃專能入於心胞也雖然心胞容水久必化痰牛黃化痰而不化水是牛黃乃非利水之藥乃消痰之物耳治水蠱而效者化其心胞之痰也心胞痰散而心胞外之水自不敢入於心胞之內然後以治腎利水之藥治其本源則水蠱之症可消也然則謂牛黃之能治水蠱亦無不可耳牛肉味甘性溫益養脾胃最有益之品也後天以脾胃為主而牛肉獨善健脾胃安得無益但不可食有病之牛也水又不若黃牛為佳牛乳味亦甘但性少寒與薑汁同飲最能潤肺滋腎善治反胃腸結但不可與米飯同食恐生癥瘕也或問用牛肉煮湯為倒倉之法可以為訓乎曰此法創于丹溪恐吐傷元氣用牛肉湯湧而吐之取其吐中有補也然亦不可輕用病必宜吐始可權宜用之蓋既吐之後必元氣大傷牛肉之汁何能補吐傷之胃試觀丹溪自言必須將養一月斷房事半年戒牛肉五載其損傷脾胃亦已甚矣一傷不可再傷苟若輕犯必有胃腹之痛終身食牛肉而輒犯者矣可不慎用之乎山羊血山羊血味鹹氣寒入肺心二臟專活死血故五絶之死可救大約只消用一分酒化開用蔥管人口吹之含藥酒乘人氣送下喉中少頃即活無血磨山羊角一分亦入酒中乘人氣如前法送下亦活但山羊必須四目者乃真真活命仙丹也否則功減半耳或疑山羊血亦羊類也何以神效至此夫山羊四目者神羊也世間最不易得用之救死者實可重生兩廣山羊非四目者然亦有功於世但不能如四目者之更神余曾在栝蒼陳使君署中得一羊實四目者當年未知取血取其雙角至今在家角亦異於凡羊磨角救人功實神效志之以見山羊實有四目云驢溺驢溺味辛氣寒有小毒入脾胃大腸之經專能殺蟲能治反胃然必黑驢之溺始可用否則不堪入藥也夫反胃乃腎經之病驢溺非補腎之劑何以能止反胃不知反胃之症不同有濕熱鬱於脾胃之間上吐而下不瀉久則濕熱生蟲得食則少減失食則必痛痛甚則上吐矣此等之反胃非止腎經之病也必須用驢溺順而下之則蟲即盡化為水從大腸而化所以安然止吐反胃定仍須用六味地黃湯調理則全愈矣否則腎氣甚衰不能潤腸而下達大腸細小不易傳送水穀仍留在脾濕熱再積復生蟲矣其反胃又安能愈哉阿膠阿膠味甘辛氣平微溫降也陽也無毒入太陰肺經及肝腎二臟止血止嗽止崩止帶益氣扶衰治勞傷利便閉禁胎漏定喘促止瀉痢安胎養肝堅骨滋腎乃益肺之妙劑生陰之靈藥多用固可奏功而少用亦能取效唯覓真者為佳或疑阿膠煎膏必取阿井之水黑驢之皮以煎之然而安得盡取黑驢之皮彼地取雜驢皮以煎膏亦可用乎曰阿膠原取阿井之水非必取黑驢之皮也阿井生東方取其天一生水且其性急而下趨清而且重乃濟水之所注取其去濁以祛逆痰也用驢皮者驢性最純而皮則取其外現於皮膚原不必取黑以走腎也夫水入於腎而皮走於肺肺主皮毛故用皮也前人尚黑驢皮者謂黑屬水以制其熱則生風之義反為蛇足矣或問阿膠益肺生陰安得真者而用之曰阿膠出於東阿者即真不必問其真假東阿之水皆濟水之所注也批亦是然出於阿井者更妙或問近人阿膠多加藥品同煎想更有益乎曰阿膠之妙全在濟水若加藥味雜之更失其義本欲加藥味以取益誰知反因藥味而失利乎世人強不知以為知半是此類也熊膽熊膽味極苦治男婦時氣熱蒸變為黃疸療小兒風痰壅塞發出驚癇驅五疳殺蟲敷惡瘡散毒痔漏塗之立建奇功此物至寒能退大熱可一用而不可再用者也存之以治火熱而兼濕病者熊膽必取人熊者始佳人熊之膽長八寸余膽不過長五六寸耳昔舍下演戲鄰人陳姓子年十三側樓觀看與同伴揪跌誤從樓遮陽墮下石板僅聞一聲急視之則兩目反張出血鼻口耳皆振出血其父抱歸尚有微氣有人云得熊膽酒服可治余取家藏熊膽五分研碎調陳酒一大碗灌下少頃即蘇次日跳躍如初至今未明其義然親試目擊因録之以俟識者也金孝芑識鹿茸鹿角鹿膠鹿角霜鹿腎鹿血鹿茸味甘咸苦辛氣溫無毒益氣滋陰扶肢體羸瘦強志堅齒止腰膝痠疼破留血隱隱作疼逐虛勞灑灑如瘧治女人崩中漏血療小兒寒熱驚癇塞溺血泄精散石淋癰腫鹿角味淡氣溫逐鬼辟邪輕身益氣續絶傷強筋骨消癰疽愈惡瘡止婦人夢與鬼交令病者招實鬼話鹿膠止痛安胎大補虛羸療跌撲損傷治吐衄崩帶鹿角霜專止滑瀉鹿腎補中以滋腎元鹿血調血脈止腰疼滾酒調熱服生服誤鹿一身皆益人者也而鹿茸最勝凡陽痿而不堅者必得茸而始能堅非草木興陽之藥可比但必須用茸為妙如不可得茸用三寸長之毛角亦佳猶勝於鹿角膠也夫鹿乃陽獸而世人轉譏東坡之誤真不善讀書者也本經言麋屬陽者乃傳寫之誤也麋乃鹿之小者鹿乃麋之大者亦非也麋鹿同形而種實各別麋小而鹿大者尚是從形而分別之也麋體生來是小而老亦不大鹿則老而彌大也東坡謂鹿在山而麋在澤亦非麋實生於山也夏至鹿角解冬至麋角解亦非陽退陰退之義鹿陽獸也夏至則一陰生陽得陰而生新則舊者自去故鹿角至夏至而解也麋陰獸也冬至則一陽生陰得陽而生新則舊者難留故麋角至冬至而解也天地之道陰陽兩相根也陽得陰而陽生陰得陽而陰長麋鹿之角亦何獨不然只因本經傳寫之誤以致人錯認鹿為麋也豫不得不辨之然而人終不信也豫更有辨麋之法麋有四目非目在眼上也前腿外臁之間有似目者二處有則麋而無則鹿至易辨也鹿茸益陰然亦無大效不必取之以入藥世人有麋鹿合而成膏以治陰陽之虛則可耳然而用麋鹿為膏又不若用鹿胎加之人參熟地山茱山藥茯苓牛膝柏子仁巴戟天肉蓯蓉炒棗仁甘草白朮麥冬沙參五味子杜仲破故紙黃耆當歸為全鹿丸之更妙也用大鹿為全鹿丸者誤鹿胎為丸大能生先天之氣益後天之母健脾生精興陽補火至神之丸奈世人未識耳或疑鹿茸白者非鹿茸也乃麋茸也必以紫者為佳果然乎曰鹿茸不論紫白大約角上毛短者為鹿茸角上毛長半寸者為麋茸最細而又多毛然而天下鹿茸多而麋茸少蓋麋種雄最少而雌最多遇鹿則交世人未知因識之以辨鹿麋之分最易別也犀角犀角味苦酸咸氣寒無毒人身懷之為末入陽明殺鉤吻鴆蛇毒山瘴溪毒百毒皆除尸疰鬼疰惡邪狐魅精神諸邪盡遣傷寒溫疫能解熱煩瘡腫癰疽專破膿血鎮肝明目定神安心孕婦忌服恐消胎氣此物乃佐使之神藥不可不用而又不可多用者也蓋犀角屬陽其性喜走而不喜守守者氣存走者氣散用犀角者不過欲其走達陽明之經也然而犀角不特走陽明也如有引經之藥各經皆能通達倘無邪氣孟浪多用耗散各臟之氣勢所不免氣散則血耗血耗則火起未有不變生他病者矣故無邪熱之症斷不可多用或疑犀角入陽明而散熱豈入陽明而散氣乎曰犀角入陽明原該散熱而不該散氣然有熱則散熱無熱必散真氣矣今真氣既散反生內熱矣故犀角善用則解熱不善用又安能解熱哉或問犀角有通天之功信乎曰謂犀角通天者通人之巔頂也犀角陽明經之藥由鼻而升於頭而下環於唇口之間故凡有頭面之火不得不藉之為使令其自下而上也羚羊角羚羊角味鹹苦氣寒無毒專走肝經解傷寒寒熱在肌膚散溫風注毒伏於骨內安心氣除魘寐驚夢狂越辟邪氣祛惡鬼小兒驚癇産婦敗血皆能治之此物亦備用以待變者也羚羊角不可輕用之藥宜於治實症而不宜於治虛症或問羚羊角別本載久服強筋骨輕身起陰益氣利丈夫似乎為強陽助氣之品繆仲醇謂火熱則陰反不能起而筋骨軟鹹寒入下焦除邪熱則陰自起氣自益筋骨強身輕也仲醇之言未嘗非是然而羚羊角實不能補虛仲醇亦因本草載有利益之語故曲為解之云久服強筋骨輕身起陽益氣入下焦除熱則陰自起氣自益筋骨強實治邪而不補正氣不可誤也終不可據之以望其滋補也麝香麝香味辛氣溫無毒闢蛇虺誅蛔蟲蟲蠱癇疰殺鬼精毆疫瘴脹急痞滿咸消催生墮胎通關利竅除恍惚驚怖鎮心安神療癰腫瘡疽蝕膿逐血吐風痰啓寐魘點目去膜止淚亦外治居多而內治甚少也或問麝香能消水果之傷然乎曰麝香何能消水果但能殺果木之蟲耳食果過多胸中未有不生蟲者也生蟲則必思果思果則必多食果矣初食之而快久食之而悶前人用麝香而食果之病痊遂疑麝香之能消果也誰知是殺蟲之效哉批解前人之惑或問近人治風症多用麝香以透徹內外而吾子不談豈治風非歟曰風病不同有入於骨者有入於皮肉者有入於臟腑者未可一概用麝香而走竄之也蓋風入於骨髓者不得已而用麝香使攻邪之藥直入於骨髓祛風而外出此治真正中風也其餘風邪不過在臟腑之外肌肉之間使亦用麝香引風入骨反致變生大病而不可救藥矣至於世人不知禁忌妄用麝香以治小兒急慢之驚往往九死一生可不慎哉或疑麝香既不可以治風病而前人用之豈皆非歟曰前人用麝香以治風症者不過借其香竄之氣以引入經絡開其所閉之關也近人不知前人立方本意毋論關閉關開而一概皆用以致引風入骨使風之不出無風而成風症為可憎耳驢鞭驢鞭者驢之外腎也味甘氣溫無毒最能長陽然而單服此一味絶不效蓋驢鞭非長陽之物也止能展筋耳夫陽道之細小也乃人肝膽之不足而筋不能舒耳驢鞭展筋筋展則陽道宜於修偉矣然而驢鞭止能展身內之筋而不能展身外之筋必得龍骨陽起石合用則外之筋乃展外筋既展而謂陽不能展乎或疑驢鞭亦尋常之物而稱其功用之奇豈因其驢勢之偉長因疑可以展陽耶此亦無徵不可信之説也曰驢鞭不能展陽余先言之矣因其與龍骨陽起石同用而有相得之驗也夫龍骨得驢鞭而化龍骨得陽起石而興三者配合始建奇功缺一而無功也雖然舍人參耆朮菟絲熟地補陽補陰之藥而唯三者之配合也奇功又何以建哉獺肝獺肝味甘平咸微熱無毒疰病傳尸一門傳染者悉效産勞發熱三時虛汗者殊功上氣咳嗽堪除鬼毒瘟癘能遣療蠱疫治冷勞卻魚鯁消水脹乃癆瘵中必需之藥不可不先備也取得之時以酒煮乾焙燥藏之磁器中經年不壞癆瘵之症久則生蟲用鰻魚之類亦可殺蟲何以必用獺肝蓋癆蟲之種類不同而治法之制伏亦宜各別用獺肝以制蟲者其蟲必食魚而得之者也其蟲絶似魚類故取獺以制魚也若鰻魚亦魚類安能以魚制魚哉或問用獺以制魚類之蟲自是確義但不知同是癆瘵之症何易知其蟲之似魚以用獺肝哉不知癆蟲不同而辨法實易凡生魚類之癆蟲者遇天雨則胸膈間必怦怦自動聽水聲則驚飲茶水則快大便必滑日間腸胃必有微動而夜則安然者也聞魚腥則喜看網繒魚笱之類必孛然色變此等之症必須用獺肝入藥始可制之否則無益批辨症甚確膃肭臍膃肭臍味鹹氣大熱無毒療痃癖尪羸並脾胃勞極破宿血結聚及腰膝寒酸闢鬼氣禁夢與鬼交逐魅邪止睡被魅魘祛冷積益元陽堅舉陽管不衰誠助房術要藥因多假又雌多於雄雌者絶無功效雄者固興陽道然而不配之參朮熟地山藥山茱杜仲肉桂巴戟天肉蓯蓉之類功亦平平無奇世人好異動言興陽必須膃肭臍誰知藥品中多有勝之者如鹿茸海馬之類未嘗不佳膃肭臍魚也而人誤認海豹為膃肭臍所以興陽無大效轉不如鹿茸海馬之能取勝也膃肭臍生於東海之中最靈而善藏能先知人捕取故世人絶無有得之者其形並不如狗魚首身無鱗甲尾如魚有四掌少異於魚曰海狗者即海豹而掌則與膃肭臍相同海豹乃獸身毛如豹掌有毛而膃肭臍無毛也膃肭臍真者聞其氣即興陽正不必吞服耳至海豹性亦淫亦能興陽故土人以海豹充膃肭所以功薄而效輕博物君子必有以辨之或問膃肭臍今人並無有見之者先生又從何處見之而辨且如是之分明耶曰古人之書可考也何必親見膃肭臍余雖未見而海豹則數見之古人云膃肭臍魚也余所見者乃獸也非海豹而何況其身絶似豹乎吾故知今之所用者皆非真也世情好異謂不可得之物必然功效實奇往往棄人參鹿茸於不用而必欲得膃肭以為快及得偽者修合藥餌朝夕知服未見其奇不悟其膃肭之偽而自嘆其陽道之衰雖助之而無用也吾深為世人惜之矣或疑膃肭臍即海豹臍下之勢也古人諱言勢而言臍耳余以為不然膃肭臍實魚身而非獸身也東海之濱豈無其種然而絶無有獲之者使吾言無徵不可慨嘆乎雖然豫之注本草也辨其理也理真而義自確百世之下倘有人得之取吾言而證之不誣始信吾先見之明也蝟皮蝟皮味苦氣平無毒主五痔血流大腸理諸疝痛引小腹治胃逆塞鼻衄開胃氣消痔腹脹痛可止陰腫痛能祛亦備用之物也或問刺蝟食其肉當去骨誤食之令人瘦劣諸節漸小有之乎曰嗟乎凡骨誤食俱瘦人不獨蝟骨也雀卵雀卵味酸氣溫無毒益男子陽道易致堅強常能固閉補陰扶陽之妙藥然亦必入人參白朮杜仲蛇床子之內則有功否則亦平常也雀卵益陽取其淫氣也然雀卵至小多取則傷生亦非延生續嗣之道不得已則用之不可因其興陽固精窮日夜之力而頻用之亦犯造物之忌也鼠骨鼠膽鼠骨取其脊骨燒灰存性擦齒可以重生然亦必輔之熟地榆樹皮當歸青鹽枸杞子骨碎補細辛沒石子之類始效鼠膽滴耳中實效應如響然膽最難取必將鼠養熟乘其不知覺之時一旦擊死取則有膽否則無膽也鼠膽治耳聾余親見治一小兒將膽汁滴入耳癢甚忽有一蟲走出長半寸四足遍身鱗甲色正白也此蟲名為環耳蟲專食人髓批此蟲非外入者乃內生之蟲耳幸小兒速治即愈否則蟲入於腦則頭痛如破終身之病也鼠膽治耳聾效捷如此因志之或問鼠骨生齒乃有人試之而不驗各本草多稱其功而吾子亦同聲附和何也曰鼠骨實能生齒但人用之不得法耳捕鼠之時戒莫出聲得鼠之時亦然養之數日使鼠不懼人一時擊死亦勿言語去其皮而取其骨火煅入藥中擦齒之時亦勿言語自然頻擦而頻生也咎鼠骨之不生齒不其誤乎鼠性最怯其齧物每乘人之不覺故其功用亦不可使其知也且鼠性又最靈一聞人聲必寂然不動齒通於骨人語言必啓其齒齒動而鼠骨之性不走於齒矣又何能生齒哉批此言似迂而其理實至也伏翼夜明砂伏翼即蝙幅也白者第一紅者次之灰色者不可用逐五淋利水道明雙目撥翳膜久服延年無憂令人喜樂媚好用血點眼夜視有光夜明砂即蝙蝠糞炒酒服下可下死胎蝙蝠得白者入之補氣血之藥可延年至百歲之外無如不可得也我識之於書者實聞之岐天師之祕傳也白蝙蝠不可得粵西有紅蝙蝠古人取之以作媚藥蓋白者延齡而紅者反助火也助火必至動火火動必至精泄然則紅蝙蝠終非益人之物也或問蝙蝠安得白者用之即紅蝙蝠亦難得不識灰色者可權用以修合藥餌乎夫蝙蝠歲久則得至陰之氣彼灰色者不過數十年之物耳何可合藥倘腹下色紅則有百歲之久矣亦可用之然終不如紅者更奇而白者更神也批白蝙蝠稀世之珍如何能得之得之乃天賜也岐公之傳必非無意或疑伏翼非長生之物即色白是千歲之品無益於補劑何足取重遠公注本草故將舉世所絶無者特神奇其説恐不可信也曰白蝙蝠之可以延年乃吾師傳鐸自服之方余泄之以示世也夫伏翼得至陰之氣活數百年而不死其常也凡物長年者皆服之延齡如鹿龜之類非耶何獨於伏翼疑之況伏翼至羽毛皆白自是千歲之物配以藥物自可難老此理之所必然也夫色白者不可得而色紅者粵西實有之古人曾取為媚藥是補陽之明驗也紅者既可以補陽豈白者獨不可以補陰乎余注本草何品不可出奇而必取伏翼以神其説哉雖然白蝙蝠之方吾師傳鐸自服余自信之正不必人之盡信也蜂蜜蜜味甘氣平微溫無毒益氣溫中潤燥解毒養脾胃卻癇痙止腸癖除口瘡心腹猝痛補五臟不足通大便久閉此採百花而釀成自然補益但可丸藥中用之入湯劑內止潤大腸也或問蜜有黃白之分其功用同乎曰世人以白蜜為上不知採黃花則蜜黃採白花則蜜白黃勝於白而世人未知也蓋花黃者得中州之氣花白者得西方之氣耳五靈脂五靈脂味甘氣平無毒功專生血止血通經閉又治經行不止去心疼並療血氣刺痛祛血痢腸風逐心腹冷氣定産婦血暈除小兒疳蛔善殺蟲又止蟲牙之痛藥籠中亦不可缺也或問五靈脂長於治血不識諸血症可統治之乎夫五靈脂長於行血而短於補血故瘀者可通虛者難用耳蟬蛻蟬蛻去目內翳膜並侵睛胬肉小兒痘瘡用之以護目斷不可少之藥也或問蟬蛻護目去目內翳膜有之乎曰有但宜知所以用之蟬蛻護目者護痘瘡未出之目非護痘瘡已壞之目也凡痘瘡現頭面甚多者須護其目先用蟬蛻入於發表之中則雙目斷無出痘之理若已見點於目中又何能救之使消哉或問蟬蛻消翳於目中宜乎目中之翳無不消之矣而謂止能護目使翳之不生不能消已成之翳是蟬蛻非消翳之品乎曰蟬蛻消翳古人盛稱之豈無所驗而云然古人謂消翳者消凡目之翳非消痘瘡之翳也凡目之翳可少用之以成功痘瘡之翳雖多用之亦無益也蝸牛蝸牛味鹹氣寒有小毒殺蟲主賊風口眼喎斜治驚癇筋脈拘攣收脫肛止消渴此物治病亦神用必須制用甘草些須同火炒焙乾存於藥籠中以治前症實奇蝸牛善殺蟲以蝸牛活者投麻油中自化為油以油塗蟲瘡效如神或問蝸牛治楊梅瘡毒有神何子之不言也曰蝸牛解毒而氣過寒涼楊梅熱毒似乎相宜然則楊梅熱毒實出諸腎用蝸牛未免直入腎中以瀉火火去而寒留往往有陽痿不振不能生子之憂豫所以略而不言也批人但知食蝸牛之解毒何知有絶嗣之禍哉蠍蠍味甘辛有毒療小兒風癇手足抽掣祛大人中風口眼喎斜卻風痰耳聾解風毒癮疹然不可多服以其辛而散氣也少少用之以治喎斜之症正相宜耳蠍毒傷人每有痛入心者以蝸牛塗上即安批效極或問全蠍可治漏瘡何子略之夫全蠍何能消漏也治漏瘡者用之必藥用蜈蚣穿山甲使之相制而相成耳九香蟲九香蟲味甘辛氣微溫入腎經命門專興陽益精且能安神魄亦蟲中之至佳者入丸散中以扶衰弱最宜但不宜入於湯劑以其性滑恐動大便耳九香蟲亦興陽之物然外人參白朮巴戟天肉蓯蓉破故紙之類亦未見其大效也或問九香蟲産於西蜀得其真者為佳近人不知真假何能奏效曰九香蟲不止西蜀有之江南未嘗不生但生於江南者無香氣耳無香氣者即無效蜚虻蜚虻味苦氣微寒有毒逐瘀血血閉寒熱酸𢠹止兩目赤疼眥傷淚出通血脈九竅治喉痹破積血癥瘕痞堅亦治此物視之可憎用之以治瘀血之症實救命之藥也藥籠中斷宜預備畜血之症必須水蛭以消之否則瘀血硬痛必變發黃之症今人畏懼水蛭謝絶不用當以虻蟲代水蛭則畜血病可解也或問蜚虻食人之血何仲景夫子以治傷寒之症曰傷寒之變症不同失於不汗有氣結血結之病氣結可用草木之藥以散氣而血結必須蜚虻水蛭以散血也但氣結與血結何以辨之氣結者小便必不利血結者小便必利也又問血結者必須用蜚虻矣然何以知是血結之病曰大約氣結血結身大熱腸中俱有燥屎作痛但血結者止小便利異於氣結也舍蜚虻又何物以散其瘀血哉殭蠶殭蠶味鹹辛氣平無毒升也陰中陽也逐風濕殊功口噤失音者必用撥疔毒極效腫突幾危者急敷主小兒驚癇夜啼治婦人崩中赤白止陰癢去三蟲滅黑皯及諸瘡瘢痕面色令好散風痰並結滯痰塊喉痹使開驅分娩罷余疼解傷寒後陰易功用雖多而不宜多服少為佐使可也或問殭蠶功多亦有過乎夫殭蠶安得無過多服則小腹冷痛令人遺溺以其性下行利多而成寒也晚蠶蛾蠶沙晚蠶蛾氣溫微咸略有小毒其性最淫強陽道交接不倦益精氣禁固難來敷諸瘡滅瘢止尿血暖腎蠶沙即晚蠶之屎其性亦溫治濕痹癮疹癱風主腸鳴熱中泄瀉按晚蠶蛾勝於春蠶者以其性淫也務須擇雄者用之雌則無效蓋雄則氣溫勤於交合敏於生育故耳但亦宜丸散而不宜湯劑嫌其過於動也晚蠶娥興陽而又不動火似可多用然亦宜同人參白朮歸耆之類用之為佳蓋無陽則氣不能舉而氣虛則陽亦不能久振也桑螵蛸桑螵蛸味鹹甘氣平無毒主女人血閉腰痛治男子虛損腎衰益精強陰補中除疝止精泄而愈白濁通淋閉以利小便又禁小便自遺此物最佳苦難得真者二三月間自於桑樹間尋之見有花斑紋子在樹條上者採之用微火焙乾存之若非桑樹上者無效或云加桑白皮佐之者非桑螵蛸三吳最多土人不知採用捨近求遠可勝三嘆或問桑螵蛸乃螳螂之子何以異於他樹耶不知螳螂食桑葉而生子其功自是不同此物可種採子入於桑樹之間每年其子必多不數年即繁又不壞桑樹而又可以採其子至便法也批此物雖益人吾終憐其細小用藥必多害物命可已則已之為妙又何必種植之多事耶白頭蚯蚓蚯蚓味鹹氣寒有小毒頸白者佳鹽水洗用治溫病大熱狂言療傷寒伏熱譫語並用搗爛絞汁井水調下立瘥兼治小水不通蠱毒猝中殺蛇瘕蛔蟲消腎風腳氣又療黃疸行濕如神人或被蛇咬傷鹽水浸之即解治屎封悍犬咬毒仍出犬毛殊功尤治毒瘡蚯蚓乃至微之物實至神之物也大熱發狂之症與其用白虎湯以瀉之不若用蚯蚓漿水以療之蓋石膏雖瀉火而能傷胃蚯蚓既瀉火而又不損土蚯蚓生於土中土為蚯蚓之母子見母而自安故也或問蚯蚓治發狂如神此何故曰蚯蚓善瀉陽明之火而又能定心中之亂故一物而兩治之也又問用蚯蚓何故必用地漿以佐之蓋地漿取北方至陰之氣瀉陽明至陽之氣也且蚯蚓得土而性安毒以攻熱而不毒以生毒相制以成奇功也又問蚯蚓有毒以治發狂之症萬一毒發不益助狂乎曰發狂之症得毒而轉有生機蓋火熱逢寒毒而自化用蚯蚓以瀉熱正取其毒氣之入心而後可以解熱也熱解而狂自定此巧治之法也蟾酥蟾酥去毒如神以毒製毒也消堅破塊解瘀化癰雖皆外治之功而藥籠中斷不可缺蟾酥有大毒似不宜服而諸家皆云可服不可信也雖曰以毒攻毒亦宜於外治而不宜於內治也蝌蚪蝌蚪蛤蟆子也治火傷與湯火傷搗爛敷之即止痛如皮破且無傷痕同桑椹汁染須亦佳但必須加入冰片耳白花蛇白花蛇味甘咸氣溫有毒蘄州者佳止風痛如癩麻風至鬚髮脫落鼻柱將塌者必須服之其餘如鶴膝雞距筋爪拘攣肌肉皮毛諸風斷不可服蓋白花蛇性竄上行而不下走解上焦之風而不解下焦之風解陽分之毒而不解陰分之毒也或問白花蛇雖異於凡蛇然蛇終是毒物以毒攻毒不畏損傷腸胃乎曰誠哉是言風症盡有祛風之藥何必食蛇以去風不論是否癩麻風俱覓蛇食之信邪不信正人情大都如斯可嘆也魚鰾魚鰾味甘氣溫入腎經專補精益陰更能生子近人多用此為種子之方然而過於潤滑必須同人參補陽之藥同用為佳魚鰾膠絶似人之精其入腎補精不待言矣恐其性膩滯加入人參以氣行於其中則精更易生而無膠結之弊也龜甲千歲靈龜龜甲味鹹甘氣平有毒陰中陽也專補陰衰善滋腎損復足真元漏下崩帶並驅癥瘕痎瘧咸卻傷寒勞復或肌體寒熱欲死者殊功腰背痠疼及手足重弱難舉者易效治小兒囟門不合理女子濕癢陰瘡逐瘀血積凝續筋骨斷絶補心輕身益氣資智千歲靈龜身上五色全具額端骨起似角和身用之最能延齡按龜乃至陰之品活用全身死用龜板用全身而加入參術之中則其毒自解惟死龜板取之煎膏必須用灼過者名曰敗龜則毒隨火化可用倘若用自死者煎膏未有不毒者也龜年尤長何能自死非受蛇傷必為毒中用之入藥得免無損幸矣安望其補益哉千歲靈龜何能易見非德高道重者斷不可得也鐸著本草既知千歲之龜可以延年烏敢隱而不告乎夫千歲靈龜自知趨避豈肯輕露於沙洲塘渚之間以招人之物色輕投於鼎鑊之中然而天地之大實有此種使道德之賢無心獲之而助其益算之丹也苟得千歲之龜而不知修合之法終屬無益鐸受異人之傳並將製法奇方附後方名千歲靈膏千歲靈龜一個紙包用火煨死然後以桑木用水煮熟約一晝連身甲搗碎入人參一斤白朮二斤熟地二斤桑葉二斤山茱萸薏仁茯苓巴戟天各一斤五味子四兩柏子仁六兩杜仲半斤各為末同龜搗爛加蜜為丸每日白滾水服五錢服後精神還少鬚髮重烏壽至百歲外猶身如少年也或問龜至靈人有放龜而延齡者烏有食龜而延年者乎況又是千歲之龜其靈更甚食之作祟未必不反促其壽也曰世間安得此千歲之龜哉一旦為人所獲此天厭之也夫龜壽萬年深藏於江湖之內原不豫人以易得況千歲之龜尤鍾至靈之氣世俗人生之事尚且深知豈己身生死反不知之乎即數宜為人所得其必有趨避之方以脫於難然而可以趨避而趨避不能者必深獲罪於天而不可逭耳夫龜潛於淵何罪之有不知物性好淫淫心一動托其至靈之氣以迷惑夫男女盜人之精氣以私益其軀殼或淫極而殺心生久耳唯知取樂而不知修省天安得而不加誅戳哉然而上帝好生殺長生之物置之於無用之地何若助修德之士作延齡之丹此異人之傳鐸而鐸又不敢幸獲而公傳之天下使道高德重者為益算之資也或謂介蟲三百六十而龜為之長神靈變化凡入藥中勿令中濕則遂其變化之性而成癥瘕於腹中先生制龜之方乃用水煮萬一生瘕奈何曰用滾水煮熟安能作祟況又用桑柴以制之乎然而用龜以補陰者正取其有神也蓋方中多是補心之藥夫心藏神而龜性有神借其氣以相通心腎兩接水火有既濟之妙也鱉甲鱉甲味鹹氣平無毒醋炙用之散痃癖癥瘕及息肉陰蝕痔疽除癆瘦骨蒸並溫瘧往來寒熱愈腸癰消腫下瘀血墮胎肉性亦不冷項下有軟骨亦不必檢去鱉甲善能攻堅又不損氣陰陽上下有痞滯不除者皆宜用之但宜研末調服世人俱炙片入湯藥中煎之則不得其功耳或疑鱉肉補陰鱉甲攻堅一物而相反恐未必然之説也夫鱉原陰物以陰補陰又何疑乎君之所疑者以鱉甲之攻堅也不知鱉性善藏凡小有隙地鱉必用甲以鑽入之是其力全在於甲故用甲以攻堅原有至理非私臆也或問鱉甲可多用乎曰雖其性善攻而其味仍補但肉則補多而攻少甲則攻多而補亦多也或問鱉甲善殺癆蟲有之乎曰不殺癆蟲何以能除癆瘦骨蒸骨蒸之病何以有蟲乎蓋蟲得濕熱而自生非盡由於傳染因熱而得汗因汗而又熱絶似潮汐之無差陰陽之有準安得而不生蟲乎且此蟲又不生於腸胃之間偏生於骨髓之內不用鱉甲安得入至陰之中引群陰之藥以滋其髓乎倘止大補其陰而不用殺蟲之味則所生之髓止足供蟲之用然殺蟲之藥又多耗髓蟲死而骨髓空虛熱仍未去熱未去而蟲又生病終無已時也鱉甲殺蟲而又補至陰之水所以治骨蒸之病最宜或問鱉甲殺骨中之蟲不知助之何藥殺蟲而又補髓也曰殺骨中之蟲只消鱉甲一味足矣所佐之補陰者宜商鐸受異人之傳欲與天下共商之方用鱉甲一斤醋炙益之地骨皮半斤丹皮四兩熟地一斤山茱萸半斤地栗粉半斤白芍白朮薏仁各四兩玄參三兩北五味子二兩沙參六兩各為末山藥一斤為糊打為丸久服蟲盡死而骨蒸亦愈批此方奇甚靈甚癆瘵之症亟宜服之鐸觀其方妙在用鱉甲為君地栗粉山茱萸為佐使以攻殺其內外之蟲又妙在群陰之藥不寒不熱涼骨中之熱即生骨中之精補攻兼施似可常服而收功者也世不少明眼之人必能知此方之妙也或疑龜甲可以煎膏而鱉甲獨無煎膏者豈不可為膏乎然而龜鱉實皆陰物何以古人絶無有論及之者曰鱉甲不可作膏前人亦嘗論及但惜略舉其端而不暢論今請大彰其義夫龜與鱉雖同是陰類而性實不同龜性喜出而鱉性喜入龜性靜而不動而鱉性動而不靜故龜長於補而鱉長於攻龜可為膏以滋陰而鱉可為末以攻堅也滋陰者可以久服受益攻堅者可以暫用成功雖鱉甲入之補陰之中攻堅之內未嘗不可久用以滋陰而終不可如龜之煎膏單用之而常服此古人所以取龜作膏而獨棄鱉甲也蛤蚧蛤蚧味鹹氣平有小毒主肺虛聲咳無休治肺痿定喘止嗽益精血助陽道血咯不已逐傳尸癆疰祛著體邪魅仍通月經更利水道至神功用全在於尾尾損則無用也然亦必得人參麥冬五味子沙參乃奇蛤蚧生於西粵者佳夜間自鳴聲至八九聲者為最勝捕得之須護其尾尾傷即有毒所斷之尾反可用也蛤蚧善能固氣含其尾急趨多不動喘故止喘實神螻蛄螻蛄即土狗也味鹹氣寒無毒本草言其利水宜分上下左右然亦不必拘也通身用之以利濕神效此物兼能接續骨傷治口瘡乳毒亦效但不宜與虛人因其性急過利也鰻魚鰻魚味甘氣寒有毒殺諸蟲調五臟除五痔逐腰背之風濕浸淫治男女骨蒸癆瘵兼療腳氣産戶蟲瘡並崩漏不斷者多食最效骨燒薰床上衣箱百蟲皆死非補益之藥然食之殺蟲使尸蟲盡絶癆瘵重生又不可為非補也大約於丸散中同補陰藥修合為佳耳鰻魚治癆瘵自是殺蟲然必須淡食為佳蓋咸則盡入於腎中而淡則無經不達也或問鰻魚亦殺癆蟲何以不同鱉方共治曰鱉與鰻雖同是殺蟲之物而性各別鱉喜攻入而鰻喜攻出也雖二物亦可同用以出奇然用之以治骨蒸宜分用而不宜同用一欲出一欲入兩相拂意反相忘其殺蟲矣況骨內之蟲驅外出而殺之不若攻入內而盡誅之也故用鰻又不若用鱉之更勝倘單用鰻魚作食以殺蟲此鱉又不若鰻魚之功也蓋鱉肉但補而不攻耳或問鰻魚殺蟲而不補精何以能愈骨蒸之病豈殺蟲即可以愈骨蒸乎曰鰻魚實只殺癆蟲而骨蒸之病可全愈者必胃健能食有滋補之味也倘胃氣不開又無填精降火之藥徒恃鰻魚之殺蟲也亦何益乎鱔魚鱔魚味甘大溫無毒入脾腎二經補中益氣且更興陽散濕氣去胡臭又生津止渴生力血塗口眼能止喎斜為急救之需也又治火丹赤腫出鱔血塗之效或問鱔魚與黃耆同用能益氣力有之乎曰有之然必須鱔頭上有冠者用之始效螃蟹螃蟹味鹹氣寒有毒散血解瘀益氣養筋除胸熱煩悶去面腫喎僻愈漆瘡續筋骨夙疾人食之其病復發懷孕婦食下令人橫生此物最不利人而人最喜噬然得此以解散胸熱亦有可取若入藥則只用之於跌損之內也或問蟹爪主破胞墮胎豈以其爪性過利乎曰蟹性最動而爪尤動之至者子死腹中胞不能破用之實神正取其動也批人胞直生而蟹爪旁走故取而破胞耳又不可不知海馬海馬亦蝦屬也入腎經命門專善興陽功不亞於海狗人未知也更善墮胎故能催生海馬之功用不亞膃肭臍乃人尚膃肭而不尚海馬此世人之惑也誰知海馬不論雌雄皆能孛興陽道若膃肭臍必須用雄者始效貴價而買乃是贋物何若用海馬之中用哉或問海馬以何地生者為佳海馬沿海多生之而最能興陽者山東第一廣東次之蓋山東尤得生氣也陽氣之生尤能種子耳文蛤文蛤味苦咸氣平寒無毒利水墮痰驅脅急腰疼除喉咳胸痹收澀崩中帶下消平鼠瘻痔瘡仲景夫子用之於傷寒方中亦取其利水走腎墮痰軟堅也真珠真珠氣寒無毒鎮心神潤顏色點目去膜塞耳治聾治小兒驚癇尤堪止渴亦能墜痰然內治絶少存之以為外治之需真珠生肌最良瘡毒中必用之藥然內毒未淨遽用真珠以生肌轉難收口牡蠣牡蠣味鹹氣平微寒無毒左顧者良火煅末用入少陰腎經軟積癖消結核去脅下硬瀉熱掀腫益精遺尿可禁斂陰汗如神摩宿血消老痰絶鬼交收氣滯但只可為佐使佐之補則補佐之攻則攻隨藥轉移不能自主也或疑牡蠣乃澀精之藥先生獨削而不談何也曰蓋牡蠣澀精而精愈遺雖非牡蠣之故殊不知牡蠣澀精而精必利而後可止非澀精之可止也或謂牡蠣非澀藥也使牡蠣為止澀之藥如何仲景張公傷寒書中載大病瘥後腰以下有水氣者用牡蠣澤漆散之乎曰嗟乎大病之後水不能下行原宜用補以消水但傷寒經汗吐下之餘元氣不能驟生補之則功緩故宜因勢利導而用澤瀉又恐水勢甚大單用澤瀉未免太泄其水而元氣隨水而盡泄故用牡蠣於利之中以澀之也利中帶澀則水泄而元氣無虧是泄中有補之道存焉真善用利耳誰謂牡蠣非澀藥哉或疑牡蠣既可於利中用澀安在止精不可與利水並用耶曰水可於利中用澀而精不可於澀中兼利也蓋精愈澀而愈遺補精而帶澀則徒補無益故遺精之病斷不可用牡蠣耳批辨澀精反致遺精實見到之語然亦有用之而效者乃玉關大開不得已而用之以閉精於一時而終不可恃之為長服之劑也或問牡蠣之肉味甘性溫即鮑魚肉也牡蠣用之而止夢遺若鮑魚多食使丈夫無髭鬚何也曰牡蠣即鮑魚之殼二者同氣皆止澀之味也食之過多則任督之路斷二經之氣不能上升於唇口故鬚髯漸少其實多食牡蠣亦能令人少髭也水蛭水蛭味鹹苦氣平微寒有毒炒黃黑色用之善祛積瘀堅瘕仲景夫子用之為抵當湯丸治傷寒之瘀血發黃也治折傷利水道通月信墮妊娠亦必用之藥蓄血不化舍此安除乎或問蓄血之症何故必用水蛭蓋血蓄之症與氣結之症不同雖同是熱症而氣結則熱結於膀胱血蓄則熱結於腸胃氣結之病可用氣藥散之於無形血蓄之症非用血物不能散之於有形也水蛭正有形之物以散其有形之血耳何必過懼哉批血蓄症非水蛭虻蟲不能消或問水蛭即水田內之螞蝗食人血最可惡之物也仲景夫子偏用之治傷寒瘀血不識有何藥可以代之乎曰血瘀蓄而不散舍水蛭實無他藥之可代水蛭不可得必多用虻蟲代之然而虻蟲終不及水蛭之神今世畏之而不敢用誰知此物並不害人耶或問水蛭至難死又善變化能一身而化為千萬宜世人疑而不敢用也先生謂並不害人此則難信也曰水蛭制之不得法則難死而能生制之得法則不生而永死取水蛭之乾者用鐵刀細切如小米大文火炒至黃黑色有煙起取出不可放在地上不得土氣又安能重生而變化哉批制水蛭總不可令其得土氣為佳然炒熟無生氣又安能再生哉故用之同瘀血一團從大便中盡出得其效最捷何至有害乎或問炒制水蛭萬一不得法其性猶存則一留腸腹之中安得而不害人乎曰何畏之極也豫有解之之法用水蛭之湯加入黃土二錢同服即水蛭不死斷亦無害批又法之巧也蓋水蛭以土為母離土則無以為養與土同用既善於解瘀血之結即隨土而共行永無留滯腹腸之虞矣龍骨龍齒紫稍花龍骨味甘氣微寒陽也雖有雌雄無分功效但色黑者不可用必須火煅研末水飛過始可用之閉塞滑瀉之大腸收斂浮越之正氣止腸風下血及婦人帶下崩中塞夢寐泄精並小兒驚癇風熱闢鬼疰精物除腸癰內疽固虛汗縮小便散堅結消癥瘕龍齒定心安魂男婦邪夢紛紜者尤宜急服紫稍花乃龍精而沾於水草而成者世無真物真則興陽或問龍善變化何以山中往往有龍骨任人取攜血骨淋漓絶不見有風雲雷雨之生龍不蠢然一物乎曰君誤認龍骨為真乎世間所用之龍骨乃地氣結成非天上行雨之龍也夫神龍見尾而不見首首且不使人見豈有骸聽人之採取乎惟龍骨乃地氣所結不能變化所以取之而無礙耳或又問龍骨既為地氣所結宜得地氣之深性當屬陰而不當屬陽矣何龍齒安魂而不安魄耶曰虎屬陰而龍屬陽龍為火而虎為金不易之道也龍生於地下宜為陰則虎生於地上亦可為陽乎萬物皆生於天地之中無陰則陽不生無陽則陰不長虎生於地上未嘗不得陽之氣龍生於地下亦未嘗不得陰之氣也然而虎得陽而生而虎終不可謂陽之精龍得陰而生而龍終不可謂陰之精也夫陽氣者生氣也陰氣者殺氣也生氣屬木而人身之肝氣應之殺氣屬金而人身之肺氣應之肺中藏魄肝中藏魂魂動似宜用虎睛以相制魄飛似宜用龍齒以相伏何以用虎睛制魂而魂愈動用龍齒制魄而魄愈飛也蓋魂動者陽氣動也以陽引陽而魂始歸魄飛者陰氣飛也以魄招魄而魄始降龍齒正得陽氣故能安魂虎睛正得陰氣故能鎮魄誰謂龍骨生於地即屬陰物哉或問龍骨製法古人有用黑豆煮汁以泡之者或用酒浸一宿而用之者或用香草湯洗過搗粉絹袋盛之入於燕子腹中懸井上一宿而用之者或用醋淬而研末用者畢竟何法制最佳曰皆可用也用燕子制者最神蓋燕子為龍之所喜龍得燕而動龍骨遇燕子自然流動而無過澀留腸之害矣海螵蛸海螵蛸味鹹微溫無毒主女子漏下赤白經行血閉陰蝕腫痛又治婦人寒熱瘕症驚風入腹環腹痛去目腫浮翳收瘡口腐膿治哮症最神效亦藥籠中宜備之物或問海螵蛸即烏賊魚骨他本云服之令人有子先生何不言也曰男子腎虛則精涸女子肝傷則血枯皆非有子之兆烏賊魚骨雖入肝腎不能大補其精血徒藉此物即終年飽食又何能生子哉批翻前人舊案實有至理非好辨也紫河車紫河車味甘氣大溫無毒入五臟六腑初産者良亦不必盡拘焙乾可用不可洗去筋膜洗去反不佳以泄其元氣也療諸虛百損癆瘵傳尸治五癆七傷骨蒸潮熱喉咳喑啞體瘦發枯吐衄赤紅並堪制服男女皆益世有埋藏地下久化為水名曰河車水則無功效矣祛狂祛疫亦虛言也或問紫河車乃胞衣兒已脫離於胞則胞中元氣盡泄胞宜無用矣何以古來本草盡稱其補益而神農乃尊之為上品乎曰人之初生先生胞而後生人及胞之破先産人而後下胞是胞乃先天之母氣亦後天之父氣也故兒雖脫離於胞而陰陽之氣未散仍存於胞也人得此胞而生身體自然可得此胞而生氣血也或者曰胞在腹中則元氣未漓胞落地下則元氣盡失總之胞是先後天之父母又安能生無根之氣血乎雖然胞成於陰陽之氣是胞即陰陽之根也凡花木之根得土氣而重生人身何獨不然胞入於脾胃之中自然生氣勃發況又益之以補氣補血補精之品則氣得根而再壯血得根而再溢精得根而再滿矣古人所定大造丸尚未得天地之奧服之效驗亦是平常遂疑紫河車非出奇之物棄而不用為可惜也鐸蒙岐天師祕傳乾坤化育丹用熟地人參白朮為君用當歸山茱萸巴戟天為臣用茯苓蓯蓉枸杞子麥冬北五味山藥芡實柏子仁棗仁巨勝子牛膝為佐用沙參甘菊覆盆子遠志蓮子心附子為使以治下寒無火元陽不舉之客絶非大造丸功效可比鐸雖不盡載分兩而智者見君臣佐使之分明亦可意會而心得之也批紫河車實生人之根故用之可以接續命根實非虛語乾坤化育丹較大造丸更奇十倍或疑紫河車既為先天之母後天之父與紫河車同生之臍帶又何獨非乾坤化育之丹乎曰臍帶之功雖不及於紫河車而補益之功大非草木可比蓋臍帶為接續之關實性命之根蒂也兒雖墮地已離於胎元而先天之祖氣尚未絶於帶內凡氣弱者可接之以重壯氣短者可接之以再延氣絶者可接之以再活後天既老得先天而再造者其斯之謂乎然修合服食之不得其法終亦不能獲效鐸受奇方共傳於世名為造化丹用臍帶二十條文火焙乾為末入人參黃耆白朮玄參沙參五味子麥冬山茱萸熟地沙苑蒺藜菟絲子淫羊藿巴戟天炒棗仁遠志砂仁茯神肉桂枸杞當歸杜仲牛膝之末共蜜搗為丸每日吞食其方如此其分兩可酌定矣倘照方修服必返少為童也批臍帶與胞胎之功相同而造化丹與乾坤化育丹正不相上下也或謂紫河車乃人之胞也食胞以圖資益不猶食人以供口腹乎吾恐獲罪於天又何延年之有曰此知一而昧一也天地無棄物即無棄功胞胎雖人之命根然人既墮於胞胎之中則胞胎棄而無用矣神農取無用者而指之為延生之具後聖即體神農之意而造為方法以續人之命是無用者成有用非參贊造化之大功乎又何獲罪於天之有哉或疑紫河車乃大熱之物食之最能動火凡陰虛火動之人恐不宜食耳曰紫河車大溫非大熱也陰虛火動正宜食之蓋火動由於水衰水衰者精少也紫河車乃生人之母即生精之母也精生於溫而不生寒大寒不生精而大溫至生精也況紫河車又生精之母氣乎其相得之宜不啻如水銀之見金倘以大熱疑之不治陰虛火動之人則惑矣批紫河車生精之母氣即生火之母氣也火生於精之中何疑乎或疑紫河車為生精之母氣亦因其藏子而言之也夫兒已墮矣破釜安能煮物乎曰紫河車為生人之母子雖生而母氣未絶也母能生子自是陰陽之至理況紫河車天性溫熱溫熱之物未有食之而不生精者也況又是先天之母氣乎人乳人乳味甘氣平寒無毒酒調服良口吮更妙入肺胃脾腎補精血益元陽肌瘦皮黃毛髮焦稿者速覓筋攣骨痿腸胃祕澀者當求健四肢榮五臟明眼目悅容顏安養神魂滑利關格或問人乳即血也乳通則經閉非明驗乎曰以乳為血則可以乳為經則不可也子生而乳通乳通而身旺其故何歟産婦未有不血虧者血虧則宜無乳何以生子不三日而乳即下通是人乳非血可知矣雖然以人乳為非血則又不可乳乃水也血亦水也血化為乳自是至理而余曰人乳非血所生乃氣生之也産婦至二三日止有氣存氣存自能生血生血而後能生乳故遺氣而但言血此余之所以辨也至女子月信乃血之餘也血滿則溢血少則止血枯則閉故經之有無視血之盛衰也世往往有壯健之婦上通乳而下又通經羸弱之女下斷經而上斷乳血有餘者上既能升而下亦能降血不足者下不能降而上又何能升哉故以乳為血則可以乳為月經之上升而成汁者斷斷不可也總之氣行則血行氣足則血足氣血行則乳行氣血足則乳足血能下降為經而經不能上升為血猶之氣能上變為乳而乳不能上升為氣也然則人乳乃氣血所生其補益氣血何必言辭之辨哉或問乳乃氣變而成安得遽生其乳吾疑乃血生而非氣生經助血以生乳而非氣行經以變乳也曰乳乃有形之物也而血與經亦皆有形有形安得化有形哉惟氣乃無形無形者有形之母也無形之氣以生有形之乳不必再辨惟是經助血以生乳非氣行經以變乳之説不可不辨也子謂血即經而經即血也誰知血之有餘則流為經而經之有餘不能反為血蓋經乃敗血非活血也活血則能助氣以生乳而敗血不能變經而生血經既不能變血又何能生乳哉然而人身之血有限而乳房之汁無窮此或疑為經之助血以生之不知實氣之行經而變之氣行則血行血行則血無瘀滯之憂而有變化之妙上通於乳房而成乳不下走於陰竅而為經此實有大道存焉而非一偏之見可以私臆之也或又問乳即是氣所成何以乳有清乳濃乳之別非血虛之故乎曰此正氣虛之故也氣虛則血虛故乳汁清兒食之必有黃瘦之憂氣旺則血旺故乳汁濃兒食之必有肥白之喜世有婦人生子自乳第二月又懷子者正氣足而能納精血旺而能蔭胎也然而所乳之子必然多病即或肥白而長年者常少正見血有餘而氣不足也氣之生乳不益可見乎或問氣化乳而色白者宜也今曰氣血同化而成乳血色赤而乳色白又何變之耶曰乳色之白正見氣變乳之驗也氣生血而成赤氣生乳而成白是乳乃氣未變之血也氣變血而腥氣變乳而甘者又是何故經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺肺通水道食氣入胃濁氣歸心淫精於脈脈氣流經經氣歸於肺故飲食之氣雖遍輸於五臟六腑而其先入者必歸於肺而化其津液也乳房在於肺之間所以生乳最先而色白者雖氣之色亦肺之色也肺屬金而金色白又何疑乎倘是血化為乳毋論色赤者不能變白而血亦何能遽變為乳以供小兒日夜之吞咽乎惟氣則易生而易化然而氣之所化者又資於胃土之生也土之味甘乳得胃土之氣故其味亦甘又乳房為胃土之室胃氣生乳而乳歸胃更無可疑小兒得乳則生生於胃氣也然則人苟食乳又何獨不生氣血乎氣者得於天之陽也血者得於地之陰也陰有質而陽無質天氣下降則霪雨盈川而天之氣未嘗耗也故人之氣至即生津液血能耗而氣不能耗似乎食乳不若食氣之為妙不知乳乃氣之初氣不比血之終氣也是以食乳之功效不亞於採先天無形之氣也胎髮胎髮乃血之嫩苗老景得之甚補衰涸至於血餘補陰甚捷諸血症服之即止其餘本經所載未見其效也凡用俱須洗淨燒灰存性入湯劑調服蓋發之味苦發之氣溫有益無損故取之以為止血救急之味也童便秋石童便氣涼無毒徹清者良祛癆熱咳嗽止鼻紅吐衄治跌撲傷損療産後敗血攻心難産胎衣不下毒蛇狾犬咬傷俱可治之秋石人童便而煎熬法煉者也無分男女皆可有益也滋腎水返本還元養丹田歸根覆命安和五臟潤澤三焦消咳逆稠痰退骨蒸邪熱積塊較堅堪用臌脹代鹽可嘗明目清心延年益壽此二種治病實佳所謂臭腐出神奇也但秋石可以多用而童便不宜多吞也或問童便治吐血甚神不識可長服否曰童便可暫飲而不可久服也雖曰服寒涼百不一生服童便百不一死然童便氣涼多服未免損胃或問童便而煎熬秋石畢竟何者為佳夫秋石陰陽之煉不同以陰煉者為第一但陰煉氣臭不若陽煉之無氣臭也然而陰煉得法實不臭也我有一法傳世取童便十五歲以下者俱可用每一桶用水二桶合之盛於缸內上用淨布鋪在缸上下用竹架之不使布之沉底露一宿取布曬於烈日之下布上即結成霜以鵝翎掃之即成秋石矣但布須浮於童便水上不可使其竟沉要布濕而又不幹為妙一桶童便可取秋石二兩蓋童便得水其性反浮又得水則盡化去其臭氣非異人之傳安得此異法哉凡童便積旬日皆可用惟一合井水必須一日即取其霜久則無用也或問人有服自己之小便者名曰反元湯亦有益乎夫吐血之症其氣必逆用反元湯以逆而平其逆也服之有功倘未嘗失血其氣原無逆症服之反致動逆與童便之功實有不同耳浣褲汁浣褲汁解箭毒並治傷寒女癆陰陽易俱效男用女女用男剪下對陰處才靈童男女者力強易效月經布燒灰解藥箭毒神驗此等物不可存於藥籠必致諸藥不效然不可不知以救世病也陰陽易之病甚多有男易男女易女者又不可不知男則交男而易男女同淨桶而交於女又不可男用女女用男之浣褲汁也須男用男女用女治之可耳要無不神效者也月水婦人月水治女勞復最神經衣灰可止血方士取首經入之茯苓之中為延齡神藥且能治癆損此物至神之藥亦至穢之物也上士用之以得仙非至神乎凡世人修合丸散興至吉祥事及小兒出痘生瘡皆避忌如犯之吉變凶藥不靈瘡痘變壞非至穢乎然而至穢之物出於至神之內也蓋經水者天癸之水也女子二七而天癸至任脈通太衝脈盛而經水時下時下者及其時而至也故此水為天一所生乃先天之氣所成後天之氣所化無形而變為有形也所以上應月下應潮一月一行與海與太陰相合也陰中至陽能補陰生陽方士美其名曰紅鉛其實即首經也是至神之物何以又成為至穢乎蓋月水未出於兒門則月水含至陽之氣月水一出於兒門則月水成至陰之形純陽而變為純陰全是殺氣而非生氣矣生氣可親而殺氣難犯又何疑乎此所以成為穢物耳非因其出於兒門而謂穢也或問月水既是穢物方士取入茯苓之中以接命不知首經與尋常月水又何以不同曰首經雖齣兒門而陽猶未化不比尋常月水盡化為陰故可用之以接陽且癆瘵微軀往往多祟憑其身正欲借穢以逐祟以祟最惡穢也所以用之相宜耳或問經水可治女勞之復其義何居曰此前人之所未發也女勞之復熱毒而入於無病之人原不必用風散解熱之品以傷人之元氣故用經水之布浣其汁而飲之引其熱而下行則其毒易出蓋經水原是下行之物不肯留住於腹中引熱下行所以最速非取其補陰中之精也或問經水既是行物何以又能止血耶曰凡血得厭穢之物皆能止血經水正穢物也故用之而效金瘡箭簇古人皆用之亦此意耳水天雨水性輕清味甘淡諸水之上也四時俱可用而夏日尤佳大旱之後得雨必須收貯飲之可以卻病或問本草載天雨水性寒而君曰性輕清何也曰凡水性皆寒獨湯泉性熱然流出於外溫亦變寒何獨於天雨之水性獨寒耶是水皆寒豫所以不言其寒也天之氣最清故天氣屬陽陰氣重而陽氣清理也天之雨水雖地氣所化然天氣不交於地則地之氣終不能化雨是雨水仍是天氣所生而非地氣也既得天之氣為多安得不輕且清哉或問立春節雨水夫婦飲之易於得孕驗乎不驗乎曰春為陽氣之首立春之雨水似乎得發育之義然而男女媾精始能生子未聞媾水而可以得男者也此説尚在可信不可信之間未可全恃飲立春之水便為種子奇方也或問梅雨水何以有毒也曰梅雨水味甘性平安得有毒因天氣鬱蒸水易化物凡不變之物得之變化故水漿則易熱也沾水則易斑也造酒醋則改味也浣衣則去垢也其實何嘗有毒哉倘久貯之不特無毒並能化毒耳或問芒種後逢壬為入梅小暑後逢壬為出梅立冬後十日為入液至小雪為出液有之乎曰此月令載之余何敢辨其非但謂百蟲飲液內之水盡皆伏蟄宜制殺蟲藥餌此則鐸所不信也倘液內無雨蟲不飲水即不蟄乎蟲既不蟄而修合藥餌豈皆不效乎大約百蟲交冬則俯俯即蟄也安在必飲液內之雨水哉或問臘雪水藏物則不蛀不壞豈亦有義乎曰安得無義哉冬氣收藏乃乾坤不交之時也冬日天雨則乾坤不交而交也不交而交似乎冬氣之不藏矣然而天雨則天氣交於地天雨而變為雪則地氣交於天而天氣仍不交於地也天氣既不交於地則雪之氣純是孤陰而無陽孤陰不長不長則不化故藏物而蟲不生而味亦不變也豈惟不生蟲哉且能殺蟲蓋陰主殺也所以冬至後之水為臘水密封陰處亦能藏物正取其純陰不陽而又居於至陰之地也一過冬交春天所雨雖變為雪藏物未有不生蟲而敗壞者正以其陰中藏陽耳或問雪與冰之性味同乎曰不同也雪味淡而性寒冰味甘而性寒淡而寒者可以滌冬日之熱邪甘而寒者可以解夏日之暑邪然而二味雖解冬夏之邪而多飲反致助邪蓋寒熱相激久而從邪邪不去而相留於腹中轉難速愈故只可暫解其熱而不可久恃其寒也或問露水亦天一之水也服之必能益人曰露水可內治而亦可外治也外治者取七夕之水洗目最佳然不可取凌霄花上之露反致損目矣內治者最善解肺金之燥然必須五更之時取之百草頭上者為佳古人取秋露以造酒名曰秋露白亦取其解肺氣之乾涸也秋露大能入五臟之陰用藥欲入陰分者必須用之為引經之味非秋露之竟能益五臟也得補陰藥同用實奏奇功或問半天河水得毋有毒乎曰在枯竹梢內取之者無毒若空樹中取之者防有蛇蠍之毒半天河水取其水未入於地也愚意用半天河水不若取天雨水而不落地者為佳恐取水之時正值無雨之候不得已取半天河水可也或問簷下雨水與屋漏水何殊乎然人飲之有病有不病者何也曰屋漏水則同塵而下不潔亦甚矣難免百蟲之穢不特味苦性寒而且有大毒故食之殺人若簷下之水瓦片之中久雨沖淋即有蟲穢得雨而化故飲之無恙若初雨之時蟲穢猶存毒難盡解飲之雖不殺人安得免於疾病乎或問冬霜亦雪之類雪可能解冬日之熱邪不識冬霜亦能解之乎曰冬霜味甘性寒與雪相同然而功用實別霜可外治而不可內服外治熱毒最效隨掃隨干隨干隨輕矣若內治熱症下喉少快一入腹內則腹痛矣蓋冬霜肅殺其氣太剛五臟之熱乃假熱居多一遇真寒其假立破不敢爭鬥反覓路逃遁有不可入之路亦入矣故不可輕用也或問冰雹之水亦霜雪之類亦可入藥乎曰冰雹乃天地乖戾之氣降之以災害世人也乖戾之氣烏可入藥乎人誤吞之必有奇災蓋其味鹹而氣腥乃毒龍取海水而變者也切忌用藥或問流水亦有分別乎曰流水不同有江水有河水有溪水有澗水而水之中又分逆流水順流水大約以源長順流者為佳而順流者又以東流者為更佳取其流入生方也然病有順逆有時取逆流者欲因其逆而逆之正取其逆而仍順也勞水者即取流水而揚之千萬遍後以入藥乃煉生為熟之法也或問井水與流水異乎曰性寒則同味之甘鹹淡則異也用井水不若用流水為佳然有時入藥有必用井水而不可用流水者取其靜也井水得地氣俱多取平旦之井華水者為天一之水又取其地中而得天氣也故井水在屋內者有小毒正以其純陰而無陽耳古人投入丹砂者化其陰氣也井水沸溢亦不可飲此純陰欲變也變而未化飲之腹脹也投管仲二枚亦佳一年投兩次足矣有毒盡化或問山岩泉水亦各不同乎曰不同岩水從石壁上墮下者可飲余不可輕用恐黑土毒木惡草之中有蛇蟲伏之則有毒飲之殺人山中泉水尤好者乳泉也乳泉亦有不同有從沙中出者有從石骨中出者石骨為上沙中次之其味甘溫不比他水皆寒也然乳泉初取之時其氣微腥其色少濁隔宿則澄清香冽飲之可以卻病久服難老取其為石中之液也倘隔宿而腥且濁者又不可用蓋山質不佳也或問水性寒彼溫泉之水為熱而不可飲者何也曰溫泉非不可飲且有不可浴者蓋亢陽之水也純陽無陰故水寒變熱耳凡人陽旺而陰衰者為多飲水所以濟陽也飲溫泉反去助陽自然無益況所助者又邪陽而非真陽乎故不可飲也或問人身之精應海中之水宜海中為補陰之味何以食鹽則有益而服海水則無功且多飲鹽滷竟至喪命耶曰腎水雖應海水言其氣味也非言海水即腎水也腎水乃先天之水無形之水也海水乃後天之水有形之水也有形烏能補無形哉食鹽有益於腎水者以水經火化也火亦無形故能入於無形之中然多食則過助火矣亦必無功猶之多飲海水純是火化而成今無陰氣且味又大苦苦先入膜使不得入而心之氣不通鹽滷見心不受乃下犯於因其味大苦又堅閉不受腎之氣亦不通矣於是流入收縮其氣必至腸結而死矣何能助腎而受益乎或問陰水既無益於人何故醫家又用地漿之水耶曰病陽無陰者不得不用地漿之水掘地作坑以新汲井水投入攪濁澄清服之取其純陰而又得土氣與井水又不同耳凡水有土氣皆不傷脾胃之氣毒物遇之解邪熱得之去也或問西北人好飲酸漿水亦有益乎曰漿水亦能解渴行路困乏人得而飲之亦有益但久則有損蓋酸漿水炊飲投入韭菜之中久則菜與飯皆敗南方三日尚可飲北方七日尚可啜南方過三日北方過七日俱不可用矣用則無益有損以此過於酸則必伐肝氣過於臭則反敗脾婦人服之必至絶經孕婦服之必至胎瘦不可不慎也或問百沸湯古人所尚愚以為太熱而無生氣矣曰凡飲茶湯亦不可過沸過沸則其性太急五臟氣然又不可不沸而即飲飲之往往腹脹以或問半滾湯既不可用何以陰陽水醫家用陽水非可常用之物也因病陰陽反覆故用合以灌之取其不陰不陽因其亂而亂之以動其吐陰陽各歸陽也倘無病而妄吐之則反亂陰陽矣烏或問澤中池塘之水亦可飲乎曰凡不流動之水皆不五六月間尤忌恐蛇蟲魚鱉之交而流精於水中誤飲秋冬亦無害然總不若飲井水之為得也或問水不可飲止此乎曰吾就日用之所需者言之耳若推其變則忌飲者甚多如浸花之水銅器貯水經宿水而有五色之光者古井之水混濁之水皆不可飲也火火性不同皆可炊焚今世取人大約火也其實火之資益關於疾病壽夭火非無意也今人不講者以爐灶石火取之法誰知鑽燧之火有益於人不淺乎我今闡發其義君子採擇焉春宜取榆柳之火蓋榆柳之氣得春氣最早葉先百木而青取其火以生春氣則一春無鬱結之病也夏宜取棗杏之火蓋棗杏之氣得夏氣最全故其心純赤取其火以長夏氣則一夏無吐瀉之病也秋宜取柞楢之火蓋柞楢之氣得秋氣俱多故其理皆白取其火以收秋氣則一秋無瘧痢之病冬宜取槐檀之木蓋槐檀之木得冬氣甚堅火以藏冬氣則一冬無寒凜之病也長夏宜取桑柘之柘之木得長夏和氣故其肌為黃取其火以合四時之夏無濕熱之病也上古之人無有疴疾者雖性情恬火之益也今世所用灶之火此傳薪之未免雜而不純烏能卻病哉至於石中損又不若傳薪之火矣夫延年即以益壽哉修仙之士專尚水火可不留
